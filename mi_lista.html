<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieM | Mi Lista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
        .text-accent{color:var(--accent-color,#dc2626)}.bg-accent{background-color:var(--accent-color,#dc2626)}
        .fade-in{animation:fadeIn .6s ease forwards;opacity:0}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .skeleton{animation:pulse 1.5s infinite ease-in-out}
        @keyframes pulse{0%{background-color:rgba(39,39,42,.6)}50%{background-color:rgba(63,63,70,.6)}100%{background-color:rgba(39,39,42,.6)}}
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans min-h-screen">

<nav class="fixed top-0 w-full z-50 bg-zinc-950/90 backdrop-blur-xl border-b border-white/5 px-4 md:px-8 py-4">
    <div class="flex justify-between items-center max-w-6xl mx-auto">
        <h1 onclick="location.href='index.html'" class="text-xl md:text-2xl font-black italic tracking-tighter cursor-pointer">MOVIE<span class="text-accent">M</span></h1>
        <button onclick="location.href='index.html'" class="text-xs font-bold uppercase tracking-widest text-zinc-400 hover:text-white transition">&larr; Volver</button>
    </div>
</nav>

<main class="max-w-6xl mx-auto px-4 md:px-8 pt-24 pb-28 md:pb-12">

    <div id="estadoCargando" class="fade-in">
        <div class="h-9 w-36 skeleton rounded-xl mb-3"></div>
        <div class="h-4 w-56 skeleton rounded mb-10"></div>
        <div class="grid grid-cols-3 md:grid-cols-6 gap-3 md:gap-6">
            <div class="aspect-[2/3] skeleton rounded-2xl"></div>
            <div class="aspect-[2/3] skeleton rounded-2xl"></div>
            <div class="aspect-[2/3] skeleton rounded-2xl"></div>
            <div class="aspect-[2/3] skeleton rounded-2xl hidden md:block"></div>
            <div class="aspect-[2/3] skeleton rounded-2xl hidden md:block"></div>
            <div class="aspect-[2/3] skeleton rounded-2xl hidden md:block"></div>
        </div>
    </div>

    <div id="estadoNoLogin" class="hidden flex-col items-center justify-center py-24 text-center fade-in">
        <div class="w-16 h-16 bg-zinc-900 rounded-full flex items-center justify-center mb-5 border border-white/5">
            <svg class="w-7 h-7 text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </div>
        <h3 class="text-xl font-black uppercase tracking-tighter mb-2">Inicia sesion</h3>
        <p class="text-zinc-500 text-sm mb-6">Necesitas una cuenta para guardar peliculas.</p>
        <button onclick="location.href='index.html'" class="bg-accent text-white px-8 py-3 rounded-full font-black uppercase text-xs tracking-widest">Ir al inicio</button>
    </div>

    <div id="estadoVacio" class="hidden flex-col items-center justify-center py-24 text-center fade-in">
        <div class="w-16 h-16 bg-zinc-900 rounded-full flex items-center justify-center mb-5 border border-white/5">
            <svg class="w-7 h-7 text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
        </div>
        <h3 class="text-xl font-black uppercase tracking-tighter mb-2">Tu lista esta vacia</h3>
        <p class="text-zinc-500 text-sm mb-6">Guarda peliculas desde su pagina de detalle.</p>
        <button onclick="location.href='index.html'" class="bg-accent text-white px-8 py-3 rounded-full font-black uppercase text-xs tracking-widest">Explorar Peliculas</button>
    </div>

    <div id="contenidoLista" class="hidden fade-in">
        <header class="mb-8">
            <h2 class="text-2xl md:text-4xl font-black italic uppercase tracking-tighter mb-1">Mi Lista</h2>
            <p class="text-zinc-500 text-sm">Todo lo que guardaste para ver despues.</p>
        </header>

        <!-- Sección Películas -->
        <div id="seccionPeliculas" class="hidden mb-12">
            <div class="flex items-center gap-3 mb-5">
                <h3 class="text-xs font-black uppercase tracking-widest text-zinc-400">Peliculas</h3>
                <div class="h-px flex-1 bg-zinc-800/60"></div>
                <span id="countPeliculas" class="text-[10px] font-black text-zinc-600 uppercase tracking-widest"></span>
            </div>
            <div id="gridPeliculas" class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 md:gap-6"></div>
        </div>

        <!-- Sección Series -->
        <div id="seccionSeries" class="hidden">
            <div class="flex items-center gap-3 mb-5">
                <h3 class="text-xs font-black uppercase tracking-widest text-zinc-400">Series</h3>
                <div class="h-px flex-1 bg-zinc-800/60"></div>
                <span id="countSeries" class="text-[10px] font-black text-zinc-600 uppercase tracking-widest"></span>
            </div>
            <div id="gridSeries" class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 md:gap-6"></div>
        </div>
    </div>
</main>

<!-- Bottom nav mobile -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 z-50 bg-zinc-950/95 backdrop-blur-xl border-t border-white/5">
    <div class="flex items-center justify-around py-3 px-2">
        <a href="index.html" class="flex flex-col items-center gap-1 text-zinc-500">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Inicio</span>
        </a>
        <a href="mi_lista.html" class="flex flex-col items-center gap-1 text-accent">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Mi Lista</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 text-zinc-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.361a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Series</span>
        </a>
        <a href="perfil.html" class="flex flex-col items-center gap-1 text-zinc-500">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Cuenta</span>
        </a>
    </div>
</nav>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import{getFirestore,doc,getDoc}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyAn5N7m7EhICK2aZG4Nx8DIW9RZd9kK1DA",authDomain:"moviem-5b73d.firebaseapp.com",projectId:"moviem-5b73d",storageBucket:"moviem-5b73d.firebasestorage.app",messagingSenderId:"843796138544",appId:"1:843796138544:web:c2bde9b39d437b84d97bf5"});
const auth=getAuth(app),db=getFirestore(app),API_KEY='86dfc26f9d7b8c9957129a1d7a173ddc';
var color=localStorage.getItem('movieM_color');if(color)document.documentElement.style.setProperty('--accent-color',color);

function mostrar(id){['estadoCargando','estadoNoLogin','estadoVacio','contenidoLista'].forEach(function(s){var el=document.getElementById(s);el.classList.add('hidden');el.classList.remove('flex');});var el=document.getElementById(id);el.classList.remove('hidden');if(id==='estadoNoLogin'||id==='estadoVacio')el.classList.add('flex');}

function crearCardPelicula(p) {
  var poster=p.poster_path?'https://image.tmdb.org/t/p/w500'+p.poster_path:'https://via.placeholder.com/500x750?text=?';
  var div=document.createElement('div');div.className='group cursor-pointer';
  div.onclick=function(){location.href='pelicula.html?id='+p.id;};
  div.innerHTML='<div class="relative aspect-[2/3] overflow-hidden rounded-xl md:rounded-2xl border border-white/5 group-hover:border-accent transition-all duration-500 shadow-xl">'
    +'<img src="'+poster+'" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy">'
    +'<div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-end p-3"><span class="text-yellow-500 text-xs font-bold">&#11088; '+(p.vote_average?p.vote_average.toFixed(1):'-')+'</span></div>'
    +'</div>'
    +'<h4 class="mt-2 text-[10px] md:text-sm font-bold truncate uppercase tracking-tighter group-hover:text-accent transition">'+(p.title||p.name)+'</h4>'
    +'<p class="text-[9px] text-zinc-600 font-bold uppercase">'+((p.release_date||p.first_air_date||'').split('-')[0])+'</p>';
  return div;
}

function crearCardSerie(s) {
  var poster=s.poster_path?'https://image.tmdb.org/t/p/w500'+s.poster_path:'https://via.placeholder.com/500x750?text=?';
  var div=document.createElement('div');div.className='group cursor-pointer';
  div.onclick=function(){location.href='serie.html?id='+s.id;};
  div.innerHTML='<div class="relative aspect-[2/3] overflow-hidden rounded-xl md:rounded-2xl border border-white/5 group-hover:border-accent transition-all duration-500 shadow-xl">'
    +'<img src="'+poster+'" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy">'
    +'<div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-end p-3"><span class="text-yellow-500 text-xs font-bold">&#11088; '+(s.vote_average?s.vote_average.toFixed(1):'-')+'</span></div>'
    +'<div class="absolute top-2 left-2 bg-black/70 text-[8px] font-black uppercase tracking-widest px-2 py-0.5 rounded text-zinc-300">Serie</div>'
    +'</div>'
    +'<h4 class="mt-2 text-[10px] md:text-sm font-bold truncate uppercase tracking-tighter group-hover:text-accent transition">'+(s.name||s.title)+'</h4>'
    +'<p class="text-[9px] text-zinc-600 font-bold uppercase">'+((s.first_air_date||'').split('-')[0])+'</p>';
  return div;
}

onAuthStateChanged(auth,async function(user){
  if(!user){mostrar('estadoNoLogin');return;}
  try{
    var snap=await getDoc(doc(db,'usuarios',user.uid));
    if(!snap.exists()){mostrar('estadoVacio');return;}
    var data=snap.data();
    if(data.color)document.documentElement.style.setProperty('--accent-color',data.color);

    var watchlist=data.watchlist||[];
    var seriesWatchlist=data.seriesWatchlist||[];

    if(!watchlist.length && !seriesWatchlist.length){mostrar('estadoVacio');return;}

    // Cargar películas y series en paralelo
    var [pelis, series] = await Promise.all([
      watchlist.length ? Promise.all(watchlist.map(function(id){return fetch('https://api.themoviedb.org/3/movie/'+id+'?api_key='+API_KEY+'&language=es-ES').then(function(r){return r.json();});})) : Promise.resolve([]),
      seriesWatchlist.length ? Promise.all(seriesWatchlist.map(function(id){return fetch('https://api.themoviedb.org/3/tv/'+id+'?api_key='+API_KEY+'&language=es-ES').then(function(r){return r.json();});})) : Promise.resolve([])
    ]);

    // Películas
    var pelisValidas = pelis.filter(function(p){return p&&!p.status_code;});
    if(pelisValidas.length){
      var gridP=document.getElementById('gridPeliculas');gridP.innerHTML='';
      pelisValidas.forEach(function(p){ gridP.appendChild(crearCardPelicula(p)); });
      document.getElementById('countPeliculas').textContent=pelisValidas.length+' titulo'+(pelisValidas.length!==1?'s':'');
      document.getElementById('seccionPeliculas').classList.remove('hidden');
    }

    // Series
    var seriesValidas = series.filter(function(s){return s&&!s.status_code;});
    if(seriesValidas.length){
      var gridS=document.getElementById('gridSeries');gridS.innerHTML='';
      seriesValidas.forEach(function(s){ gridS.appendChild(crearCardSerie(s)); });
      document.getElementById('countSeries').textContent=seriesValidas.length+' titulo'+(seriesValidas.length!==1?'s':'');
      document.getElementById('seccionSeries').classList.remove('hidden');
    }

    mostrar('contenidoLista');
  }catch(e){console.error(e);mostrar('estadoVacio');}
});
</script>
</body>
</html>

<main class="max-w-6xl mx-auto px-4 md:px-8 pt-24 pb-28 md:pb-12">

            <div class="aspect-[2/3] skeleton rounded-2xl hidden md:block"></div>
        </div>
    </div>

    <div id="estadoNoLogin" class="hidden flex-col items-center justify-center py-24 text-center fade-in">
        <div class="w-16 h-16 bg-zinc-900 rounded-full flex items-center justify-center mb-5 border border-white/5">
            <svg class="w-7 h-7 text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>

    </div>

    <div id="estadoVacio" class="hidden flex-col items-center justify-center py-24 text-center fade-in">
        <div class="w-16 h-16 bg-zinc-900 rounded-full flex items-center justify-center mb-5 border border-white/5">
            <svg class="w-7 h-7 text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>

    <div id="contenidoLista" class="hidden fade-in">

            <p id="subtitleLista" class="text-zinc-500 text-sm"></p>

        <!-- LISTAS PERSONALIZADAS -->
        <section id="secListas" class="mb-10 hidden">
            <div class="flex items-center justify-between mb-5">
                <h3 class="text-base md:text-xl font-black italic uppercase tracking-tighter flex items-center gap-2">

                    <span id="cntListas" class="text-xs font-bold text-zinc-500 normal-case italic tracking-normal"></span>

                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
                    </button>
                </div>
            </div>
            <div class="relative overflow-hidden">

                     style="scroll-snap-type:x mandatory;" onscroll="actualizarFades('pelis')">
                </div>

            </div>
        </section>

        <!-- SERIES -->
        <section id="secSeries" class="mb-10 hidden">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-base md:text-xl font-black italic uppercase tracking-tighter flex items-center gap-2">
                    <span class="w-1 h-5 bg-accent rounded-full inline-block"></span> Series

                </h3>

                    </button>
                    <button id="btnNextSeries" onclick="scrollCarrusel('filaSeries',1)"
                        class="w-9 h-9 rounded-full bg-zinc-800 border border-white/10 flex items-center justify-center hover:bg-accent transition active:scale-95 disabled:opacity-30">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
                    </button>
                </div>

                <div id="filaSeries" class="flex gap-3 overflow-x-auto no-scrollbar scroll-smooth pb-2"

function mostrar(id){['estadoCargando','estadoNoLogin','estadoVacio','contenidoLista'].forEach(function(s){var el=document.getElementById(s);el.classList.add('hidden');el.classList.remove('flex');});var el=document.getElementById(id);el.classList.remove('hidden');if(id==='estadoNoLogin'||id==='estadoVacio')el.classList.add('flex');}

window.actualizarFades=function(tipo){var filaId=tipo==='pelis'?'filaPelis':'filaSeries';var fila=document.getElementById(filaId);if(!fila)return;var atLeft=fila.scrollLeft<=10;var atRight=fila.scrollLeft>=fila.scrollWidth-fila.clientWidth-10;document.getElementById('fadeL'+(tipo==='pelis'?'Pelis':'Series')).style.opacity=atLeft?'0':'1';document.getElementById('fadeR'+(tipo==='pelis'?'Pelis':'Series')).style.opacity=atRight?'0':'1';var prevBtn=document.getElementById('btnPrev'+(tipo==='pelis'?'Pelis':'Series'));var nextBtn=document.getElementById('btnNext'+(tipo==='pelis'?'Pelis':'Series'));if(prevBtn)prevBtn.disabled=atLeft;if(nextBtn)nextBtn.disabled=atRight;};

function crearCard(item,tipo){
    var id=item.id,titulo=item.title||item.name||'',anio=(item.release_date||item.first_air_date||'').split('-')[0],rating=item.vote_average?item.vote_average.toFixed(1):'-',poster=item.poster_path?IMG+item.poster_path:'https://via.placeholder.com/500x750?text=?',href=tipo==='pelicula'?'pelicula.html?id='+id:'serie.html?id='+id;
    var div=document.createElement('div');div.className='shrink-0 group cursor-pointer';div.style.cssText='width:calc((100% - 4*0.75rem)/5);min-width:110px;max-width:160px;scroll-snap-align:start';div.onclick=function(){location.href=href;};
    div.innerHTML='<div class="relative aspect-[2/3] overflow-hidden rounded-xl border border-white/5 group-hover:border-accent transition-all duration-300 shadow-xl mb-1.5"><img src="'+poster+'" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" loading="lazy"><div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-end p-2"><span class="text-yellow-500 text-[10px] font-bold">&#11088; '+rating+'</span></div></div><p class="text-[10px] font-bold truncate uppercase tracking-tighter group-hover:text-accent transition">'+titulo+'</p><p class="text-[9px] text-zinc-600 font-bold">'+anio+'</p>';
    return div;
}

function crearCardLista(lista) {
    const items = lista.items || [];
    const preview = items.slice(0,3);
    const div = document.createElement('div');
    div.className = 'bg-zinc-900/50 border border-white/5 rounded-2xl p-4 hover:border-accent/30 transition cursor-pointer group';
    div.onclick = function() { abrirDetalleLista(lista.id, lista.nombre); };
    const previewHTML = preview.map(it => `<div class="w-10 h-14 rounded-lg overflow-hidden border border-white/5 shrink-0"><img src="${it.poster||'https://via.placeholder.com/80x120?text=?'}" class="w-full h-full object-cover"></div>`).join('');
    div.innerHTML = `
        <div class="flex items-start gap-3 mb-3">
            <div class="flex gap-1">${previewHTML || '<div class="w-10 h-14 rounded-lg bg-zinc-800 flex items-center justify-center text-zinc-600 shrink-0"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h10"/></svg></div>'}</div>
        </div>
        <h4 class="font-black uppercase tracking-tight text-sm truncate group-hover:text-accent transition">${lista.nombre}</h4>
        <p class="text-[10px] text-zinc-500 font-bold mt-1">${items.length} ítem${items.length!==1?'s':''} · ${lista.esPropia?'Tuya':'Colaborativa'}</p>`;
    return div;
}

// Modal detalle lista
window.abrirDetalleLista = function(listaId, nombre) {
    document.getElementById('modalDetalleLista').classList.remove('hidden');
    document.getElementById('modalDetalleLista').classList.add('flex');
    document.getElementById('detalleListaNombre').innerText = nombre;
    document.getElementById('detalleListaGrid').innerHTML = '<p class="text-zinc-600 text-xs animate-pulse">Cargando...</p>';
    getDoc(doc(db,'listas',listaId)).then(snap => {
        if (!snap.exists()) return;
        const items = snap.data().items || [];
        const grid = document.getElementById('detalleListaGrid');
        if (!items.length) { grid.innerHTML='<p class="text-zinc-600 text-xs italic">Lista vacía.</p>'; return; }
        grid.innerHTML='';
        items.forEach(it => {
            const d = document.createElement('div');
            d.className='relative group cursor-pointer';
            d.onclick=function(){location.href=(it.tipo==='pelicula'?'pelicula.html':'serie.html')+'?id='+it.id;};
            d.innerHTML=`<div class="aspect-[2/3] rounded-xl overflow-hidden border border-white/5 group-hover:border-accent transition">
                <img src="${it.poster||'https://via.placeholder.com/200x300?text=?'}" class="w-full h-full object-cover">
            </div>
            <p class="text-[9px] font-bold uppercase tracking-tighter mt-1 truncate">${it.titulo||''}</p>`;
            grid.appendChild(d);
        });
    });
};

onAuthStateChanged(auth,async function(user){
    if(!user){mostrar('estadoNoLogin');return;}
    try{
        var snap=await getDoc(doc(db,'usuarios',user.uid));
        if(!snap.exists()){mostrar('estadoVacio');return;}
        var data=snap.data();
        if(data.color)document.documentElement.style.setProperty('--accent-color',data.color);

        var watchlist=data.watchlist||[],seriesWatchlist=data.seriesWatchlist||[];

        // Cargar listas personalizadas (propias + colaborativas)
        const [snapListas1, snapListas2] = await Promise.all([
            getDocs(query(collection(db,'listas'),where('ownerUID','==',user.uid))),
            getDocs(query(collection(db,'listas'),where('colaboradores','array-contains',user.uid)))
        ]);
        const listas=[];
        snapListas1.forEach(d=>listas.push({id:d.id,...d.data(),esPropia:true}));
        snapListas2.forEach(d=>{if(!listas.find(l=>l.id===d.id))listas.push({id:d.id,...d.data(),esPropia:false});});
        if(listas.length){
            document.getElementById('secListas').classList.remove('hidden');
            document.getElementById('cntListas').innerText='('+listas.length+')';
            var grid=document.getElementById('gridListas'); grid.innerHTML='';
            listas.forEach(function(l){grid.appendChild(crearCardLista(l));});
        }

        if(!watchlist.length&&!seriesWatchlist.length&&!listas.length){mostrar('estadoVacio');return;}
        if(!watchlist.length&&!seriesWatchlist.length){mostrar('contenidoLista');return;}

        var[pelis,series]=await Promise.all([
            Promise.all(watchlist.map(function(id){return fetch('https://api.themoviedb.org/3/movie/'+id+'?api_key='+API_KEY+'&language=es-ES').then(function(r){return r.json();});})),
            Promise.all(seriesWatchlist.map(function(id){return fetch('https://api.themoviedb.org/3/tv/'+id+'?api_key='+API_KEY+'&language=es-ES').then(function(r){return r.json();});}))
        ]);
        pelis=pelis.filter(function(p){return p&&!p.status_code;});
        series=series.filter(function(s){return s&&!s.status_code;});
        var total=pelis.length+series.length;
        document.getElementById('subtitleLista').innerText=total+' elemento'+(total!==1?'s':'')+' guardado'+(total!==1?'s':'');
        if(pelis.length){document.getElementById('secPeliculas').classList.remove('hidden');document.getElementById('cntPelis').innerText='('+pelis.length+')';var filaPelis=document.getElementById('filaPelis');filaPelis.innerHTML='';pelis.forEach(function(p){filaPelis.appendChild(crearCard(p,'pelicula'));});setTimeout(function(){actualizarFades('pelis');},100);}
        if(series.length){document.getElementById('secSeries').classList.remove('hidden');document.getElementById('cntSeries').innerText='('+series.length+')';var filaSeries=document.getElementById('filaSeries');filaSeries.innerHTML='';series.forEach(function(s){filaSeries.appendChild(crearCard(s,'serie'));});setTimeout(function(){actualizarFades('series');},100);}
        mostrar('contenidoLista');
    }catch(e){console.error(e);mostrar('estadoVacio');}
});
</script>

    <div class="bg-zinc-900 border border-white/10 w-full max-w-2xl rounded-t-3xl md:rounded-3xl shadow-2xl flex flex-col max-h-[90vh]">

                class="w-8 h-8 rounded-full bg-zinc-800 hover:bg-zinc-700 flex items-center justify-center transition">

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player IPTV</title>
</head>

<body style="background:black; margin:0;">

<video id="video" controls autoplay style="width:100%; height:100%;"></video>

<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest"></script>

<script>
if (mpegts.getFeatureList().mseLivePlayback) {

    var player = mpegts.createPlayer({
        type: 'mpegts',
        isLive: true,
        url: 'http://mundo2.pro:80/live/Clienteehhdhd/73773hdhdh2/361001.ts'
    });

    player.attachMediaElement(document.getElementById('video'));
    player.load();
    player.play();

}
</script>

</body>
</html>

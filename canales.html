<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieM | TV en Vivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent-color: #dc2626; }
        .text-accent { color: var(--accent-color); }
        .bg-accent { background-color: var(--accent-color); }
        .border-accent { border-color: var(--accent-color); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .card-canal { transition: all .3s cubic-bezier(.4,0,.2,1); }
        .card-canal:hover { transform: translateY(-4px) scale(1.02); }
        .card-canal:active { transform: scale(.97); }
        .live-dot { animation: livepulse 1.5s infinite; }
        @keyframes livepulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .4; transform: scale(1.3); }
        }
        .fade-in { animation: fi .5s ease forwards; opacity: 0; }
        @keyframes fi { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .chip { transition: all .2s ease; }
        .chip.active { background-color: var(--accent-color); color: white; border-color: var(--accent-color); }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans min-h-screen overflow-x-hidden">

<!-- NAV -->
<nav class="fixed top-0 w-full z-50 bg-zinc-950/90 backdrop-blur-xl border-b border-white/5 px-4 md:px-8 py-4">
    <div class="flex justify-between items-center max-w-7xl mx-auto">
        <h1 onclick="location.href='index.html'" class="text-xl md:text-2xl font-black italic tracking-tighter cursor-pointer">
            MOVIE<span class="text-accent">M</span>
        </h1>
        <div class="flex items-center gap-3">
            <div class="flex items-center gap-1.5 bg-red-600/10 border border-red-600/30 px-3 py-1.5 rounded-full">
                <span class="w-2 h-2 rounded-full bg-red-500 live-dot"></span>
                <span class="text-[10px] font-black uppercase tracking-widest text-red-400">En Vivo</span>
            </div>
            <button onclick="location.href='index.html'" class="text-xs font-bold uppercase tracking-widest text-zinc-400 hover:text-white transition">← Volver</button>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 md:px-8 pt-24 pb-28 md:pb-12">

    <!-- Hero -->
    <div class="mb-10 fade-in">
        <h2 class="text-3xl md:text-5xl font-black italic uppercase tracking-tighter mb-2">
            TV <span class="text-accent">en Vivo</span>
        </h2>
        <p class="text-zinc-500 text-sm">Canales internacionales gratuitos, sin registro.</p>
    </div>

    <!-- Filtros por categoría -->
    <div class="flex gap-2 overflow-x-auto no-scrollbar pb-3 mb-8 fade-in" style="animation-delay:.1s">
        <button onclick="filtrarCategoria('Todos')" class="chip active shrink-0 px-4 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase tracking-widest" data-cat="Todos">Todos</button>
        <button onclick="filtrarCategoria('Noticias')" class="chip shrink-0 px-4 py-2 rounded-full border border-white/10 bg-zinc-900 text-zinc-400 text-[10px] font-black uppercase tracking-widest" data-cat="Noticias">Noticias</button>
        <button onclick="filtrarCategoria('Entretenimiento')" class="chip shrink-0 px-4 py-2 rounded-full border border-white/10 bg-zinc-900 text-zinc-400 text-[10px] font-black uppercase tracking-widest" data-cat="Entretenimiento">Entrete.</button>
        <button onclick="filtrarCategoria('Deportes')" class="chip shrink-0 px-4 py-2 rounded-full border border-white/10 bg-zinc-900 text-zinc-400 text-[10px] font-black uppercase tracking-widest" data-cat="Deportes">Deportes</button>
        <button onclick="filtrarCategoria('Ciencia')" class="chip shrink-0 px-4 py-2 rounded-full border border-white/10 bg-zinc-900 text-zinc-400 text-[10px] font-black uppercase tracking-widest" data-cat="Ciencia">Ciencia</button>
        <button onclick="filtrarCategoria('Naturaleza')" class="chip shrink-0 px-4 py-2 rounded-full border border-white/10 bg-zinc-900 text-zinc-400 text-[10px] font-black uppercase tracking-widest" data-cat="Naturaleza">Naturaleza</button>
        <button onclick="filtrarCategoria('Clima')" class="chip shrink-0 px-4 py-2 rounded-full border border-white/10 bg-zinc-900 text-zinc-400 text-[10px] font-black uppercase tracking-widest" data-cat="Clima">Clima</button>
    </div>

    <!-- Grid de canales -->
    <div id="gridCanales" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 md:gap-4 fade-in" style="animation-delay:.2s"></div>

</main>

<!-- Bottom nav mobile -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 z-50 bg-zinc-950/95 backdrop-blur-xl border-t border-white/5">
    <div class="flex items-center justify-around py-3 px-2">
        <a href="index.html" class="flex flex-col items-center gap-1 text-zinc-500">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Inicio</span>
        </a>
        <a href="mi_lista.html" class="flex flex-col items-center gap-1 text-zinc-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Mi Lista</span>
        </a>
        <a href="canales.html" class="flex flex-col items-center gap-1 text-accent">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.361a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">TV</span>
        </a>
        <a href="perfil.html" class="flex flex-col items-center gap-1 text-zinc-500">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Perfil</span>
        </a>
    </div>
</nav>

<script>
var c = localStorage.getItem('movieM_color');
if (c) document.documentElement.style.setProperty('--accent-color', c);

const CANALES = [
    // ── NOTICIAS ──────────────────────────────────
    { id:'cnn',      nombre:'CNN en Español',   logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b1/CNN_International_logo.svg/300px-CNN_International_logo.svg.png',    categoria:'Noticias',       pais:'🇺🇸', color:'#cc0000' },
    { id:'bbc',      nombre:'BBC World News',   logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/BBC_World_News_2022_%28Boxed%29.svg/300px-BBC_World_News_2022_%28Boxed%29.svg.png', categoria:'Noticias', pais:'🇬🇧', color:'#bb1919' },
    { id:'dw',       nombre:'DW Español',       logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/Deutsche_Welle_symbol_2012.svg/300px-Deutsche_Welle_symbol_2012.svg.png', categoria:'Noticias', pais:'🇩🇪', color:'#0b6cbc' },
    { id:'france24', nombre:'France 24 ES',     logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/France_24_logo.svg/300px-France_24_logo.svg.png', categoria:'Noticias', pais:'🇫🇷', color:'#f50000' },
    { id:'aljazeera',nombre:'Al Jazeera',       logo:'https://upload.wikimedia.org/wikipedia/en/thumb/f/f2/Aljazeera_eng.svg/300px-Aljazeera_eng.svg.png', categoria:'Noticias', pais:'🇶🇦', color:'#e8a000' },
    { id:'rt',       nombre:'RT en Español',    logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/RT_logo.svg/300px-RT_logo.svg.png', categoria:'Noticias', pais:'🇷🇺', color:'#b22222' },
    { id:'euronews', nombre:'Euronews ES',      logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Euronews_2022_Logo.svg/300px-Euronews_2022_Logo.svg.png', categoria:'Noticias', pais:'🇪🇺', color:'#003f7f' },
    { id:'cbsn',     nombre:'CBS News',         logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/CBS_News_logo.svg/300px-CBS_News_logo.svg.png', categoria:'Noticias', pais:'🇺🇸', color:'#4169e1' },
    { id:'abcnews',  nombre:'ABC News',         logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/8/81/ABC_News_logo.svg/300px-ABC_News_logo.svg.png', categoria:'Noticias', pais:'🇺🇸', color:'#003087' },
    { id:'bloomberg',nombre:'Bloomberg TV',     logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5d/New_Bloomberg_Logo.svg/300px-New_Bloomberg_Logo.svg.png', categoria:'Noticias', pais:'🇺🇸', color:'#ff6600' },
    // ── ENTRETENIMIENTO ────────────────────────────
    { id:'pluto',    nombre:'Pluto TV Movies',  logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Pluto_TV_logo.svg/300px-Pluto_TV_logo.svg.png', categoria:'Entretenimiento', pais:'🌐', color:'#f5bc00' },
    // ── CIENCIA ────────────────────────────────────
    { id:'nasa',     nombre:'NASA TV',          logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/NASA_logo.svg/300px-NASA_logo.svg.png', categoria:'Ciencia', pais:'🇺🇸', color:'#0b3d91' },
    // ── NATURALEZA ─────────────────────────────────
    { id:'nature',   nombre:'Nature World TV',  logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/National_Geographic_Channel.svg/300px-National_Geographic_Channel.svg.png', categoria:'Naturaleza', pais:'🌐', color:'#f5a800' },
    // ── DEPORTES ───────────────────────────────────
    { id:'olympic',  nombre:'Olympic Channel',  logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Olympic_Channel_logo.svg/300px-Olympic_Channel_logo.svg.png', categoria:'Deportes', pais:'🌐', color:'#0085c3' },
    // ── CLIMA ──────────────────────────────────────
    { id:'weather',  nombre:'Weather Channel',  logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/The_Weather_Channel_logo_2005-present.svg/300px-The_Weather_Channel_logo_2005-present.svg.png', categoria:'Clima', pais:'🇺🇸', color:'#1a6ab1' },
];

var catActual = 'Todos';

function filtrarCategoria(cat) {
    catActual = cat;
    document.querySelectorAll('.chip').forEach(function(btn) {
        var esCat = btn.dataset.cat === cat;
        btn.classList.toggle('active', esCat);
        if (!esCat) { btn.classList.add('bg-zinc-900','text-zinc-400'); btn.classList.remove('text-white'); }
        else { btn.classList.remove('bg-zinc-900','text-zinc-400'); btn.classList.add('text-white'); }
    });
    renderCanales();
}

function renderCanales() {
    var grid = document.getElementById('gridCanales');
    var lista = catActual === 'Todos' ? CANALES : CANALES.filter(function(c){ return c.categoria === catActual; });
    grid.innerHTML = '';
    lista.forEach(function(canal, i) {
        var div = document.createElement('div');
        div.className = 'card-canal cursor-pointer group';
        div.style.animationDelay = (i * 0.04) + 's';
        div.onclick = function() { location.href = 'tv.html?id=' + canal.id; };
        div.innerHTML =
            '<div class="relative aspect-[16/10] rounded-2xl overflow-hidden border border-white/5 group-hover:border-accent transition-all duration-300 shadow-xl mb-2.5" style="background:linear-gradient(135deg,#18181b,#09090b)">'
            + '<div class="absolute inset-0 flex items-center justify-center p-4">'
            + '<img src="' + canal.logo + '" class="max-w-full max-h-full object-contain drop-shadow-lg" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
            + '<div style="display:none" class="absolute inset-0 items-center justify-center"><span class="text-3xl font-black text-white/20">' + canal.nombre.charAt(0) + '</span></div>'
            + '</div>'
            // Overlay con botón play al hover
            + '<div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">'
            + '<div class="w-12 h-12 rounded-full flex items-center justify-center border-2 border-white shadow-2xl" style="background-color:' + canal.color + '">'
            + '<svg class="w-5 h-5 fill-white ml-0.5" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>'
            + '</div></div>'
            // Punto LIVE
            + '<div class="absolute top-2 left-2 flex items-center gap-1 bg-black/70 px-2 py-0.5 rounded-full">'
            + '<span class="w-1.5 h-1.5 rounded-full bg-red-500 live-dot"></span>'
            + '<span class="text-[8px] font-black uppercase tracking-widest text-red-400">Live</span>'
            + '</div>'
            // País
            + '<span class="absolute top-2 right-2 text-sm">' + canal.pais + '</span>'
            + '</div>'
            + '<p class="text-xs font-black uppercase tracking-tight truncate px-0.5">' + canal.nombre + '</p>'
            + '<p class="text-[9px] text-zinc-600 uppercase font-bold tracking-widest">' + canal.categoria + '</p>';
        grid.appendChild(div);
    });
}

window.filtrarCategoria = filtrarCategoria;
renderCanales();
</script>
</body>
</html>

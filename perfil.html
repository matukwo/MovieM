<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MovieM | Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent-color: #dc2626; }
        .text-accent { color: var(--accent-color); }
        .bg-accent { background-color: var(--accent-color); }
        .border-accent { border-color: var(--accent-color); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .avatar-container:hover .overlay-edit { opacity: 1; }
        #actorCarousel { transition: transform 0.5s cubic-bezier(0.4,0,0.2,1); }
        .fade-in { animation: fadeIn 0.5s ease forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans overflow-x-hidden">

<!-- Modal: opciones avatar -->
<div id="modalAvatarOpciones" class="fixed inset-0 z-[300] flex items-center justify-center bg-black/90 hidden px-4">
    <div class="bg-zinc-900 border border-white/10 w-full max-w-sm rounded-3xl p-8 shadow-2xl text-center">
        <h4 class="text-xs font-black uppercase tracking-[0.2em] mb-8 text-accent">Foto de Perfil</h4>
        <div class="space-y-4">
            <label class="flex items-center justify-center gap-4 w-full bg-white text-black font-black py-4 rounded-2xl text-[10px] uppercase tracking-widest cursor-pointer hover:bg-zinc-200 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                Subir desde mi PC
                <input type="file" id="inputFileAvatar" accept="image/*" class="hidden" onchange="subirFotoLocal(event)">
            </label>
            <div class="flex items-center gap-4 text-zinc-600 my-4">
                <div class="h-px bg-zinc-800 flex-1"></div><span class="text-[8px] font-bold uppercase">o</span><div class="h-px bg-zinc-800 flex-1"></div>
            </div>
            <button onclick="abrirBuscadorAvatar()" class="w-full bg-zinc-800 text-white font-black py-4 rounded-2xl text-[10px] uppercase tracking-widest hover:bg-zinc-700 transition">Buscar un personaje</button>
        </div>
        <button onclick="cerrarOpcionesAvatar()" class="mt-8 text-[9px] font-bold uppercase text-zinc-500 tracking-widest">Cerrar</button>
    </div>
</div>

<!-- Modal: búsqueda general -->
<div id="modalBusqueda" class="fixed inset-0 z-[350] flex items-center justify-center bg-black/80 hidden px-4">
    <div class="bg-zinc-900 border border-white/10 w-full max-w-md rounded-3xl p-6 shadow-2xl">
        <h4 id="tituloModalBusqueda" class="text-xs font-black uppercase tracking-widest mb-4 text-accent text-center">Buscar</h4>
        <input type="text" id="inputBusquedaGral" placeholder="Escribe aqu&iacute;..." class="w-full bg-zinc-800 border border-zinc-700 p-3 rounded-xl text-sm outline-none focus:border-accent mb-4 text-white">
        <div id="resultadosGral" class="max-h-60 overflow-y-auto space-y-2 no-scrollbar"></div>
        <button onclick="cerrarModalBusqueda()" class="w-full mt-4 text-[10px] font-bold uppercase tracking-widest text-zinc-500">Cancelar</button>
    </div>
</div>

<nav class="p-6 grid grid-cols-3 items-center bg-zinc-950/80 backdrop-blur-md sticky top-0 w-full z-50 border-b border-white/5">
    <div class="flex space-x-6 text-xs font-bold uppercase tracking-widest text-zinc-400">
        <a href="index.html" class="hover:text-white transition">Inicio</a>
        <a href="mi_lista.html" class="hover:text-white transition">Mi Lista</a>
    </div>
    <div class="flex justify-center">
        <h1 class="text-3xl font-black text-accent tracking-tighter cursor-pointer" onclick="window.location.href='index.html'">MOVIE<span class="text-white font-light">M</span></h1>
    </div>
    <div class="flex items-center justify-end">
        <button onclick="window.location.href='index.html'" class="text-xs font-bold uppercase tracking-widest text-zinc-400 hover:text-white transition">&larr; Volver</button>
    </div>
</nav>

<main class="max-w-6xl mx-auto pt-12 px-6 pb-12">

    <!-- Cabecera del perfil -->
    <section class="flex flex-col md:flex-row items-center md:items-start gap-10 mb-16 border-b border-white/5 pb-12 w-full fade-in">

        <!-- Avatar -->
        <div id="avatarWrapper" class="relative shrink-0">
            <div class="w-32 h-32 bg-zinc-900 border-4 border-accent rounded-full flex items-center justify-center text-5xl font-black italic shadow-2xl overflow-hidden" id="userAvatarFrame">M</div>
            <!-- overlay editar (solo propio perfil) -->
            <div id="overlayEdit" class="hidden absolute inset-0 bg-black/60 rounded-full flex items-center justify-center cursor-pointer" onclick="abrirOpcionesAvatar()">
                <svg class="w-7 h-7 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
            </div>
        </div>

        <div class="flex-1 w-full">
            <div class="flex flex-col md:flex-row md:items-center gap-4 mb-4 justify-center md:justify-start flex-wrap">
                <h2 class="text-4xl font-black uppercase tracking-tighter" id="profileName">...</h2>

                <!-- Contadores -->
                <div class="flex gap-5 items-center border-l border-white/5 pl-5">
                    <div class="text-center">
                        <span class="block text-xl font-bold leading-none" id="contSeguidores">0</span>
                        <span class="text-[8px] text-zinc-500 uppercase font-black tracking-widest">Seguidores</span>
                    </div>
                    <div class="text-center">
                        <span class="block text-xl font-bold leading-none" id="contSiguiendo">0</span>
                        <span class="text-[8px] text-zinc-500 uppercase font-black tracking-widest">Siguiendo</span>
                    </div>
                </div>

                <!-- Botón seguir (solo en perfiles ajenos) -->
                <button id="btnSeguir" class="hidden px-6 py-2.5 rounded-full font-black text-xs uppercase tracking-widest transition-all border-2 border-accent text-accent hover:bg-accent hover:text-white" onclick="toggleSeguir()">
                    Seguir
                </button>
            </div>

            <!-- Bio -->
            <div id="contenedorBio" class="mb-4 flex items-start gap-3 group min-h-[60px]">
                <p class="text-zinc-300 text-base italic leading-relaxed max-w-xl" id="userBio">...</p>
                <button id="btnEditarBio" class="hidden text-accent opacity-0 group-hover:opacity-100 transition-opacity mt-1 shrink-0" onclick="editarBio()">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                </button>
            </div>

            <!-- Géneros -->
            <div class="flex flex-wrap gap-2" id="generosCont"></div>
        </div>
    </section>

    <!-- Contenido -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-12 items-start">
        <div class="lg:col-span-2 space-y-12 w-full">

            <!-- Películas favoritas -->
            <section class="w-full fade-in">
                <h3 class="text-xs font-black uppercase tracking-[0.3em] text-zinc-500 mb-6 flex items-center gap-2">
                    <span class="w-8 h-px bg-accent"></span> Pel&iacute;culas Favoritas
                </h3>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4" id="favContainer"></div>
            </section>

            <!-- Comentarios recientes -->
            <section class="w-full fade-in">
                <h3 class="text-xs font-black uppercase tracking-[0.3em] text-zinc-500 mb-6 flex items-center gap-2">
                    <span class="w-8 h-px bg-accent"></span> &Uacute;ltimos Comentarios
                </h3>
                <div class="space-y-4" id="contenedorComentarios">
                    <p class="text-zinc-600 text-xs italic">Cargando comentarios...</p>
                </div>
            </section>
        </div>

        <aside class="space-y-8 w-full lg:pt-1">
            <!-- Actores favoritos -->
            <section class="bg-zinc-900/30 p-6 rounded-3xl border border-white/5 text-center relative overflow-hidden group shadow-lg min-h-[220px] flex flex-col">
                <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-zinc-500 mb-4 italic">Actores Favoritos</h3>
                <div class="relative overflow-hidden flex-1">
                    <div id="actorCarousel" class="flex transition-transform duration-500 h-full"></div>
                </div>
                <button onclick="prevActor()" class="absolute left-2 top-1/2 -translate-y-1/2 bg-black/50 p-1.5 rounded-full opacity-0 group-hover:opacity-100 transition-opacity z-10">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <button onclick="nextActor()" class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/50 p-1.5 rounded-full opacity-0 group-hover:opacity-100 transition-opacity z-10">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"/></svg>
                </button>
                <button id="btnAgregarActor" class="hidden mt-4 text-[9px] font-black uppercase tracking-widest text-accent hover:underline" onclick="abrirBuscadorActor()">+ Agregar Actor</button>
            </section>

            <!-- Color de acento (solo propio) -->
            <section id="seccionColor" class="hidden bg-zinc-900/30 p-6 rounded-3xl border border-white/5">
                <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-zinc-500 mb-4">Color de acento</h3>
                <div class="flex gap-3 justify-center">
                    <div onclick="cambiarColor('#dc2626')" class="w-7 h-7 rounded-full bg-red-600 cursor-pointer hover:scale-110 transition border-2 border-transparent"></div>
                    <div onclick="cambiarColor('#2563eb')" class="w-7 h-7 rounded-full bg-blue-600 cursor-pointer hover:scale-110 transition border-2 border-transparent"></div>
                    <div onclick="cambiarColor('#16a34a')" class="w-7 h-7 rounded-full bg-green-600 cursor-pointer hover:scale-110 transition border-2 border-transparent"></div>
                    <div onclick="cambiarColor('#9333ea')" class="w-7 h-7 rounded-full bg-purple-600 cursor-pointer hover:scale-110 transition border-2 border-transparent"></div>
                </div>
                <button onclick="cerrarSesion()" class="w-full mt-6 py-3 rounded-xl border border-zinc-800 text-[10px] font-bold uppercase tracking-widest text-zinc-500 hover:text-white hover:bg-zinc-800 transition">
                    Cerrar Sesi&oacute;n
                </button>
            </section>
        </aside>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion, arrayRemove, collection, query, where, getDocs, addDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAn5N7m7EhICK2aZG4Nx8DIW9RZd9kK1DA",
        authDomain: "moviem-5b73d.firebaseapp.com",
        projectId: "moviem-5b73d",
        storageBucket: "moviem-5b73d.firebasestorage.app",
        messagingSenderId: "843796138544",
        appId: "1:843796138544:web:c2bde9b39d437b84d97bf5"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';

    // ── Estado global ─────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const paramUser = params.get('user'); // username en la URL
    let miUID = null, miUsername = null;
    let perfilUID = null, perfilUsername = null;
    let isMiPerfil = false;
    let actorIndex = 0;
    let actoresLocal = [];
    let favoritasLocal = [null, null, null, null];
    let slotSeleccionado = null;
    let tipoBusqueda = 'peli';

    // ── Aplicar color ─────────────────────────────────────────────
    var colorGuardado = localStorage.getItem('movieM_color');
    if (colorGuardado) document.documentElement.style.setProperty('--accent-color', colorGuardado);

    // ── Auth ──────────────────────────────────────────────────────
    onAuthStateChanged(auth, async function(user) {
        if (user) {
            miUID = user.uid;
            var snap = await getDoc(doc(db, 'usuarios', miUID));
            miUsername = snap.exists() ? snap.data().username : user.email.split('@')[0];
            localStorage.setItem('usuarioMovieM', miUsername);
        }
        // Determinar qué perfil cargar
        if (paramUser) {
            await buscarPerfilPorUsername(paramUser);
        } else if (miUID) {
            perfilUID = miUID;
            perfilUsername = miUsername;
            isMiPerfil = true;
            cargarPerfil();
        } else {
            // Sin login y sin ?user -> redirigir
            window.location.href = 'index.html';
        }
    });

    async function buscarPerfilPorUsername(username) {
        try {
            var snap = await getDocs(query(collection(db, 'usuarios'), where('username', '==', username)));
            if (snap.empty) { document.getElementById('profileName').innerText = 'Usuario no encontrado'; return; }
            snap.forEach(function(d) { perfilUID = d.id; perfilUsername = d.data().username; });
            isMiPerfil = (miUID && perfilUID === miUID);
            cargarPerfil();
        } catch(e) { console.error(e); }
    }

    // ── Cargar perfil completo ────────────────────────────────────
    async function cargarPerfil() {
        try {
            var snap = await getDoc(doc(db, 'usuarios', perfilUID));
            var data = snap.exists() ? snap.data() : {};

            // Color
            if (data.color) {
                document.documentElement.style.setProperty('--accent-color', data.color);
                if (isMiPerfil) localStorage.setItem('movieM_color', data.color);
            }

            // Nombre
            document.getElementById('profileName').innerText = perfilUsername || 'Usuario';

            // Avatar
            if (data.avatar) {
                document.getElementById('userAvatarFrame').innerHTML = '<img src="' + data.avatar + '" class="w-full h-full object-cover">';
            } else {
                document.getElementById('userAvatarFrame').innerText = (perfilUsername || 'U').charAt(0).toUpperCase();
            }

            // Bio
            renderizarBio(data.bio || '');

            // Contadores
            var seguidores = (data.seguidores || []).length;
            var siguiendo = (data.siguiendo || []).length;
            document.getElementById('contSeguidores').innerText = seguidores;
            document.getElementById('contSiguiendo').innerText = siguiendo;

            // Géneros
            actoresLocal = data.actores || [];
            favoritasLocal = data.favoritas || [null, null, null, null];

            if (isMiPerfil) {
                // Modo edición
                document.getElementById('overlayEdit').classList.remove('hidden');
                document.getElementById('overlayEdit').classList.add('flex');
                document.getElementById('btnEditarBio').classList.remove('hidden');
                document.getElementById('btnAgregarActor').classList.remove('hidden');
                document.getElementById('seccionColor').classList.remove('hidden');
                renderizarGeneros(data.generos || [], true);
                renderizarFavs(true);
            } else {
                renderizarGeneros(data.generos || [], false);
                renderizarFavs(false);
                // Mostrar botón seguir si hay sesión iniciada
                if (miUID) {
                    var btnSeguir = document.getElementById('btnSeguir');
                    btnSeguir.classList.remove('hidden');
                    // Verificar si ya sigo a este usuario
                    var miSnap = await getDoc(doc(db, 'usuarios', miUID));
                    var miData = miSnap.exists() ? miSnap.data() : {};
                    var yaSigo = (miData.siguiendo || []).includes(perfilUID);
                    actualizarBtnSeguir(yaSigo);
                }
            }

            renderizarActores();
            cargarComentarios();

        } catch(e) { console.error(e); }
    }

    // ── Seguir / Dejar de seguir ──────────────────────────────────
    async function toggleSeguir() {
        if (!miUID) return;
        var btn = document.getElementById('btnSeguir');
        var yaSigo = btn.dataset.siguiendo === 'true';

        try {
            // Actualizo mi lista de "siguiendo"
            await setDoc(doc(db, 'usuarios', miUID), {
                siguiendo: yaSigo ? arrayRemove(perfilUID) : arrayUnion(perfilUID)
            }, { merge: true });
            // Actualizo los "seguidores" del otro perfil
            await setDoc(doc(db, 'usuarios', perfilUID), {
                seguidores: yaSigo ? arrayRemove(miUID) : arrayUnion(miUID)
            }, { merge: true });

            // Actualizar contador en pantalla
            var cont = document.getElementById('contSeguidores');
            cont.innerText = parseInt(cont.innerText) + (yaSigo ? -1 : 1);
            actualizarBtnSeguir(!yaSigo);
        } catch(e) { console.error(e); }
    }
    window.toggleSeguir = toggleSeguir;

    function actualizarBtnSeguir(siguiendo) {
        var btn = document.getElementById('btnSeguir');
        btn.dataset.siguiendo = siguiendo ? 'true' : 'false';
        if (siguiendo) {
            btn.innerText = 'Siguiendo';
            btn.classList.add('bg-accent', 'text-white');
            btn.classList.remove('text-accent');
        } else {
            btn.innerText = 'Seguir';
            btn.classList.remove('bg-accent', 'text-white');
            btn.classList.add('text-accent');
        }
    }

    // ── Guardar dato en Firestore ─────────────────────────────────
    async function guardarDato(campo, valor) {
        if (!isMiPerfil || !perfilUID) return;
        var obj = {}; obj[campo] = valor;
        await setDoc(doc(db, 'usuarios', perfilUID), obj, { merge: true });
    }

    // ── Bio ───────────────────────────────────────────────────────
    window.editarBio = function() {
        var bio = document.getElementById('userBio').innerText;
        document.getElementById('contenedorBio').innerHTML = '<div class="w-full"><textarea id="editBioInput" class="w-full bg-zinc-900 border border-accent p-3 rounded-xl text-base outline-none text-zinc-300 h-24 resize-none">' + bio + '</textarea><div class="flex gap-2 mt-2"><button onclick="guardarBioFn()" class="text-[9px] font-black uppercase bg-accent px-4 py-2 rounded-lg">Guardar</button><button onclick="renderizarBio(document.getElementById(\'editBioInput\').value || \'\')" class="text-[9px] font-black uppercase bg-zinc-800 px-4 py-2 rounded-lg">Cancelar</button></div></div>';
    };
    window.guardarBioFn = async function() {
        var val = document.getElementById('editBioInput').value;
        await guardarDato('bio', val);
        renderizarBio(val);
    };
    function renderizarBio(t) {
        var editBtn = isMiPerfil ? '<button id="btnEditarBio" class="text-accent opacity-0 group-hover:opacity-100 transition-opacity mt-1 shrink-0" onclick="editarBio()"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></button>' : '';
        document.getElementById('contenedorBio').innerHTML = '<p class="text-zinc-300 text-base italic leading-relaxed max-w-xl" id="userBio">' + (t || '<span class="text-zinc-600">Sin biograf&iacute;a</span>') + '</p>' + editBtn;
    }

    // ── Géneros ───────────────────────────────────────────────────
    var generosMap = {28:'Acci&oacute;n',12:'Aventura',16:'Animaci&oacute;n',35:'Comedia',80:'Crimen',99:'Documental',18:'Drama',10751:'Familia',14:'Fantas&iacute;a',36:'Historia',27:'Terror',10402:'M&uacute;sica',9648:'Misterio',10749:'Romance',878:'Ciencia Ficci&oacute;n',53:'Thriller',10752:'B&eacute;lica',37:'Western'};
    function renderizarGeneros(ids, editable) {
        var cont = document.getElementById('generosCont');
        var html = (ids || []).map(function(id) {
            return '<span class="px-3 py-1 bg-zinc-900 border border-white/10 rounded-full text-[10px] font-bold uppercase tracking-wider text-zinc-400' + (editable ? ' cursor-pointer hover:border-accent hover:text-white transition group' : '') + '">' + (generosMap[id] || id) + (editable ? '<span class="hidden group-hover:inline ml-1 text-accent" onclick="quitarGenero(' + id + ')">x</span>' : '') + '</span>';
        }).join('');
        if (editable) html += '<button onclick="abrirSelectorGeneros()" class="px-3 py-1 border border-dashed border-zinc-700 rounded-full text-[10px] font-bold uppercase text-zinc-600 hover:text-accent hover:border-accent transition">+</button>';
        cont.innerHTML = html;
    }
    window.quitarGenero = async function(id) {
        var snap = await getDoc(doc(db, 'usuarios', perfilUID));
        var ids = (snap.exists() ? snap.data().generos : []) || [];
        ids = ids.filter(function(g) { return g !== id; });
        await guardarDato('generos', ids);
        renderizarGeneros(ids, true);
    };
    window.abrirSelectorGeneros = function() {
        tipoBusqueda = 'genero';
        var cont = document.getElementById('resultadosGral');
        cont.innerHTML = Object.entries(generosMap).map(function(e) {
            return '<div class="flex items-center gap-3 p-2 hover:bg-zinc-800 rounded-lg cursor-pointer text-sm font-bold" onclick="agregarGenero(' + e[0] + ')">' + e[1] + '</div>';
        }).join('');
        document.getElementById('tituloModalBusqueda').innerText = 'Elegir G\xe9nero';
        document.getElementById('inputBusquedaGral').classList.add('hidden');
        document.getElementById('modalBusqueda').classList.remove('hidden');
    };
    window.agregarGenero = async function(id) {
        var snap = await getDoc(doc(db, 'usuarios', perfilUID));
        var ids = (snap.exists() ? snap.data().generos : []) || [];
        if (!ids.includes(id) && ids.length < 5) { ids.push(id); await guardarDato('generos', ids); }
        renderizarGeneros(ids, true);
        cerrarModalBusqueda();
    };

    // ── Avatar ────────────────────────────────────────────────────
    window.abrirOpcionesAvatar = function() { document.getElementById('modalAvatarOpciones').classList.remove('hidden'); };
    window.cerrarOpcionesAvatar = function() { document.getElementById('modalAvatarOpciones').classList.add('hidden'); };
    window.subirFotoLocal = function(e) {
        var file = e.target.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = async function(ev) {
            var base64 = ev.target.result;
            await guardarDato('avatar', base64);
            document.getElementById('userAvatarFrame').innerHTML = '<img src="' + base64 + '" class="w-full h-full object-cover">';
            cerrarOpcionesAvatar();
        };
        reader.readAsDataURL(file);
    };
    window.abrirBuscadorAvatar = function() { tipoBusqueda = 'avatar'; mostrarModalBusqueda('Buscar Personaje'); cerrarOpcionesAvatar(); };

    // ── Buscador modal ────────────────────────────────────────────
    window.abrirBuscadorFav = function(i) { tipoBusqueda = 'peli'; slotSeleccionado = i; mostrarModalBusqueda('Pel\xedcula Favorita'); };
    window.abrirBuscadorActor = function() { tipoBusqueda = 'actor'; mostrarModalBusqueda('Agregar Actor'); };
    function mostrarModalBusqueda(titulo) {
        document.getElementById('tituloModalBusqueda').innerText = titulo;
        document.getElementById('inputBusquedaGral').classList.remove('hidden');
        document.getElementById('inputBusquedaGral').value = '';
        document.getElementById('resultadosGral').innerHTML = '';
        document.getElementById('modalBusqueda').classList.remove('hidden');
        document.getElementById('inputBusquedaGral').focus();
    }
    window.cerrarModalBusqueda = function() {
        document.getElementById('modalBusqueda').classList.add('hidden');
        document.getElementById('resultadosGral').innerHTML = '';
        document.getElementById('inputBusquedaGral').classList.remove('hidden');
    };
    document.getElementById('inputBusquedaGral').addEventListener('input', async function() {
        var q = this.value;
        if (q.length < 3) return;
        var endpoint = tipoBusqueda === 'peli' ? 'search/movie' : 'search/person';
        var res = await fetch('https://api.themoviedb.org/3/' + endpoint + '?api_key=' + API_KEY + '&query=' + encodeURIComponent(q) + '&language=es-ES');
        var data = await res.json();
        var cont = document.getElementById('resultadosGral'); cont.innerHTML = '';
        (data.results || []).slice(0, 6).forEach(function(item) {
            var img = item.poster_path || item.profile_path;
            var div = document.createElement('div');
            div.className = 'flex items-center gap-3 p-2 hover:bg-zinc-800 rounded-lg cursor-pointer';
            div.innerHTML = '<img src="https://image.tmdb.org/t/p/w92' + img + '" class="w-8 h-12 rounded object-cover"><span class="text-xs font-bold text-white">' + (item.title || item.name) + '</span>';
            div.onclick = async function() {
                if (tipoBusqueda === 'peli') await seleccionarFav(img, item.id);
                else if (tipoBusqueda === 'actor') await agregarActorFn(item.name, img);
                else { await guardarDato('avatar', 'https://image.tmdb.org/t/p/w500' + img); document.getElementById('userAvatarFrame').innerHTML = '<img src="https://image.tmdb.org/t/p/w500' + img + '" class="w-full h-full object-cover">'; }
                cerrarModalBusqueda();
            };
            cont.appendChild(div);
        });
    });

    // ── Favoritas ─────────────────────────────────────────────────
    async function seleccionarFav(poster, id) {
        favoritasLocal[slotSeleccionado] = { poster: poster, id: id };
        await guardarDato('favoritas', favoritasLocal);
        renderizarFavs(true);
    }
    window.quitarFav = async function(i) {
        favoritasLocal[i] = null;
        await guardarDato('favoritas', favoritasLocal);
        renderizarFavs(true);
    };
    function renderizarFavs(editable) {
        var html = favoritasLocal.map(function(f, i) {
            if (f && f.poster) {
                var img = f.poster.startsWith('http') ? f.poster : 'https://image.tmdb.org/t/p/w500' + f.poster;
                return '<div class="aspect-[2/3] bg-zinc-900 rounded-xl border border-white/10 overflow-hidden cursor-pointer hover:border-accent transition group relative" onclick="window.location.href=\'pelicula.html?id=' + f.id + '\'">'
                    + '<img src="' + img + '" class="w-full h-full object-cover">'
                    + (editable ? '<div onclick="event.stopPropagation();quitarFav(' + i + ')" class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center text-[9px] font-bold uppercase cursor-pointer">Quitar</div>' : '')
                    + '</div>';
            } else {
                return '<div class="aspect-[2/3] bg-zinc-900 rounded-xl border border-dashed border-white/10 flex items-center justify-center' + (editable ? ' cursor-pointer hover:border-accent transition' : '') + '">'
                    + (editable ? '<span class="text-zinc-700 text-3xl font-bold" onclick="abrirBuscadorFav(' + i + ')">+</span>' : '<span class="text-zinc-800 text-3xl">&#xF8FF;</span>')
                    + '</div>';
            }
        }).join('');
        document.getElementById('favContainer').innerHTML = html;
    }

    // ── Actores ───────────────────────────────────────────────────
    async function agregarActorFn(nombre, foto) {
        actoresLocal.push({ nombre: nombre, foto: foto });
        await guardarDato('actores', actoresLocal);
        actorIndex = actoresLocal.length - 1;
        renderizarActores(); moverCarrusel();
    }
    window.eliminarActor = async function() {
        actoresLocal.splice(actorIndex, 1);
        actorIndex = 0;
        await guardarDato('actores', actoresLocal);
        renderizarActores(); moverCarrusel();
    };
    function renderizarActores() {
        var c = document.getElementById('actorCarousel');
        if (actoresLocal.length === 0) {
            c.innerHTML = '<div class="min-w-full h-full flex items-center justify-center text-zinc-600 text-[10px] font-bold uppercase italic border border-dashed border-white/5 rounded-2xl">Sin actores</div>';
            return;
        }
        c.innerHTML = actoresLocal.map(function(a, idx) {
            var src = a.foto && a.foto.startsWith('http') ? a.foto : 'https://image.tmdb.org/t/p/w200' + a.foto;
            return '<div class="min-w-full flex flex-col items-center justify-center h-full">'
                + '<div class="w-20 h-20 rounded-full border-2 border-accent overflow-hidden mb-2 shadow-xl shrink-0"><img src="' + src + '" class="w-full h-full object-cover"></div>'
                + '<p class="text-[10px] font-black text-white uppercase tracking-widest truncate w-full px-2 text-center">' + a.nombre + '</p>'
                + (isMiPerfil ? '<button onclick="eliminarActor()" class="text-[8px] text-zinc-600 mt-1 hover:text-red-500 uppercase font-bold shrink-0">Quitar</button>' : '')
                + '</div>';
        }).join('');
    }
    window.nextActor = function() { actorIndex = actorIndex < actoresLocal.length - 1 ? actorIndex + 1 : 0; moverCarrusel(); };
    window.prevActor = function() { actorIndex = actorIndex > 0 ? actorIndex - 1 : actoresLocal.length - 1; moverCarrusel(); };
    function moverCarrusel() { document.getElementById('actorCarousel').style.transform = 'translateX(-' + (actorIndex * 100) + '%)'; }

    // ── Comentarios ───────────────────────────────────────────────
    async function cargarComentarios() {
        var cont = document.getElementById('contenedorComentarios');
        try {
            var q = query(collection(db, 'comentarios'), where('user', '==', perfilUsername));
            var snap = await getDocs(q);
            if (snap.empty) { cont.innerHTML = '<p class="text-zinc-600 text-xs italic">Sin comentarios a&uacute;n.</p>'; return; }
            var docs = [];
            snap.forEach(function(d) { docs.push(d.data()); });
            docs.sort(function(a, b) { return (b.fecha || 0) - (a.fecha || 0); });
            cont.innerHTML = docs.slice(0, 5).map(function(c) {
                var stars = '\u2605'.repeat(c.rating || 0);
                var fecha = c.fecha ? new Date(c.fecha).toLocaleDateString() : '';
                return '<div class="bg-zinc-900/50 p-5 rounded-2xl border border-white/5 shadow-lg cursor-pointer hover:border-accent transition" onclick="window.location.href=\'pelicula.html?id=' + c.movieID + '\'">'
                    + '<div class="flex justify-between items-center mb-2">'
                    + '<span class="text-[9px] font-black uppercase text-zinc-500">Pel&iacute;cula #' + c.movieID + ' &nbsp;&middot;&nbsp; ' + fecha + '</span>'
                    + '<span class="text-yellow-500 text-xs">' + stars + '</span>'
                    + '</div>'
                    + '<p class="text-zinc-300 text-sm italic leading-relaxed">&ldquo;' + c.txt + '&rdquo;</p>'
                    + '</div>';
            }).join('');
        } catch(e) { cont.innerHTML = '<p class="text-zinc-600 text-xs italic">No se pudieron cargar comentarios.</p>'; }
    }

    // ── Color & Sesión ────────────────────────────────────────────
    window.cambiarColor = async function(hex) {
        document.documentElement.style.setProperty('--accent-color', hex);
        localStorage.setItem('movieM_color', hex);
        await guardarDato('color', hex);
    };
    window.cerrarSesion = async function() {
        await signOut(auth);
        window.location.href = 'index.html';
    };
</script>
</body>
</html>

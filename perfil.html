<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieM | Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #dc2626; }
        .text-accent { color: var(--accent); }
        .bg-accent { background-color: var(--accent); }
        .border-accent { border-color: var(--accent); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        #actorCarousel { transition: transform .5s cubic-bezier(.4,0,.2,1); }
        .fade-in { animation: fi .5s ease forwards; opacity: 0; }
        @keyframes fi { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans overflow-x-hidden pb-24 md:pb-0">

<!-- Modal: Seguidores / Siguiendo -->
<div id="modalSeguidos" class="fixed inset-0 z-[400] flex items-end md:items-center justify-center bg-black/80 hidden px-0 md:px-4">
    <div class="bg-zinc-900 border border-white/10 w-full max-w-sm rounded-t-3xl md:rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[80vh]">
        <div class="flex items-center justify-between px-5 py-4 border-b border-white/5">
            <div class="flex gap-1 bg-zinc-800 rounded-full p-1">
                <button id="tabSeguidores" onclick="cambiarTabSeguidos('seguidores')" class="tab-seg px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest transition-all bg-accent text-white">Seguidores</button>
                <button id="tabSiguiendo" onclick="cambiarTabSeguidos('siguiendo')" class="tab-seg px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest transition-all text-zinc-400">Siguiendo</button>
            </div>
            <button onclick="cerrarModalSeguidos()" class="text-zinc-500 hover:text-white transition p-1">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        <div id="listaSeguidos" class="overflow-y-auto no-scrollbar flex-1 p-3 space-y-1">
            <p class="text-zinc-600 text-xs text-center py-8 italic animate-pulse">Cargando...</p>
        </div>
    </div>
</div>

<!-- Modal: opciones avatar -->
<div id="modalAvatarOpciones" class="fixed inset-0 z-[300] flex items-end md:items-center justify-center bg-black/90 hidden px-4 pb-4 md:pb-0">
    <div class="bg-zinc-900 border border-white/10 w-full max-w-sm rounded-3xl p-7 shadow-2xl text-center">
        <div class="w-10 h-1 bg-zinc-700 rounded-full mx-auto mb-5 md:hidden"></div>
        <h4 class="text-xs font-black uppercase tracking-[0.2em] mb-6 text-accent">Foto de Perfil</h4>
        <div class="space-y-3">
            <label class="flex items-center justify-center gap-3 w-full bg-white text-black font-black py-4 rounded-2xl text-[10px] uppercase tracking-widest cursor-pointer hover:bg-zinc-200 active:scale-95 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                Subir desde mi dispositivo
                <input type="file" id="inputFileAvatar" accept="image/*" class="hidden" onchange="subirFotoLocal(event)">
            </label>
            <button onclick="abrirBuscadorAvatar()" class="w-full bg-zinc-800 text-white font-black py-4 rounded-2xl text-[10px] uppercase tracking-widest hover:bg-zinc-700 active:scale-95 transition">Buscar un personaje</button>
        </div>
        <button onclick="cerrarOpcionesAvatar()" class="mt-6 text-[9px] font-bold uppercase text-zinc-500 tracking-widest">Cerrar</button>
    </div>
</div>

<!-- Modal: búsqueda general -->
<div id="modalBusqueda" class="fixed inset-0 z-[350] flex items-end md:items-center justify-center bg-black/80 hidden px-4 pb-4 md:pb-0">
    <div class="bg-zinc-900 border border-white/10 w-full max-w-md rounded-3xl p-5 shadow-2xl mx-4">
        <div class="w-10 h-1 bg-zinc-700 rounded-full mx-auto mb-5 md:hidden"></div>
        <h4 id="tituloModalBusqueda" class="text-xs font-black uppercase tracking-widest mb-4 text-accent text-center">Buscar</h4>
        <input type="text" id="inputBusquedaGral" placeholder="Escribe aquí..." class="w-full bg-zinc-800 border border-zinc-700 p-3 rounded-xl text-sm outline-none focus:border-accent mb-4 text-white">
        <div id="resultadosGral" class="max-h-52 overflow-y-auto space-y-1 no-scrollbar"></div>
        <button onclick="cerrarModalBusqueda()" class="w-full mt-4 py-3 text-[10px] font-bold uppercase tracking-widest text-zinc-500">Cancelar</button>
    </div>
</div>

<!-- Nav -->
<nav class="px-4 md:px-6 py-4 flex items-center justify-between bg-zinc-950/90 backdrop-blur-md sticky top-0 w-full z-50 border-b border-white/5">
    <h1 class="text-xl md:text-2xl font-black text-accent tracking-tighter cursor-pointer" onclick="location.href='index.html'">MOVIE<span class="text-white font-light">M</span></h1>
    <div class="flex items-center gap-3">
        <button id="btnSeccionColor" class="hidden text-[9px] font-black uppercase tracking-widest text-zinc-500 hover:text-white transition px-3 py-2 bg-zinc-900 rounded-full border border-white/5">Ajustes</button>
        <button onclick="location.href='index.html'" class="text-[10px] font-bold uppercase tracking-widest text-zinc-400 hover:text-white transition">← Inicio</button>
    </div>
</nav>

<!-- Panel color (propio) - slide down -->
<div id="panelColor" class="hidden bg-zinc-900/95 border-b border-white/5 px-4 py-5">
    <div class="max-w-lg mx-auto flex flex-wrap items-center justify-between gap-4">
        <div>
            <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest mb-3">Color de acento</p>
            <div class="flex gap-3">
                <div onclick="cambiarColor('#dc2626')" class="w-7 h-7 rounded-full bg-red-600 cursor-pointer hover:scale-110 active:scale-95 transition"></div>
                <div onclick="cambiarColor('#2563eb')" class="w-7 h-7 rounded-full bg-blue-600 cursor-pointer hover:scale-110 active:scale-95 transition"></div>
                <div onclick="cambiarColor('#16a34a')" class="w-7 h-7 rounded-full bg-green-600 cursor-pointer hover:scale-110 active:scale-95 transition"></div>
                <div onclick="cambiarColor('#9333ea')" class="w-7 h-7 rounded-full bg-purple-600 cursor-pointer hover:scale-110 active:scale-95 transition"></div>
            </div>
        </div>
        <button onclick="cerrarSesion()" class="px-5 py-2.5 rounded-xl border border-zinc-700 text-[10px] font-bold uppercase tracking-widest text-zinc-400 hover:text-white hover:bg-zinc-800 transition">
            Cerrar Sesión
        </button>
    </div>
</div>

<main class="max-w-5xl mx-auto px-4 md:px-6 pt-6 md:pt-10">

    <!-- Cabecera del perfil -->
    <section class="flex flex-col sm:flex-row gap-5 md:gap-10 items-center sm:items-start mb-10 md:mb-14 border-b border-white/5 pb-8 fade-in">

        <!-- Avatar -->
        <div class="relative shrink-0 group">
            <div class="w-24 h-24 md:w-32 md:h-32 bg-zinc-900 border-4 border-accent rounded-full flex items-center justify-center text-4xl md:text-5xl font-black italic shadow-2xl overflow-hidden" id="userAvatarFrame">M</div>
            <div id="overlayEdit" class="hidden absolute inset-0 bg-black/60 rounded-full items-center justify-center cursor-pointer opacity-0 group-hover:opacity-100 transition-opacity" onclick="abrirOpcionesAvatar()">
                <svg class="w-6 h-6 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
            </div>
        </div>

        <!-- Info -->
        <div class="flex-1 text-center sm:text-left w-full">
            <div class="flex flex-col sm:flex-row sm:items-center gap-3 mb-3 justify-center sm:justify-start flex-wrap">
                <h2 class="text-2xl md:text-4xl font-black uppercase tracking-tighter flex items-center gap-2" id="profileName">...</h2>
                <!-- Contadores -->
                <div class="flex gap-5 items-center justify-center sm:justify-start border-t sm:border-t-0 sm:border-l border-white/10 pt-3 sm:pt-0 sm:pl-5">
                    <button onclick="abrirModalSeguidos('seguidores')" class="text-center hover:opacity-70 active:scale-95 transition-all">
                        <span class="block text-lg md:text-xl font-bold leading-none" id="contSeguidores">0</span>
                        <span class="text-[8px] text-zinc-500 uppercase font-black tracking-widest">Seguidores</span>
                    </button>
                    <button onclick="abrirModalSeguidos('siguiendo')" class="text-center hover:opacity-70 active:scale-95 transition-all">
                        <span class="block text-lg md:text-xl font-bold leading-none" id="contSiguiendo">0</span>
                        <span class="text-[8px] text-zinc-500 uppercase font-black tracking-widest">Siguiendo</span>
                    </button>
                </div>
                <!-- Botón seguir + te sigue -->
                <div class="flex items-center gap-2">
                    <button id="btnSeguir" class="hidden px-5 py-2 rounded-full font-black text-xs uppercase tracking-widest transition-all border-2 border-accent text-accent hover:bg-accent hover:text-white active:scale-95" onclick="toggleSeguir()">
                        Seguir
                    </button>
                    <span id="badgeTeSigue" class="hidden px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest bg-zinc-800 border border-white/10 text-zinc-400">Te sigue</span>
                </div>
            </div>

            <!-- Bio -->
            <div id="contenedorBio" class="mb-4 flex items-start gap-2 group justify-center sm:justify-start min-h-[40px]">
                <p class="text-zinc-300 text-sm md:text-base italic leading-relaxed max-w-lg" id="userBio">...</p>
                <button id="btnEditarBio" class="hidden text-accent opacity-0 group-hover:opacity-100 transition-opacity mt-0.5 shrink-0" onclick="editarBio()">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                </button>
            </div>

            <!-- Géneros -->
            <div class="flex flex-wrap gap-2 justify-center sm:justify-start" id="generosCont"></div>
        </div>
    </section>

    <!-- Grid de contenido -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 md:gap-12">

        <div class="lg:col-span-2 space-y-10 md:space-y-12">

            <!-- Favoritas -->
            <section class="fade-in">
                <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-500 mb-5 flex items-center gap-2">
                    <span class="w-6 h-px bg-accent"></span> Películas Favoritas
                </h3>
                <div class="grid grid-cols-4 gap-2 md:gap-4" id="favContainer"></div>
            </section>

            <!-- Comentarios -->
            <section class="fade-in">
                <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-500 mb-5 flex items-center gap-2">
                    <span class="w-6 h-px bg-accent"></span> Últimos Comentarios
                </h3>
                <div class="space-y-3" id="contenedorComentarios">
                    <p class="text-zinc-600 text-xs italic">Cargando...</p>
                </div>
            </section>
        </div>

        <!-- Sidebar -->
        <aside class="space-y-6">
            <!-- Actores favoritos -->
            <section class="bg-zinc-900/30 p-5 md:p-6 rounded-2xl md:rounded-3xl border border-white/5 text-center relative overflow-hidden group shadow-lg min-h-[180px] md:min-h-[220px] flex flex-col">
                <h3 class="text-[9px] font-black uppercase tracking-[0.2em] text-zinc-500 mb-4 italic">Actores Favoritos</h3>
                <div class="relative overflow-hidden flex-1">
                    <div id="actorCarousel" class="flex h-full"></div>
                </div>
                <button onclick="prevActor()" class="absolute left-2 top-1/2 -translate-y-1/2 bg-black/50 p-1.5 rounded-full opacity-0 group-hover:opacity-100 transition z-10">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <button onclick="nextActor()" class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/50 p-1.5 rounded-full opacity-0 group-hover:opacity-100 transition z-10">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"/></svg>
                </button>
                <button id="btnAgregarActor" class="hidden mt-4 text-[9px] font-black uppercase tracking-widest text-accent hover:underline" onclick="abrirBuscadorActor()">+ Agregar Actor</button>
            </section>
        </aside>
    </div>
</main>

<!-- Bottom nav mobile -->
<nav class="fixed bottom-0 w-full md:hidden bg-zinc-950/95 backdrop-blur-md border-t border-white/5 z-50">
    <div class="flex items-center justify-around py-3 px-2">
        <a href="index.html" class="flex flex-col items-center gap-1 text-zinc-500">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[9px] font-bold uppercase tracking-widest">Inicio</span>
        </a>
        <a href="mi_lista.html" class="flex flex-col items-center gap-1 text-zinc-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
            <span class="text-[9px] font-bold uppercase tracking-widest">Mi Lista</span>
        </a>
        <a href="perfil.html" class="flex flex-col items-center gap-1 text-white">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span class="text-[9px] font-bold uppercase tracking-widest">Perfil</span>
        </a>
    </div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const FB = {apiKey:"AIzaSyAn5N7m7EhICK2aZG4Nx8DIW9RZd9kK1DA",authDomain:"moviem-5b73d.firebaseapp.com",projectId:"moviem-5b73d",storageBucket:"moviem-5b73d.firebasestorage.app",messagingSenderId:"843796138544",appId:"1:843796138544:web:c2bde9b39d437b84d97bf5"};
    const app = initializeApp(FB);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const API = '86dfc26f9d7b8c9957129a1d7a173ddc';

    const params = new URLSearchParams(location.search);
    const paramUser = params.get('user');
    let miUID=null, miUsername=null, perfilUID=null, perfilUsername=null, isMiPerfil=false;
    let actorIndex=0, actoresLocal=[], favoritasLocal=[null,null,null,null], slotSel=null, tipoBusq='peli';

    // ── UID del creador/admin de la página ────────────────────────
    // Reemplazá este valor con tu UID real de Firebase (lo encontrás en Firebase Console → Authentication)
    const ADMIN_UID = '41XWZR8OzwdpMHf54UIQEzAEt7s1';
    const VERIFIED_USERS = []; // Agregá UIDs de usuarios verificados: ['uid1', 'uid2']

    function getBadge(uid) {
        if (uid === ADMIN_UID) return '<svg title="Creador" class="w-3.5 h-3.5 text-blue-400 inline-block ml-1 shrink-0" viewBox="0 0 24 24" fill="currentColor"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>';
        if (VERIFIED_USERS.includes(uid)) return '<svg title="Verificado" class="w-3.5 h-3.5 text-yellow-400 inline-block ml-1 shrink-0" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M8.603 3.799A4.49 4.49 0 0112 2.25c1.357 0 2.573.6 3.397 1.549a4.49 4.49 0 013.498 1.307 4.491 4.491 0 011.307 3.497A4.49 4.49 0 0121.75 12a4.49 4.49 0 01-1.549 3.397 4.491 4.491 0 01-1.307 3.497 4.491 4.491 0 01-3.497 1.307A4.49 4.49 0 0112 21.75a4.49 4.49 0 01-3.397-1.549 4.491 4.491 0 01-3.497-1.307 4.491 4.491 0 01-1.307-3.497A4.49 4.49 0 012.25 12a4.49 4.49 0 011.549-3.397 4.491 4.491 0 011.307-3.497 4.491 4.491 0 013.497-1.307zm7.007 6.387a.75.75 0 10-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 00-1.06 1.06l2.25 2.25a.75.75 0 001.14-.094l3.75-5.25z" clip-rule="evenodd"/></svg>';
        return '';
    }

    var c = localStorage.getItem('movieM_color');
    if (c) document.documentElement.style.setProperty('--accent', c);

    // ── Auth ──────────────────────────────────────────────────────
    onAuthStateChanged(auth, async function(user) {
        if (user) {
            miUID = user.uid;
            var snap = await getDoc(doc(db,'usuarios',miUID));
            miUsername = snap.exists() ? snap.data().username : user.email.split('@')[0];
        }
        if (paramUser) { await buscarPorUsername(paramUser); }
        else if (miUID) { perfilUID=miUID; perfilUsername=miUsername; isMiPerfil=true; cargarPerfil(); }
        else { location.href='index.html'; }
    });

    async function buscarPorUsername(u) {
        var snap = await getDocs(query(collection(db,'usuarios'), where('username','==',u)));
        if (snap.empty) { document.getElementById('profileName').innerText='Usuario no encontrado'; return; }
        snap.forEach(function(d){ perfilUID=d.id; perfilUsername=d.data().username; });
        isMiPerfil = (miUID && perfilUID===miUID);
        cargarPerfil();
    }

    async function cargarPerfil() {
        var snap = await getDoc(doc(db,'usuarios',perfilUID));
        var data = snap.exists() ? snap.data() : {};

        if (data.color) { document.documentElement.style.setProperty('--accent', data.color); if(isMiPerfil) localStorage.setItem('movieM_color',data.color); }

        document.getElementById('profileName').innerText = perfilUsername||'Usuario';

        // ── Tilde de verificado si es el admin ────────────────────
        if (perfilUID === ADMIN_UID) {
            document.getElementById('profileName').innerHTML =
                (perfilUsername||'Usuario') +
                '<svg class="w-6 h-6 md:w-7 md:h-7 text-blue-400 shrink-0" viewBox="0 0 24 24" fill="currentColor" title="Creador de MovieM"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>';
        } else if (VERIFIED_USERS.includes(perfilUID)) {
            document.getElementById('profileName').innerHTML =
                (perfilUsername||'Usuario') +
                '<svg class="w-6 h-6 md:w-7 md:h-7 text-yellow-400 shrink-0" viewBox="0 0 24 24" fill="currentColor" title="Usuario Verificado"><path fill-rule="evenodd" d="M8.603 3.799A4.49 4.49 0 0112 2.25c1.357 0 2.573.6 3.397 1.549a4.49 4.49 0 013.498 1.307 4.491 4.491 0 011.307 3.497A4.49 4.49 0 0121.75 12a4.49 4.49 0 01-1.549 3.397 4.491 4.491 0 01-1.307 3.497 4.491 4.491 0 01-3.497 1.307A4.49 4.49 0 0112 21.75a4.49 4.49 0 01-3.397-1.549 4.491 4.491 0 01-3.497-1.307 4.491 4.491 0 01-1.307-3.497A4.49 4.49 0 012.25 12a4.49 4.49 0 011.549-3.397 4.491 4.491 0 011.307-3.497 4.491 4.491 0 013.497-1.307zm7.007 6.387a.75.75 0 10-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 00-1.06 1.06l2.25 2.25a.75.75 0 001.14-.094l3.75-5.25z" clip-rule="evenodd"/></svg>';
        }

        document.getElementById('userAvatarFrame').innerHTML = data.avatar
            ? '<img src="'+data.avatar+'" class="w-full h-full object-cover">'
            : (perfilUsername||'U').charAt(0).toUpperCase();

        renderizarBio(data.bio||'');

        var segs = (data.seguidores||[]).length, sig = (data.siguiendo||[]).length;
        document.getElementById('contSeguidores').innerText = segs;
        document.getElementById('contSiguiendo').innerText = sig;

        actoresLocal = data.actores||[];
        favoritasLocal = data.favoritas||[null,null,null,null];

        if (isMiPerfil) {
            var oe = document.getElementById('overlayEdit');
            oe.classList.remove('hidden'); oe.classList.add('flex');
            document.getElementById('btnEditarBio').classList.remove('hidden');
            document.getElementById('btnAgregarActor').classList.remove('hidden');
            document.getElementById('btnSeccionColor').classList.remove('hidden');
            renderizarGeneros(data.generos||[], true);
            renderizarFavs(true);
        } else {
            renderizarGeneros(data.generos||[], false);
            renderizarFavs(false);
            if (miUID) {
                var miSnap = await getDoc(doc(db,'usuarios',miUID));
                var miData = miSnap.exists() ? miSnap.data() : {};
                var yaSigo = (miData.siguiendo||[]).includes(perfilUID);
                var btn = document.getElementById('btnSeguir');
                btn.classList.remove('hidden');
                actualizarBtnSeguir(yaSigo);

                // ── "Te sigue" badge ──────────────────────────────
                var ellosSeguidores = data.seguidores||[];
                if (ellosSeguidores.includes(miUID)) {
                    document.getElementById('badgeTeSigue').classList.remove('hidden');
                }
            }
        }
        renderizarActores();
        cargarComentarios();
    }

    // ── Panel ajustes toggle ──────────────────────────────────────
    document.getElementById('btnSeccionColor').onclick = function() {
        document.getElementById('panelColor').classList.toggle('hidden');
    };

    // ── Seguir ────────────────────────────────────────────────────
    async function toggleSeguir() {
        if (!miUID) return;
        var btn = document.getElementById('btnSeguir');
        var yaSigo = btn.dataset.siguiendo === 'true';
        await setDoc(doc(db,'usuarios',miUID), {siguiendo: yaSigo ? arrayRemove(perfilUID) : arrayUnion(perfilUID)},{merge:true});
        await setDoc(doc(db,'usuarios',perfilUID), {seguidores: yaSigo ? arrayRemove(miUID) : arrayUnion(miUID)},{merge:true});
        var cont = document.getElementById('contSeguidores');
        cont.innerText = parseInt(cont.innerText) + (yaSigo ? -1 : 1);
        actualizarBtnSeguir(!yaSigo);
    }
    window.toggleSeguir = toggleSeguir;

    function actualizarBtnSeguir(sig) {
        var btn = document.getElementById('btnSeguir');
        btn.dataset.siguiendo = sig ? 'true' : 'false';
        btn.innerText = sig ? 'Siguiendo ✓' : 'Seguir';
        btn.classList.toggle('bg-accent', sig); btn.classList.toggle('text-white', sig);
        btn.classList.toggle('text-accent', !sig);
    }

    async function guardarDato(campo, valor) {
        if (!isMiPerfil||!perfilUID) return;
        var obj={}; obj[campo]=valor;
        await setDoc(doc(db,'usuarios',perfilUID), obj, {merge:true});
    }

    // ── Bio ───────────────────────────────────────────────────────
    window.editarBio = function() {
        var bio = document.getElementById('userBio').innerText;
        document.getElementById('contenedorBio').innerHTML = '<div class="w-full"><textarea id="editBioInput" class="w-full bg-zinc-900 border border-accent p-3 rounded-xl text-sm outline-none text-zinc-300 h-20 resize-none">'+bio+'</textarea><div class="flex gap-2 mt-2"><button onclick="guardarBioFn()" class="text-[9px] font-black uppercase bg-accent px-4 py-2 rounded-lg">Guardar</button><button onclick="renderizarBio(\'\')" class="text-[9px] font-black uppercase bg-zinc-800 px-4 py-2 rounded-lg">Cancelar</button></div></div>';
    };
    window.guardarBioFn = async function() {
        var val = document.getElementById('editBioInput').value;
        await guardarDato('bio', val); renderizarBio(val);
    };
    function renderizarBio(t) {
        var editBtn = isMiPerfil ? '<button id="btnEditarBio" class="text-accent opacity-0 group-hover:opacity-100 transition-opacity mt-0.5 shrink-0" onclick="editarBio()"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></button>' : '';
        document.getElementById('contenedorBio').innerHTML = '<p class="text-zinc-300 text-sm md:text-base italic leading-relaxed max-w-lg" id="userBio">'+(t||'<span class="text-zinc-600">Sin biografía</span>')+'</p>'+editBtn;
    }

    // ── Géneros ───────────────────────────────────────────────────
    var gMap = {28:'Acción',12:'Aventura',16:'Animación',35:'Comedia',80:'Crimen',99:'Documental',18:'Drama',10751:'Familia',14:'Fantasía',36:'Historia',27:'Terror',10402:'Música',9648:'Misterio',10749:'Romance',878:'Sci-Fi',53:'Thriller',10752:'Bélica',37:'Western'};
    function renderizarGeneros(ids, editable) {
        var html = (ids||[]).map(function(id){
            return '<span class="px-2.5 py-1 bg-zinc-900 border border-white/10 rounded-full text-[9px] font-bold uppercase tracking-wider text-zinc-400'+(editable?' cursor-pointer hover:border-accent hover:text-white transition group':'')+'">'+(gMap[id]||id)+(editable?'<span class="hidden group-hover:inline ml-1 text-accent" onclick="quitarGenero('+id+')">×</span>':'')+'</span>';
        }).join('');
        if (editable) html += '<button onclick="abrirSelectorGeneros()" class="px-2.5 py-1 border border-dashed border-zinc-700 rounded-full text-[9px] font-bold uppercase text-zinc-600 hover:text-accent hover:border-accent transition">+</button>';
        document.getElementById('generosCont').innerHTML = html;
    }
    window.quitarGenero = async function(id) {
        var snap = await getDoc(doc(db,'usuarios',perfilUID));
        var ids = ((snap.exists()?snap.data().generos:[])||[]).filter(function(g){ return g!==id; });
        await guardarDato('generos',ids); renderizarGeneros(ids,true);
    };
    window.abrirSelectorGeneros = function() {
        tipoBusq='genero';
        document.getElementById('resultadosGral').innerHTML = Object.entries(gMap).map(function(e){ return '<div class="flex items-center p-2.5 hover:bg-zinc-800 rounded-xl cursor-pointer text-sm font-bold active:scale-95 transition" onclick="agregarGenero('+e[0]+')">'+e[1]+'</div>'; }).join('');
        document.getElementById('tituloModalBusqueda').innerText = 'Elegir Género';
        document.getElementById('inputBusquedaGral').classList.add('hidden');
        document.getElementById('modalBusqueda').classList.remove('hidden');
    };
    window.agregarGenero = async function(id) {
        var snap = await getDoc(doc(db,'usuarios',perfilUID));
        var ids = ((snap.exists()?snap.data().generos:[])||[]);
        if (!ids.includes(id) && ids.length < 5) { ids.push(id); await guardarDato('generos',ids); }
        renderizarGeneros(ids,true); cerrarModalBusqueda();
    };

    // ── Avatar ────────────────────────────────────────────────────
    window.abrirOpcionesAvatar = function(){ document.getElementById('modalAvatarOpciones').classList.remove('hidden'); };
    window.cerrarOpcionesAvatar = function(){ document.getElementById('modalAvatarOpciones').classList.add('hidden'); };
    window.subirFotoLocal = function(e) {
        var file = e.target.files[0]; if (!file) return;
        var r = new FileReader();
        r.onload = async function(ev) {
            await guardarDato('avatar', ev.target.result);
            document.getElementById('userAvatarFrame').innerHTML = '<img src="'+ev.target.result+'" class="w-full h-full object-cover">';
            cerrarOpcionesAvatar();
        };
        r.readAsDataURL(file);
    };
    window.abrirBuscadorAvatar = function(){ tipoBusq='avatar'; mostrarModal('Buscar Personaje'); cerrarOpcionesAvatar(); };

    // ── Modal búsqueda ────────────────────────────────────────────
    window.abrirBuscadorFav = function(i){ tipoBusq='peli'; slotSel=i; mostrarModal('Película Favorita'); };
    window.abrirBuscadorActor = function(){ tipoBusq='actor'; mostrarModal('Agregar Actor'); };
    function mostrarModal(t) {
        document.getElementById('tituloModalBusqueda').innerText = t;
        document.getElementById('inputBusquedaGral').classList.remove('hidden');
        document.getElementById('inputBusquedaGral').value='';
        document.getElementById('resultadosGral').innerHTML='';
        document.getElementById('modalBusqueda').classList.remove('hidden');
        setTimeout(function(){ document.getElementById('inputBusquedaGral').focus(); },200);
    }
    window.cerrarModalBusqueda = function(){
        document.getElementById('modalBusqueda').classList.add('hidden');
        document.getElementById('inputBusquedaGral').classList.remove('hidden');
        document.getElementById('resultadosGral').innerHTML='';
    };
    document.getElementById('inputBusquedaGral').addEventListener('input', async function() {
        var q = this.value; if (q.length<2) return;
        var ep = tipoBusq==='peli' ? 'search/movie' : 'search/person';
        var res = await fetch('https://api.themoviedb.org/3/'+ep+'?api_key='+API+'&query='+encodeURIComponent(q)+'&language=es-ES');
        var data = await res.json();
        var cont = document.getElementById('resultadosGral'); cont.innerHTML='';
        (data.results||[]).slice(0,6).forEach(function(item) {
            var img = item.poster_path||item.profile_path;
            var d = document.createElement('div'); d.className='flex items-center gap-3 p-2.5 hover:bg-zinc-800 rounded-xl cursor-pointer active:scale-95 transition';
            d.innerHTML = '<img src="https://image.tmdb.org/t/p/w92'+img+'" class="w-8 h-12 rounded-lg object-cover"><span class="text-sm font-bold">'+( item.title||item.name)+'</span>';
            d.onclick = async function() {
                if (tipoBusq==='peli') { favoritasLocal[slotSel]={poster:img,id:item.id}; await guardarDato('favoritas',favoritasLocal); renderizarFavs(true); }
                else if (tipoBusq==='actor') { actoresLocal.push({nombre:item.name,foto:img}); await guardarDato('actores',actoresLocal); actorIndex=actoresLocal.length-1; renderizarActores(); moverCarrusel(); }
                else { await guardarDato('avatar','https://image.tmdb.org/t/p/w500'+img); document.getElementById('userAvatarFrame').innerHTML='<img src="https://image.tmdb.org/t/p/w500'+img+'" class="w-full h-full object-cover">'; }
                cerrarModalBusqueda();
            };
            cont.appendChild(d);
        });
    });

    // ── Favoritas ─────────────────────────────────────────────────
    function renderizarFavs(editable) {
        document.getElementById('favContainer').innerHTML = favoritasLocal.map(function(f,i){
            if (f&&f.poster) {
                var src = f.poster.startsWith('http') ? f.poster : 'https://image.tmdb.org/t/p/w500'+f.poster;
                return '<div class="aspect-[2/3] bg-zinc-900 rounded-xl border border-white/10 overflow-hidden cursor-pointer group relative active:scale-95 transition" onclick="location.href=\'pelicula.html?id='+f.id+'\'">'
                    +'<img src="'+src+'" class="w-full h-full object-cover">'
                    +(editable?'<div onclick="event.stopPropagation();quitarFav('+i+')" class="absolute inset-0 bg-black/70 opacity-0 group-hover:opacity-100 flex items-center justify-center text-[9px] font-bold uppercase">Quitar</div>':'')
                    +'</div>';
            }
            return '<div class="aspect-[2/3] bg-zinc-900/60 rounded-xl border border-dashed border-white/10 flex flex-col items-center justify-center gap-2'+(editable?' cursor-pointer hover:border-accent hover:bg-zinc-800/60 transition group/slot':'')+'" '+(editable?'onclick="abrirBuscadorFav('+i+')"':'')+' >'
                +'<svg class="w-7 h-7 '+(editable?'text-zinc-700 group-hover/slot:text-accent transition':'text-zinc-800')+'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="18" rx="2" ry="2" stroke-width="1.5"/><path stroke-width="1.5" d="M7 3v18M17 3v18M2 9h5M2 15h5M17 9h5M17 15h5"/></svg>'
                +(editable?'<span class="text-[9px] font-black uppercase tracking-widest text-zinc-700 group-hover/slot:text-accent transition">Agregar</span>':'')
                +'</div>';
        }).join('');
    }
    window.quitarFav = async function(i){ favoritasLocal[i]=null; await guardarDato('favoritas',favoritasLocal); renderizarFavs(true); };

    // ── Actores ───────────────────────────────────────────────────
    function renderizarActores() {
        var c2 = document.getElementById('actorCarousel');
        if (!actoresLocal.length) { c2.innerHTML='<div class="min-w-full h-full flex items-center justify-center text-zinc-600 text-[9px] font-bold uppercase italic">Sin actores</div>'; return; }
        c2.innerHTML = actoresLocal.map(function(a){
            var src = a.foto&&a.foto.startsWith('http') ? a.foto : 'https://image.tmdb.org/t/p/w200'+a.foto;
            return '<div class="min-w-full flex flex-col items-center justify-center h-full">'
                +'<div class="w-16 h-16 md:w-20 md:h-20 rounded-full border-2 border-accent overflow-hidden mb-2 shadow-xl shrink-0"><img src="'+src+'" class="w-full h-full object-cover" loading="lazy"></div>'
                +'<p class="text-[9px] font-black text-white uppercase tracking-widest truncate w-full px-2 text-center">'+a.nombre+'</p>'
                +(isMiPerfil?'<button onclick="eliminarActor()" class="text-[8px] text-zinc-600 mt-1 hover:text-red-500 uppercase font-bold">Quitar</button>':'')
                +'</div>';
        }).join('');
    }
    window.eliminarActor = async function(){ actoresLocal.splice(actorIndex,1); actorIndex=0; await guardarDato('actores',actoresLocal); renderizarActores(); moverCarrusel(); };
    window.nextActor = function(){ actorIndex = actorIndex<actoresLocal.length-1 ? actorIndex+1 : 0; moverCarrusel(); };
    window.prevActor = function(){ actorIndex = actorIndex>0 ? actorIndex-1 : actoresLocal.length-1; moverCarrusel(); };
    function moverCarrusel(){ document.getElementById('actorCarousel').style.transform='translateX(-'+(actorIndex*100)+'%)'; }

    // ── Comentarios ───────────────────────────────────────────────
    async function cargarComentarios() {
        var cont = document.getElementById('contenedorComentarios');
        // Nota: miUID puede estar disponible o no según el timing de onAuthStateChanged
        // Se compara con ADMIN_UID directamente; si miUID es null, no es admin
        var esAdmin = miUID !== null && miUID === ADMIN_UID;
        try {
            var snap = await getDocs(query(collection(db,'comentarios'), where('user','==',perfilUsername)));
            if (snap.empty) { cont.innerHTML='<p class="text-zinc-600 text-xs italic">Sin comentarios aún.</p>'; return; }
            var docs=[]; snap.forEach(function(d){ docs.push({id:d.id, ...d.data()}); });
            docs.sort(function(a,b){ return (b.fecha||0)-(a.fecha||0); });
            var recientes = docs.slice(0,5);
            var pelisData = {};
            await Promise.all(recientes.map(async function(cm){
                var movieKey = cm.movieID;
                if (!movieKey) return;
                try {
                    var isSerie = String(movieKey).startsWith('tv-');
                    var realID = isSerie ? movieKey.replace('tv-','') : movieKey;
                    var endpoint = isSerie
                        ? 'https://api.themoviedb.org/3/tv/'+realID+'?api_key='+API+'&language=es-ES'
                        : 'https://api.themoviedb.org/3/movie/'+realID+'?api_key='+API+'&language=es-ES';
                    var r = await fetch(endpoint);
                    var d = await r.json();
                    if (d && (d.title||d.name)) pelisData[movieKey] = d;
                } catch(e) {}
            }));
            cont.innerHTML = '';
            recientes.forEach(function(cm){
                var peli = pelisData[cm.movieID];
                var posterURL = peli && peli.poster_path ? 'https://image.tmdb.org/t/p/w92'+peli.poster_path : null;
                var nombrePeli = peli ? (peli.title||peli.name) : (String(cm.movieID).startsWith('tv-') ? 'Serie' : 'Película');
                var isSerie = String(cm.movieID).startsWith('tv-');
                var realID = isSerie ? cm.movieID.replace('tv-','') : cm.movieID;
                var href = isSerie ? 'serie.html?id='+realID : 'pelicula.html?id='+realID;

                var div = document.createElement('div');
                div.className = 'bg-zinc-900/50 rounded-xl border border-white/5 overflow-hidden hover:border-accent transition group/cm';
                div.innerHTML =
                    '<div class="flex gap-3">'
                    +(posterURL ? '<img src="'+posterURL+'" class="w-14 h-20 object-cover shrink-0">'
                        : '<div class="w-14 h-20 bg-zinc-800 shrink-0 flex items-center justify-center"><svg class="w-5 h-5 text-zinc-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><rect x="2" y="3" width="20" height="18" rx="2" stroke-width="1.5"/><path stroke-width="1.5" d="M7 3v18M17 3v18M2 9h5M2 15h5M17 9h5M17 15h5"/></svg></div>')
                    +'<div class="flex-1 p-3 min-w-0">'
                    +'<div class="flex justify-between items-start gap-2 mb-1">'
                    +'<p class="text-xs font-black text-white uppercase tracking-tight truncate max-w-[160px] cursor-pointer hover:text-accent transition" onclick="location.href=\''+href+'\'">'+nombrePeli+'</p>'
                    +'<div class="flex items-center gap-2 shrink-0">'
                    +'<span class="text-yellow-500 text-[10px]">'+'★'.repeat(cm.rating||0)+'</span>'
                    // Botón borrar — solo visible para el admin
                    +(esAdmin
                        ? '<button onclick="borrarComentario(\''+cm.id+'\')" class="opacity-0 group-hover/cm:opacity-100 transition-opacity w-5 h-5 rounded-full bg-red-900/60 hover:bg-red-600 flex items-center justify-center" title="Borrar comentario"><svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg></button>'
                        : '')
                    +'</div>'
                    +'</div>'
                    +'<p class="text-zinc-400 text-[11px] italic leading-relaxed line-clamp-2">"'+cm.txt+'"</p>'
                    +'</div>'
                    +'</div>';
                cont.appendChild(div);
            });
        } catch(e){ cont.innerHTML='<p class="text-zinc-600 text-xs italic">Error al cargar comentarios.</p>'; }
    }

    // ── Borrar comentario (solo admin) ────────────────────────────
    window.borrarComentario = async function(docId) {
        if (miUID !== ADMIN_UID) return;
        if (!confirm('¿Borrar este comentario?')) return;
        try {
            await deleteDoc(doc(db, 'comentarios', docId));
            cargarComentarios();
        } catch(e) { alert('Error al borrar.'); }
    };

    // ── Color / Sesión ────────────────────────────────────────────
    window.cambiarColor = async function(hex) {
        document.documentElement.style.setProperty('--accent', hex);
        localStorage.setItem('movieM_color', hex);
        await guardarDato('color', hex);
    };
    window.cerrarSesion = async function(){ await signOut(auth); location.href='index.html'; };

    // ── Modal Seguidores / Siguiendo ──────────────────────────────
    var tabActualSeg = 'seguidores';

    window.abrirModalSeguidos = async function(tab) {
        tabActualSeg = tab || 'seguidores';
        document.getElementById('modalSeguidos').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
        await renderizarListaSeguidos(tabActualSeg);
    };

    window.cerrarModalSeguidos = function() {
        document.getElementById('modalSeguidos').classList.add('hidden');
        document.body.style.overflow = 'auto';
    };

    window.cambiarTabSeguidos = async function(tab) {
        tabActualSeg = tab;
        // Actualizar estilos de tabs
        ['seguidores','siguiendo'].forEach(function(t) {
            var btn = document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1));
            if (t === tab) {
                btn.classList.add('bg-accent','text-white');
                btn.classList.remove('text-zinc-400');
            } else {
                btn.classList.remove('bg-accent','text-white');
                btn.classList.add('text-zinc-400');
            }
        });
        await renderizarListaSeguidos(tab);
    };

    async function renderizarListaSeguidos(tab) {
        var lista = document.getElementById('listaSeguidos');
        lista.innerHTML = '<p class="text-zinc-600 text-xs text-center py-8 italic animate-pulse">Cargando...</p>';

        try {
            var snap = await getDoc(doc(db,'usuarios',perfilUID));
            var data = snap.exists() ? snap.data() : {};
            var uids = tab === 'seguidores' ? (data.seguidores||[]) : (data.siguiendo||[]);

            if (!uids.length) {
                lista.innerHTML = '<p class="text-zinc-600 text-xs text-center py-10 italic">'
                    + (tab === 'seguidores' ? 'Sin seguidores aún.' : 'No sigue a nadie aún.')
                    + '</p>';
                return;
            }

            // Traer datos de cada usuario
            var usuarios = await Promise.all(uids.map(async function(uid) {
                try {
                    var s = await getDoc(doc(db,'usuarios',uid));
                    return s.exists() ? { uid: uid, ...s.data() } : null;
                } catch(e) { return null; }
            }));

            lista.innerHTML = '';
            usuarios.filter(Boolean).forEach(function(u) {
                var nombre = u.username || 'Usuario';
                var letra = nombre.charAt(0).toUpperCase();
                var avatarHTML = u.avatar
                    ? '<img src="'+u.avatar+'" class="w-10 h-10 rounded-full object-cover shrink-0 border-2 border-white/10">'
                    : '<div class="w-10 h-10 rounded-full shrink-0 flex items-center justify-center font-black text-white text-sm border-2 border-white/10" style="background-color:var(--accent)">'+letra+'</div>';

                var div = document.createElement('div');
                div.className = 'flex items-center gap-3 p-3 rounded-2xl hover:bg-zinc-800 active:bg-zinc-800 cursor-pointer transition-all';
                div.onclick = function() {
                    cerrarModalSeguidos();
                    location.href = 'perfil.html?user=' + encodeURIComponent(nombre);
                };
                div.innerHTML = avatarHTML
                    + '<div class="flex-1 min-w-0">'
                    + '<p class="font-black text-sm uppercase tracking-tight truncate">'+nombre+'</p>'
                    + (u.bio ? '<p class="text-zinc-500 text-[10px] truncate italic">'+u.bio+'</p>' : '')
                    + '</div>'
                    + '<svg class="w-4 h-4 text-zinc-600 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>';
                lista.appendChild(div);
            });

        } catch(e) {
            lista.innerHTML = '<p class="text-zinc-600 text-xs text-center py-8 italic">Error al cargar.</p>';
        }
    }

    // Cerrar modal al tocar el fondo
    document.getElementById('modalSeguidos').addEventListener('click', function(e) {
        if (e.target === this) cerrarModalSeguidos();
    });
</script>

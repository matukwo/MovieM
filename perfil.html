<script type="module">
    // 1. Importaciones (Asegúrate de que firebase-config.js tenga los exports)
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';
    let usuarioActual = null;

    // --- CONTROL DE SESIÓN ---
    onAuthStateChanged(auth, (user) => {
        const mainContent = document.getElementById('mainContent');
        const noSession = document.getElementById('noSession');

        if (user) {
            usuarioActual = user;
            const userName = user.displayName || user.email.split('@')[0];
            localStorage.setItem('usuarioMovieM', userName);
            
            // Mostrar interfaz de usuario
            if(mainContent) mainContent.classList.remove('hidden');
            if(noSession) noSession.classList.add('hidden');
            
            document.getElementById('profileName').innerText = userName;
            document.getElementById('modalUserLabel').innerText = userName;

            cargarDatosUsuario(userName);
        } else {
            // Usuario no logueado
            localStorage.removeItem('usuarioMovieM');
            if(mainContent) mainContent.classList.add('hidden');
            if(noSession) noSession.classList.remove('hidden');
        }
    });

    // --- FUNCIONES GLOBALES (Exportadas a window para que funcionen los onclick) ---
    window.cerrarSesion = async () => {
        try {
            await auth.signOut();
            localStorage.removeItem('usuarioMovieM');
            window.location.href = 'index.html';
        } catch (error) {
            console.error("Error al cerrar sesión", error);
        }
    };

    window.editarBio = () => {
        const p = document.getElementById('userBio');
        const contenedor = document.getElementById('contenedorBio');
        if(!p || !contenedor) return;

        contenedor.innerHTML = `
            <div class="w-full">
                <textarea id="editBioInput" class="w-full bg-zinc-900 border border-accent p-3 rounded-xl text-lg outline-none text-zinc-300 h-24 resize-none">${p.innerText}</textarea>
                <div class="flex gap-2 mt-2">
                    <button onclick="guardarBioFirestore()" class="text-[9px] font-black uppercase bg-accent px-3 py-1 rounded-lg">Guardar</button>
                    <button onclick="location.reload()" class="text-[9px] font-black uppercase bg-zinc-800 px-3 py-1 rounded-lg">Cancelar</button>
                </div>
            </div>`;
    };

    window.guardarBioFirestore = async () => {
        const nuevaBio = document.getElementById('editBioInput').value;
        const u = localStorage.getItem('usuarioMovieM');
        
        localStorage.setItem(`bio_${u}`, nuevaBio);
        renderizarBio(nuevaBio);

        if (u) {
            try {
                const userRef = doc(db, "usuarios", u);
                await updateDoc(userRef, { bio: nuevaBio });
            } catch (e) { console.error("Error al guardar en nube", e); }
        }
    };

    // --- FUNCIONES DE APOYO ---
    async function cargarDatosUsuario(userName) {
        renderizarBio(localStorage.getItem(`bio_${userName}`));
        renderizarAvatar(localStorage.getItem(`avatar_${userName}`));
        
        try {
            const userRef = doc(db, "usuarios", userName);
            const docSnap = await getDoc(userRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (data.bio) {
                    renderizarBio(data.bio);
                    localStorage.setItem(`bio_${userName}`, data.bio);
                }
                if (data.avatar) {
                    renderizarAvatar(data.avatar);
                    localStorage.setItem(`avatar_${userName}`, data.avatar);
                }
            }
        } catch (e) {
            console.warn("Sincronización fallida, usando datos locales.");
        }
        
        // Aquí debes asegurarte de que renderizarFavs esté definida
        if (typeof window.renderizarFavs === 'function') {
            window.renderizarFavs(userName);
        }
    }

    function renderizarAvatar(f) {
        const frame = document.getElementById('userAvatarFrame');
        const mini = document.getElementById('miniAvatar');
        if(f && frame && mini) {
            const imgHTML = `<img src="${f}" class="w-full h-full object-cover">`;
            frame.innerHTML = imgHTML;
            mini.innerHTML = imgHTML;
        }
    }

    function renderizarBio(t) {
        const cont = document.getElementById('contenedorBio');
        if(!cont) return;
        cont.innerHTML = `
            <p class="text-zinc-300 text-lg italic leading-relaxed" id="userBio">${t || "Escribe algo sobre ti..."}</p>
            <button onclick="editarBio()" class="text-accent opacity-0 group-hover:opacity-100 transition-opacity mt-1.5 shrink-0">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
            </button>`;
    }

    // Eventos de UI
    const btnUser = document.getElementById('btnUsuario');
    if(btnUser) {
        btnUser.onclick = () => {
            document.getElementById('modalLogin').classList.toggle('hidden');
        };
    }
</script>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MovieM | Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="firebase-config.js"></script>
    <style>
        :root { --accent-color: #dc2626; }
        .text-accent { color: var(--accent-color); }
        .bg-accent { background-color: var(--accent-color); }
        .border-accent { border-color: var(--accent-color); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Solo mostrar overlay si tiene la clase 'can-edit' */
        .can-edit.avatar-container:hover .overlay-edit { opacity: 1; }
        #actorCarousel { transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden-admin { display: none !important; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans overflow-x-hidden">

<div id="modalAvatarOpciones" class="fixed inset-0 z-[300] flex items-center justify-center bg-black/90 hidden px-4">
    <div class="bg-zinc-900 border border-white/10 w-full max-w-sm rounded-3xl p-8 shadow-2xl text-center">
        <h4 class="text-xs font-black uppercase tracking-[0.2em] mb-8 text-accent">Foto de Perfil</h4>
        <div class="space-y-4">
            <label class="flex items-center justify-center gap-4 w-full bg-white text-black font-black py-4 rounded-2xl text-[10px] uppercase tracking-widest cursor-pointer hover:bg-zinc-200 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                Subir desde mi PC
                <input type="file" id="inputFileAvatar" accept="image/*" class="hidden" onchange="subirFotoLocal(event)">
            </label>
            <button onclick="abrirBuscadorAvatar()" class="w-full bg-zinc-800 text-white font-black py-4 rounded-2xl text-[10px] uppercase tracking-widest hover:bg-zinc-700 transition">Buscar un personaje</button>
        </div>
        <button onclick="cerrarOpcionesAvatar()" class="mt-8 text-[9px] font-bold uppercase text-zinc-500 tracking-widest">Cerrar</button>
    </div>
</div>

<div id="modalBusqueda" class="fixed inset-0 z-[350] flex items-center justify-center bg-black/80 hidden px-4">
    <div class="bg-zinc-900 border border-white/10 w-full max-w-md rounded-3xl p-6 shadow-2xl">
        <h4 id="tituloModalBusqueda" class="text-xs font-black uppercase tracking-widest mb-4 text-accent text-center">Buscar</h4>
        <input type="text" id="inputBusquedaGral" placeholder="Escribe aquí..." class="w-full bg-zinc-800 border border-zinc-700 p-3 rounded-xl text-sm outline-none focus:border-accent mb-4 text-white">
        <div id="resultadosGral" class="max-h-60 overflow-y-auto space-y-2 no-scrollbar"></div>
        <button onclick="cerrarModalBusqueda()" class="w-full mt-4 text-[10px] font-bold uppercase tracking-widest text-zinc-500">Cancelar</button>
    </div>
</div>

<nav class="p-6 grid grid-cols-3 items-center bg-zinc-950/80 backdrop-blur-md sticky top-0 w-full z-50 border-b border-white/5">
    <div class="flex space-x-6 text-xs font-bold uppercase tracking-widest text-zinc-400">
        <a href="index.html" class="hover:text-white transition">Inicio</a>
        <a href="milista.html" class="hover:text-white transition">Mi Lista</a>
    </div>
    <div class="flex justify-center">
        <h1 class="text-3xl font-black text-accent tracking-tighter cursor-pointer" onclick="window.location.href='index.html'">MOVIE<span class="text-white font-light">M</span></h1>
    </div>
    <div class="flex items-center justify-end">
        <button id="btnUsuario" class="w-10 h-10 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center hover:bg-accent transition group shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 v-5 text-zinc-400 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
        </button>
    </div>
</nav>

<div id="modalLogin" class="fixed top-24 right-6 z-[100] hidden">
    <div class="bg-zinc-900/95 border border-white/10 w-72 rounded-2xl shadow-2xl p-6 text-center">
        <div class="w-16 h-16 bg-zinc-800 border-2 border-accent rounded-full mx-auto mb-3 flex items-center justify-center text-2xl font-black italic shadow-xl overflow-hidden" id="miniAvatar">M</div>
        <p class="text-zinc-200 font-black uppercase tracking-tighter text-lg mb-4" id="modalUserLabel">Usuario</p>
        <div class="border-t border-white/5 pt-4">
            <p class="text-[9px] text-zinc-500 font-bold uppercase mb-3 text-center">Color de Acento</p>
            <div class="flex gap-3 justify-center mb-6">
                <div onclick="cambiarColor('#dc2626')" class="w-5 h-5 rounded-full bg-red-600 cursor-pointer"></div>
                <div onclick="cambiarColor('#2563eb')" class="w-5 h-5 rounded-full bg-blue-600 cursor-pointer"></div>
                <div onclick="cambiarColor('#16a34a')" class="w-5 h-5 rounded-full bg-green-600 cursor-pointer"></div>
                <div onclick="cambiarColor('#9333ea')" class="w-5 h-5 rounded-full bg-purple-600 cursor-pointer"></div>
            </div>
        </div>
        <button onclick="cerrarSesion()" class="w-full py-3 rounded-xl border border-zinc-800 text-[10px] font-bold text-zinc-500 hover:text-white transition">Cerrar Sesión</button>
    </div>
</div>

<main id="mainContent" class="hidden max-w-6xl mx-auto pt-12 px-6 pb-12 fade-in">
    <section class="flex flex-col md:flex-row items-center md:items-start gap-10 mb-16 border-b border-white/5 pb-12 w-full">
        <div id="avatarClickContainer" class="relative avatar-container cursor-pointer shrink-0" onclick="abrirOpcionesAvatar()">
            <div class="w-32 h-32 bg-zinc-900 border-4 border-accent rounded-full flex items-center justify-center text-6xl font-black italic shadow-2xl overflow-hidden" id="userAvatarFrame">M</div>
            <div class="absolute inset-0 bg-black/60 rounded-full flex items-center justify-center opacity-0 overlay-edit transition-opacity">
                <svg class="w-8 h-8 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
            </div>
        </div>

        <div class="flex-1 flex flex-col md:flex-row gap-8 w-full items-center md:items-start">
            <div class="flex-1 text-center md:text-left w-full">
                <div class="flex flex-col md:flex-row md:items-center gap-6 mb-4 justify-center md:justify-start">
                    <h2 class="text-4xl font-black uppercase tracking-tighter" id="profileName">Usuario</h2>
                    <div class="flex justify-center gap-6 h-full items-center border-l border-white/5 pl-6">
                        <div class="text-center md:text-left"><span class="block text-xl font-bold leading-none" id="countSeguidores">0</span><span class="text-[8px] text-zinc-500 uppercase font-black tracking-widest mt-1">Seguidores</span></div>
                        <div class="text-center md:text-left"><span class="block text-xl font-bold leading-none" id="countSiguiendo">0</span><span class="text-[8px] text-zinc-500 uppercase font-black tracking-widest mt-1">Siguiendo</span></div>
                    </div>
                </div>
                
                <div id="contenedorBio" class="mb-4 flex items-start gap-4 justify-center md:justify-start group min-h-[80px]">
                    <p class="text-zinc-300 text-lg italic leading-relaxed max-w-xl" id="userBio">Cargando...</p>
                    <button id="btnEditarBio" onclick="editarBio()" class="text-accent opacity-0 group-hover:opacity-100 transition-opacity mt-1.5 shrink-0 hidden-admin">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                    </button>
                </div>
                <div class="flex flex-wrap justify-center md:justify-start gap-2" id="generosCont"></div>
            </div>

            <div class="w-full md:w-48 shrink-0 md:pt-2">
                <div class="bg-zinc-900/30 p-5 rounded-3xl border border-white/5 text-center min-h-[120px] flex flex-col justify-center">
                    <h3 class="text-[9px] font-black uppercase tracking-[0.2em] text-zinc-500 mb-4 italic">Siguiendo a</h3>
                    <div class="flex flex-wrap justify-center gap-2.5" id="siguiendoAvatares"></div>
                </div>
            </div>
        </div>
    </section>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-12 items-start">
        <div class="lg:col-span-2 space-y-12 w-full">
            <section class="w-full">
                <h3 class="text-xs font-black uppercase tracking-[0.3em] text-zinc-500 mb-6 flex items-center gap-2"><span class="w-8 h-px bg-accent"></span> Películas Favoritas</h3>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4" id="favContainer"></div>
            </section>
        </div>

        <aside class="space-y-8 w-full lg:pt-1">
            <section class="bg-zinc-900/30 p-6 rounded-3xl border border-white/5 text-center relative overflow-hidden group shadow-lg min-h-[220px] flex flex-col">
                <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-zinc-500 mb-4 italic">Actores Favoritos</h3>
                <div class="relative overflow-hidden flex-1"><div id="actorCarousel" class="flex transition-transform duration-500 h-full"></div></div>
                <button onclick="prevActor()" class="absolute left-2 top-1/2 -translate-y-1/2 bg-black/50 p-1.5 rounded-full opacity-0 group-hover:opacity-100 transition-opacity z-10"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"/></svg></button>
                <button onclick="nextActor()" class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/50 p-1.5 rounded-full opacity-0 group-hover:opacity-100 transition-opacity z-10"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"/></svg></button>
                <button id="btnAgregarActor" onclick="abrirBuscadorActor()" class="mt-4 text-[9px] font-black uppercase tracking-widest text-accent hover:underline hidden-admin">+ Agregar Actor</button>
            </section>
        </aside>
    </div>
</main>

<div id="noSession" class="flex flex-col items-center justify-center min-h-[70vh] text-center px-6 hidden">
    <div class="w-20 h-20 bg-zinc-900 rounded-full flex items-center justify-center mb-6 border border-white/5">
        <svg class="w-10 h-10 text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
    </div>
    <h2 class="text-2xl font-black uppercase italic mb-2" id="errorTitle">Acceso Restringido</h2>
    <p class="text-zinc-500 max-w-xs mb-8" id="errorMsg">Debes iniciar sesión para ver perfiles.</p>
    <button onclick="window.location.href='index.html'" class="bg-white text-black px-8 py-3 rounded-full font-black uppercase text-xs tracking-widest hover:bg-red-600 hover:text-white transition shadow-xl">Ir al Inicio</button>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';
    let isOwner = false;
    let currentProfileID = null; // El nombre de usuario que estamos viendo

    let userData = {
        bio: "Escribe algo sobre ti...",
        avatar: "",
        color: "#dc2626",
        favs: [null, null, null, null],
        actores: [],
        generos: [],
        seguidores: 0,
        siguiendo: 0
    };

    let tipoBusqueda = 'peli', slotSeleccionado = null, actorIndex = 0;

    // --- LÓGICA DE URL Y SEGURIDAD ---
    const urlParams = new URLSearchParams(window.location.search);
    const userFromURL = urlParams.get('u'); 

    onAuthStateChanged(auth, async (user) => {
        const main = document.getElementById('mainContent');
        const noSession = document.getElementById('noSession');
        
        // Determinar qué perfil cargar
        const myName = user ? (user.displayName || user.email.split('@')[0]) : null;
        currentProfileID = userFromURL || myName;

        if (!currentProfileID) {
            main.classList.add('hidden');
            noSession.classList.remove('hidden');
            return;
        }

        isOwner = (user && currentProfileID === myName);
        await sincronizarDatos(currentProfileID);
        
        main.classList.remove('hidden');
        noSession.classList.add('hidden');
        
        if (user) {
            document.getElementById('modalUserLabel').innerText = myName;
        }
    });

    async function sincronizarDatos(username) {
        const userRef = doc(db, "usuarios", username);
        const docSnap = await getDoc(userRef);

        if (docSnap.exists()) {
            userData = { ...userData, ...docSnap.data() };
            renderizarTodo();
        } else {
            if (isOwner) {
                // Si soy el dueño y no existe el doc, lo creo
                await setDoc(userRef, userData);
                renderizarTodo();
            } else {
                // Si no existe y no soy el dueño, error
                document.getElementById('mainContent').classList.add('hidden');
                document.getElementById('noSession').classList.remove('hidden');
                document.getElementById('errorTitle').innerText = "Usuario no encontrado";
                document.getElementById('errorMsg').innerText = "El perfil que buscas no existe en MovieM.";
            }
        }
    }

    function renderizarTodo() {
        document.getElementById('profileName').innerText = currentProfileID;
        renderizarBio(userData.bio);
        renderizarAvatar(userData.avatar);
        renderizarFavs();
        renderizarActores();
        renderizarGeneros();
        cambiarColor(userData.color, false); // false para no guardar al renderizar inicial
        document.getElementById('countSeguidores').innerText = userData.seguidores;
        document.getElementById('countSiguiendo').innerText = userData.siguiendo;
        
        // Gestionar permisos visuales
        gestionarPermisosEdicion();
    }

    function gestionarPermisosEdicion() {
        const adminElements = document.querySelectorAll('.hidden-admin');
        const avatarCont = document.getElementById('avatarClickContainer');

        if (isOwner) {
            adminElements.forEach(el => el.classList.remove('hidden'));
            avatarCont.classList.add('can-edit');
            avatarCont.style.cursor = "pointer";
        } else {
            adminElements.forEach(el => el.classList.add('hidden'));
            avatarCont.classList.remove('can-edit');
            avatarCont.style.cursor = "default";
            avatarCont.onclick = null; // Desactiva click en avatar
        }
    }

    async function guardarEnNube() {
        if (!isOwner) return;
        try {
            await updateDoc(doc(db, "usuarios", currentProfileID), userData);
        } catch(e) { console.error("Error guardando:", e); }
    }

    // --- UI FUNCTIONS (Ajustadas para lectura/escritura) ---

    window.cambiarColor = (hex, save = true) => {
        document.documentElement.style.setProperty('--accent-color', hex);
        userData.color = hex;
        if(save && isOwner) guardarEnNube();
    };

    window.cerrarSesion = () => auth.signOut().then(() => window.location.href = 'index.html');

    // Avatar
    window.abrirOpcionesAvatar = () => { if(isOwner) document.getElementById('modalAvatarOpciones').classList.remove('hidden'); };
    window.cerrarOpcionesAvatar = () => document.getElementById('modalAvatarOpciones').classList.add('hidden');
    
    window.subirFotoLocal = (e) => {
        if(!isOwner) return;
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => { 
                userData.avatar = ev.target.result;
                renderizarAvatar(userData.avatar);
                guardarEnNube();
                cerrarOpcionesAvatar();
            };
            reader.readAsDataURL(file);
        }
    };

    function renderizarAvatar(img) {
        const html = img ? `<img src="${img}" class="w-full h-full object-cover">` : "M";
        document.getElementById('userAvatarFrame').innerHTML = html;
        document.getElementById('miniAvatar').innerHTML = html;
    }

    // Bio
    window.editarBio = () => {
        if(!isOwner) return;
        const p = document.getElementById('userBio');
        document.getElementById('contenedorBio').innerHTML = `
            <div class="w-full">
                <textarea id="editBioInput" class="w-full bg-zinc-900 border border-accent p-3 rounded-xl text-lg outline-none text-zinc-300 h-24 resize-none">${p.innerText}</textarea>
                <div class="flex gap-2 mt-2">
                    <button onclick="guardarBio()" class="text-[9px] font-black uppercase bg-accent px-3 py-1 rounded-lg">Guardar</button>
                    <button onclick="renderizarTodo()" class="text-[9px] font-black uppercase bg-zinc-800 px-3 py-1 rounded-lg">Cancelar</button>
                </div>
            </div>`;
    };

    window.guardarBio = () => {
        userData.bio = document.getElementById('editBioInput').value;
        renderizarBio(userData.bio);
        guardarEnNube();
    };

    function renderizarBio(t) {
        document.getElementById('contenedorBio').innerHTML = `
            <p class="text-zinc-300 text-lg italic leading-relaxed" id="userBio">${t}</p>
            <button id="btnEditarBio" onclick="editarBio()" class="text-accent opacity-0 group-hover:opacity-100 transition-opacity mt-1.5 shrink-0 ${isOwner ? '' : 'hidden'}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
            </button>`;
    }

    // Favoritas
    function renderizarFavs() {
        document.getElementById('favContainer').innerHTML = userData.favs.map((f, i) => `
            <div class="aspect-[2/3] bg-zinc-900 rounded-xl border border-white/10 flex items-center justify-center overflow-hidden transition group relative ${isOwner ? 'cursor-pointer hover:border-accent' : ''}">
                ${f ? `<img src="https://image.tmdb.org/t/p/w500${f.poster}" class="w-full h-full object-cover">
                       ${isOwner ? `<div onclick="quitarFav(${i})" class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center text-[9px] font-bold uppercase">Quitar</div>` : ''}` 
                    : `<span class="text-zinc-700 text-3xl font-bold" ${isOwner ? `onclick="abrirBuscadorFav(${i})"` : ''}>${isOwner ? '+' : ''}</span>`}
            </div>`).join('');
    }
    window.abrirBuscadorFav = (i) => { if(isOwner) { tipoBusqueda = 'peli'; slotSeleccionado = i; mostrarModalBusqueda("Película Favorita"); } };
    window.quitarFav = (i) => { if(isOwner) { userData.favs[i] = null; renderizarFavs(); guardarEnNube(); } };

    // Actores
    function renderizarActores() {
        const container = document.getElementById('actorCarousel');
        if (userData.actores.length === 0) { container.innerHTML = `<div class="min-w-full flex items-center justify-center text-zinc-600 text-[10px] font-bold uppercase italic">Sin actores</div>`; return; }
        container.innerHTML = userData.actores.map(a => `
            <div class="min-w-full flex flex-col items-center justify-center h-full">
                <div class="w-24 h-24 rounded-full border-2 border-accent overflow-hidden mb-2 shadow-xl shrink-0">
                    <img src="${a.foto.startsWith('http')?a.foto:'https://image.tmdb.org/t/p/w200'+a.foto}" class="w-full h-full object-cover">
                </div>
                <p class="text-[10px] font-black text-white uppercase tracking-widest truncate w-full px-2">${a.nombre}</p>
                ${isOwner ? `<button onclick="eliminarActor()" class="text-[8px] text-zinc-600 mt-1 hover:text-red-500 uppercase font-bold">Quitar</button>` : ''}
            </div>`).join('');
    }
    window.abrirBuscadorActor = () => { if(isOwner) { tipoBusqueda = 'actor'; mostrarModalBusqueda("Agregar Actor"); } };
    window.eliminarActor = () => { if(isOwner) { userData.actores.splice(actorIndex, 1); actorIndex = 0; moverCarrusel(); renderizarActores(); guardarEnNube(); } };
    window.nextActor = () => { if(actorIndex < userData.actores.length - 1) actorIndex++; else actorIndex = 0; moverCarrusel(); };
    window.prevActor = () => { if(actorIndex > 0) actorIndex--; else actorIndex = userData.actores.length - 1; moverCarrusel(); };
    function moverCarrusel() { document.getElementById('actorCarousel').style.transform = `translateX(-${actorIndex * 100}%)`; }

    // Géneros
    function renderizarGeneros() {
        let html = userData.generos.map((g, i) => `
            <span ${isOwner ? `onclick="quitarGenero(${i})"` : ''} class="px-3 py-1 bg-zinc-900 border border-white/10 rounded-full text-[10px] font-bold uppercase tracking-wider text-zinc-400 ${isOwner ? 'hover:border-accent hover:text-white cursor-pointer' : ''} transition group">
                ${g} ${isOwner ? '<span class="hidden group-hover:inline ml-1 text-accent">×</span>' : ''}
            </span>`).join('');
        
        if(isOwner) {
            html += `<button onclick="agregarGenero()" class="px-3 py-1 border border-dashed border-zinc-700 rounded-full text-[10px] font-bold uppercase text-zinc-600 hover:text-accent hover:border-accent transition">+</button>`;
        }
        document.getElementById('generosCont').innerHTML = html;
    }
    window.agregarGenero = () => { if(isOwner) { const g = prompt("Género:"); if(g) { userData.generos.push(g); renderizarGeneros(); guardarEnNube(); } } };
    window.quitarGenero = (i) => { if(isOwner) { userData.generos.splice(i, 1); renderizarGeneros(); guardarEnNube(); } };

    // --- BUSCADOR LOGIC ---
    window.abrirBuscadorAvatar = () => { if(isOwner) { tipoBusqueda = 'avatar'; mostrarModalBusqueda("Buscar Personaje"); cerrarOpcionesAvatar(); } };
    function mostrarModalBusqueda(t) { document.getElementById('tituloModalBusqueda').innerText = t; document.getElementById('modalBusqueda').classList.remove('hidden'); document.getElementById('inputBusquedaGral').focus(); }
    window.cerrarModalBusqueda = () => { document.getElementById('modalBusqueda').classList.add('hidden'); document.getElementById('resultadosGral').innerHTML = ""; };

    document.getElementById('inputBusquedaGral').addEventListener('input', async (e) => {
        const q = e.target.value; if(q.length < 3) return;
        const res = await fetch(`https://api.themoviedb.org/3/${tipoBusqueda==='peli'?'search/movie':'search/person'}?api_key=${API_KEY}&query=${q}&language=es-ES`);
        const data = await res.json();
        const resCont = document.getElementById('resultadosGral'); resCont.innerHTML = "";
        data.results.slice(0, 5).forEach(item => {
            const img = item.poster_path || item.profile_path;
            if(!img) return;
            const div = document.createElement('div'); div.className = "flex items-center gap-3 p-2 hover:bg-zinc-800 rounded-lg cursor-pointer";
            div.innerHTML = `<img src="https://image.tmdb.org/t/p/w92${img}" class="w-8 h-12 rounded object-cover"><span class="text-xs font-bold text-white">${item.title || item.name}</span>`;
            div.onclick = () => {
                if(tipoBusqueda === 'peli') userData.favs[slotSeleccionado] = { poster: img, id: item.id };
                else if(tipoBusqueda === 'actor') userData.actores.push({ nombre: item.name, foto: img });
                else userData.avatar = `https://image.tmdb.org/t/p/w500${img}`;
                
                renderizarTodo();
                guardarEnNube();
                cerrarModalBusqueda();
            };
            resCont.appendChild(div);
        });
    });

    document.getElementById('btnUsuario').onclick = () => document.getElementById('modalLogin').classList.toggle('hidden');

</script>
</body>
</html>

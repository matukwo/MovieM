<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieM | Pelicula</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="firebase-config.js"></script>
    <style>
        .star{cursor:pointer;transition:color .2s ease}
        #starRating:hover .star{color:#ca8a04}
        #starRating .star:hover~.star{color:#3f3f46!important}
        .no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
        .glass-card{background:rgba(255,255,255,.04);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);box-shadow:0 30px 60px -15px rgba(0,0,0,.8)}
        @keyframes pulse-bg{0%{background-color:rgba(39,39,42,.5)}50%{background-color:rgba(63,63,70,.5)}100%{background-color:rgba(39,39,42,.5)}}
        .skeleton{animation:pulse-bg 1.5s infinite ease-in-out}
        .fade-in{animation:fadeIn .8s ease forwards;opacity:0}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        #playerOverlay{display:none;background:#000;position:fixed;inset:0;z-index:200;flex-direction:column}
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans overflow-x-hidden">

<!-- Player overlay -->
<div id="playerOverlay">
    <div class="w-full flex justify-between items-center px-3 py-2 md:px-4 md:py-3 bg-zinc-950 border-b border-white/5">
        <span class="text-red-600 font-black tracking-tighter text-lg md:text-xl shrink-0">MOVIE<span class="text-white font-light">M</span></span>
        <div id="fuentesBtns" class="flex gap-2">

            <button id="btnFuenteLat" onclick="cambiarFuente('latino')" class="hidden text-[10px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full border transition border-white/10 text-white/40 hover:text-yellow-400">🇦🇷 Latino</button>
        </div>
        <button onclick="cerrarPelicula()" class="text-white/60 font-black uppercase text-[10px] tracking-widest bg-white/5 px-4 py-2 rounded-full border border-white/5 shrink-0">Cerrar x</button>
    </div>

        <!-- Botón respaldo latino -->

</div>

<!-- Backdrop -->
<div id="backdrop" class="fixed inset-0 w-full h-full bg-cover bg-center opacity-20 md:opacity-30 blur-sm -z-10 transition-all duration-700"></div>

<!-- Botón volver -->

<!-- Modal Trailer -->
<div id="modalVideo" class="fixed inset-0 bg-black/95 z-[100] hidden flex items-center justify-center p-2 md:p-4">
    <button onclick="cerrarTrailer()" class="absolute top-4 right-4 md:top-8 md:right-8 text-white text-3xl hover:text-red-600 transition z-10">x</button>
    <div id="videoContainer" class="w-full max-w-5xl aspect-video rounded-xl md:rounded-3xl overflow-hidden shadow-2xl"></div>
</div>

<script type="module">
        const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';
        const urlParams = new URLSearchParams(window.location.search);
        const movieID = urlParams.get('id');
        let currentRating = 0;



        // ── Rangos de usuario ────────────────────────────────────
        const ADMIN_UID = '41XWZR8OzwdpMHf54UIQEzAEt7s1';
        const VERIFIED_USERS = []; // Agregá UIDs verificados: ['uid1', 'uid2']
        let miUID_pelicula = null; // UID del usuario logueado en esta página

        async function cargarPagina() {
            try {
                // Pedir es-MX primero, si título/overview viene vacío usar es-ES como fallback
                const [pResMX, pResES, cRes] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/movie/${movieID}?api_key=${API_KEY}&language=es-MX`),
                    fetch(`https://api.themoviedb.org/3/movie/${movieID}?api_key=${API_KEY}&language=es-ES`),
                    fetch(`https://api.themoviedb.org/3/movie/${movieID}/credits?api_key=${API_KEY}&language=es-MX`)
                ]);
                const peliMX = await pResMX.json();
                const peliES = await pResES.json();
                const credits = await cRes.json();

                // Preferir título latino; si no hay, usar España; si tampoco, el original
                const peli = {
                    ...peliMX,
                    title: (peliMX.title && peliMX.title !== peliMX.original_title) ? peliMX.title
                           : (peliES.title && peliES.title !== peliMX.original_title) ? peliES.title
                           : peliMX.original_title,
                    overview: peliMX.overview || peliES.overview || ''
                };

                if(document.getElementById('tituloSkeleton')) document.getElementById('tituloSkeleton').remove();
                if(document.getElementById('sinopsisSkeleton')) document.getElementById('sinopsisSkeleton').remove();
                document.getElementById('sinopsis').classList.remove('hidden');

                document.getElementById('titulo').innerText = peli.title;
                var tmob=document.getElementById('tituloMobile');if(tmob)tmob.innerText=peli.title;
                document.getElementById('sinopsis').innerText = peli.overview || "Sin descripción disponible.";
                document.getElementById('anio').innerText = peli.release_date ? peli.release_date.split('-')[0] : "S/F";
                document.getElementById('voto').innerText = peli.vote_average.toFixed(1);
                var vm=document.getElementById('votoMobile');if(vm)vm.innerText=peli.vote_average.toFixed(1);
                var am=document.getElementById('anioMobile');if(am)am.innerText=peli.release_date?peli.release_date.split('-')[0]:'S/F';
                document.getElementById('sinopsis').innerText = peli.overview || "Sin descripcion disponible.";
                var sm=document.getElementById('sinopsisMobile');if(sm){sm.innerText=peli.overview||'Sin descripcion.';sm.classList.remove('hidden');var sk=document.getElementById('sinopsisSkeleton');if(sk)sk.remove();}
                document.getElementById('poster').src = 'https://image.tmdb.org/t/p/w500' + peli.poster_path;
                document.getElementById('backdrop').style.backgroundImage = `url('https://image.tmdb.org/t/p/original${peli.backdrop_path}')`;
                
                if(peli.vote_average > 7.4) document.getElementById('badget-premios').classList.remove('hidden');

                const dir = credits.crew.find(c => c.job === "Director");
                if(dir) { document.getElementById('director').innerText = `Director: ${dir.name}`; var dm=document.getElementById('directorMobile');if(dm)dm.innerText='Dir: '+dir.name; }

                document.getElementById('reparto').innerHTML = credits.cast.slice(0, 15).map(actor => `
                    <div onclick="verActor(${actor.id})" class="min-w-[110px] text-center cursor-pointer shrink-0 fade-in">
                        <div class="w-20 h-20 mx-auto mb-4 overflow-hidden rounded-full border border-zinc-800 hover:border-red-600 transition-all transform hover:scale-110 duration-300">
                            <img src="${actor.profile_path ? 'https://image.tmdb.org/t/p/w200' + actor.profile_path : 'https://via.placeholder.com/200'}" class="w-full h-full object-cover">
                        </div>
                        <p class="text-[10px] font-black text-zinc-200 truncate uppercase tracking-tighter px-1">${actor.name}</p>
                        <p class="text-[8px] text-zinc-600 truncate italic px-1">${actor.character}</p>
                    </div>`).join('');

                escucharComentariosNube(); 
                checkStatus();
                actualizarHUD();
                // Guardar duración real para progreso más preciso
                if (peli.runtime) window._peliculaDuracion = peli.runtime;
                // Cargar similares
                cargarSimilares();
                // Mostrar barra de progreso si ya vio algo
                actualizarBarraProgreso(leerProgreso());
            } catch (error) { console.error(error); }
        }

        // --- HUD DE USUARIO + captura UID ---
        // Cargar el UID real del usuario logueado lo antes posible
        window.onAuthStateChanged(window.auth, function(user) {
            if (user) {
                miUID_pelicula = user.uid;
                checkStatus(); // re-check con UID real
            }
        });

        function actualizarHUD() {
            const userActual = localStorage.getItem('usuarioMovieM');
            const hud = document.getElementById('userHUD');
            if (userActual && userActual !== 'undefined') {
                document.getElementById('userNameHUD').innerText = userActual;
                document.getElementById('userInitial').innerText = userActual.charAt(0).toUpperCase();
                hud.classList.remove('hidden');
                hud.classList.add('flex');
            }
        }

        // --- FIREBASE LOGIC (COMENTARIOS) ---
        // Badge SVGs por rango
        function getBadge(uid) {
            if (uid === ADMIN_UID) return '<svg title="Creador" class="w-3.5 h-3.5 text-blue-400 inline-block ml-1 shrink-0" viewBox="0 0 24 24" fill="currentColor"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>';
            if (VERIFIED_USERS.includes(uid)) return '<svg title="Verificado" class="w-3.5 h-3.5 text-yellow-400 inline-block ml-1 shrink-0" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M8.603 3.799A4.49 4.49 0 0112 2.25c1.357 0 2.573.6 3.397 1.549a4.49 4.49 0 013.498 1.307 4.491 4.491 0 011.307 3.497A4.49 4.49 0 0121.75 12a4.49 4.49 0 01-1.549 3.397 4.491 4.491 0 01-1.307 3.497 4.491 4.491 0 01-3.497 1.307A4.49 4.49 0 0112 21.75a4.49 4.49 0 01-3.397-1.549 4.491 4.491 0 01-3.497-1.307 4.491 4.491 0 01-1.307-3.497A4.49 4.49 0 012.25 12a4.49 4.49 0 011.549-3.397 4.491 4.491 0 011.307-3.497 4.491 4.491 0 013.497-1.307zm7.007 6.387a.75.75 0 10-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 00-1.06 1.06l2.25 2.25a.75.75 0 001.14-.094l3.75-5.25z" clip-rule="evenodd"/></svg>';
            return '';
        }

        function escucharComentariosNube() {
            const contenedor = document.getElementById('listaComentarios');
            const q = window.query(
                window.collection(window.db, "comentarios"),
                window.where("movieID", "==", movieID),
                window.orderBy("fecha", "desc")
            );

            // Primero buscamos los UIDs de todos los usuarios para poder mostrar badges
            window.onSnapshot(q, async (snapshot) => {
                contenedor.innerHTML = "";
                if (snapshot.empty) {
                    contenedor.innerHTML = `<p class="text-zinc-600 text-sm italic">Nadie ha comentado aún. ¡Sé el primero!</p>`;
                    return;
                }

                // Recolectar usernames únicos y buscar sus UIDs
                const usernames = [...new Set(snapshot.docs.map(d => d.data().user))];
                const uidMap = {}; // username → uid
                try {
                    const usersSnap = await window.getDocs(
                        window.query(window.collection(window.db, 'usuarios'), window.where('username', 'in', usernames.slice(0,10)))
                    );
                    usersSnap.forEach(d => { uidMap[d.data().username] = d.id; });
                } catch(e) {}

                snapshot.forEach((docSnap) => {
                    const c = docSnap.data();
                    const docId = docSnap.id;
                    const fechaComentario = c.fecha ? new Date(c.fecha).toLocaleString() : "Reciente";
                    const uid = uidMap[c.user] || '';
                    const badge = getBadge(uid);
                    const esAdmin = miUID_pelicula === ADMIN_UID;
                    
                    const div = document.createElement('div');
                    div.className = 'bg-zinc-900/50 p-5 rounded-2xl border border-white/5 shadow-xl fade-in mb-4 group/comment';
                    div.innerHTML = `
                        <div class="flex justify-between items-start mb-3 gap-2">
                            <div class="flex flex-col gap-1 min-w-0">
                                <span class="text-red-600 font-black text-xs uppercase tracking-widest leading-none flex items-center gap-1">
                                    <a href="perfil.html?user=${encodeURIComponent(c.user)}" class="hover:underline">${c.user}</a>${badge}
                                </span>
                                <span class="text-[9px] text-zinc-600 font-bold uppercase tracking-tighter">${fechaComentario}</span>
                            </div>
                            <div class="flex items-center gap-2 shrink-0">
                                <span class="text-yellow-500 text-[10px] tracking-widest">${"★".repeat(c.rating)}</span>
                                ${esAdmin ? `<button onclick="borrarComentarioPelicula('${docId}')" class="opacity-0 group-hover/comment:opacity-100 transition-opacity w-6 h-6 rounded-full bg-red-900/60 hover:bg-red-600 flex items-center justify-center" title="Borrar">
                                    <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
                                </button>` : ''}
                            </div>
                        </div>
                        <p class="text-zinc-400 text-sm leading-relaxed font-medium">${c.txt}</p>
                    `;
                    contenedor.appendChild(div);
                });
            });
        }

        window.borrarComentarioPelicula = async function(docId) {
            if (miUID_pelicula !== ADMIN_UID) return;
            if (!confirm('¿Borrar este comentario?')) return;
            try { await window.deleteDoc(window.doc(window.db, 'comentarios', docId)); }
            catch(e) { alert('Error al borrar.'); }
        };

        window.publicarComentario = async () => {
            const txt = document.getElementById('comentarioTxt').value.trim();
            const userActual = localStorage.getItem('usuarioMovieM');
            
            // Corrección: Validación de sesión primero
            if (!userActual || userActual === 'undefined') {
                return alert("Debes iniciar sesión para comentar.");
            }
            if(!txt || currentRating === 0) {
                return alert("Por favor, escribe un comentario y selecciona una valoración.");
            }

            try {
                await window.addDoc(window.collection(window.db, "comentarios"), {
                    movieID: movieID,
                    user: userActual,
                    txt: txt,
                    rating: currentRating,
                    fecha: Date.now()
                });
                document.getElementById('comentarioTxt').value = "";
                window.setRating(0);
            } catch (e) {
                console.error("Error Firebase:", e);
                alert("Error al publicar el comentario.");
            }
        };

        // --- SISTEMAS DE INTERACCIÓN ---
        async function checkStatus() {
            if (!miUID_pelicula) return;

            try {
                const userRef = window.doc(window.db, "usuarios", miUID_pelicula);
                const userDoc = await window.getDoc(userRef);
                
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    if (data.watchlist && data.watchlist.includes(movieID)) {
                        ['btnWatchlist','btnWatchlistDesktop'].forEach(id => { const b=document.getElementById(id); if(!b)return; b.classList.add('bg-zinc-100','text-black','border-white'); b.classList.remove('bg-zinc-900','text-zinc-400','border-white/5'); });
                    }
                    if (data.likes && data.likes.includes(movieID)) {
                        ['btnLike','btnLikeDesktop'].forEach(id => { const b=document.getElementById(id); if(!b)return; b.classList.add('bg-red-600','border-red-600','text-white'); b.classList.remove('bg-zinc-900','text-zinc-400','border-white/5'); });
                    }
                }
            } catch (e) { console.error("Error al checkear status:", e); }
        }

        window.toggleWatchlist = async () => {
            if (!miUID_pelicula) return alert("Debes iniciar sesión para guardar películas.");

            const btn = document.getElementById('btnWatchlist');
            const userRef = window.doc(window.db, "usuarios", miUID_pelicula);
            const isSaved = btn.classList.contains('bg-zinc-100');

            try {
                await window.setDoc(userRef, { 
                    watchlist: isSaved ? window.arrayRemove(movieID) : window.arrayUnion(movieID) 
                }, { merge: true });
                
                ['btnWatchlist','btnWatchlistDesktop'].forEach(id => {
                    const b = document.getElementById(id); if(!b) return;
                    if(!isSaved){b.classList.add('bg-zinc-100','text-black','border-white');b.classList.remove('bg-zinc-900','text-zinc-400','border-white/5');}
                    else{b.classList.remove('bg-zinc-100','text-black','border-white');b.classList.add('bg-zinc-900','text-zinc-400','border-white/5');}
                });
            } catch (e) { console.error("Error en Watchlist:", e); }
        };

        window.toggleLike = async () => {
            if (!miUID_pelicula) return alert("Debes iniciar sesión para dar like.");

            const btn = document.getElementById('btnLike');
            const userRef = window.doc(window.db, "usuarios", miUID_pelicula);
            const isLiked = btn.classList.contains('bg-red-600');

            try {
                await window.setDoc(userRef, { 
                    likes: isLiked ? window.arrayRemove(movieID) : window.arrayUnion(movieID) 
                }, { merge: true });
                
                ['btnLike','btnLikeDesktop'].forEach(id => {
                    const b = document.getElementById(id); if(!b) return;
                    if(!isLiked){b.classList.add('bg-red-600','border-red-600','text-white');b.classList.remove('bg-zinc-900','text-zinc-400','border-white/5');}
                    else{b.classList.remove('bg-red-600','border-red-600','text-white');b.classList.add('bg-zinc-900','text-zinc-400','border-white/5');}
                });
            } catch (e) { console.error("Error en Like:", e); }
        };

        // --- MODAL ACTORES & TRAILER ---
        window.verActor = async (id) => {
            try {
                const [resBio, resPelis] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/person/${id}?api_key=${API_KEY}&language=es-MX`),
                    fetch(`https://api.themoviedb.org/3/person/${id}/movie_credits?api_key=${API_KEY}&language=es-MX`)
                ]);
                const actor = await resBio.json();
                const créditos = await resPelis.json();
                
                document.getElementById('actorNombre').innerText = actor.name;
                document.getElementById('actorFoto').src = actor.profile_path ? 'https://image.tmdb.org/t/p/w500' + actor.profile_path : 'https://via.placeholder.com/500';
                document.getElementById('actorInfo').innerText = actor.biography || "Biografía no disponible.";
                
                const pelisValidas = créditos.cast.filter(p => p.poster_path).sort((a, b) => b.popularity - a.popularity).slice(0, 15);
                const isScrollable = pelisValidas.length > 5;
                const contenedorPelis = document.getElementById('actorPelisContenedor');
                
                const pelisHTML = pelisValidas.map(p => `
                    <div class="w-[85px] group/item cursor-pointer shrink-0" onclick="window.location.href='pelicula.html?id=${p.id}'">
                        <div class="w-[85px] h-[125px] overflow-hidden rounded-xl border border-white/5 group-hover/item:border-red-600 transition-all duration-300 transform group-hover/item:scale-105">
                            <img src="https://image.tmdb.org/t/p/w200${p.poster_path}" class="w-full h-full object-cover">
                        </div>
                        <p class="text-[7px] mt-2 text-zinc-500 truncate w-full text-center uppercase font-bold px-1">${p.title}</p>
                    </div>`).join('');

                contenedorPelis.innerHTML = `
                    ${isScrollable ? `<button onclick="scrollPelis(-300)" class="absolute -left-6 top-[62px] -translate-y-1/2 bg-zinc-900/90 p-2 rounded-full border border-white/10 opacity-0 group-hover:opacity-100 transition-opacity z-20 hover:bg-red-600 text-white shadow-xl"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>` : ''}
                    <div id="listaPelisActor" class="flex gap-4 overflow-x-auto no-scrollbar scroll-smooth pb-4 px-1">${pelisHTML}</div>
                    ${isScrollable ? `<button onclick="scrollPelis(300)" class="absolute -right-6 top-[62px] -translate-y-1/2 bg-zinc-900/90 p-2 rounded-full border border-white/10 opacity-0 group-hover:opacity-100 transition-opacity z-20 hover:bg-red-600 text-white shadow-xl"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>` : ''}
                `;
                document.getElementById('modalActor').classList.remove('hidden');
                document.body.style.overflow = "hidden";
            } catch (error) { console.error(error); }
        };

        window.cerrarActor = () => { document.getElementById('modalActor').classList.add('hidden'); document.body.style.overflow = "auto"; };
        window.scrollPelis = (distancia) => document.getElementById('listaPelisActor').scrollBy({ left: distancia, behavior: 'smooth' });
        window.scrollReparto = (distancia) => document.getElementById('reparto').scrollBy({ left: distancia, behavior: 'smooth' });

        window.abrirTrailer = async () => {
            try {
                const res = await fetch(`https://api.themoviedb.org/3/movie/${movieID}/videos?api_key=${API_KEY}`);
                const data = await res.json();
                const tr = data.results.find(v => v.type === "Trailer" && v.site === "YouTube");
                if(tr) {
                    document.getElementById('videoContainer').innerHTML = `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${tr.key}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
                    document.getElementById('modalVideo').classList.remove('hidden');
                    document.body.style.overflow = "hidden";
                }
            } catch (error) { console.error(error); }
        };

        window.cerrarTrailer = () => { 
            document.getElementById('modalVideo').classList.add('hidden'); 
            document.getElementById('videoContainer').innerHTML = '';
            document.body.style.overflow = "auto";
        };

        // --- OTROS HELPERS ---
        window.setRating = (n) => {
            currentRating = n;
            document.querySelectorAll('.star').forEach((s, i) => {
                s.style.color = i < n ? '#eab308' : '#3f3f46';
            });
        };

        // ── CONTINUAR VIENDO ───────────────────────────────────────────────────────
        // Guarda el progreso de reproducción en localStorage
        // Clave: movieM_progress → { "pelicula_ID": porcentaje }
        let progresoTimer = null;
        let progresoInicio = null;

        function guardarProgreso(porcentaje) {
            try {
                const prog = JSON.parse(localStorage.getItem('movieM_progress') || '{}');
                prog['pelicula_' + movieID] = Math.min(100, Math.max(0, Math.round(porcentaje)));
                localStorage.setItem('movieM_progress', JSON.stringify(prog));
            } catch(e) {}
        }

        function leerProgreso() {
            try {
                const prog = JSON.parse(localStorage.getItem('movieM_progress') || '{}');
                return prog['pelicula_' + movieID] || 0;
            } catch(e) { return 0; }
        }

        function actualizarBarraProgreso(pct) {
            const bar = document.getElementById('progresoBar');
            const wrap = document.getElementById('progresoWrap');
            const num  = document.getElementById('progresoNum');
            if (!bar || !wrap) return;
            if (pct > 2) {
                wrap.classList.remove('hidden');
                bar.style.width = pct + '%';
                if (num) num.innerText = Math.round(pct) + '%';
            } else {
                wrap.classList.add('hidden');
            }
        }

        // Cargar link latino desde Firestore
        // Link latino desde Firestore
        let _latinoUrl = null;
        let _latinoUrl2 = null;
        async function cargarLatinoLink() {
            try {
                for (let i = 0; i < 30; i++) {
                    if (window.db && window.getDoc && window.doc) break;
                    await new Promise(r => setTimeout(r, 100));
                }
                const snap = await window.getDoc(window.doc(window.db, 'latinoLinks', String(movieID)));
                if (snap.exists()) {
                    _latinoUrl = snap.data().url;
                    _latinoUrl2 = snap.data().url2 || null;
                    document.getElementById('btnFuenteLat').classList.remove('hidden');
                }
            } catch(e) { console.log('Sin link latino para esta película'); }
        }
        cargarLatinoLink();

        window.usarRespaldo = function() {
            if (!_latinoUrl2) return;
            document.getElementById('movieFrame').src = _latinoUrl2;
            document.getElementById('btnRespaldoWrap').classList.add('hidden');
        };

        window.cambiarFuente = function(fuente) {
            const subBtn = document.getElementById('btnFuenteSub');
            const latBtn = document.getElementById('btnFuenteLat');
            const respaldoWrap = document.getElementById('btnRespaldoWrap');
            const base = 'text-[10px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full border transition';
            if (fuente === 'sub') {
                subBtn.className = base + ' bg-white/10 border-white/20 text-white';
                latBtn.className = base + ' border-white/10 text-white/40 hover:text-yellow-400';
                respaldoWrap.classList.add('hidden');
                document.getElementById('movieFrame').src = `https://vidsrc.cc/v3/embed/movie/${movieID}?auto_lang=es`;
            } else {
                latBtn.className = base + ' bg-yellow-500/20 border-yellow-500/50 text-yellow-400';
                subBtn.className = base + ' border-white/10 text-white/40 hover:text-white';
                document.getElementById('movieFrame').src = _latinoUrl;
                // Mostrar botón respaldo si hay url2
                if (_latinoUrl2) respaldoWrap.classList.remove('hidden');
            }
        };

        window.verPelicula = () => {
            // Siempre arranca en Subtitulado
            document.getElementById('btnFuenteSub').className = 'text-[10px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full border transition bg-white/10 border-white/20 text-white';
            const latBtn = document.getElementById('btnFuenteLat');
            if (!latBtn.classList.contains('hidden')) {
                latBtn.className = 'text-[10px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full border transition border-white/10 text-white/40 hover:text-yellow-400';
            }
            document.getElementById('movieFrame').src = `https://vidsrc.cc/v3/embed/movie/${movieID}?auto_lang=es`;
            document.getElementById('playerOverlay').style.display = 'flex';
            document.body.style.overflow = "hidden";
            progresoInicio = Date.now();
            const duracionEstimada = (window._peliculaDuracion || 120) * 60 * 1000;
            const progresoActual = leerProgreso();
            progresoTimer = setInterval(() => {
                const transcurrido = Date.now() - progresoInicio;
                const pctNuevo = progresoActual + (transcurrido / duracionEstimada) * 100;
                guardarProgreso(pctNuevo);
                actualizarBarraProgreso(Math.min(100, Math.round(pctNuevo)));
            }, 10000);
        };

        window.cerrarPelicula = () => {
            document.getElementById('playerOverlay').style.display = 'none';
            document.getElementById('movieFrame').src = "";
            document.getElementById('btnRespaldoWrap').classList.add('hidden');
            document.body.style.overflow = "auto";
            if (progresoTimer) { clearInterval(progresoTimer); progresoTimer = null; }
            // Guardar progreso final
            if (progresoInicio) {
                const duracion = (window._peliculaDuracion || 120) * 60 * 1000;
                const transcurrido = Date.now() - progresoInicio;
                const actual = leerProgreso();
                guardarProgreso(actual + (transcurrido / duracion) * 100);
                progresoInicio = null;
            }
            actualizarBarraProgreso(leerProgreso());
        };

        async function cargarSimilares() {
            try {
                const res = await fetch(`https://api.themoviedb.org/3/movie/${movieID}/similar?api_key=${API_KEY}&language=es-MX&page=1`);
                const data = await res.json();
                const fila = document.getElementById('similaresFila');
                const progress = JSON.parse(localStorage.getItem('movieM_progress') || '{}');
                const items = (data.results || []).filter(p => p.poster_path).slice(0, 18);
                if (!items.length) {
                    fila.closest('section').classList.add('hidden');
                    return;
                }
                fila.innerHTML = items.map(p => {
                    const prog = progress['pelicula_' + p.id] || 0;
                    const rating = p.vote_average ? p.vote_average.toFixed(1) : '';
                    const anio = (p.release_date || '').split('-')[0];
                    return `
                    <div onclick="location.href='pelicula.html?id=${p.id}'"
                        class="min-w-[75px] md:min-w-[100px] shrink-0 cursor-pointer group/sim-card">
                        <div class="relative rounded-xl overflow-hidden border border-white/5 transition-transform duration-200 group-hover/sim-card:scale-105 mb-1.5">
                            <img src="https://image.tmdb.org/t/p/w200${p.poster_path}"
                                 class="w-full aspect-[2/3] object-cover" loading="lazy">
                            <div class="absolute top-1 right-1 flex flex-col gap-0.5 items-end">
                                ${rating ? `<div class="bg-black/80 text-yellow-500 text-[7px] font-black px-1 py-0.5 rounded">⭐ ${rating}</div>` : ''}
                                ${anio ? `<div class="bg-black/80 text-zinc-300 text-[7px] font-black px-1 py-0.5 rounded">${anio}</div>` : ''}
                            </div>
                            ${prog > 0 ? `<div class="absolute bottom-0 left-0 right-0 h-1 bg-zinc-800/80"><div class="h-full bg-red-600 rounded-full transition-all" style="width:${prog}%"></div></div>` : ''}
                        </div>
                        <p class="text-[8px] font-bold uppercase tracking-tighter text-zinc-500 truncate">${p.title}</p>
                    </div>`;
                }).join('');
            } catch(e) { console.error('similares:', e); }
        }

        cargarPagina();
    </script>
</body>
</html>

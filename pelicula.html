<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieM | Detalle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="firebase-config.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-nav { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        #playerOverlay { display: none; background: #000; position: fixed; inset: 0; z-index: 200; flex-direction: column; }
        .skeleton { animation: pulse 1.5s infinite ease-in-out; background: #27272a; }
        @keyframes pulse { 50% { opacity: 0.5; } }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans overflow-x-hidden">

    <nav class="fixed top-0 left-0 w-full z-[100] glass-nav px-8 py-4 flex items-center justify-between">
        <div class="flex items-center gap-8">
            <a href="index.html" class="text-xs font-bold uppercase tracking-widest hover:text-red-600 transition">Inicio</a>
            <a href="#" class="text-xs font-bold uppercase tracking-widest text-zinc-500 hover:text-white transition">Series</a>
            <a href="perfil.html" class="text-xs font-bold uppercase tracking-widest text-zinc-500 hover:text-white transition">Mi Lista</a>
        </div>

        <div class="absolute left-1/2 -translate-x-1/2">
            <a href="index.html" class="text-2xl font-black tracking-tighter italic">MOVIE<span class="text-red-600">M</span></a>
        </div>

        <div class="flex items-center gap-6">
            <div class="relative hidden md:block">
                <input type="text" placeholder="Películas o usuarios" class="bg-zinc-900 border border-white/10 rounded-full py-2 px-10 text-xs outline-none focus:border-red-600 w-64 transition-all">
                <svg class="w-4 h-4 absolute left-4 top-2.5 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
            
            <button id="userBtn" onclick="toggleUserModal()" class="w-10 h-10 rounded-full bg-zinc-800 border border-white/10 flex items-center justify-center font-black text-sm hover:scale-110 transition hidden">
                <span id="userInitialNav">?</span>
            </button>
            
            <a id="loginBtn" href="login.html" class="text-[10px] font-black uppercase tracking-widest bg-red-600 px-4 py-2 rounded-lg hover:bg-red-700 transition">Ingresar</a>
        </div>
    </nav>

    <div id="userModal" class="fixed inset-0 z-[200] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="toggleUserModal()"></div>
        <div class="relative w-full max-w-sm bg-zinc-900 rounded-[40px] p-10 border border-white/5 text-center shadow-2xl">
            <div id="modalAvatar" class="w-24 h-24 rounded-full bg-red-600 mx-auto mb-6 flex items-center justify-center text-4xl font-black text-white shadow-lg">M</div>
            <h2 id="modalName" class="text-2xl font-black italic uppercase tracking-tighter mb-8">Usuario</h2>
            <button onclick="window.location.href='perfil.html'" class="w-full bg-zinc-800 py-4 rounded-2xl font-black text-xs uppercase tracking-widest border border-white/5 hover:bg-zinc-700 transition mb-4">Ver Perfil</button>
            <button onclick="cerrarSesion()" class="w-full py-4 text-zinc-500 font-bold text-xs uppercase tracking-widest hover:text-red-500 transition">Cerrar Sesión</button>
        </div>
    </div>

    <main class="pt-32 container mx-auto px-8 lg:px-20">
        </main>

    <script type="module">
        // ... (Tu configuración de Firebase y constantes de API) ...
        const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';
        const urlParams = new URLSearchParams(window.location.search);
        const movieID = urlParams.get('id');

        function gestionarHUD() {
            const user = localStorage.getItem('usuarioMovieM');
            const userBtn = document.getElementById('userBtn');
            const loginBtn = document.getElementById('loginBtn');

            if (user && user !== 'undefined') {
                const inicial = user.charAt(0).toUpperCase();
                document.getElementById('userInitialNav').innerText = inicial;
                document.getElementById('modalAvatar').innerText = inicial;
                document.getElementById('modalName').innerText = user;
                
                userBtn.classList.remove('hidden');
                loginBtn.classList.add('hidden');
            } else {
                userBtn.classList.add('hidden');
                loginBtn.classList.remove('hidden');
            }
        }

        window.toggleUserModal = () => {
            const modal = document.getElementById('userModal');
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
        };

        window.cerrarSesion = () => {
            localStorage.removeItem('usuarioMovieM');
            window.location.reload();
        };

        // Al cargar la página
        gestionarHUD();
        // cargarPelicula(); ... (el resto de tu lógica de TMDB)
    </script>
</body>
</html>

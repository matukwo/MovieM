<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieM | Detalle Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="firebase-config.js"></script>
    <style>
        /* Estrellas: Mejora de interactividad */
        .star { cursor: pointer; transition: all 0.2s ease; color: #3f3f46; }
        .star.active { color: #eab308; text-shadow: 0 0 10px rgba(234, 179, 8, 0.4); }
        #starRating:hover .star { color: #ca8a04; }
        #starRating .star:hover ~ .star { color: #3f3f46 !important; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes pulse-bg {
            0%, 100% { background-color: rgba(39, 39, 42, 0.5); }
            50% { background-color: rgba(63, 63, 70, 0.5); }
        }
        .skeleton { animation: pulse-bg 1.5s infinite ease-in-out; }

        .fade-in { animation: fadeIn 0.8s ease forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        #playerOverlay { display: none; background: #000; position: fixed; inset: 0; z-index: 200; flex-direction: column; }

        /* Estilos del HUD Flotante */
        .hud-shadow { shadow: 0 20px 50px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans overflow-x-hidden pt-24">

    <div id="userHUD" class="fixed top-8 right-8 z-[150] hidden items-center gap-4 bg-black/60 backdrop-blur-xl p-1.5 pr-6 rounded-full border border-white/10 shadow-2xl transition-all duration-500 cursor-pointer hover:scale-105" onclick="toggleUserModal()">
        <div class="w-10 h-10 rounded-full bg-red-600 flex items-center justify-center font-black text-white border-2 border-white/20 shadow-inner overflow-hidden" id="userInitialContainer">
            <span id="userInitialLetter">M</span>
        </div>
        <div class="flex flex-col">
            <span class="text-[8px] text-zinc-500 uppercase font-black tracking-tighter">Mi Cuenta</span>
            <span id="userNameHUD" class="text-xs font-bold uppercase tracking-widest text-white">Usuario</span>
        </div>
    </div>

    <div id="userModal" class="fixed inset-0 z-[200] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="toggleUserModal()"></div>
        <div class="relative w-full max-w-sm bg-[#121212] rounded-[40px] p-10 border border-white/5 text-center shadow-2xl">
            <div class="w-24 h-24 rounded-full bg-red-600 mx-auto mb-6 flex items-center justify-center text-4xl font-black text-white border-4 border-red-600/20" id="modalInitial">M</div>
            <h2 id="modalName" class="text-2xl font-black italic uppercase tracking-tighter mb-8 text-white">MATU</h2>
            
            <button onclick="window.location.href='perfil.html'" class="w-full bg-zinc-900 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest border border-white/5 hover:bg-zinc-800 transition mb-8">Mi Perfil</button>
            
            <div class="h-px bg-white/5 w-full mb-8"></div>
            
            <p class="text-[10px] font-black uppercase tracking-[0.2em] text-zinc-500 mb-6">Color de Acento</p>
            <div class="flex justify-center gap-4 mb-10">
                <div class="w-8 h-8 rounded-full bg-red-600 cursor-pointer hover:scale-125 transition"></div>
                <div class="w-8 h-8 rounded-full bg-blue-600 cursor-pointer hover:scale-125 transition"></div>
                <div class="w-8 h-8 rounded-full bg-green-600 cursor-pointer hover:scale-125 transition"></div>
                <div class="w-8 h-8 rounded-full bg-purple-600 cursor-pointer hover:scale-125 transition"></div>
            </div>

            <button onclick="cerrarSesion()" class="w-full py-4 rounded-2xl font-black text-[10px] uppercase tracking-[0.3em] text-zinc-500 hover:text-white transition">Cerrar Sesión</button>
        </div>
    </div>

    <div id="playerOverlay">
        <div class="w-full flex justify-between items-center p-4 bg-zinc-950 border-b border-white/5">
            <span class="text-red-600 font-black tracking-tighter text-xl">MOVIE<span class="text-white font-light">M</span></span>
            <button onclick="cerrarPelicula()" class="text-white/30 hover:text-white transition font-black uppercase text-[10px] tracking-widest bg-white/5 px-6 py-3 rounded-full border border-white/5">Cerrar ✕</button>
        </div>
        <div class="flex-1 bg-black relative">
            <iframe id="movieFrame" src="" class="w-full h-full" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

    <div id="backdrop" class="fixed inset-0 w-full h-full bg-cover bg-center opacity-30 blur-sm -z-10 transition-all duration-1000 scale-110"></div>
    <div class="fixed inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/80 to-transparent -z-10"></div>

    <button onclick="window.location.href='index.html'" class="fixed top-8 left-8 bg-black/50 p-3 rounded-full hover:bg-red-600 transition z-50 border border-white/10 shadow-2xl group">
        <svg class="w-6 h-6 transform group-hover:-translate-x-1 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    </button>

    <main class="container mx-auto px-8 lg:px-20">
        <div class="flex flex-col md:flex-row gap-12 items-center md:items-start mb-16 relative z-0 fade-in">
            <div class="w-full max-w-[320px] shrink-0">
                <div id="posterSkeleton" class="w-full aspect-[2/3] rounded-2xl skeleton shadow-2xl"></div>
                <img id="poster" src="" class="w-full rounded-2xl border border-white/10 shadow-2xl transition-transform hover:scale-[1.03] duration-500 hidden" onload="this.classList.remove('hidden'); document.getElementById('posterSkeleton')?.remove()">
            </div>
            
            <div class="flex-1 relative z-10 min-w-0 text-center md:text-left">
                <div id="badget-premios" class="hidden mb-6 inline-flex items-center gap-2.5 bg-yellow-600/20 border border-yellow-600/50 text-yellow-500 px-5 py-2 rounded-full text-[10px] font-bold uppercase tracking-[0.2em] shadow-lg animate-bounce">
                    <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.2h7.6l-6 4.8 2.4 7.2-6-4.8-6 4.8 2.4-7.2-6-4.8h7.6z"/></svg>
                    Altamente Calificada
                </div>
                
                <h1 id="titulo" class="text-5xl md:text-8xl font-black mb-6 italic tracking-tighter uppercase leading-[0.9] text-white"></h1>
                <div id="tituloSkeleton" class="h-20 w-3/4 skeleton rounded-xl mb-6"></div>
                
                <div class="flex flex-wrap items-center justify-center md:justify-start gap-6 mb-8 font-bold">
                    <span id="anio" class="bg-zinc-800/80 backdrop-blur px-4 py-1.5 rounded text-white text-sm border border-white/5"></span>
                    <span class="text-yellow-500 flex items-center gap-2 text-xl font-black">⭐ <span id="voto" class="text-white">0.0</span></span>
                    <span id="director" class="text-zinc-400 border-l border-zinc-800 pl-6 font-semibold italic text-base"></span>
                </div>
                
                <p id="sinopsis" class="text-lg text-zinc-400 max-w-2xl leading-relaxed mb-10 hidden font-medium"></p>
                
                <div class="flex flex-wrap items-center justify-center md:justify-start gap-5">
                    <button onclick="verPelicula()" class="bg-red-600 text-white px-10 py-5 rounded-full font-black flex items-center gap-3 hover:bg-red-700 transition-all shadow-[0_0_30px_rgba(220,38,38,0.3)] active:scale-95 tracking-widest uppercase text-sm">
                        <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Ver ahora
                    </button>

                    <button onclick="abrirTrailer()" class="bg-white/10 backdrop-blur text-white px-10 py-5 rounded-full font-black flex items-center gap-3 hover:bg-white hover:text-black transition-all shadow-xl active:scale-95 tracking-widest uppercase text-sm border border-white/10">
                        <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M10 15l5.19-3L10 9v6zM21 12c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9 9-4.03 9-9zm-16.1 0c0-3.92 3.18-7.1 7.1-7.1s7.1 3.18 7.1 7.1-3.18 7.1-7.1 7.1-7.1-3.18-7.1-7.1z"/></svg> Trailer
                    </button>
                    
                    <div class="flex gap-4">
                        <button id="btnWatchlist" onclick="toggleWatchlist()" class="w-14 h-14 rounded-full bg-zinc-900/80 border border-white/10 flex items-center justify-center text-zinc-400 hover:text-white transition-all hover:scale-110">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" /></svg>
                        </button>
                        <button id="btnLike" onclick="toggleLike()" class="w-14 h-14 rounded-full bg-zinc-900/80 border border-white/10 flex items-center justify-center text-zinc-400 hover:text-red-500 transition-all hover:scale-110">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78v0z"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        </main>

    <script type="module">
        const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';
        const urlParams = new URLSearchParams(window.location.search);
        const movieID = urlParams.get('id');
        let currentRating = 0;

        async function cargarPagina() {
            if(!movieID) { window.location.href = 'index.html'; return; }
            try {
                const [pRes, cRes] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/movie/${movieID}?api_key=${API_KEY}&language=es-ES`),
                    fetch(`https://api.themoviedb.org/3/movie/${movieID}/credits?api_key=${API_KEY}&language=es-ES`)
                ]);
                const peli = await pRes.json();
                const credits = await cRes.json();

                document.getElementById('tituloSkeleton')?.remove();
                document.getElementById('sinopsis').classList.remove('hidden');

                document.title = `${peli.title} | MovieM`;
                document.getElementById('titulo').innerText = peli.title;
                document.getElementById('sinopsis').innerText = peli.overview || "No hay sinopsis.";
                document.getElementById('anio').innerText = peli.release_date ? peli.release_date.split('-')[0] : "N/A";
                document.getElementById('voto').innerText = peli.vote_average.toFixed(1);
                document.getElementById('poster').src = 'https://image.tmdb.org/t/p/w500' + peli.poster_path;
                document.getElementById('backdrop').style.backgroundImage = `url('https://image.tmdb.org/t/p/original${peli.backdrop_path}')`;
                
                if(peli.vote_average > 7.5) document.getElementById('badget-premios').classList.remove('hidden');

                const dir = credits.crew.find(c => c.job === "Director");
                if(dir) document.getElementById('director').innerText = `Dirigida por ${dir.name}`;

                actualizarHUD();
                checkStatus();
                // ... resto de funciones de carga (reparto, comentarios)
            } catch (error) { console.error(error); }
        }

        // --- LÓGICA DEL HUD Y MODAL DE USUARIO ---
        function actualizarHUD() {
            const user = localStorage.getItem('usuarioMovieM');
            if (user && user !== 'undefined') {
                const initial = user.charAt(0).toUpperCase();
                
                // HUD Superior
                document.getElementById('userNameHUD').innerText = user;
                document.getElementById('userInitialLetter').innerText = initial;
                document.getElementById('userHUD').classList.remove('hidden');
                document.getElementById('userHUD').classList.add('flex');

                // Modal Interno
                document.getElementById('modalName').innerText = user;
                document.getElementById('modalInitial').innerText = initial;
            } else {
                window.location.href = 'login.html'; // Redirigir si no hay sesión
            }
        }

        window.toggleUserModal = () => {
            const modal = document.getElementById('userModal');
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
        };

        window.cerrarSesion = () => {
            localStorage.removeItem('usuarioMovieM');
            window.location.href = 'login.html';
        };

        // --- (Mantén el resto de tus funciones como verPelicula, toggleLike, etc.) ---
        
        cargarPagina();
    </script>
</body>
</html>

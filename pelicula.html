    <style>
        .star{cursor:pointer;transition:color .2s ease}
        #starRating:hover .star{color:#ca8a04}
        #starRating .star:hover~.star{color:#3f3f46!important}
        .no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
        .glass-card{background:rgba(255,255,255,.04);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);box-shadow:0 30px 60px -15px rgba(0,0,0,.8)}
        @keyframes pulse-bg{0%{background-color:rgba(39,39,42,.5)}50%{background-color:rgba(63,63,70,.5)}100%{background-color:rgba(39,39,42,.5)}}
        .skeleton{animation:pulse-bg 1.5s infinite ease-in-out}
        .fade-in{animation:fadeIn .8s ease forwards;opacity:0}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        #playerOverlay{display:none;background:#000;position:fixed;inset:0;z-index:200;flex-direction:column}
    </style>

<body class="bg-zinc-950 text-white font-sans overflow-x-hidden">

<!-- Player overlay -->
<div id="playerOverlay">
    <div class="w-full flex justify-between items-center px-3 py-2 md:px-4 md:py-3 bg-zinc-950 border-b border-white/5">
        <span class="text-red-600 font-black tracking-tighter text-lg md:text-xl shrink-0">MOVIE<span class="text-white font-light">M</span></span>
        <div id="fuentesBtns" class="flex gap-2">
            <button id="btnFuenteSub" onclick="cambiarFuente('sub')" class="text-[10px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full border transition bg-white/10 border-white/20 text-white">Subtitulado</button>
            <!-- Botón Latino con dropdown -->
            <div class="relative hidden" id="latinoWrap">
                <button id="btnFuenteLat" onclick="toggleLatinoMenu()" class="text-[10px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full border transition border-white/10 text-white/40 hover:text-yellow-400 flex items-center gap-1">
                    Latino
                    <svg id="latArrow" class="w-3 h-3 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/></svg>
                </button>
                <!-- Dropdown servidores -->
                <div id="latinoMenu" class="hidden absolute top-full left-0 mt-1 bg-zinc-900 border border-white/10 rounded-2xl overflow-hidden shadow-2xl z-50 min-w-[130px]">
                    <div id="latinoMenuItems"></div>
                </div>
            </div>
        </div>
        <button onclick="cerrarPelicula()" class="text-white/60 font-black uppercase text-[10px] tracking-widest bg-white/5 px-4 py-2 rounded-full border border-white/5 shrink-0">Cerrar x</button>
    </div>
    <div class="flex-1 bg-black relative">
        <iframe id="movieFrame" src="" class="w-full h-full" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        <!-- Botón respaldo latino -->
        <div id="btnRespaldoWrap" class="hidden absolute bottom-4 left-1/2 -translate-x-1/2 z-50">
            <button onclick="usarRespaldo()" class="bg-zinc-900/95 border border-yellow-500/30 text-yellow-400 text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-full shadow-xl active:scale-95 hover:bg-zinc-800 transition">
                ¿No funciona? Probar respaldo
            </button>
        </div>
    </div>
</div>

<!-- Backdrop -->
<div id="backdrop" class="fixed inset-0 w-full h-full bg-cover bg-center opacity-20 md:opacity-30 blur-sm -z-10 transition-all duration-700"></div>
<div class="fixed inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/80 to-transparent -z-10"></div>

<!-- Botón volver -->
<button onclick="location.href='index.html'" class="fixed top-4 left-4 md:top-8 md:left-8 bg-black/50 p-2.5 md:p-3 rounded-full hover:bg-red-600 transition z-50 border border-white/10 shadow-2xl">
    <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
</button>

<!-- HUD usuario -->
<div id="userHUD" class="fixed top-4 right-4 md:top-8 md:right-8 z-50 hidden items-center gap-3 bg-black/40 backdrop-blur-md p-1.5 pr-4 rounded-full border border-white/10 shadow-2xl">
    <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-red-600 flex items-center justify-center font-black text-white border-2 border-white/20 text-sm" id="userInitial">?</div>
    <span id="userNameHUD" class="text-xs font-bold uppercase tracking-widest hidden md:inline">Usuario</span>
</div>

<main class="px-4 md:px-8 pt-16 md:pt-20 pb-8">

    <!-- Info principal -->
    <div class="flex flex-col md:flex-row gap-6 md:gap-12 items-start mb-10 md:mb-16 relative z-0 fade-in">

        <!-- Poster: pequeño y a la izquierda en mobile -->
        <div class="flex gap-4 md:block w-full md:w-80 md:shrink-0">
            <div class="w-28 md:w-full shrink-0">
                <div id="posterSkeleton" class="w-full aspect-[2/3] rounded-xl md:rounded-2xl skeleton"></div>
                <img id="poster" src="" class="w-full rounded-xl md:rounded-2xl border border-white/10 shadow-2xl hidden" onload="this.classList.remove('hidden');document.getElementById('posterSkeleton')?.remove()">
                <!-- Barra de progreso "Continuar viendo" -->
                <div id="progresoWrap" class="hidden mt-2">
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-[9px] font-black uppercase tracking-widest text-zinc-500">Continuar viendo</span>
                        <span id="progresoNum" class="text-[9px] font-black text-accent"></span>
                    </div>
                    <div class="w-full h-1.5 bg-zinc-800 rounded-full overflow-hidden">
                        <div id="progresoBar" class="h-full bg-red-600 rounded-full transition-all duration-500" style="width:0%"></div>
                    </div>
                </div>
            </div>
            <!-- Info inline en mobile (al lado del poster) -->
            <div class="flex-1 md:hidden pt-1">
                <div id="badget-premios-mobile" class="hidden mb-2 inline-flex items-center gap-1.5 bg-yellow-600/20 border border-yellow-600/50 text-yellow-500 px-3 py-1 rounded-full text-[9px] font-bold uppercase tracking-widest">
                    <svg class="w-3 h-3" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.2h7.6l-6 4.8 2.4 7.2-6-4.8-6 4.8 2.4-7.2-6-4.8h7.6z"/></svg>
                    Nominada
                </div>

                <div class="flex items-center gap-2 mb-3 flex-wrap">
                    <span id="anioMobile" class="bg-zinc-800 px-2 py-0.5 rounded text-white text-xs font-bold"></span>
                    <span class="text-yellow-500 text-sm font-bold">&#11088; <span id="votoMobile">0.0</span></span>
                </div>
                <span id="directorMobile" class="text-zinc-500 text-xs italic block mb-3"></span>
                <!-- Botones mobile compactos -->
                <div class="flex gap-2 flex-wrap">
                    <button onclick="verPelicula()" class="bg-red-600 text-white px-4 py-2.5 rounded-full font-black text-xs flex items-center gap-1.5 active:scale-95 shadow-lg">
                        <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Ver
                    </button>
                    <button onclick="abrirTrailer()" class="bg-zinc-800 text-white px-4 py-2.5 rounded-full font-black text-xs flex items-center gap-1.5 active:scale-95">

                    </button>

                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
                    </button>
                    <button id="btnLike" onclick="toggleLike()" class="w-10 h-10 rounded-full bg-zinc-900 border border-white/5 flex items-center justify-center text-zinc-400 active:scale-95">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78v0z"/></svg>
                    </button>
                    <button id="btnVisto" onclick="toggleVisto()" class="w-10 h-10 rounded-full bg-zinc-900 border border-white/5 flex items-center justify-center text-zinc-400 active:scale-95" title="Marcar como vista">

                    <button onclick="compartir()" class="w-10 h-10 rounded-full bg-zinc-900 border border-white/5 flex items-center justify-center text-zinc-400 active:scale-95" title="Compartir">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>

                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Info desktop (lado derecho) -->
        <div class="flex-1 relative z-10 min-w-0 hidden md:block">
            <div id="badget-premios" class="hidden mb-4 inline-flex items-center gap-2.5 bg-yellow-600/20 border border-yellow-600/50 text-yellow-500 px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest shadow-lg">
                <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.2h7.6l-6 4.8 2.4 7.2-6-4.8-6 4.8 2.4-7.2-6-4.8h7.6z"/></svg>
                Nominada a Premios de la Academia

            <h1 id="titulo" class="text-5xl md:text-7xl font-black mb-4 italic tracking-tighter uppercase leading-none text-white truncate"></h1>

            <div class="flex items-center gap-4 mb-6 font-bold flex-wrap">
                <span id="anio" class="bg-zinc-800 px-3 py-1 rounded text-white text-sm"></span>
                <span class="text-yellow-500 flex items-center gap-1 text-lg">&#11088; <span id="voto">0.0</span></span>
                <span id="director" class="text-zinc-400 border-l border-zinc-800 pl-4 font-semibold italic text-base"></span>
            </div>
            <div id="sinopsisSkeleton" class="space-y-3 mb-8 max-w-2xl">
                <div class="h-4 w-full skeleton rounded"></div>
                <div class="h-4 w-full skeleton rounded"></div>
                <div class="h-4 w-2/3 skeleton rounded"></div>
            </div>
            <p id="sinopsis" class="text-lg text-zinc-500 max-w-2xl leading-relaxed mb-10 hidden"></p>
            <div class="flex flex-wrap items-center gap-4">
                <button onclick="verPelicula()" class="bg-red-600 text-white px-8 py-4 rounded-full font-black flex items-center gap-3 hover:bg-red-700 transition-all shadow-xl shadow-red-600/20 active:scale-95 tracking-tight uppercase">
                    <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> VER PELICULA
                </button>
                <button onclick="abrirTrailer()" class="bg-white text-black px-8 py-4 rounded-full font-black flex items-center gap-3 hover:bg-red-600 hover:text-white transition-all shadow-xl active:scale-95">

    <div id="videoContainer" class="w-full max-w-5xl aspect-video rounded-xl md:rounded-3xl overflow-hidden shadow-2xl"></div>

<script type="module">
        const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';
        const urlParams = new URLSearchParams(window.location.search);
        const movieID = urlParams.get('id');
        let currentRating = 0;



        // ── Rangos de usuario ────────────────────────────────────
        const ADMIN_UID = '41XWZR8OzwdpMHf54UIQEzAEt7s1';
        const VERIFIED_USERS = []; // Agregá UIDs verificados: ['uid1', 'uid2']
        let miUID_pelicula = null; // UID del usuario logueado en esta página

        async function cargarPagina() {
            try {
                // Pedir es-MX primero, si título/overview viene vacío usar es-ES como fallback
                const [pResMX, pResES, cRes] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/movie/${movieID}?api_key=${API_KEY}&language=es-MX`),
                    fetch(`https://api.themoviedb.org/3/movie/${movieID}?api_key=${API_KEY}&language=es-ES`),
                    fetch(`https://api.themoviedb.org/3/movie/${movieID}/credits?api_key=${API_KEY}&language=es-MX`)
                ]);
                const peliMX = await pResMX.json();
                const peliES = await pResES.json();
                const credits = await cRes.json();

                // Preferir título latino; si no hay, usar España; si tampoco, el original
                const peli = {
                    ...peliMX,
                    title: (peliMX.title && peliMX.title !== peliMX.original_title) ? peliMX.title
                           : (peliES.title && peliES.title !== peliMX.original_title) ? peliES.title
                           : peliMX.original_title,
                    overview: peliMX.overview || peliES.overview || ''
                };

                if(document.getElementById('tituloSkeleton')) document.getElementById('tituloSkeleton').remove();
                if(document.getElementById('sinopsisSkeleton')) document.getElementById('sinopsisSkeleton').remove();
                document.getElementById('sinopsis').classList.remove('hidden');

                document.getElementById('titulo').innerText = peli.title;
                var tmob=document.getElementById('tituloMobile');if(tmob)tmob.innerText=peli.title;
                document.getElementById('sinopsis').innerText = peli.overview || "Sin descripción disponible.";
                document.getElementById('anio').innerText = peli.release_date ? peli.release_date.split('-')[0] : "S/F";
                document.getElementById('voto').innerText = peli.vote_average.toFixed(1);
                var vm=document.getElementById('votoMobile');if(vm)vm.innerText=peli.vote_average.toFixed(1);
                var am=document.getElementById('anioMobile');if(am)am.innerText=peli.release_date?peli.release_date.split('-')[0]:'S/F';
                document.getElementById('sinopsis').innerText = peli.overview || "Sin descripcion disponible.";
                var sm=document.getElementById('sinopsisMobile');if(sm){sm.innerText=peli.overview||'Sin descripcion.';sm.classList.remove('hidden');var sk=document.getElementById('sinopsisSkeleton');if(sk)sk.remove();}
                document.getElementById('poster').src = 'https://image.tmdb.org/t/p/w500' + peli.poster_path;
                document.getElementById('backdrop').style.backgroundImage = `url('https://image.tmdb.org/t/p/original${peli.backdrop_path}')`;
                // Guardar para uso en guardarProgreso sin depender del DOM
                window._peliPosterURL = 'https://image.tmdb.org/t/p/w500' + peli.poster_path;
                window._peliTitulo = peli.title;
                
                if(peli.vote_average > 7.4) document.getElementById('badget-premios').classList.remove('hidden');

                const dir = credits.crew.find(c => c.job === "Director");
                if(dir) { document.getElementById('director').innerText = `Director: ${dir.name}`; var dm=document.getElementById('directorMobile');if(dm)dm.innerText='Dir: '+dir.name; }

                document.getElementById('reparto').innerHTML = credits.cast.slice(0, 15).map(actor => `
                    <div onclick="verActor(${actor.id})" class="min-w-[110px] text-center cursor-pointer shrink-0 fade-in">
                        <div class="w-20 h-20 mx-auto mb-4 overflow-hidden rounded-full border border-zinc-800 hover:border-red-600 transition-all transform hover:scale-110 duration-300">
                            <img src="${actor.profile_path ? 'https://image.tmdb.org/t/p/w200' + actor.profile_path : 'https://via.placeholder.com/200'}" class="w-full h-full object-cover">
                        </div>
                        <p class="text-[10px] font-black text-zinc-200 truncate uppercase tracking-tighter px-1">${actor.name}</p>
                        <p class="text-[8px] text-zinc-600 truncate italic px-1">${actor.character}</p>
                    </div>`).join('');

                escucharComentariosNube(); 
                checkStatus();
                actualizarHUD();
                // Guardar duración real para progreso más preciso
                if (peli.runtime) window._peliculaDuracion = peli.runtime;
                cargarSimilares();
            } catch (error) { console.error(error); }
        }

        // --- HUD DE USUARIO + progreso ---
        async function iniciarAuth() {
            // Esperar que firebase-config.js exponga window.auth
            for (let i = 0; i < 50; i++) {
                if (window.auth && window.onAuthStateChanged) break;
                await new Promise(r => setTimeout(r, 100));
            }
            window.onAuthStateChanged(window.auth, async function(user) {
                if (user) {
                    miUID_pelicula = user.uid;
                    checkStatus();
                    const pct = await leerProgreso();
                    _progresoBase = parseFloat(pct) || 0;
                    actualizarBarraProgreso(_progresoBase);
                }
            });
        }
        iniciarAuth();

        function actualizarHUD() {
            const userActual = localStorage.getItem('usuarioMovieM');
            const hud = document.getElementById('userHUD');
            if (userActual && userActual !== 'undefined') {
                document.getElementById('userNameHUD').innerText = userActual;
                document.getElementById('userInitial').innerText = userActual.charAt(0).toUpperCase();
                hud.classList.remove('hidden');
                hud.classList.add('flex');
            }
        }

        // --- FIREBASE LOGIC (COMENTARIOS) ---
        // Badge SVGs por rango
        function getBadge(uid) {
            if (uid === ADMIN_UID) return '<svg title="Creador" class="w-3.5 h-3.5 text-blue-400 inline-block ml-1 shrink-0" viewBox="0 0 24 24" fill="currentColor"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>';
            if (VERIFIED_USERS.includes(uid)) return '<svg title="Verificado" class="w-3.5 h-3.5 text-yellow-400 inline-block ml-1 shrink-0" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M8.603 3.799A4.49 4.49 0 0112 2.25c1.357 0 2.573.6 3.397 1.549a4.49 4.49 0 013.498 1.307 4.491 4.491 0 011.307 3.497A4.49 4.49 0 0121.75 12a4.49 4.49 0 01-1.549 3.397 4.491 4.491 0 01-1.307 3.497 4.491 4.491 0 01-3.497 1.307A4.49 4.49 0 0112 21.75a4.49 4.49 0 01-3.397-1.549 4.491 4.491 0 01-3.497-1.307 4.491 4.491 0 01-1.307-3.497A4.49 4.49 0 012.25 12a4.49 4.49 0 011.549-3.397 4.491 4.491 0 011.307-3.497 4.491 4.491 0 013.497-1.307zm7.007 6.387a.75.75 0 10-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 00-1.06 1.06l2.25 2.25a.75.75 0 001.14-.094l3.75-5.25z" clip-rule="evenodd"/></svg>';
            return '';
        }

        function escucharComentariosNube() {
            const contenedor = document.getElementById('listaComentarios');
            const q = window.query(
                window.collection(window.db, "comentarios"),
                window.where("movieID", "==", movieID),
                window.orderBy("fecha", "desc")
            );

            // Primero buscamos los UIDs de todos los usuarios para poder mostrar badges
            window.onSnapshot(q, async (snapshot) => {
                contenedor.innerHTML = "";
                if (snapshot.empty) {
                    contenedor.innerHTML = `<p class="text-zinc-600 text-sm italic">Nadie ha comentado aún. ¡Sé el primero!</p>`;
                    return;
                }

                // Recolectar usernames únicos y buscar sus UIDs
                const usernames = [...new Set(snapshot.docs.map(d => d.data().user))];
                const uidMap = {}; // username → uid
                try {
                    const usersSnap = await window.getDocs(
                        window.query(window.collection(window.db, 'usuarios'), window.where('username', 'in', usernames.slice(0,10)))
                    );
                    usersSnap.forEach(d => { uidMap[d.data().username] = d.id; });
                } catch(e) {}

                snapshot.forEach((docSnap) => {
                    const c = docSnap.data();
                    const docId = docSnap.id;
                    const fechaComentario = c.fecha ? new Date(c.fecha).toLocaleString() : "Reciente";
                    const uid = uidMap[c.user] || '';
                    const badge = getBadge(uid);
                    const esAdmin = miUID_pelicula === ADMIN_UID;
                    
                    const div = document.createElement('div');
                    div.className = 'bg-zinc-900/50 p-5 rounded-2xl border border-white/5 shadow-xl fade-in mb-4 group/comment';
                    div.innerHTML = `
                        <div class="flex justify-between items-start mb-3 gap-2">
                            <div class="flex flex-col gap-1 min-w-0">
                                <span class="text-red-600 font-black text-xs uppercase tracking-widest leading-none flex items-center gap-1">
                                    <a href="perfil.html?user=${encodeURIComponent(c.user)}" class="hover:underline">${c.user}</a>${badge}
                                </span>
                                <span class="text-[9px] text-zinc-600 font-bold uppercase tracking-tighter">${fechaComentario}</span>
                            </div>
                            <div class="flex items-center gap-2 shrink-0">
                                <span class="text-yellow-500 text-[10px] tracking-widest">${"★".repeat(c.rating)}</span>
                                ${esAdmin ? `<button onclick="borrarComentarioPelicula('${docId}')" class="opacity-0 group-hover/comment:opacity-100 transition-opacity w-6 h-6 rounded-full bg-red-900/60 hover:bg-red-600 flex items-center justify-center" title="Borrar">
                                    <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
                                </button>` : ''}
                            </div>
                        </div>
                        <p class="text-zinc-400 text-sm leading-relaxed font-medium">${c.txt}</p>
                    `;
                    contenedor.appendChild(div);
                });
            });
        }

        window.borrarComentarioPelicula = async function(docId) {
            if (miUID_pelicula !== ADMIN_UID) return;
            if (!confirm('¿Borrar este comentario?')) return;
            try { await window.deleteDoc(window.doc(window.db, 'comentarios', docId)); }
            catch(e) { alert('Error al borrar.'); }
        };

        window.publicarComentario = async () => {
            const txt = document.getElementById('comentarioTxt').value.trim();
            const userActual = localStorage.getItem('usuarioMovieM');
            
            // Corrección: Validación de sesión primero
            if (!userActual || userActual === 'undefined') {
                return alert("Debes iniciar sesión para comentar.");
            }
            if(!txt || currentRating === 0) {
                return alert("Por favor, escribe un comentario y selecciona una valoración.");
            }

            try {
                await window.addDoc(window.collection(window.db, "comentarios"), {
                    movieID: movieID,
                    user: userActual,
                    txt: txt,
                    rating: currentRating,
                    fecha: Date.now()
                });
                document.getElementById('comentarioTxt').value = "";
                window.setRating(0);
            } catch (e) {
                console.error("Error Firebase:", e);
                alert("Error al publicar el comentario.");
            }
        };

        // --- SISTEMAS DE INTERACCIÓN ---
        async function checkStatus() {
            if (!miUID_pelicula) return;

            try {
                const userRef = window.doc(window.db, "usuarios", miUID_pelicula);

<script>
/* ===== Sistema Continuar Viendo (iframe compatible) ===== */

let miUID_pelicula = null;
let tiempoViendo = 0;
let progresoInterval = null;

window.onAuthStateChanged && window.onAuthStateChanged(window.auth,(user)=>{
    if(user){
        miUID_pelicula = user.uid;
    }
});

async function guardarProgreso(){

    if(!miUID_pelicula) return;

    const titulo = window._peliTitulo || document.getElementById("titulo")?.innerText || "";
    const poster = window._peliPosterURL || document.getElementById("poster")?.src || "";

    if(!titulo || !poster || poster.includes("undefined")) return;

    const porcentaje = Math.min(100,Math.round((tiempoViendo/5400)*100));

    try{

        const ref = window.doc(
            window.db,
            "usuarios",
            miUID_pelicula,
            "continuar",
            "pelicula_"+movieID
        );

        if(porcentaje >= 95){
            await window.deleteDoc(ref);
            return;
        }

        await window.setDoc(ref,{
            tipo:"pelicula",
            contentId:String(movieID),
            titulo:titulo,
            poster:poster,
            porcentaje:Math.max(porcentaje, 1), // mínimo 1% para que aparezca en continuar viendo
            tiempo:tiempoViendo,
            updatedAt:window.serverTimestamp()
        },{merge:true});

        console.log("Progreso guardado:",porcentaje+"%");

    }catch(e){
        console.error("Error guardando progreso",e);
    }
}

function iniciarTracking(){

    tiempoViendo = 0;

    if(progresoInterval){
        clearInterval(progresoInterval);
    }

    progresoInterval = setInterval(()=>{

        tiempoViendo += 5;
        guardarProgreso();

    },5000);

}

function detenerTracking(){

    if(progresoInterval){
        clearInterval(progresoInterval);
    }

    guardarProgreso();
}

const frame = document.getElementById("movieFrame");

if(frame){
    frame.addEventListener("load",()=>{
        iniciarTracking();
    });
}

window.addEventListener("beforeunload",()=>{
    detenerTracking();
});
</script>

<!-- ══ MODAL: Agregar a Lista ══ -->
<div id="modalAgregarLista" class="fixed inset-0 z-[500] flex items-end md:items-center justify-center bg-black/80 hidden px-0 md:px-4">
    <div class="bg-zinc-900 border border-white/10 w-full max-w-sm rounded-t-3xl md:rounded-3xl shadow-2xl flex flex-col max-h-[75vh]">
        <div class="flex items-center justify-between px-5 py-4 border-b border-white/5 shrink-0">
            <h4 class="text-xs font-black uppercase tracking-widest text-white">Agregar a Lista</h4>
            <button onclick="cerrarModalListas()" class="text-zinc-500 hover:text-white transition p-1">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        <div id="listasParaAgregar" class="overflow-y-auto flex-1 p-3 space-y-1"></div>
        <div class="p-3 border-t border-white/5 shrink-0">
            <button onclick="crearYAgregarLista()" class="w-full py-3 text-[10px] font-black uppercase tracking-widest text-white bg-red-600 rounded-2xl hover:opacity-90 transition active:scale-95">+ Nueva Lista</button>
        </div>
    </div>
</div>

<script>
// ══ Listas desde pelicula.html ══
let _listasModalUID = null;

(function waitAuth() {
    const t = setInterval(() => {
        if (window.auth && window.onAuthStateChanged) {
            clearInterval(t);
            window.onAuthStateChanged(window.auth, u => { _listasModalUID = u ? u.uid : null; });
        }
    }, 100);
})();

async function waitDB2() {
    for (let i = 0; i < 50; i++) {
        if (window.db && window.getDocs && window.collection && window.addDoc) return;
        await new Promise(r => setTimeout(r, 100));
    }
}

window.abrirModalListas = async function() {
    if (!_listasModalUID) return alert('Debes iniciar sesión para usar listas.');
    await waitDB2();
    const cont = document.getElementById('listasParaAgregar');
    cont.innerHTML = '<p class="text-zinc-600 text-xs text-center py-6 italic animate-pulse">Cargando listas...</p>';
    document.getElementById('modalAgregarLista').classList.remove('hidden');
    try {
        const snap = await window.getDocs(window.collection(window.db, 'usuarios', _listasModalUID, 'listas'));
        if (snap.empty) {
            cont.innerHTML = '<p class="text-zinc-600 text-xs text-center py-6 italic">No tenés listas. Creá una abajo.</p>';
            return;
        }
        cont.innerHTML = '';
        snap.forEach(d => {
            const lista = { id: d.id, ...d.data() };
            const items = lista.items || [];
            const yaEsta = items.some(it => String(it.id) === String(movieID));
            const div = document.createElement('button');
            div.className = `w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition text-left ${yaEsta ? 'bg-red-600/10 border border-red-600/30' : 'hover:bg-zinc-800'}`;
            div.innerHTML = `
                <svg class="w-4 h-4 shrink-0 ${yaEsta ? 'text-red-500' : 'text-zinc-600'}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    ${yaEsta
                        ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>'
                        : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>'}
                </svg>
                <div class="flex-1 min-w-0">
                    <p class="text-xs font-black uppercase tracking-tight text-white truncate">${lista.nombre}</p>
                    <p class="text-[9px] text-zinc-500">${items.length} título${items.length !== 1 ? 's' : ''}</p>
                </div>
                ${yaEsta ? '<span class="text-[9px] font-bold text-red-400 shrink-0">Ya está</span>' : ''}`;
            if (!yaEsta) div.onclick = () => agregarAPeliLista(lista.id, lista.nombre);
            cont.appendChild(div);
        });
    } catch(e) { cont.innerHTML = '<p class="text-red-400 text-xs text-center py-6">Error al cargar.</p>'; }
};

window.cerrarModalListas = function() {
    document.getElementById('modalAgregarLista').classList.add('hidden');
};

async function agregarAPeliLista(listaID, listaNombre) {
    await waitDB2();
    const titulo = document.getElementById('titulo')?.innerText || document.getElementById('tituloMobile')?.innerText || '';
    const poster = document.getElementById('poster')?.getAttribute('src')?.replace('https://image.tmdb.org/t/p/w500','').replace('https://image.tmdb.org/t/p/w200','') || '';
    try {
        const ref = window.doc(window.db, 'usuarios', _listasModalUID, 'listas', listaID);
        const snap = await window.getDoc(ref);
        const items = snap.exists() ? [...(snap.data().items || [])] : [];
        items.push({ id: movieID, tipo: 'pelicula', titulo, poster });
        await window.setDoc(ref, { items }, { merge: true });
        cerrarModalListas();
        mostrarToastCompartir(`✓ Agregada a "${listaNombre}"`);
    } catch(e) { console.error(e); }
}

window.crearYAgregarLista = async function() {
    const nombre = prompt('Nombre de la nueva lista:');
    if (!nombre?.trim()) return;
    await waitDB2();
    try {
        const titulo = document.getElementById('titulo')?.innerText || document.getElementById('tituloMobile')?.innerText || '';
        const poster = document.getElementById('poster')?.getAttribute('src')?.replace('https://image.tmdb.org/t/p/w500','').replace('https://image.tmdb.org/t/p/w200','') || '';
        await window.addDoc(window.collection(window.db, 'usuarios', _listasModalUID, 'listas'), {
            nombre: nombre.trim(), desc: '', items: [{ id: movieID, tipo: 'pelicula', titulo, poster }], creadaEn: Date.now()
        });
        cerrarModalListas();
        mostrarToastCompartir(`✓ Lista "${nombre.trim()}" creada`);
    } catch(e) { console.error(e); }
};

document.getElementById('modalAgregarLista').addEventListener('click', function(e) {
    if (e.target === this) cerrarModalListas();
});
</script>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MovieM | Detalle Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .star { cursor: pointer; transition: color 0.2s ease; }
        #starRating:hover .star { color: #ca8a04; }
        #starRating .star:hover ~ .star { color: #3f3f46 !important; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8);
        }

        @keyframes pulse-bg {
            0% { background-color: rgba(39, 39, 42, 0.5); }
            50% { background-color: rgba(63, 63, 70, 0.5); }
            100% { background-color: rgba(39, 39, 42, 0.5); }
        }
        .skeleton { animation: pulse-bg 1.5s infinite ease-in-out; }

        .fade-in { animation: fadeIn 0.8s ease forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #playerOverlay { display: none; background: #000; position: fixed; inset: 0; z-index: 200; flex-direction: column; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans overflow-x-hidden pt-24">

    <div id="playerOverlay">
        <div class="w-full flex justify-between items-center p-4 bg-zinc-950 border-b border-white/5">
            <span class="text-red-600 font-black tracking-tighter text-xl">MOVIE<span class="text-white font-light">M</span></span>
            <button onclick="cerrarPelicula()" class="text-white/30 hover:text-white transition font-black uppercase text-[10px] tracking-widest bg-white/5 px-5 py-2.5 rounded-full border border-white/5">Cerrar ✕</button>
        </div>
        <div class="flex-1 bg-black relative">
            <iframe id="movieFrame" src="" class="w-full h-full" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

    <div id="backdrop" class="fixed inset-0 w-full h-full bg-cover bg-center opacity-30 blur-sm -z-10 transition-all duration-700"></div>
    <div class="fixed inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/80 to-transparent -z-10"></div>

    <button onclick="window.location.href='index.html'" class="fixed top-8 left-8 bg-black/50 p-3 rounded-full hover:bg-red-600 transition z-50 border border-white/10 shadow-2xl">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    </button>

    <main class="container mx-auto px-8">
        <div class="flex flex-col md:flex-row gap-12 items-start mb-16 relative z-0 fade-in">
            <div class="w-full md:w-80 shrink-0">
                <div id="posterSkeleton" class="w-full aspect-[2/3] rounded-2xl skeleton"></div>
                <img id="poster" src="" class="w-full rounded-2xl border border-white/10 shadow-2xl transition-transform hover:scale-[1.02] duration-500 hidden" onload="this.classList.remove('hidden'); document.getElementById('posterSkeleton').remove()">
            </div>
            
            <div class="flex-1 relative z-10 min-w-0">
                <div id="badget-premios" class="hidden mb-4 inline-flex items-center gap-2.5 bg-yellow-600/20 border border-yellow-600/50 text-yellow-500 px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest shadow-lg">
                    ⭐ Nominada a Premios de la Academia
                </div>
                
                <h1 id="titulo" class="text-5xl md:text-7xl font-black mb-4 italic tracking-tighter uppercase leading-none text-white truncate"></h1>
                <div id="tituloSkeleton" class="h-16 w-3/4 skeleton rounded-xl mb-4"></div>
                
                <div class="flex items-center gap-4 mb-8 font-bold">
                    <span id="anio" class="bg-zinc-800 px-3 py-1 rounded text-white text-sm"></span>
                    <span class="text-yellow-500 flex items-center gap-1 text-lg">⭐ <span id="voto">0.0</span></span>
                    <span id="director" class="text-zinc-400 border-l border-zinc-800 pl-4 font-semibold italic text-base"></span>
                </div>
                
                <p id="sinopsis" class="text-lg text-zinc-500 max-w-2xl leading-relaxed mb-10 hidden"></p>
                <div id="sinopsisSkeleton" class="space-y-3 mb-10 max-w-2xl">
                    <div class="h-4 w-full skeleton rounded"></div>
                    <div class="h-4 w-full skeleton rounded"></div>
                </div>
                
                <div class="flex flex-wrap items-center gap-4">
                    <button onclick="verPelicula()" class="bg-red-600 text-white px-8 py-4 rounded-full font-black flex items-center gap-3 hover:bg-red-700 transition-all shadow-xl shadow-red-600/20 active:scale-95 tracking-tight uppercase">VER PELÍCULA</button>
                    <button onclick="abrirTrailer()" class="bg-white text-black px-8 py-4 rounded-full font-black flex items-center gap-3 hover:bg-red-600 hover:text-white transition-all shadow-xl active:scale-95 tracking-tight">VER TRÁILER</button>
                </div>
            </div>
        </div>

        <section class="mb-20 fade-in">
            <h3 class="text-2xl font-bold mb-8 text-zinc-200 flex items-center gap-3 uppercase tracking-widest text-sm">
                Reparto Principal <div class="h-px flex-1 bg-zinc-800/50"></div>
            </h3>
            <div id="reparto" class="flex gap-8 overflow-x-auto no-scrollbar pb-6 scroll-smooth"></div>
        </section>

        <section class="border-t border-white/5 pt-12 grid md:grid-cols-2 gap-16 mb-20 fade-in">
            <div class="bg-zinc-900/40 p-10 rounded-3xl border border-white/5 shadow-2xl">
                <h3 class="text-2xl font-bold mb-6 italic">Tu reseña en <span class="text-red-600">MovieM</span></h3>
                <div id="starRating" class="flex gap-2 mb-6 text-zinc-700">
                    <span onclick="setRating(1)" class="star text-4xl">★</span>
                    <span onclick="setRating(2)" class="star text-4xl">★</span>
                    <span onclick="setRating(3)" class="star text-4xl">★</span>
                    <span onclick="setRating(4)" class="star text-4xl">★</span>
                    <span onclick="setRating(5)" class="star text-4xl">★</span>
                </div>
                <textarea id="comentarioTxt" placeholder="¿Qué te pareció la película?" class="w-full bg-zinc-800/50 border-none p-5 rounded-2xl text-white mb-6 h-36 outline-none focus:ring-1 focus:ring-red-600 transition-all"></textarea>
                <button onclick="publicarComentario()" class="w-full bg-red-600 py-4 rounded-2xl font-black hover:bg-red-700 transition tracking-widest uppercase text-sm">PUBLICAR</button>
            </div>
            <div>
                <h3 class="text-2xl font-bold mb-8 flex items-center gap-3">Opiniones de la Comunidad</h3>
                <div id="listaComentarios" class="space-y-4 max-h-[400px] overflow-y-auto no-scrollbar"></div>
            </div>
        </section>
    </main>

    <div id="modalVideo" class="fixed inset-0 bg-black/95 z-[100] hidden flex items-center justify-center p-4">
        <button onclick="cerrarTrailer()" class="absolute top-8 right-8 text-white text-4xl hover:text-red-600 transition">✕</button>
        <div id="videoContainer" class="w-full max-w-5xl aspect-video rounded-3xl overflow-hidden shadow-2xl"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAn5N7mEhICK2aZG4Nx8DIW9RZd9kK1DA",
            authDomain: "moviem-5b73d.firebaseapp.com",
            projectId: "moviem-5b73d",
            storageBucket: "moviem-5b73d.firebasestorage.app",
            messagingSenderId: "843796138544",
            appId: "1:843796138544:web:c2bde9b39d437b84d97bf5",
            measurementId: "G-7FH2FMPYZT"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';
        const urlParams = new URLSearchParams(window.location.search);
        const movieID = urlParams.get('id');
        let currentRating = 0;

        async function cargarPagina() {
            if(!movieID) return;
            try {
                const [pRes, cRes] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/movie/${movieID}?api_key=${API_KEY}&language=es-ES`),
                    fetch(`https://api.themoviedb.org/3/movie/${movieID}/credits?api_key=${API_KEY}&language=es-ES`)
                ]);
                const peli = await pRes.json();
                const credits = await cRes.json();

                document.getElementById('titulo').innerText = peli.title;
                document.getElementById('sinopsis').innerText = peli.overview || "Sin descripción.";
                document.getElementById('anio').innerText = peli.release_date?.split('-')[0] || "";
                document.getElementById('voto').innerText = peli.vote_average.toFixed(1);
                document.getElementById('poster').src = 'https://image.tmdb.org/t/p/w500' + peli.poster_path;
                document.getElementById('backdrop').style.backgroundImage = `url('https://image.tmdb.org/t/p/original${peli.backdrop_path}')`;
                
                document.getElementById('tituloSkeleton').remove();
                document.getElementById('sinopsisSkeleton').remove();
                document.getElementById('sinopsis').classList.remove('hidden');

                document.getElementById('reparto').innerHTML = credits.cast.slice(0, 10).map(actor => `
                    <div class="min-w-[110px] text-center">
                        <img src="https://image.tmdb.org/t/p/w200${actor.profile_path}" class="w-20 h-20 mx-auto rounded-full object-cover mb-2 border border-zinc-800">
                        <p class="text-[10px] font-bold uppercase truncate">${actor.name}</p>
                    </div>`).join('');

                cargarComentariosRealtime();
            } catch (e) { console.error(e); }
        }

        function cargarComentariosRealtime() {
            const q = query(collection(db, "peliculas", movieID, "comentarios"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                const lista = document.getElementById('listaComentarios');
                lista.innerHTML = "";
                snapshot.forEach(doc => {
                    const c = doc.data();
                    lista.innerHTML += `
                        <div class="bg-zinc-900/50 p-6 rounded-2xl border border-white/5 fade-in">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-red-600 font-black text-xs uppercase">${c.user}</span>
                                <span class="text-yellow-500 text-[10px]">${"★".repeat(c.rating)}</span>
                            </div>
                            <p class="text-zinc-400 text-sm">${c.txt}</p>
                        </div>`;
                });
            });
        }

        window.publicarComentario = async () => {
            const txt = document.getElementById('comentarioTxt').value.trim();
            if(!txt || currentRating === 0) return alert("Completa el comentario y las estrellas.");
            try {
                await addDoc(collection(db, "peliculas", movieID, "comentarios"), {
                    user: "Invitado",
                    txt: txt,
                    rating: currentRating,
                    timestamp: serverTimestamp()
                });
                document.getElementById('comentarioTxt').value = "";
                setRating(0);
            } catch (e) { alert("Error al guardar."); }
        };

        window.setRating = (n) => {
            currentRating = n;
            document.querySelectorAll('.star').forEach((s, i) => {
                s.classList.toggle('text-yellow-500', i < n);
                s.classList.toggle('text-zinc-700', i >= n);
            });
        };

        window.verPelicula = () => {
            document.getElementById('movieFrame').src = `https://vidsrc.cc/v3/embed/movie/${movieID}?auto_lang=es`;
            document.getElementById('playerOverlay').style.display = 'flex';
        };

        window.cerrarPelicula = () => {
            document.getElementById('playerOverlay').style.display = 'none';
            document.getElementById('movieFrame').src = "";
        };

        window.abrirTrailer = async () => {
            const res = await fetch(`https://api.themoviedb.org/3/movie/${movieID}/videos?api_key=${API_KEY}`);
            const data = await res.json();
            const tr = data.results.find(v => v.type === "Trailer" && v.site === "YouTube");
            if(tr) {
                document.getElementById('videoContainer').innerHTML = `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${tr.key}?autoplay=1" allowfullscreen></iframe>`;
                document.getElementById('modalVideo').classList.remove('hidden');
            }
        };

        window.cerrarTrailer = () => {
            document.getElementById('modalVideo').classList.add('hidden');
            document.getElementById('videoContainer').innerHTML = "";
        };

        cargarPagina();
    </script>
</body>
</html>

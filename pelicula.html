<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieM | Detalle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="firebase-config.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .star { cursor: pointer; transition: color 0.2s ease; color: #3f3f46; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-card { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .skeleton { animation: pulse-bg 1.5s infinite ease-in-out; }
        @keyframes pulse-bg { 0%, 100% { background-color: rgba(39, 39, 42, 0.5); } 50% { background-color: rgba(63, 63, 70, 0.5); } }
        .fade-in { animation: fadeIn 0.8s ease forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #playerOverlay { display: none; background: #000; position: fixed; inset: 0; z-index: 500; flex-direction: column; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans overflow-x-hidden pt-32">

    <nav class="fixed top-0 left-0 w-full z-[100] px-8 py-4 flex justify-between items-center bg-zinc-950/90 backdrop-blur-md border-b border-white/5">
        <div class="flex items-center gap-8">
            <a href="index.html" class="text-red-600 font-black tracking-tighter text-2xl italic hover:scale-105 transition-transform">
                MOVIE<span class="text-white font-light">M</span>
            </a>
            <div class="hidden md:flex gap-6 text-[11px] font-bold tracking-widest text-zinc-400 uppercase">
                <a href="index.html" class="hover:text-white transition text-red-600">Inicio</a>
                <a href="#" class="hover:text-white transition">Series</a>
                <a href="#" class="hover:text-white transition">Mi Lista</a>
            </div>
        </div>

        <div class="flex items-center gap-6">
            <div class="relative group hidden sm:block">
                <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
                    <svg class="w-4 h-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
                <input type="text" placeholder="Películas o usuarios" class="bg-zinc-900/50 border border-white/10 rounded-lg py-2 pl-10 pr-4 text-xs w-64 focus:outline-none focus:ring-1 focus:ring-red-600 transition-all text-zinc-300">
            </div>

            <div id="userHUD" class="hidden items-center">
                <div class="w-9 h-9 rounded-lg bg-zinc-800 border border-white/10 flex items-center justify-center text-sm font-black text-white cursor-pointer hover:bg-zinc-700 transition-colors" id="userInitial">?</div>
            </div>
        </div>
    </nav>

    <div id="playerOverlay">
        <div class="w-full flex justify-between items-center p-4 bg-zinc-950 border-b border-white/5 text-white">
            <span class="text-red-600 font-black tracking-tighter text-xl italic">MOVIE<span class="text-white font-light">M</span></span>
            <button onclick="cerrarPelicula()" class="text-white/30 hover:text-white transition font-black uppercase text-[10px] tracking-widest bg-white/5 px-5 py-2.5 rounded-full border border-white/5">Cerrar ✕</button>
        </div>
        <div class="flex-1 bg-black relative">
            <iframe id="movieFrame" src="" class="w-full h-full" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

    <div id="backdrop" class="fixed inset-0 w-full h-full bg-cover bg-center opacity-30 blur-sm -z-10 transition-all duration-700"></div>
    <div class="fixed inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/80 to-transparent -z-10"></div>

    <main class="container mx-auto px-8">
        <div class="flex flex-col md:flex-row gap-12 items-start mb-16 relative z-0 fade-in">
            <div class="w-full md:w-80 shrink-0">
                <div id="posterSkeleton" class="w-full aspect-[2/3] rounded-2xl skeleton"></div>
                <img id="poster" src="" class="w-full rounded-2xl border border-white/10 shadow-2xl transition-transform hover:scale-[1.02] duration-500 hidden" onload="this.classList.remove('hidden'); document.getElementById('posterSkeleton')?.remove()">
            </div>
            
            <div class="flex-1 relative z-10 min-w-0">
                <div id="badget-premios" class="hidden mb-4 inline-flex items-center gap-2.5 bg-yellow-600/20 border border-yellow-600/50 text-yellow-500 px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest shadow-lg">
                    ⭐ Nominada a Premios de la Academia
                </div>
                <h1 id="titulo" class="text-5xl md:text-7xl font-black mb-4 italic tracking-tighter uppercase leading-none text-white truncate"></h1>
                <div id="tituloSkeleton" class="h-16 w-3/4 skeleton rounded-xl mb-4"></div>
                
                <div class="flex items-center gap-4 mb-8 font-bold">
                    <span id="anio" class="bg-zinc-800 px-3 py-1 rounded text-white text-sm"></span>
                    <span class="text-yellow-500 flex items-center gap-1 text-lg">⭐ <span id="voto">0.0</span></span>
                    <span id="director" class="text-zinc-400 border-l border-zinc-800 pl-4 font-semibold italic text-base"></span>
                </div>
                
                <div id="sinopsisSkeleton" class="space-y-3 mb-10 max-w-2xl"><div class="h-4 w-full skeleton rounded"></div><div class="h-4 w-full skeleton rounded"></div></div>
                <p id="sinopsis" class="text-lg text-zinc-500 max-w-2xl leading-relaxed mb-10 hidden"></p>
                
                <div class="flex flex-wrap items-center gap-4">
                    <button onclick="verPelicula()" class="bg-red-600 text-white px-8 py-4 rounded-full font-black flex items-center gap-3 hover:bg-red-700 transition shadow-xl shadow-red-600/20 active:scale-95 tracking-tight uppercase">
                        VER PELÍCULA
                    </button>
                    <button onclick="abrirTrailer()" class="bg-white text-black px-8 py-4 rounded-full font-black flex items-center gap-3 hover:bg-red-600 hover:text-white transition shadow-xl active:scale-95 tracking-tight">
                        VER TRÁILER
                    </button>
                    <div class="flex gap-3">
                        <button id="btnWatchlist" onclick="toggleWatchlist()" class="w-14 h-14 rounded-full bg-zinc-900 border border-white/5 flex items-center justify-center text-zinc-400 hover:text-white transition">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" /></svg>
                        </button>
                        <button id="btnLike" onclick="toggleLike()" class="w-14 h-14 rounded-full bg-zinc-900 border border-white/5 flex items-center justify-center text-zinc-400 hover:text-red-500 transition">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78v0z" fill="currentColor"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <section class="mb-20 fade-in" style="animation-delay: 0.2s">
            <h3 class="text-xs font-black uppercase tracking-[0.2em] text-zinc-500 mb-8 flex items-center gap-4">
                Reparto Principal <div class="h-px flex-1 bg-zinc-800/50"></div>
            </h3>
            <div class="relative group">
                <button onclick="scrollReparto(-400)" class="absolute -left-6 top-1/2 -translate-y-1/2 bg-black/80 p-3 rounded-full border border-white/10 opacity-0 group-hover:opacity-100 transition-all z-20 hover:bg-red-600 text-white">←</button>
                <div id="reparto" class="flex gap-8 overflow-x-auto no-scrollbar scroll-smooth pb-6"></div>
                <button onclick="scrollReparto(400)" class="absolute -right-6 top-1/2 -translate-y-1/2 bg-black/80 p-3 rounded-full border border-white/10 opacity-0 group-hover:opacity-100 transition-all z-20 hover:bg-red-600 text-white">→</button>
            </div>
        </section>

        <section class="border-t border-white/5 pt-12 grid md:grid-cols-2 gap-16 mb-20 fade-in" style="animation-delay: 0.4s">
            <div class="bg-zinc-900/40 p-10 rounded-[35px] border border-white/5 shadow-2xl">
                <h3 class="text-2xl font-bold mb-6 italic">Tu reseña en <span class="text-red-600">MovieM</span></h3>
                <div id="starRating" class="flex gap-2 mb-6">
                    <span onclick="setRating(1)" class="star text-4xl">★</span>
                    <span onclick="setRating(2)" class="star text-4xl">★</span>
                    <span onclick="setRating(3)" class="star text-4xl">★</span>
                    <span onclick="setRating(4)" class="star text-4xl">★</span>
                    <span onclick="setRating(5)" class="star text-4xl">★</span>
                </div>
                <textarea id="comentarioTxt" placeholder="¿Qué te pareció la película?" class="w-full bg-zinc-800/50 border-none p-5 rounded-2xl text-white mb-6 h-36 outline-none focus:ring-1 focus:ring-red-600 transition-all"></textarea>
                <button onclick="publicarComentario()" class="w-full bg-red-600 py-4 rounded-2xl font-black hover:bg-red-700 transition uppercase text-sm tracking-widest">PUBLICAR EN MOVIEM</button>
            </div>
            <div>
                <h3 class="text-2xl font-bold mb-8 flex items-center gap-3">Opiniones Globales</h3>
                <div id="listaComentarios" class="space-y-4 max-h-[400px] overflow-y-auto no-scrollbar pr-2"></div>
            </div>
        </section>
    </main>

    <div id="modalActor" class="fixed inset-0 z-[600] hidden flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-xl" onclick="cerrarActor()"></div>
        <div class="relative glass-card p-10 rounded-[45px] max-w-4xl w-full max-h-[85vh] overflow-y-auto no-scrollbar shadow-2xl">
            <button onclick="cerrarActor()" class="absolute top-8 right-10 text-white/30 hover:text-white transition-all text-2xl">✕</button>
            <div id="modalActorContent" class="flex flex-col md:flex-row gap-10 items-start">
                <img id="actorFoto" src="" class="w-48 rounded-[30px] shadow-2xl border border-white/10 shrink-0">
                <div class="flex-1">
                    <h2 id="actorNombre" class="text-4xl font-black mb-4 italic tracking-tighter uppercase text-white"></h2>
                    <p id="actorInfo" class="text-zinc-300 text-sm leading-relaxed mb-8 italic"></p>
                    <h4 class="text-[10px] font-bold uppercase tracking-[0.2em] text-red-500 mb-4">Películas Destacadas</h4>
                    <div id="actorPelisContenedor" class="flex gap-4 overflow-x-auto no-scrollbar pb-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';
        const urlParams = new URLSearchParams(window.location.search);
        const movieID = urlParams.get('id');
        let currentRating = 0;

        async function cargarPagina() {
            try {
                if(!movieID) return window.location.href = 'index.html';

                const [pRes, cRes] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/movie/${movieID}?api_key=${API_KEY}&language=es-ES`),
                    fetch(`https://api.themoviedb.org/3/movie/${movieID}/credits?api_key=${API_KEY}&language=es-ES`)
                ]);
                const peli = await pRes.json();
                const credits = await cRes.json();

                document.getElementById('tituloSkeleton')?.remove();
                document.getElementById('sinopsisSkeleton')?.remove();
                document.getElementById('sinopsis').classList.remove('hidden');

                document.getElementById('titulo').innerText = peli.title;
                document.getElementById('sinopsis').innerText = peli.overview || "Sin descripción.";
                document.getElementById('anio').innerText = peli.release_date?.split('-')[0] || "S/F";
                document.getElementById('voto').innerText = peli.vote_average.toFixed(1);
                document.getElementById('poster').src = 'https://image.tmdb.org/t/p/w500' + peli.poster_path;
                document.getElementById('backdrop').style.backgroundImage = `url('https://image.tmdb.org/t/p/original${peli.backdrop_path}')`;
                
                if(peli.vote_average > 7.4) document.getElementById('badget-premios').classList.remove('hidden');
                
                const dir = credits.crew.find(c => c.job === "Director");
                if(dir) document.getElementById('director').innerText = `Dirigida por ${dir.name}`;

                document.getElementById('reparto').innerHTML = credits.cast.slice(0, 15).map(actor => `
                    <div onclick="verActor(${actor.id})" class="min-w-[120px] text-center cursor-pointer shrink-0 transition-transform hover:scale-105">
                        <div class="w-24 h-24 mx-auto mb-4 overflow-hidden rounded-full border border-zinc-800 hover:border-red-600 transition-all">
                            <img src="${actor.profile_path ? 'https://image.tmdb.org/t/p/w200' + actor.profile_path : 'https://via.placeholder.com/200'}" class="w-full h-full object-cover">
                        </div>
                        <p class="text-[10px] font-black text-white truncate uppercase px-1">${actor.name}</p>
                        <p class="text-[8px] text-zinc-600 truncate italic">${actor.character}</p>
                    </div>`).join('');

                escucharComentarios();
                actualizarHUD();
                checkStatus();
            } catch (e) { console.error(e); }
        }

        function actualizarHUD() {
            const user = localStorage.getItem('usuarioMovieM');
            if (user && user !== 'undefined' && user !== 'null') {
                document.getElementById('userInitial').innerText = user[0].toUpperCase();
                document.getElementById('userHUD').classList.remove('hidden');
                document.getElementById('userHUD').classList.add('flex');
            }
        }

        async function checkStatus() {
            const user = localStorage.getItem('usuarioMovieM');
            if (!user || user === 'null') return;
            const userDoc = await window.getDoc(window.doc(window.db, "usuarios", user));
            if (userDoc.exists()) {
                const data = userDoc.data();
                if (data.watchlist?.includes(movieID)) document.getElementById('btnWatchlist').classList.add('bg-white', 'text-black');
                if (data.likes?.includes(movieID)) {
                    document.getElementById('btnLike').classList.add('bg-red-600', 'text-white');
                    document.getElementById('btnLike').querySelector('svg').setAttribute('fill', 'white');
                }
            }
        }

        window.toggleWatchlist = async () => {
            const user = localStorage.getItem('usuarioMovieM');
            if (!user || user === 'null') return alert("Inicia sesión primero");
            const btn = document.getElementById('btnWatchlist');
            const isSaved = btn.classList.contains('bg-white');
            await window.setDoc(window.doc(window.db, "usuarios", user), {
                watchlist: isSaved ? window.arrayRemove(movieID) : window.arrayUnion(movieID)
            }, { merge: true });
            btn.classList.toggle('bg-white'); btn.classList.toggle('text-black');
        };

        window.toggleLike = async () => {
            const user = localStorage.getItem('usuarioMovieM');
            if (!user || user === 'null') return alert("Inicia sesión primero");
            const btn = document.getElementById('btnLike');
            const isLiked = btn.classList.contains('bg-red-600');
            await window.setDoc(window.doc(window.db, "usuarios", user), {
                likes: isLiked ? window.arrayRemove(movieID) : window.arrayUnion(movieID)
            }, { merge: true });
            btn.classList.toggle('bg-red-600'); btn.classList.toggle('text-white');
            btn.querySelector('svg').setAttribute('fill', isLiked ? 'none' : 'white');
        };

        window.abrirTrailer = async () => {
            const res = await fetch(`https://api.themoviedb.org/3/movie/${movieID}/videos?api_key=${API_KEY}`);
            const data = await res.json();
            const tr = data.results.find(v => v.type === "Trailer" && v.site === "YouTube");
            if(tr) {
                document.getElementById('movieFrame').src = `https://www.youtube.com/embed/${tr.key}?autoplay=1`;
                document.getElementById('playerOverlay').style.display = 'flex';
                document.body.style.overflow = "hidden";
            } else alert("Trailer no disponible.");
        };

        window.verActor = async (id) => {
            const [resBio, resPelis] = await Promise.all([
                fetch(`https://api.themoviedb.org/3/person/${id}?api_key=${API_KEY}&language=es-ES`),
                fetch(`https://api.themoviedb.org/3/person/${id}/movie_credits?api_key=${API_KEY}&language=es-ES`)
            ]);
            const actor = await resBio.json();
            const pelis = await resPelis.json();
            document.getElementById('actorNombre').innerText = actor.name;
            document.getElementById('actorFoto').src = 'https://image.tmdb.org/t/p/w500' + actor.profile_path;
            document.getElementById('actorInfo').innerText = actor.biography || "Sin biografía.";
            document.getElementById('actorPelisContenedor').innerHTML = pelis.cast.slice(0, 10).map(p => `
                <div class="min-w-[80px] text-center">
                    <img src="https://image.tmdb.org/t/p/w200${p.poster_path}" class="w-20 rounded-lg mb-2">
                    <p class="text-[7px] uppercase font-bold text-zinc-500 truncate">${p.title}</p>
                </div>`).join('');
            document.getElementById('modalActor').classList.remove('hidden');
        };

        window.cerrarActor = () => document.getElementById('modalActor').classList.add('hidden');
        window.scrollReparto = (d) => document.getElementById('reparto').scrollBy({ left: d, behavior: 'smooth' });

        function escucharComentarios() {
            if(!window.db) return;
            const q = window.query(window.collection(window.db, "comentarios"), window.where("movieID", "==", movieID), window.orderBy("fecha", "desc"));
            window.onSnapshot(q, (snap) => {
                const contenedor = document.getElementById('listaComentarios');
                contenedor.innerHTML = snap.empty ? '<p class="text-zinc-600 italic text-sm">No hay opiniones todavía. Sé el primero.</p>' : '';
                snap.forEach(doc => {
                    const c = doc.data();
                    contenedor.innerHTML += `
                        <div class="bg-zinc-900/50 p-6 rounded-2xl border border-white/5 fade-in mb-4">
                            <div class="flex justify-between mb-2">
                                <span class="text-red-600 font-black text-xs uppercase">${c.user}</span>
                                <span class="text-yellow-500 text-[10px]">${"★".repeat(c.rating)}</span>
                            </div>
                            <p class="text-zinc-400 text-sm italic">"${c.txt}"</p>
                        </div>`;
                });
            });
        }

        window.setRating = (n) => {
            currentRating = n;
            document.querySelectorAll('.star').forEach((s, i) => s.style.color = i < n ? '#eab308' : '#3f3f46');
        };

        window.publicarComentario = async () => {
            const txt = document.getElementById('comentarioTxt').value;
            const user = localStorage.getItem('usuarioMovieM');
            if(!user || user === 'null') return alert("Inicia sesión para comentar");
            if(!txt || currentRating === 0) return alert("Completa tu reseña y estrellas");
            await window.addDoc(window.collection(window.db, "comentarios"), { movieID, user, txt, rating: currentRating, fecha: Date.now() });
            document.getElementById('comentarioTxt').value = ""; setRating(0);
        };

        window.verPelicula = () => {
            document.getElementById('movieFrame').src = `https://vidsrc.cc/v3/embed/movie/${movieID}?auto_lang=es`;
            document.getElementById('playerOverlay').style.display = 'flex';
        };

        window.cerrarPelicula = () => {
            document.getElementById('playerOverlay').style.display = 'none';
            document.getElementById('movieFrame').src = "";
            document.body.style.overflow = "auto";
        };

        // Verificación de carga de Firebase antes de iniciar
        const waitFirebase = setInterval(() => {
            if (window.db) {
                clearInterval(waitFirebase);
                cargarPagina();
            }
        }, 100);
    </script>
</body>
</html>

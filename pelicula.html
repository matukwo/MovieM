<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieM | Detalle Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="firebase-config.js"></script>
    <style>
        /* Estrellas: Mejora de interactividad */
        .star { cursor: pointer; transition: all 0.2s ease; color: #3f3f46; }
        .star.active { color: #eab308; text-shadow: 0 0 10px rgba(234, 179, 8, 0.4); }
        #starRating:hover .star { color: #ca8a04; }
        #starRating .star:hover ~ .star { color: #3f3f46 !important; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes pulse-bg {
            0%, 100% { background-color: rgba(39, 39, 42, 0.5); }
            50% { background-color: rgba(63, 63, 70, 0.5); }
        }
        .skeleton { animation: pulse-bg 1.5s infinite ease-in-out; }

        .fade-in { animation: fadeIn 0.8s ease forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        #playerOverlay { display: none; background: #000; position: fixed; inset: 0; z-index: 200; flex-direction: column; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans overflow-x-hidden pt-24">

    <div id="userHUD" class="fixed top-8 right-8 z-50 hidden items-center gap-4 bg-black/60 backdrop-blur-xl p-2 pr-6 rounded-full border border-white/10 shadow-2xl transition-all duration-500">
        <div class="w-10 h-10 rounded-full bg-red-600 flex items-center justify-center font-black text-white border-2 border-white/20 shadow-inner" id="userInitial">?</div>
        <div class="flex flex-col">
            <span class="text-[8px] text-zinc-500 uppercase font-black tracking-tighter">Sesión Activa</span>
            <span id="userNameHUD" class="text-xs font-bold uppercase tracking-widest text-white">Usuario</span>
        </div>
    </div>

    <div id="playerOverlay">
        <div class="w-full flex justify-between items-center p-4 bg-zinc-950 border-b border-white/5">
            <span class="text-red-600 font-black tracking-tighter text-xl">MOVIE<span class="text-white font-light">M</span></span>
            <button onclick="cerrarPelicula()" class="text-white/30 hover:text-white transition font-black uppercase text-[10px] tracking-widest bg-white/5 px-6 py-3 rounded-full border border-white/5">Cerrar ✕</button>
        </div>
        <div class="flex-1 bg-black relative">
            <iframe id="movieFrame" src="" class="w-full h-full" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

    <div id="backdrop" class="fixed inset-0 w-full h-full bg-cover bg-center opacity-30 blur-sm -z-10 transition-all duration-1000 scale-110"></div>
    <div class="fixed inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/80 to-transparent -z-10"></div>

    <button onclick="window.location.href='index.html'" class="fixed top-8 left-8 bg-black/50 p-3 rounded-full hover:bg-red-600 transition z-50 border border-white/10 shadow-2xl group">
        <svg class="w-6 h-6 transform group-hover:-translate-x-1 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    </button>

    <main class="container mx-auto px-8 lg:px-20">
        <div class="flex flex-col md:flex-row gap-12 items-center md:items-start mb-16 relative z-0 fade-in">
            <div class="w-full max-w-[320px] shrink-0">
                <div id="posterSkeleton" class="w-full aspect-[2/3] rounded-2xl skeleton shadow-2xl"></div>
                <img id="poster" src="" class="w-full rounded-2xl border border-white/10 shadow-2xl transition-transform hover:scale-[1.03] duration-500 hidden" onload="this.classList.remove('hidden'); document.getElementById('posterSkeleton')?.remove()">
            </div>
            
            <div class="flex-1 relative z-10 min-w-0 text-center md:text-left">
                <div id="badget-premios" class="hidden mb-6 inline-flex items-center gap-2.5 bg-yellow-600/20 border border-yellow-600/50 text-yellow-500 px-5 py-2 rounded-full text-[10px] font-bold uppercase tracking-[0.2em] shadow-lg animate-bounce">
                    <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.2h7.6l-6 4.8 2.4 7.2-6-4.8-6 4.8 2.4-7.2-6-4.8h7.6z"/></svg>
                    Altamente Calificada
                </div>
                
                <h1 id="titulo" class="text-5xl md:text-8xl font-black mb-6 italic tracking-tighter uppercase leading-[0.9] text-white"></h1>
                <div id="tituloSkeleton" class="h-20 w-3/4 skeleton rounded-xl mb-6"></div>
                
                <div class="flex flex-wrap items-center justify-center md:justify-start gap-6 mb-8 font-bold">
                    <span id="anio" class="bg-zinc-800/80 backdrop-blur px-4 py-1.5 rounded text-white text-sm border border-white/5"></span>
                    <span class="text-yellow-500 flex items-center gap-2 text-xl font-black">⭐ <span id="voto" class="text-white">0.0</span></span>
                    <span id="director" class="text-zinc-400 border-l border-zinc-800 pl-6 font-semibold italic text-base"></span>
                </div>
                
                <p id="sinopsis" class="text-lg text-zinc-400 max-w-2xl leading-relaxed mb-10 hidden font-medium"></p>
                
                <div class="flex flex-wrap items-center justify-center md:justify-start gap-5">
                    <button onclick="verPelicula()" class="bg-red-600 text-white px-10 py-5 rounded-full font-black flex items-center gap-3 hover:bg-red-700 transition-all shadow-[0_0_30px_rgba(220,38,38,0.3)] active:scale-95 tracking-widest uppercase text-sm">
                        <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Ver ahora
                    </button>

                    <button onclick="abrirTrailer()" class="bg-white/10 backdrop-blur text-white px-10 py-5 rounded-full font-black flex items-center gap-3 hover:bg-white hover:text-black transition-all shadow-xl active:scale-95 tracking-widest uppercase text-sm border border-white/10">
                        <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M10 15l5.19-3L10 9v6zM21 12c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9 9-4.03 9-9zm-16.1 0c0-3.92 3.18-7.1 7.1-7.1s7.1 3.18 7.1 7.1-3.18 7.1-7.1 7.1-7.1-3.18-7.1-7.1z"/></svg> Trailer
                    </button>
                    
                    <div class="flex gap-4">
                        <button id="btnWatchlist" onclick="toggleWatchlist()" class="w-14 h-14 rounded-full bg-zinc-900/80 border border-white/10 flex items-center justify-center text-zinc-400 hover:text-white transition-all hover:scale-110">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" /></svg>
                        </button>
                        <button id="btnLike" onclick="toggleLike()" class="w-14 h-14 rounded-full bg-zinc-900/80 border border-white/10 flex items-center justify-center text-zinc-400 hover:text-red-500 transition-all hover:scale-110">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78v0z"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <section class="mb-20 fade-in" style="animation-delay: 0.2s">
            <h3 class="text-2xl font-black mb-10 text-zinc-400 flex items-center gap-4 uppercase tracking-[0.3em] text-xs">
                Reparto Principal <div class="h-px flex-1 bg-gradient-to-r from-zinc-800 to-transparent"></div>
            </h3>
            <div class="relative group">
                <button onclick="scrollReparto(-400)" class="absolute -left-6 top-1/2 -translate-y-1/2 bg-black/80 p-3 rounded-full border border-white/10 opacity-0 group-hover:opacity-100 transition-all z-20 hover:bg-red-600 text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <div id="reparto" class="flex gap-10 overflow-x-auto no-scrollbar pb-10 px-4 pt-4 scroll-smooth">
                    <div class="min-w-[120px] skeleton h-32 rounded-full"></div>
                    <div class="min-w-[120px] skeleton h-32 rounded-full"></div>
                </div>
                <button onclick="scrollReparto(400)" class="absolute -right-6 top-1/2 -translate-y-1/2 bg-black/80 p-3 rounded-full border border-white/10 opacity-0 group-hover:opacity-100 transition-all z-20 hover:bg-red-600 text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                </button>
            </div>
        </section>

        <section class="border-t border-white/5 pt-16 grid lg:grid-cols-5 gap-16 mb-32 relative z-0 fade-in" style="animation-delay: 0.4s">
            <div class="lg:col-span-2 bg-zinc-900/40 p-10 rounded-[40px] border border-white/5 shadow-2xl h-fit">
                <h3 class="text-3xl font-black mb-2 italic">Tu <span class="text-red-600">Review</span></h3>
                <p class="text-zinc-500 text-sm mb-8 font-medium">Comparte tu opinión con la comunidad de MovieM.</p>
                
                <div id="starRating" class="flex gap-3 mb-8">
                    <span onclick="setRating(1)" class="star text-4xl">★</span>
                    <span onclick="setRating(2)" class="star text-4xl">★</span>
                    <span onclick="setRating(3)" class="star text-4xl">★</span>
                    <span onclick="setRating(4)" class="star text-4xl">★</span>
                    <span onclick="setRating(5)" class="star text-4xl">★</span>
                </div>
                
                <textarea id="comentarioTxt" placeholder="¿Fue una obra maestra o una pérdida de tiempo?" class="w-full bg-zinc-950/50 border border-white/5 p-6 rounded-3xl text-white mb-6 h-40 outline-none focus:border-red-600 focus:ring-4 focus:ring-red-600/10 transition-all placeholder:text-zinc-700 font-medium"></textarea>
                <button onclick="publicarComentario()" class="w-full bg-red-600 py-5 rounded-2xl font-black hover:bg-red-700 transition-all tracking-widest uppercase text-xs shadow-xl active:scale-[0.98]">Enviar Reseña</button>
            </div>

            <div class="lg:col-span-3">
                <h3 class="text-2xl font-black mb-10 flex items-center gap-4">Opiniones Globales <span class="text-[9px] bg-red-600 px-3 py-1 rounded-full text-white font-black uppercase tracking-widest">LIVE</span></h3>
                <div id="listaComentarios" class="space-y-6 max-h-[600px] overflow-y-auto no-scrollbar pr-4">
                    </div>
            </div>
        </section>
    </main>

    <div id="modalActor" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-xl" onclick="cerrarActor()"></div>
        <div class="relative glass-card p-8 md:p-12 rounded-[50px] max-w-5xl w-full max-h-[90vh] overflow-y-auto no-scrollbar shadow-2xl border-white/10">
            <button onclick="cerrarActor()" class="absolute top-10 right-10 text-white/30 hover:text-white transition-all text-3xl">✕</button>
            <div id="modalActorContent" class="flex flex-col md:flex-row gap-12 items-start">
                <img id="actorFoto" src="" class="w-56 h-72 object-cover rounded-[35px] shadow-2xl border border-white/10 shrink-0 mx-auto">
                <div class="flex-1">
                    <h2 id="actorNombre" class="text-5xl font-black mb-6 italic tracking-tighter uppercase text-white"></h2>
                    <p id="actorInfo" class="text-zinc-400 text-base leading-relaxed mb-10 font-medium"></p>
                    <h4 class="text-[10px] font-black uppercase tracking-[0.3em] text-red-500 mb-6">Filmografía Relevante</h4>
                    <div id="actorPelisContenedor" class="relative group"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="modalVideo" class="fixed inset-0 bg-black/98 z-[100] hidden flex items-center justify-center p-4">
        <button onclick="cerrarTrailer()" class="absolute top-10 right-10 text-white/50 text-4xl hover:text-red-600 transition">✕</button>
        <div id="videoContainer" class="w-full max-w-6xl aspect-video rounded-[40px] overflow-hidden shadow-[0_0_100px_rgba(220,38,38,0.15)] bg-black"></div>
    </div>

    <script type="module">
        const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';
        const urlParams = new URLSearchParams(window.location.search);
        const movieID = urlParams.get('id');
        let currentRating = 0;

        async function cargarPagina() {
            if(!movieID) { window.location.href = 'index.html'; return; }
            try {
                const [pRes, cRes] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/movie/${movieID}?api_key=${API_KEY}&language=es-ES`),
                    fetch(`https://api.themoviedb.org/3/movie/${movieID}/credits?api_key=${API_KEY}&language=es-ES`)
                ]);
                const peli = await pRes.json();
                const credits = await cRes.json();

                // Limpieza Skeletons
                document.getElementById('tituloSkeleton')?.remove();
                document.getElementById('sinopsisSkeleton')?.remove();
                document.getElementById('sinopsis').classList.remove('hidden');

                // Inyección de Datos
                document.title = `${peli.title} | MovieM`;
                document.getElementById('titulo').innerText = peli.title;
                document.getElementById('sinopsis').innerText = peli.overview || "Esta película aún no tiene una sinopsis disponible en español.";
                document.getElementById('anio').innerText = peli.release_date ? peli.release_date.split('-')[0] : "N/A";
                document.getElementById('voto').innerText = peli.vote_average.toFixed(1);
                document.getElementById('poster').src = 'https://image.tmdb.org/t/p/w500' + peli.poster_path;
                document.getElementById('backdrop').style.backgroundImage = `url('https://image.tmdb.org/t/p/original${peli.backdrop_path}')`;
                
                if(peli.vote_average > 7.5) document.getElementById('badget-premios').classList.remove('hidden');

                const dir = credits.crew.find(c => c.job === "Director");
                if(dir) document.getElementById('director').innerText = `Dirigida por ${dir.name}`;

                // Render Reparto
                document.getElementById('reparto').innerHTML = credits.cast.slice(0, 12).map(actor => `
                    <div onclick="verActor(${actor.id})" class="min-w-[130px] text-center cursor-pointer shrink-0 group transition-all duration-500">
                        <div class="w-24 h-24 mx-auto mb-5 overflow-hidden rounded-full border-2 border-zinc-800 group-hover:border-red-600 transition-all shadow-xl group-hover:scale-110">
                            <img src="${actor.profile_path ? 'https://image.tmdb.org/t/p/w200' + actor.profile_path : 'https://via.placeholder.com/200?text=Actor'}" class="w-full h-full object-cover">
                        </div>
                        <p class="text-[10px] font-black text-white truncate uppercase tracking-tighter">${actor.name}</p>
                        <p class="text-[8px] text-zinc-600 truncate italic mt-1">${actor.character}</p>
                    </div>`).join('');

                escucharComentariosNube(); 
                checkStatus();
                actualizarHUD();
            } catch (error) { console.error("Error cargando película:", error); }
        }

        // --- HUD ---
        function actualizarHUD() {
            const user = localStorage.getItem('usuarioMovieM');
            const hud = document.getElementById('userHUD');
            if (user && user !== 'undefined') {
                document.getElementById('userNameHUD').innerText = user;
                document.getElementById('userInitial').innerText = user.charAt(0).toUpperCase();
                hud.classList.remove('hidden');
                hud.classList.add('flex');
            }
        }

        // --- FIREBASE (RESEÑAS) ---
        function escucharComentariosNube() {
            const container = document.getElementById('listaComentarios');
            if(!window.db) return; // Evita error si firebase-config no carga
            const q = window.query(
                window.collection(window.db, "comentarios"),
                window.where("movieID", "==", movieID),
                window.orderBy("fecha", "desc")
            );

            window.onSnapshot(q, (snapshot) => {
                container.innerHTML = "";
                if (snapshot.empty) {
                    container.innerHTML = `<p class="text-zinc-600 text-sm italic py-10">Sé el primero en escribir una reseña para esta película.</p>`;
                    return;
                }
                snapshot.forEach((doc) => {
                    const c = doc.data();
                    const fecha = c.fecha ? new Date(c.fecha).toLocaleDateString() : "Reciente";
                    container.innerHTML += `
                        <div class="bg-zinc-900/30 p-8 rounded-[30px] border border-white/5 hover:border-white/10 transition-all fade-in">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <span class="text-red-600 font-black text-[10px] uppercase tracking-[0.2em] block mb-1">${c.user}</span>
                                    <span class="text-[9px] text-zinc-600 font-bold uppercase">${fecha}</span>
                                </div>
                                <span class="text-yellow-500 text-[10px] tracking-widest bg-yellow-500/10 px-3 py-1 rounded-full">${"★".repeat(c.rating)}</span>
                            </div>
                            <p class="text-zinc-400 text-sm leading-relaxed font-medium">"${c.txt}"</p>
                        </div>`;
                });
            });
        }

        window.publicarComentario = async () => {
            const txt = document.getElementById('comentarioTxt').value.trim();
            const user = localStorage.getItem('usuarioMovieM');
            if (!user) return alert("Inicia sesión para comentar.");
            if (!txt || currentRating === 0) return alert("Escribe un comentario y califica con estrellas.");

            try {
                await window.addDoc(window.collection(window.db, "comentarios"), {
                    movieID, user, txt, rating: currentRating, fecha: Date.now()
                });
                document.getElementById('comentarioTxt').value = "";
                window.setRating(0);
            } catch (e) { alert("Error al conectar con la base de datos."); }
        };

        // --- SISTEMAS DE LIKE / WATCHLIST ---
        async function checkStatus() {
            const user = localStorage.getItem('usuarioMovieM');
            if (!user) return;
            const userDoc = await window.getDoc(window.doc(window.db, "usuarios", user));
            if (userDoc.exists()) {
                const data = userDoc.data();
                if (data.watchlist?.includes(movieID)) {
                    document.getElementById('btnWatchlist').classList.add('bg-white', 'text-black');
                }
                if (data.likes?.includes(movieID)) {
                    document.getElementById('btnLike').classList.add('bg-red-600', 'text-white', 'border-red-600');
                }
            }
        }

        window.toggleWatchlist = async () => {
            const user = localStorage.getItem('usuarioMovieM');
            if (!user) return alert("Debes iniciar sesión.");
            const btn = document.getElementById('btnWatchlist');
            const active = btn.classList.contains('bg-white');
            await window.setDoc(window.doc(window.db, "usuarios", user), {
                watchlist: active ? window.arrayRemove(movieID) : window.arrayUnion(movieID)
            }, { merge: true });
            btn.classList.toggle('bg-white'); btn.classList.toggle('text-black');
        };

        window.toggleLike = async () => {
            const user = localStorage.getItem('usuarioMovieM');
            if (!user) return alert("Debes iniciar sesión.");
            const btn = document.getElementById('btnLike');
            const active = btn.classList.contains('bg-red-600');
            await window.setDoc(window.doc(window.db, "usuarios", user), {
                likes: active ? window.arrayRemove(movieID) : window.arrayUnion(movieID)
            }, { merge: true });
            btn.classList.toggle('bg-red-600'); btn.classList.toggle('text-white'); btn.classList.toggle('border-red-600');
        };

        // --- UTILS ---
        window.setRating = (n) => {
            currentRating = n;
            document.querySelectorAll('.star').forEach((s, i) => {
                s.classList.toggle('active', i < n);
            });
        };

        window.verActor = async (id) => {
            const [resBio, resPelis] = await Promise.all([
                fetch(`https://api.themoviedb.org/3/person/${id}?api_key=${API_KEY}&language=es-ES`),
                fetch(`https://api.themoviedb.org/3/person/${id}/movie_credits?api_key=${API_KEY}&language=es-ES`)
            ]);
            const actor = await resBio.json();
            const peliData = await resPelis.json();
            
            document.getElementById('actorNombre').innerText = actor.name;
            document.getElementById('actorFoto').src = actor.profile_path ? 'https://image.tmdb.org/t/p/w500' + actor.profile_path : 'https://via.placeholder.com/500?text=No+Photo';
            document.getElementById('actorInfo').innerText = actor.biography || "No hay biografía disponible.";
            
            const pelis = peliData.cast.filter(p => p.poster_path).sort((a,b) => b.popularity - a.popularity).slice(0, 10);
            document.getElementById('actorPelisContenedor').innerHTML = `<div class="flex gap-4 overflow-x-auto no-scrollbar pb-4">
                ${pelis.map(p => `<img onclick="window.location.href='pelicula.html?id=${p.id}'" src="https://image.tmdb.org/t/p/w200${p.poster_path}" class="w-20 h-28 rounded-xl cursor-pointer hover:scale-105 transition shadow-lg border border-white/10">`).join('')}
            </div>`;
            
            document.getElementById('modalActor').classList.remove('hidden');
            document.body.style.overflow = "hidden";
        };

        window.cerrarActor = () => { document.getElementById('modalActor').classList.add('hidden'); document.body.style.overflow = "auto"; };
        window.abrirTrailer = async () => {
            const res = await fetch(`https://api.themoviedb.org/3/movie/${movieID}/videos?api_key=${API_KEY}`);
            const data = await res.json();
            const tr = data.results.find(v => v.type === "Trailer" && v.site === "YouTube");
            if(tr) {
                document.getElementById('videoContainer').innerHTML = `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${tr.key}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
                document.getElementById('modalVideo').classList.remove('hidden');
                document.body.style.overflow = "hidden";
            } else { alert("Trailer no disponible."); }
        };

        window.cerrarTrailer = () => { document.getElementById('modalVideo').classList.add('hidden'); document.getElementById('videoContainer').innerHTML = ''; document.body.style.overflow = "auto"; };
        window.verPelicula = () => {
            document.getElementById('movieFrame').src = `https://vidsrc.cc/v3/embed/movie/${movieID}?auto_lang=es`;
            document.getElementById('playerOverlay').style.display = 'flex';
            document.body.style.overflow = "hidden";
        };
        window.cerrarPelicula = () => { document.getElementById('playerOverlay').style.display = 'none'; document.getElementById('movieFrame').src = ""; document.body.style.overflow = "auto"; };
        window.scrollReparto = (d) => document.getElementById('reparto').scrollBy({ left: d, behavior: 'smooth' });

        cargarPagina();
    </script>
</body>
</html>

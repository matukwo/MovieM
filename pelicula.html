<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieM | Detalle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent-color: #dc2626; }
        .text-accent { color: var(--accent-color); }
        .bg-accent { background-color: var(--accent-color); }
        .border-accent { border-color: var(--accent-color); }

        .star { cursor: pointer; transition: all 0.2s ease; color: #3f3f46; }
        .star.active { color: #eab308; text-shadow: 0 0 10px rgba(234, 179, 8, 0.4); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass-nav { 
            background: rgba(0, 0, 0, 0.85); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.08); 
        }

        .skeleton { animation: pulse 1.5s infinite ease-in-out; background: #27272a; }
        @keyframes pulse { 50% { opacity: 0.5; } }

        .fade-in { animation: fadeIn 0.8s ease forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        #playerOverlay { display: none; background: #000; position: fixed; inset: 0; z-index: 200; flex-direction: column; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans overflow-x-hidden">

    <nav class="fixed top-0 left-0 w-full z-[100] glass-nav px-4 md:px-10 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4 md:gap-8">
            <a href="index.html" class="text-[10px] md:text-xs font-bold uppercase tracking-widest hover:text-accent transition">Inicio</a>
            <a href="#" class="hidden sm:block text-[10px] md:text-xs font-bold uppercase tracking-widest text-zinc-500 hover:text-white transition">Series</a>
            <a href="milista.html" class="text-[10px] md:text-xs font-bold uppercase tracking-widest text-zinc-500 hover:text-white transition">Mi Lista</a>
        </div>

        <div class="absolute left-1/2 -translate-x-1/2">
            <a href="index.html" class="text-xl md:text-2xl font-black tracking-tighter italic">MOVIE<span class="text-accent">M</span></a>
        </div>

        <div class="flex items-center gap-3 md:gap-6">
            <div id="authArea" class="flex items-center gap-4">
                <button id="userBtn" onclick="toggleUserModal()" class="w-10 h-10 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center hover:border-accent transition group overflow-hidden hidden">
                    <div id="avatarNav" class="w-full h-full flex items-center justify-center font-black italic text-white text-sm">?</div>
                </button>
                <a id="loginBtn" href="index.html" class="text-[10px] font-black uppercase tracking-widest bg-accent px-4 py-2 rounded-lg hover:opacity-90 transition">Ingresar</a>
            </div>
        </div>
    </nav>

    <div id="userModal" class="fixed inset-0 z-[200] hidden items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-md" onclick="toggleUserModal()"></div>
        <div class="relative w-full max-w-[320px] bg-zinc-900/95 rounded-[35px] p-8 border border-white/10 text-center shadow-2xl">
            <div class="h-1.5 w-24 bg-accent mx-auto mb-6 rounded-full"></div>
            <div id="modalAvatar" class="w-20 h-20 rounded-full bg-zinc-800 mx-auto mb-4 flex items-center justify-center text-3xl font-black text-white shadow-lg border-2 border-accent overflow-hidden">?</div>
            <h2 id="modalName" class="text-xl font-black italic uppercase tracking-tighter mb-6 text-white">Usuario</h2>
            <div class="space-y-3">
                <button onclick="window.location.href='perfil.html'" class="w-full bg-white/5 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest border border-white/5 hover:bg-accent transition">Mi Perfil</button>
                <button onclick="cerrarSesion()" class="w-full py-4 text-zinc-500 font-bold text-[10px] uppercase tracking-widest hover:text-white transition">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <div id="playerOverlay">
        <div class="w-full flex justify-between items-center p-4 bg-zinc-950 border-b border-white/5">
            <span class="text-accent font-black tracking-tighter text-xl">MOVIE<span class="text-white font-light">M</span></span>
            <button onclick="cerrarPelicula()" class="text-white/30 hover:text-white transition font-black uppercase text-[10px] tracking-widest bg-white/5 px-6 py-3 rounded-full">Cerrar ✕</button>
        </div>
        <div class="flex-1 bg-black">
            <iframe id="movieFrame" src="" class="w-full h-full" allowfullscreen></iframe>
        </div>
    </div>

    <div id="backdrop" class="fixed inset-0 w-full h-full bg-cover bg-center opacity-20 blur-sm -z-10 scale-110"></div>
    <div class="fixed inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/90 to-transparent -z-10"></div>

    <main class="container mx-auto px-4 md:px-10 pt-32">
        <div class="flex flex-col md:flex-row gap-10 items-center md:items-start mb-16 fade-in">
            <div class="w-full max-w-[280px] shrink-0">
                <div id="posterSkeleton" class="w-full aspect-[2/3] rounded-2xl skeleton shadow-2xl"></div>
                <img id="poster" src="" class="w-full rounded-2xl border border-white/10 shadow-2xl hidden" onload="this.classList.remove('hidden'); document.getElementById('posterSkeleton')?.remove()">
            </div>
            <div class="flex-1 text-center md:text-left">
                <h1 id="titulo" class="text-4xl md:text-7xl font-black mb-4 italic tracking-tighter uppercase leading-none"></h1>
                <p id="sinopsis" class="text-base md:text-lg text-zinc-400 max-w-2xl leading-relaxed mb-8"></p>
                <div class="flex gap-4 justify-center md:justify-start">
                    <button onclick="verPelicula()" class="bg-accent text-white px-8 py-4 rounded-full font-black uppercase text-xs tracking-widest">Ver ahora</button>
                </div>
            </div>
        </div>

        <section class="border-t border-white/5 pt-16 grid lg:grid-cols-5 gap-10 mb-20">
            <div class="lg:col-span-2 bg-zinc-900/40 p-8 rounded-[30px] border border-white/5">
                <h3 class="text-2xl font-black mb-1 italic">Tu <span class="text-accent">Review</span></h3>
                <div id="starRating" class="flex gap-2 my-6">
                    <span onclick="setRating(1)" class="star text-3xl">★</span>
                    <span onclick="setRating(2)" class="star text-3xl">★</span>
                    <span onclick="setRating(3)" class="star text-3xl">★</span>
                    <span onclick="setRating(4)" class="star text-3xl">★</span>
                    <span onclick="setRating(5)" class="star text-3xl">★</span>
                </div>
                <textarea id="comentarioTxt" placeholder="Escribe tu opinión..." class="w-full bg-black/40 border border-white/5 p-5 rounded-2xl text-white mb-4 h-32 outline-none focus:border-accent transition-all"></textarea>
                <button onclick="publicarComentario()" class="w-full bg-accent py-4 rounded-xl font-black uppercase text-[10px] tracking-widest">Publicar</button>
            </div>
            <div class="lg:col-span-3">
                <div id="listaComentarios" class="space-y-4"></div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURACIÓN FIREBASE (Usa la misma de tu index)
        const firebaseConfig = {
            apiKey: "AIzaSyAn5N7m7EhICK2aZG4Nx8DIW9RZd9kK1DA",
            authDomain: "moviem-5b73d.firebaseapp.com",
            projectId: "moviem-5b73d",
            storageBucket: "moviem-5b73d.firebasestorage.app",
            messagingSenderId: "843796138544",
            appId: "1:843796138544:web:c2bde9b39d437b84d97bf5"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';
        const urlParams = new URLSearchParams(window.location.search);
        const movieID = urlParams.get('id');
        let currentRating = 0;
        let usuarioActual = null;

        // --- GESTIÓN DE ESTADO DE SESIÓN ---
        onAuthStateChanged(auth, async (user) => {
            const userBtn = document.getElementById('userBtn');
            const loginBtn = document.getElementById('loginBtn');
            
            if (user) {
                const docSnap = await getDoc(doc(db, "usuarios", user.uid));
                if (docSnap.exists()) {
                    usuarioActual = docSnap.data();
                    // Actualizar UI
                    document.getElementById('modalName').innerText = usuarioActual.username;
                    const content = usuarioActual.avatar 
                        ? `<img src="${usuarioActual.avatar}" class="w-full h-full object-cover">`
                        : `<span>${usuarioActual.username.charAt(0).toUpperCase()}</span>`;
                    
                    document.getElementById('avatarNav').innerHTML = content;
                    document.getElementById('modalAvatar').innerHTML = content;
                    
                    if(usuarioActual.color) document.documentElement.style.setProperty('--accent-color', usuarioActual.color);
                    
                    userBtn.classList.remove('hidden');
                    loginBtn.classList.add('hidden');
                }
            } else {
                usuarioActual = null;
                userBtn.classList.add('hidden');
                loginBtn.classList.remove('hidden');
            }
        });

        window.toggleUserModal = () => document.getElementById('userModal').classList.toggle('hidden');
        
        window.cerrarSesion = async () => {
            await signOut(auth);
            window.location.reload();
        };

        // --- LÓGICA DE LA PELÍCULA ---
        async function cargarDetalles() {
            if(!movieID) return window.location.href = 'index.html';
            const res = await fetch(`https://api.themoviedb.org/3/movie/${movieID}?api_key=${API_KEY}&language=es-ES`);
            const peli = await res.json();

            document.getElementById('titulo').innerText = peli.title;
            document.getElementById('sinopsis').innerText = peli.overview;
            document.getElementById('poster').src = 'https://image.tmdb.org/t/p/w500' + peli.poster_path;
            document.getElementById('backdrop').style.backgroundImage = `url('https://image.tmdb.org/t/p/original${peli.backdrop_path}')`;
            
            escucharComentarios();
        }

        window.verPelicula = () => {
            document.getElementById('movieFrame').src = `https://vidsrc.cc/v3/embed/movie/${movieID}?auto_lang=es`;
            document.getElementById('playerOverlay').style.display = 'flex';
        };

        window.cerrarPelicula = () => {
            document.getElementById('playerOverlay').style.display = 'none';
            document.getElementById('movieFrame').src = "";
        };

        // --- REVIEWS ---
        window.setRating = (n) => {
            currentRating = n;
            document.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('active', i < n));
        };

        window.publicarComentario = async () => {
            if(!usuarioActual) return alert("Debes iniciar sesión para comentar");
            const txt = document.getElementById('comentarioTxt').value;
            if(!txt || currentRating === 0) return alert("Completa el comentario y las estrellas");

            await addDoc(collection(db, "comentarios"), {
                movieID,
                user: usuarioActual.username,
                txt,
                rating: currentRating,
                fecha: Date.now()
            });
            
            document.getElementById('comentarioTxt').value = "";
            setRating(0);
        };

        function escucharComentarios() {
            const q = query(collection(db, "comentarios"), where("movieID", "==", movieID), orderBy("fecha", "desc"));
            onSnapshot(q, (snap) => {
                const lista = document.getElementById('listaComentarios');
                lista.innerHTML = "";
                snap.forEach(doc => {
                    const c = doc.data();
                    lista.innerHTML += `
                        <div class="bg-white/5 p-6 rounded-2xl border border-white/5 fade-in">
                            <div class="flex justify-between mb-2">
                                <span class="text-accent font-black text-[10px] uppercase">${c.user}</span>
                                <span class="text-yellow-500 text-[10px]">${"★".repeat(c.rating)}</span>
                            </div>
                            <p class="text-zinc-400 text-sm italic">"${c.txt}"</p>
                        </div>`;
                });
            });
        }

        cargarDetalles();
    </script>
</body>
</html>

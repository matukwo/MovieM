<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

/* CONFIG FIREBASE */

const firebaseConfig = {
apiKey: "AIzaSyAn5N7mEhICK2aZG4Nx8DIW9RZd9kK1DA",
authDomain: "moviem-5b73d.firebaseapp.com",
projectId: "moviem-5b73d",
storageBucket: "moviem-5b73d.firebasestorage.app",
messagingSenderId: "843796138544",
appId: "1:843796138544:web:c2bde9b39d437b84d97bf5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


/* CONFIG PELICULA */

const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';
const urlParams = new URLSearchParams(window.location.search);
const movieID = urlParams.get('id');

let currentRating = 0;


/* CARGAR PELICULA */

async function cargarPagina(){

if(!movieID) return;

try{

const [pRes, cRes] = await Promise.all([
fetch(`https://api.themoviedb.org/3/movie/${movieID}?api_key=${API_KEY}&language=es-ES`),
fetch(`https://api.themoviedb.org/3/movie/${movieID}/credits?api_key=${API_KEY}&language=es-ES`)
]);

const peli = await pRes.json();
const credits = await cRes.json();


document.getElementById('titulo').innerText = peli.title;

document.getElementById('sinopsis').innerText =
peli.overview || "Sin descripción.";

document.getElementById('anio').innerText =
peli.release_date?.split('-')[0] || "S/F";

document.getElementById('voto').innerText =
peli.vote_average.toFixed(1);

document.getElementById('poster').src =
'https://image.tmdb.org/t/p/w500'+peli.poster_path;

document.getElementById('backdrop').style.backgroundImage =
`url('https://image.tmdb.org/t/p/original${peli.backdrop_path}')`;


document.getElementById('tituloSkeleton')?.remove();
document.getElementById('sinopsisSkeleton')?.remove();
document.getElementById('sinopsis').classList.remove('hidden');


const dir = credits.crew.find(c=>c.job==="Director");

if(dir){
document.getElementById('director').innerText =
`Director: ${dir.name}`;
}


/* REPARTO */

document.getElementById('reparto').innerHTML =
credits.cast.slice(0,15).map(actor=>`

<div class="min-w-[110px] text-center shrink-0">

<img src="${actor.profile_path ? 'https://image.tmdb.org/t/p/w200'+actor.profile_path : 'https://via.placeholder.com/200'}"
class="w-16 h-16 mx-auto rounded-full object-cover mb-2 border border-zinc-800">

<p class="text-[10px] font-bold uppercase truncate px-1">
${actor.name}
</p>

</div>

`).join('');


cargarComentariosRealtime();

}
catch(e){

console.error("Error cargando peli:",e);

}

}



/* COMENTARIOS EN TIEMPO REAL */

function cargarComentariosRealtime(){

const q = query(
collection(db,"peliculas",movieID,"comentarios")
);

onSnapshot(q,(snapshot)=>{

const lista = document.getElementById('listaComentarios');

lista.innerHTML="";

if(snapshot.empty){

lista.innerHTML=
`<p class="text-zinc-600 italic">
Sé el primero en comentar.
</p>`;

return;

}

let items=[];

snapshot.forEach(doc=>{
items.push(doc.data());
});


/* ORDEN POR FECHA */

items.sort((a,b)=>
(b.timestamp?.toMillis?.()||0) -
(a.timestamp?.toMillis?.()||0)
);


/* RENDER */

items.forEach(c=>{

lista.innerHTML+=`

<div class="bg-zinc-900/50 p-6 rounded-2xl border border-white/5 mb-3 fade-in">

<div class="flex justify-between items-center mb-2">

<span class="text-red-600 font-black text-xs italic">
@Invitado
</span>

<span class="text-yellow-500 text-[10px]">
${"★".repeat(c.rating)}
</span>

</div>

<p class="text-zinc-400 text-sm">
${c.txt}
</p>

</div>

`;

});

},
(err)=>{

console.error("Firebase error:",err);

document.getElementById('listaComentarios').innerHTML=
`<p class="text-red-500 text-xs italic">
Error de conexión
</p>`;

});

}



/* PUBLICAR COMENTARIO */

window.publicarComentario = async ()=>{

const txt =
document.getElementById('comentarioTxt').value.trim();

if(!txt || currentRating===0){

alert("Escribí algo y marcá las estrellas");
return;

}


/* ANTI SPAM */

const last = localStorage.getItem("lastComment");

if(last && Date.now()-last < 30000){

alert("Esperá 30 segundos para comentar otra vez");
return;

}


const btn =
document.getElementById('btnPublicar');

btn.disabled=true;
btn.innerText="ENVIANDO...";


try{

await addDoc(
collection(db,"peliculas",movieID,"comentarios"),
{
user:"Invitado",
txt:txt,
rating:currentRating,
timestamp:serverTimestamp()
}
);


localStorage.setItem("lastComment",Date.now());

document.getElementById('comentarioTxt').value="";

setRating(0);

alert("Comentario enviado");


}
catch(e){

console.error("Error guardando:",e);

alert("Error al enviar comentario");

}
finally{

btn.disabled=false;
btn.innerText="PUBLICAR COMENTARIO";

}

};



/* ESTRELLAS */

window.setRating=(n)=>{

currentRating=n;

document.querySelectorAll('.star')
.forEach((s,i)=>{

s.style.color =
i<n ? '#eab308' : '#3f3f46';

});

};



/* CARGAR PAGINA */

cargarPagina();

</script>

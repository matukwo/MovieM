<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieM | Detalle Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .star { cursor: pointer; transition: color 0.2s ease; }
        #starRating:hover .star { color: #ca8a04; }
        #starRating .star:hover ~ .star { color: #3f3f46 !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .skeleton { animation: pulse-bg 1.5s infinite ease-in-out; }
        @keyframes pulse-bg {
            0% { background-color: rgba(39, 39, 42, 0.5); }
            50% { background-color: rgba(63, 63, 70, 0.5); }
            100% { background-color: rgba(39, 39, 42, 0.5); }
        }
        .fade-in { animation: fadeIn 0.8s ease forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #playerOverlay { display: none; background: #000; position: fixed; inset: 0; z-index: 200; flex-direction: column; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans overflow-x-hidden pt-24">

    <div id="playerOverlay">
        <div class="w-full flex justify-between items-center p-4 bg-zinc-950 border-b border-white/5">
            <span class="text-red-600 font-black tracking-tighter text-xl">MOVIE<span class="text-white font-light">M</span></span>
            <button onclick="cerrarPelicula()" class="text-white/30 hover:text-white transition font-black uppercase text-[10px] tracking-widest bg-white/5 px-5 py-2.5 rounded-full border border-white/5">Cerrar ✕</button>
        </div>
        <div class="flex-1 bg-black relative">
            <iframe id="movieFrame" src="" class="w-full h-full" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

    <div id="backdrop" class="fixed inset-0 w-full h-full bg-cover bg-center opacity-30 blur-sm -z-10 transition-all duration-700"></div>
    <div class="fixed inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/80 to-transparent -z-10"></div>

    <button onclick="window.history.back()" class="fixed top-8 left-8 bg-black/50 p-3 rounded-full hover:bg-red-600 transition z-50 border border-white/10 shadow-2xl">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    </button>

    <main class="container mx-auto px-8">
        <div class="flex flex-col md:flex-row gap-12 items-start mb-16 relative z-0 fade-in">
            <div class="w-full md:w-80 shrink-0">
                <div id="posterSkeleton" class="w-full aspect-[2/3] rounded-2xl skeleton"></div>
                <img id="poster" src="" class="w-full rounded-2xl border border-white/10 shadow-2xl transition-transform hover:scale-[1.02] duration-500 hidden" onload="this.classList.remove('hidden'); document.getElementById('posterSkeleton')?.remove()">
            </div>
            
            <div class="flex-1 min-w-0">
                <h1 id="titulo" class="text-5xl md:text-7xl font-black mb-4 italic tracking-tighter uppercase leading-none text-white"></h1>
                <div class="flex items-center gap-4 mb-8 font-bold">
                    <span id="anio" class="bg-zinc-800 px-3 py-1 rounded text-white text-sm"></span>
                    <span class="text-yellow-500 flex items-center gap-1 text-lg">⭐ <span id="voto">0.0</span></span>
                </div>
                <p id="sinopsis" class="text-lg text-zinc-500 max-w-2xl leading-relaxed mb-10"></p>
                
                <div class="flex flex-wrap items-center gap-4">
                    <button onclick="verPelicula()" class="bg-red-600 text-white px-8 py-4 rounded-full font-black flex items-center gap-3 hover:bg-red-700 transition-all shadow-xl active:scale-95 uppercase">
                        <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> VER PELÍCULA
                    </button>
                </div>
            </div>
        </div>

        <section class="border-t border-white/5 pt-12 grid md:grid-cols-2 gap-16 mb-20 fade-in">
            <div class="bg-zinc-900/40 p-10 rounded-3xl border border-white/5 shadow-2xl">
                <h3 class="text-2xl font-bold mb-6 italic">Tu reseña en <span class="text-red-600">MovieM</span></h3>
                <div id="starRating" class="flex gap-2 mb-6 text-zinc-700">
                    <span onclick="setRating(1)" class="star text-4xl">★</span>
                    <span onclick="setRating(2)" class="star text-4xl">★</span>
                    <span onclick="setRating(3)" class="star text-4xl">★</span>
                    <span onclick="setRating(4)" class="star text-4xl">★</span>
                    <span onclick="setRating(5)" class="star text-4xl">★</span>
                </div>
                <textarea id="comentarioTxt" placeholder="¿Qué te pareció la película?" class="w-full bg-zinc-800/50 border-none p-5 rounded-2xl text-white mb-6 h-36 outline-none focus:ring-1 focus:ring-red-600 transition-all"></textarea>
                <button id="btnPublicar" onclick="publicarComentario()" class="w-full bg-red-600 py-4 rounded-2xl font-black hover:bg-red-700 transition tracking-widest uppercase">PUBLICAR COMENTARIO</button>
            </div>

            <div>
                <h3 class="text-2xl font-bold mb-8 flex items-center gap-3">Opiniones <span class="text-[10px] bg-zinc-800 px-2 py-1 rounded text-zinc-500 uppercase tracking-wider">GLOBAL</span></h3>
                <div id="listaComentarios" class="space-y-4 max-h-[500px] overflow-y-auto no-scrollbar">
                    </div>
            </div>
        </section>
    </main>

    <script>
        // --- TUS LLAVES CONFIGURADAS ---
        const SB_URL = "https://jrrccbqfvpexvysj79o1.supabase.co"; 
        const SB_KEY = "sb_publishable_jR_RCCBQFvpEXvYsj79O1A_tQnMhyyJ"; // Clave pública
        
        const TMDB_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';
        const urlParams = new URLSearchParams(window.location.search);
        const movieID = urlParams.get('id');
        let currentRating = 0;

        // Cargar datos de la película
        async function init() {
            if(!movieID) return;
            try {
                const res = await fetch(`https://api.themoviedb.org/3/movie/${movieID}?api_key=${TMDB_KEY}&language=es-ES`);
                const data = await res.json();
                
                document.getElementById('titulo').innerText = data.title;
                document.getElementById('sinopsis').innerText = data.overview || "Sin descripción.";
                document.getElementById('anio').innerText = data.release_date?.split('-')[0] || "S/F";
                document.getElementById('voto').innerText = data.vote_average.toFixed(1);
                document.getElementById('poster').src = `https://image.tmdb.org/t/p/w500${data.poster_path}`;
                document.getElementById('backdrop').style.backgroundImage = `url('https://image.tmdb.org/t/p/original${data.backdrop_path}')`;
                
                cargarComentarios();
            } catch (e) { console.error(e); }
        }

        // Cargar desde Supabase
        async function cargarComentarios() {
            const container = document.getElementById('listaComentarios');
            try {
                const res = await fetch(`${SB_URL}/rest/v1/comentarios?movie_id=eq.${movieID}&order=created_at.desc`, {
                    headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
                });
                const datos = await res.json();

                if (!datos || datos.length === 0) {
                    container.innerHTML = `<p class="text-zinc-600 italic">No hay comentarios aún.</p>`;
                    return;
                }

                container.innerHTML = datos.map(c => `
                    <div class="bg-zinc-900/50 p-6 rounded-2xl border border-white/5 mb-4 fade-in">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-red-600 font-bold text-xs uppercase">${c.usuario}</span>
                            <span class="text-yellow-500 text-xs">${"★".repeat(c.rating)}</span>
                        </div>
                        <p class="text-zinc-400 text-sm">${c.comentario}</p>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        // Guardar en Supabase
        async function publicarComentario() {
            const txt = document.getElementById('comentarioTxt').value.trim();
            const btn = document.getElementById('btnPublicar');
            
            if(!txt || currentRating === 0) return alert("Elige estrellas y escribe algo.");

            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            try {
                const res = await fetch(`${SB_URL}/rest/v1/comentarios`, {
                    method: "POST",
                    headers: { 
                        "apikey": SB_KEY, 
                        "Authorization": `Bearer ${SB_KEY}`,
                        "Content-Type": "application/json",
                        "Prefer": "return=minimal"
                    },
                    body: JSON.stringify({
                        movie_id: movieID,
                        usuario: "INVITADO",
                        comentario: txt,
                        rating: currentRating
                    })
                });

                if (res.ok) {
                    document.getElementById('comentarioTxt').value = "";
                    setRating(0);
                    cargarComentarios();
                } else {
                    alert("Error. ¿Creaste la tabla en Supabase?");
                }
            } catch (e) { alert("Error de conexión."); }
            finally {
                btn.disabled = false;
                btn.innerText = "PUBLICAR COMENTARIO";
            }
        }

        window.setRating = (n) => {
            currentRating = n;
            document.querySelectorAll('.star').forEach((s, i) => {
                s.style.color = i < n ? '#eab308' : '#3f3f46';
            });
        };

        window.verPelicula = () => {
            document.getElementById('movieFrame').src = `https://vidsrc.cc/v3/embed/movie/${movieID}?auto_lang=es`;
            document.getElementById('playerOverlay').style.display = 'flex';
            document.body.style.overflow = "hidden";
        };

        window.cerrarPelicula = () => {
            document.getElementById('playerOverlay').style.display = 'none';
            document.getElementById('movieFrame').src = "";
            document.body.style.overflow = "auto";
        };

        init();
    </script>
</body>
</html>

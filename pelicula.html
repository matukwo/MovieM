<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieM | Detalle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .star { cursor: pointer; transition: color 0.2s ease; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .skeleton { animation: pulse 1.5s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.8; } }
        #playerOverlay { display: none; background: #000; position: fixed; inset: 0; z-index: 200; flex-direction: column; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans pt-24">

    <div id="playerOverlay">
        <div class="w-full flex justify-between items-center p-4 bg-zinc-900">
            <span class="text-red-600 font-bold">MOVIE<span class="text-white">M</span></span>
            <button onclick="cerrarPelicula()" class="text-white bg-white/10 px-4 py-2 rounded-full text-xs">CERRAR ✕</button>
        </div>
        <iframe id="movieFrame" class="w-full h-full" allowfullscreen></iframe>
    </div>

    <div id="backdrop" class="fixed inset-0 opacity-20 blur-md -z-10 bg-cover bg-center transition-all duration-700"></div>

    <main class="container mx-auto px-6">
        <div class="flex flex-col md:flex-row gap-10 mb-16">
            <div class="w-full md:w-72 shrink-0">
                <img id="poster" src="" class="w-full rounded-2xl shadow-2xl border border-white/10 hidden" onload="this.classList.remove('hidden')">
                <div id="posterSkeleton" class="w-full aspect-[2/3] bg-zinc-800 rounded-2xl skeleton"></div>
            </div>
            <div class="flex-1">
                <h1 id="titulo" class="text-5xl font-black mb-4 uppercase italic tracking-tighter"></h1>
                <div class="flex items-center gap-4 mb-6">
                    <span id="anio" class="text-zinc-400 font-bold"></span>
                    <span class="text-yellow-500">⭐ <span id="voto"></span></span>
                </div>
                <p id="sinopsis" class="text-zinc-400 text-lg max-w-2xl mb-8"></p>
                <button onclick="verPelicula()" class="bg-red-600 hover:bg-red-700 text-white px-8 py-4 rounded-full font-bold transition transform active:scale-95">VER PELÍCULA</button>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-12 pb-20 border-t border-white/5 pt-12">
            <div class="bg-zinc-900/50 p-8 rounded-3xl border border-white/5">
                <h2 class="text-xl font-bold mb-6 italic">Tu reseña en <span class="text-red-600">MovieM</span></h2>
                <div id="starRating" class="flex gap-2 mb-6 text-zinc-700">
                    <span onclick="setRating(1)" class="star text-3xl">★</span>
                    <span onclick="setRating(2)" class="star text-3xl">★</span>
                    <span onclick="setRating(3)" class="star text-3xl">★</span>
                    <span onclick="setRating(4)" class="star text-3xl">★</span>
                    <span onclick="setRating(5)" class="star text-3xl">★</span>
                </div>
                <textarea id="comentarioTxt" placeholder="¿Qué te pareció?" class="w-full bg-zinc-800 border-none p-4 rounded-xl text-white mb-4 h-32 outline-none focus:ring-1 focus:ring-red-600"></textarea>
                <button id="btnPublicar" onclick="publicarComentario()" class="w-full bg-red-600 py-3 rounded-xl font-bold hover:bg-red-700 transition uppercase tracking-widest text-sm">Publicar</button>
            </div>

            <div>
                <h2 class="text-xl font-bold mb-8 italic">Comentarios Globales</h2>
                <div id="listaComentarios" class="space-y-4 max-h-[400px] overflow-y-auto no-scrollbar">
                    <p class="text-zinc-600 italic">Cargando opiniones...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- CONFIGURACIÓN ---
        const SB_URL = "https://jrrccbqfvpexvysj79o1.supabase.co"; 
        const SB_KEY = "sb_publishable_jR_RCCBQFvpEXvYsj79O1A_tQnMhyyJ";
        const TMDB_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';
        
        const params = new URLSearchParams(window.location.search);
        const movieID = params.get('id');
        let currentRating = 0;

        // Iniciar página
        async function init() {
            if(!movieID) return;
            // Datos película
            const res = await fetch(`https://api.themoviedb.org/3/movie/${movieID}?api_key=${TMDB_KEY}&language=es-ES`);
            const data = await res.json();
            document.getElementById('titulo').innerText = data.title;
            document.getElementById('sinopsis').innerText = data.overview;
            document.getElementById('anio').innerText = data.release_date.split('-')[0];
            document.getElementById('voto').innerText = data.vote_average.toFixed(1);
            document.getElementById('poster').src = `https://image.tmdb.org/t/p/w500${data.poster_path}`;
            document.getElementById('backdrop').style.backgroundImage = `url('https://image.tmdb.org/t/p/original${data.backdrop_path}')`;
            document.getElementById('posterSkeleton').remove();
            
            cargarComentarios();
        }

        // Leer de Supabase
        async function cargarComentarios() {
            const res = await fetch(`${SB_URL}/rest/v1/comentarios?movie_id=eq.${movieID}&order=created_at.desc`, {
                headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
            });
            const datos = await res.json();
            const list = document.getElementById('listaComentarios');
            
            if(!datos || datos.length === 0) {
                list.innerHTML = '<p class="text-zinc-600 italic text-sm">Sé el primero en comentar esta película.</p>';
                return;
            }

            list.innerHTML = datos.map(c => `
                <div class="bg-zinc-900/30 p-5 rounded-2xl border border-white/5">
                    <div class="flex justify-between mb-2">
                        <span class="text-red-500 font-bold text-xs uppercase">${c.usuario}</span>
                        <span class="text-yellow-500 text-[10px]">${"★".repeat(c.rating)}</span>
                    </div>
                    <p class="text-zinc-400 text-sm leading-relaxed">${c.comentario}</p>
                </div>
            `).join('');
        }

        // Guardar en Supabase
        async function publicarComentario() {
            const txt = document.getElementById('comentarioTxt').value.trim();
            if(!txt || currentRating === 0) return alert("Selecciona estrellas y escribe un mensaje.");

            const btn = document.getElementById('btnPublicar');
            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            try {
                const res = await fetch(`${SB_URL}/rest/v1/comentarios`, {
                    method: "POST",
                    headers: { 
                        "apikey": SB_KEY, 
                        "Authorization": `Bearer ${SB_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        movie_id: movieID,
                        usuario: "INVITADO",
                        comentario: txt,
                        rating: currentRating
                    })
                });

                if(res.ok) {
                    document.getElementById('comentarioTxt').value = "";
                    setRating(0);
                    cargarComentarios();
                } else {
                    alert("Error: Revisa si creaste la tabla 'comentarios' en Supabase.");
                }
            } catch (e) {
                alert("Error de conexión.");
            } finally {
                btn.disabled = false;
                btn.innerText = "PUBLICAR";
            }
        }

        // UI Helpers
        window.setRating = (n) => {
            currentRating = n;
            document.querySelectorAll('.star').forEach((s, i) => s.style.color = i < n ? '#eab308' : '#3f3f46');
        };

        window.verPelicula = () => {
            document.getElementById('movieFrame').src = `https://vidsrc.cc/v3/embed/movie/${movieID}?auto_lang=es`;
            document.getElementById('playerOverlay').style.display = 'flex';
        };

        window.cerrarPelicula = () => {
            document.getElementById('playerOverlay').style.display = 'none';
            document.getElementById('movieFrame').src = "";
        };

        init();
    </script>
</body>
</html>

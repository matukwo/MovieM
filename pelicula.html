<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieM | Pelicula</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="firebase-config.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
        #playerOverlay{display:none;background:#000;position:fixed;inset:0;z-index:200;flex-direction:column}
        .skeleton{animation:pulse-bg 1.5s infinite ease-in-out}@keyframes pulse-bg{0%{background-color:#18181b}50%{background-color:#27272a}100%{background-color:#18181b}}
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans overflow-x-hidden">

<div id="playerOverlay">
    <div class="w-full flex justify-between items-center px-4 py-3 bg-zinc-950 border-b border-white/5">
        <span class="text-red-600 font-black tracking-tighter text-xl">MOVIE<span class="text-white font-light">M</span></span>
        <div class="flex gap-2">
            <button id="btnFuenteSub" onclick="cambiarFuente('sub')" class="text-[10px] font-black uppercase px-3 py-1.5 rounded-full border bg-white/10 border-white/20 text-white">Subtitulado</button>
            <button id="btnFuenteLat" onclick="cambiarFuente('latino')" class="hidden text-[10px] font-black uppercase px-3 py-1.5 rounded-full border border-white/10 text-white/40">Latino</button>
        </div>
        <button onclick="cerrarPelicula()" class="text-white/60 font-black uppercase text-[10px] tracking-widest bg-white/5 px-4 py-2 rounded-full border border-white/5">Cerrar x</button>
    </div>
    <div class="flex-1 bg-black">
        <iframe id="movieFrame" src="" class="w-full h-full" allowfullscreen></iframe>
    </div>
</div>

<div id="backdrop" class="fixed inset-0 w-full h-full bg-cover bg-center opacity-30 blur-sm -z-10 transition-all duration-700"></div>
<div class="fixed inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/80 to-transparent -z-10"></div>

<button onclick="location.href='index.html'" class="fixed top-8 left-8 bg-black/50 p-3 rounded-full hover:bg-red-600 transition z-50 border border-white/10">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
</button>

<main class="px-4 md:px-8 pt-24 pb-8">
    <div class="flex flex-col md:flex-row gap-12 items-start">
        <div class="w-full md:w-80 shrink-0">
            <div id="posterSkeleton" class="w-full aspect-[2/3] rounded-2xl skeleton"></div>
            <img id="poster" src="" class="w-full rounded-2xl border border-white/10 shadow-2xl hidden" onload="this.classList.remove('hidden');document.getElementById('posterSkeleton').remove()">
            
            <div id="progresoWrap" class="hidden mt-4">
                <div class="flex justify-between mb-1">
                    <span class="text-[9px] font-black uppercase text-zinc-500 tracking-widest">Tu Progreso</span>
                    <span id="progresoNum" class="text-[9px] font-black text-red-600">0%</span>
                </div>
                <div class="w-full h-1.5 bg-zinc-800 rounded-full overflow-hidden">
                    <div id="progresoBar" class="h-full bg-red-600 transition-all duration-500" style="width:0%"></div>
                </div>
            </div>
        </div>

        <div class="flex-1">
            <h1 id="titulo" class="text-5xl md:text-7xl font-black mb-4 italic tracking-tighter uppercase leading-none">Cargando...</h1>
            <div class="flex items-center gap-4 mb-6 font-bold">
                <span id="anio" class="bg-zinc-800 px-3 py-1 rounded text-white text-sm"></span>
                <span class="text-yellow-500 text-lg">&#11088; <span id="voto">0.0</span></span>
            </div>
            <p id="sinopsis" class="text-lg text-zinc-400 max-w-2xl leading-relaxed mb-10"></p>
            <button onclick="verPelicula()" class="bg-red-600 text-white px-10 py-4 rounded-full font-black hover:bg-red-700 transition transform active:scale-95 uppercase tracking-tighter">
                Ver Película
            </button>
        </div>
    </div>
</main>

<script type="module">
    const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';
    const urlParams = new URLSearchParams(window.location.search);
    const movieID = urlParams.get('id');
    let miUID_pelicula = null;
    let _progresoBase = 0; 
    let progresoInicioSesion = null;
    let progresoTimer = null;
    let _latinoUrl = null;
    let duracionPeliculaMin = 120; // Valor por defecto por si falla la API

    window.onAuthStateChanged(window.auth, (user) => {
        if (user) {
            miUID_pelicula = user.uid;
            leerProgreso().then(pct => {
                _progresoBase = parseFloat(pct) || 0;
                actualizarBarraProgreso(_progresoBase);
            });
        }
    });

    async function cargarPagina() {
        try {
            const res = await fetch(`https://api.themoviedb.org/3/movie/${movieID}?api_key=${API_KEY}&language=es-MX`);
            const peli = await res.json();
            document.getElementById('titulo').innerText = peli.title;
            document.getElementById('sinopsis').innerText = peli.overview;
            document.getElementById('anio').innerText = (peli.release_date || "2024").split('-')[0];
            document.getElementById('voto').innerText = (peli.vote_average || 0).toFixed(1);
            document.getElementById('poster').src = 'https://image.tmdb.org/t/p/w500' + peli.poster_path;
            document.getElementById('backdrop').style.backgroundImage = `url('https://image.tmdb.org/t/p/original${peli.backdrop_path}')`;
            
            // Guardamos la duración real si existe
            if(peli.runtime && peli.runtime > 0) duracionPeliculaMin = peli.runtime;

            const snap = await window.getDoc(window.doc(window.db, 'latinoLinks', String(movieID)));
            if (snap.exists()) {
                _latinoUrl = snap.data().url;
                document.getElementById('btnFuenteLat').classList.remove('hidden');
            }
        } catch(e) { console.error("Error cargando página:", e); }
    }

    async function guardarProgreso(porcentaje) {
        if (!miUID_pelicula) return;
        
        // Validación para evitar NaN
        let pctFinal = parseFloat(porcentaje);
        if (isNaN(pctFinal)) return;
        
        pctFinal = Math.min(100, Math.max(0, Math.round(pctFinal)));
        
        actualizarBarraProgreso(pctFinal);

        try {
            const ref = window.doc(window.db, 'usuarios', miUID_pelicula, 'continuar', 'pelicula_' + movieID);
            await window.setDoc(ref, {
                contentId: String(movieID),
                porcentaje: pctFinal,
                titulo: document.getElementById('titulo').innerText,
                poster: document.getElementById('poster').src,
                updatedAt: window.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error("Error al guardar:", e); }
    }

    async function leerProgreso() {
        if (!miUID_pelicula) return 0;
        try {
            const ref = window.doc(window.db, 'usuarios', miUID_pelicula, 'continuar', 'pelicula_' + movieID);
            const snap = await window.getDoc(ref);
            return (snap.exists()) ? (snap.data().porcentaje || 0) : 0;
        } catch(e) { return 0; }
    }

    function actualizarBarraProgreso(pct) {
        const bar = document.getElementById('progresoBar');
        const wrap = document.getElementById('progresoWrap');
        const num = document.getElementById('progresoNum');
        if (pct > 1) {
            wrap.classList.remove('hidden');
            bar.style.width = pct + '%';
            num.innerText = pct + '%';
        }
    }

    window.cambiarFuente = function(fuente) {
        const frame = document.getElementById('movieFrame');
        frame.src = (fuente === 'sub') 
            ? `https://vidsrc.cc/v3/embed/movie/${movieID}?auto_lang=es` 
            : _latinoUrl;
    }

    window.verPelicula = () => {
        document.getElementById('playerOverlay').style.display = 'flex';
        document.getElementById('movieFrame').src = `https://vidsrc.cc/v3/embed/movie/${movieID}?auto_lang=es`;
        progresoInicioSesion = Date.now();
        
        // Cada 15 segundos calculamos el progreso acumulado
        progresoTimer = setInterval(() => {
            const msVistos = Date.now() - progresoInicioSesion;
            const duracionMs = duracionPeliculaMin * 60 * 1000;
            const incrementoPct = (msVistos / duracionMs) * 100;
            guardarProgreso(_progresoBase + incrementoPct);
        }, 15000);
    }

    window.cerrarPelicula = async () => {
        clearInterval(progresoTimer);
        if (progresoInicioSesion) {
            const msVistos = Date.now() - progresoInicioSesion;
            const duracionMs = duracionPeliculaMin * 60 * 1000;
            const incrementoPct = (msVistos / duracionMs) * 100;
            await guardarProgreso(_progresoBase + incrementoPct);
        }
        location.reload(); 
    }

    cargarPagina();
</script>
</body>
</html>

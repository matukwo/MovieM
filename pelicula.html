<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieM | Pelicula</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="firebase-config.js"></script>
    <style>
        .star{cursor:pointer;transition:color .2s ease}
        #starRating:hover .star{color:#ca8a04}
        #starRating .star:hover~.star{color:#3f3f46!important}
        .no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
        .glass-card{background:rgba(255,255,255,.04);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);box-shadow:0 30px 60px -15px rgba(0,0,0,.8)}
        @keyframes pulse-bg{0%{background-color:rgba(39,39,42,.5)}50%{background-color:rgba(63,63,70,.5)}100%{background-color:rgba(39,39,42,.5)}}
        .skeleton{animation:pulse-bg 1.5s infinite ease-in-out}
        .fade-in{animation:fadeIn .8s ease forwards;opacity:0}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        #playerOverlay{display:none;background:#000;position:fixed;inset:0;z-index:200;flex-direction:column}
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans overflow-x-hidden">

<!-- Player overlay -->
<div id="playerOverlay">
    <div class="w-full flex justify-between items-center p-3 md:p-4 bg-zinc-950 border-b border-white/5">
        <span class="text-red-600 font-black tracking-tighter text-lg md:text-xl">MOVIE<span class="text-white font-light">M</span></span>
        <button onclick="cerrarPelicula()" class="text-white/60 font-black uppercase text-[10px] tracking-widest bg-white/5 px-4 py-2 rounded-full border border-white/5">Cerrar x</button>
    </div>
    <div class="flex-1 bg-black">
        <iframe id="movieFrame" src="" class="w-full h-full" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
</div>

<!-- Backdrop -->
<div id="backdrop" class="fixed inset-0 w-full h-full bg-cover bg-center opacity-20 md:opacity-30 blur-sm -z-10 transition-all duration-700"></div>
<div class="fixed inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/80 to-transparent -z-10"></div>

<!-- Botón volver -->
<button onclick="location.href='index.html'" class="fixed top-4 left-4 md:top-8 md:left-8 bg-black/50 p-2.5 md:p-3 rounded-full hover:bg-red-600 transition z-50 border border-white/10 shadow-2xl">
    <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
</button>

<!-- HUD usuario -->
<div id="userHUD" class="fixed top-4 right-4 md:top-8 md:right-8 z-50 hidden items-center gap-3 bg-black/40 backdrop-blur-md p-1.5 pr-4 rounded-full border border-white/10 shadow-2xl">
    <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-red-600 flex items-center justify-center font-black text-white border-2 border-white/20 text-sm" id="userInitial">?</div>
    <span id="userNameHUD" class="text-xs font-bold uppercase tracking-widest hidden md:inline">Usuario</span>
</div>

<main class="px-4 md:px-8 pt-16 md:pt-20 pb-8">

    <!-- Info principal -->

        <!-- Poster: pequeño y a la izquierda en mobile -->
        <div class="flex gap-4 md:block w-full md:w-80 md:shrink-0">

                    </div>
                    <div class="w-full h-1.5 bg-zinc-800 rounded-full overflow-hidden">
                        <div id="progresoBar" class="h-full bg-red-600 rounded-full transition-all duration-500" style="width:0%"></div>

            </div>

            <div class="flex flex-wrap items-center gap-4">
                <button onclick="verPelicula()" class="bg-red-600 text-white px-8 py-4 rounded-full font-black flex items-center gap-3 hover:bg-red-700 transition-all shadow-xl shadow-red-600/20 active:scale-95 tracking-tight uppercase">
                    <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> VER PELICULA
                </button>
                <button onclick="abrirTrailer()" class="bg-white text-black px-8 py-4 rounded-full font-black flex items-center gap-3 hover:bg-red-600 hover:text-white transition-all shadow-xl active:scale-95">
                    <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M10 15l5.19-3L10 9v6zM21 12c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9 9-4.03 9-9zm-16.1 0c0-3.92 3.18-7.1 7.1-7.1s7.1 3.18 7.1 7.1-3.18 7.1-7.1 7.1-7.1-3.18-7.1-7.1z"/></svg> VER TRAILER
                </button>
                <button id="btnWatchlistDesktop" onclick="toggleWatchlist()" class="w-14 h-14 rounded-full bg-zinc-900 border border-white/5 flex items-center justify-center text-zinc-400 hover:text-white transition active:scale-95" title="Guardar en Mi Lista">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
                </button>
                <button id="btnLikeDesktop" onclick="toggleLike()" class="w-14 h-14 rounded-full bg-zinc-900 border border-white/5 flex items-center justify-center text-zinc-400 hover:text-white transition active:scale-95" title="Me gusta">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78v0z"/></svg>
                </button>
                <button onclick="abrirModalListas()" class="w-14 h-14 rounded-full bg-zinc-900 border border-white/5 flex items-center justify-center text-zinc-400 hover:text-white transition active:scale-95" title="Mis Listas">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h10"/></svg>
                </button>
                <button onclick="compartirContenido()" class="w-14 h-14 rounded-full bg-zinc-900 border border-white/5 flex items-center justify-center text-zinc-400 hover:text-white transition active:scale-95" title="Compartir">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
                </button>

    <!-- Sinopsis mobile (abajo del poster) -->
    <div class="md:hidden mb-8 fade-in">
        <div id="sinopsisSkeleton" class="space-y-2 mb-4">
            <div class="h-3 w-full skeleton rounded"></div>
            <div class="h-3 w-5/6 skeleton rounded"></div>
            <div class="h-3 w-2/3 skeleton rounded"></div>
        </div>
        <p id="sinopsisMobile" class="text-sm text-zinc-400 leading-relaxed hidden"></p>
    </div>

    <!-- Reparto -->
    <section class="mb-12 md:mb-20 fade-in group/reparto" style="animation-delay:.2s">
        <h3 class="text-xs md:text-sm font-black uppercase tracking-widest mb-4 md:mb-8 text-zinc-400 flex items-center gap-3">
            Reparto Principal <div class="h-px flex-1 bg-zinc-800/50"></div>
        </h3>
        <div class="relative">
            <button onclick="document.getElementById('reparto').scrollBy({left:-320,behavior:'smooth'})" class="row-arrow left">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <div id="reparto" class="flex gap-5 md:gap-8 overflow-x-auto no-scrollbar pb-4 scroll-smooth px-2">
                <div class="min-w-[80px] skeleton h-20 rounded-full"></div>
            </div>
            <button onclick="document.getElementById('reparto').scrollBy({left:320,behavior:'smooth'})" class="row-arrow right">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"/></svg>
            </button>
        </div>
    </section>

    <!-- Películas Similares -->
    <section class="mb-10 md:mb-14 fade-in" style="animation-delay:.35s">
        <h2 class="text-lg md:text-2xl font-black italic uppercase tracking-tighter mb-4 flex items-center gap-3">
            <span class="w-1 h-6 bg-red-600 rounded-full inline-block"></span>

                <div class="min-w-[75px] md:min-w-[100px] skeleton rounded-xl aspect-[2/3]"></div>

                <div class="min-w-[75px] md:min-w-[100px] skeleton rounded-xl aspect-[2/3]"></div>
                <div class="min-w-[75px] md:min-w-[100px] skeleton rounded-xl aspect-[2/3]"></div>
                <div class="min-w-[75px] md:min-w-[100px] skeleton rounded-xl aspect-[2/3]"></div>

    <!-- Comentarios + Resena -->
    <section class="border-t border-white/5 pt-8 md:pt-12 grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-16 mb-16 fade-in" style="animation-delay:.4s">

            <h3 class="text-lg md:text-2xl font-bold mb-5 italic">Tu resena en <span class="text-red-600">MovieM</span></h3>
            <div id="starRating" class="flex gap-2 mb-5 text-zinc-700">

                <span onclick="setRating(2)" class="star text-3xl md:text-4xl">&#9733;</span>
                <span onclick="setRating(3)" class="star text-3xl md:text-4xl">&#9733;</span>

                    <button id="sortBtn_populares" onclick="setSortMode('populares')" class="text-[9px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full text-zinc-400 transition-all">Populares</button>

</main>

<!-- Modal Actor -->
<div id="modalActor" class="fixed inset-0 z-[110] hidden flex items-end md:items-center justify-center p-0 md:p-6">
    <div class="absolute inset-0 bg-black/70 backdrop-blur-md" onclick="cerrarActor()"></div>
    <div class="relative glass-card px-5 py-6 md:px-10 md:py-10 rounded-t-3xl md:rounded-[45px] w-full max-w-4xl max-h-[90vh] overflow-y-auto no-scrollbar shadow-2xl">

<!-- Modal Trailer -->

    <div id="videoContainer" class="w-full max-w-5xl aspect-video rounded-xl md:rounded-3xl overflow-hidden shadow-2xl"></div>
</div>

<script type="module">
        const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';
        const urlParams = new URLSearchParams(window.location.search);
        const movieID = urlParams.get('id');
        let currentRating = 0;
        let _tituloActual = '';
        let _posterActual = '';
        let _sortMode = 'reciente';
        let _allDocs = [];
        let _listaIdActiva = null;
        let _likeEnVuelo = false;

        const ADMIN_UID = '41XWZR8OzwdpMHf54UIQEzAEt7s1';
        const VERIFIED_USERS = [];
        let miUID_pelicula = null;

        // ── ACCENT COLOR ─────────────────────────────────────────
        var _c = localStorage.getItem('movieM_color');
        if(_c) document.documentElement.style.setProperty('--accent-color',_c);

        // ── TOAST ─────────────────────────────────────────────────
        function toast(msg, ok=true) {
            const t = document.getElementById('toastMsg');
            const el = document.createElement('div');
            el.className = `bg-zinc-900 border ${ok?'border-green-500/40':'border-red-500/40'} text-white text-xs font-black uppercase tracking-widest px-5 py-3 rounded-2xl shadow-2xl transition-all duration-300 opacity-0`;
            el.innerText = msg;
            t.appendChild(el);
            requestAnimationFrame(() => { el.style.opacity = '1'; });

        function renderComentarios() {
            const contenedor = document.getElementById('listaComentarios');
            if (!_allDocs.length) {
                contenedor.innerHTML = '<p class="text-zinc-600 text-sm italic">Nadie ha comentado aún. ¡Sé el primero!</p>';
                return;
            }
            let sorted = [..._allDocs];
            if (_sortMode === 'populares') {
                sorted.sort((a,b) => totalLikes(b.data.reacciones) - totalLikes(a.data.reacciones));
            }
            contenedor.innerHTML = '';
            sorted.forEach(item => {
                const c = item.data, docId = item.id, uid = item.uid;
                const fecha = c.fecha ? new Date(c.fecha).toLocaleString() : 'Reciente';
                const badge = getBadge(uid);
                const esAdmin = miUID_pelicula === ADMIN_UID;
                const likes = (c.reacciones && c.reacciones['like']) || 0;
                const misR = c.misReacciones || {};
                const yaDioLike = miUID_pelicula ? !!misR[miUID_pelicula] : false;

                const div = document.createElement('div');
                div.className = 'bg-zinc-900/50 p-4 rounded-2xl border border-white/5 shadow-xl fade-in group/comment';
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-2 gap-2">
                        <div class="flex flex-col gap-0.5 min-w-0">
                            <span class="text-red-600 font-black text-xs uppercase tracking-widest leading-none flex items-center gap-1">
                                <a href="perfil.html?user=${encodeURIComponent(c.user)}" class="hover:underline">${c.user}</a>${badge}
                            </span>
                            <span class="text-[9px] text-zinc-600 font-bold uppercase tracking-tighter">${fecha}</span>
                        </div>
                        <div class="flex items-center gap-2 shrink-0">
                            <span class="text-yellow-500 text-[10px] tracking-widest">${'★'.repeat(c.rating||0)}</span>
                            ${esAdmin ? `<button onclick="borrarComentarioPelicula('${docId}')" class="opacity-0 group-hover/comment:opacity-100 transition-opacity w-6 h-6 rounded-full bg-red-900/60 hover:bg-red-600 flex items-center justify-center">
                                <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>` : ''}
                        </div>
                    </div>
                    <p class="text-zinc-400 text-sm leading-relaxed font-medium mb-3">${c.txt}</p>
                    <button id="like-btn-${docId}"
                        data-liked="${yaDioLike ? '1' : '0'}"
                        data-likes="${likes}"
                        onclick="reaccionar('${docId}')"
                        class="flex items-center gap-1.5 px-3 py-1.5 rounded-full border text-xs transition-all active:scale-95 select-none
                        ${yaDioLike ? 'bg-red-600/20 border-red-500/50 text-red-400' : 'bg-zinc-800/60 border-white/5 text-zinc-400 hover:border-white/20 hover:text-white'}">
                        <svg class="w-3.5 h-3.5 ${yaDioLike ? 'fill-red-400' : 'fill-none'}" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
                        </svg>
                        ${likes > 0 ? `<span class="like-cnt font-black tabular-nums">${likes}</span>` : '<span class="like-cnt font-black tabular-nums" style="display:none"></span>'}
                    </button>`;
                contenedor.appendChild(div);
            });
        }

        window.reaccionar = async function(docId) {
            if (!miUID_pelicula) { toast('Iniciá sesión para reaccionar', false); return; }

            const btn = document.getElementById('like-btn-' + docId);
            if (!btn || btn.dataset.loading) return;
            btn.dataset.loading = '1';

            const yaLiked = btn.dataset.liked === '1';
            const cntEl = btn.querySelector('.like-cnt');
            const svgPath = btn.querySelector('svg');
            const likesActuales = parseInt(btn.dataset.likes || '0', 10);
            const newLikes = yaLiked ? Math.max(0, likesActuales - 1) : likesActuales + 1;

            // Actualizar DOM directo, igual que toggleLike de película
            if (yaLiked) {
                btn.dataset.liked = '0';
                btn.dataset.likes = newLikes;
                btn.className = 'flex items-center gap-1.5 px-3 py-1.5 rounded-full border text-xs transition-all active:scale-95 select-none bg-zinc-800/60 border-white/5 text-zinc-400 hover:border-white/20 hover:text-white';
                svgPath.setAttribute('class', 'w-3.5 h-3.5 fill-none');
            } else {
                btn.dataset.liked = '1';
                btn.dataset.likes = newLikes;
                btn.className = 'flex items-center gap-1.5 px-3 py-1.5 rounded-full border text-xs transition-all active:scale-95 select-none bg-red-600/20 border-red-500/50 text-red-400';
                svgPath.setAttribute('class', 'w-3.5 h-3.5 fill-red-400');
            }
            if (cntEl) {
                cntEl.innerText = newLikes > 0 ? newLikes : '';
                cntEl.style.display = newLikes > 0 ? '' : 'none';
            } else if (newLikes > 0) {
                const span = document.createElement('span');
                span.className = 'like-cnt font-black tabular-nums';
                span.innerText = newLikes;
                btn.appendChild(span);
            }

            _likeEnVuelo = true;
            try {
                const ref = window.doc(window.db, 'comentarios', docId);
                const updates = {};
                updates['reacciones.like'] = yaLiked ? window.increment(-1) : window.increment(1);
                updates[`misReacciones.${miUID_pelicula}`] = yaLiked ? window.deleteField() : true;
                await window.updateDoc(ref, updates);
            } catch(e) {
                // Revertir si falla
                btn.dataset.liked = yaLiked ? '1' : '0';
                btn.dataset.likes = likesActuales;
                if (cntEl) cntEl.innerText = likesActuales > 0 ? likesActuales : '';
                console.error(e);
            } finally {
                delete btn.dataset.loading;
                // Liberar flag después de que el snapshot local haya pasado
                setTimeout(() => { _likeEnVuelo = false; }, 2000);
            }
        };

            return '';

        function escucharComentariosNube() {
            const q = window.query(
                window.collection(window.db, 'comentarios'),
                window.where('movieID', '==', movieID),
                window.orderBy('fecha', 'desc')
            );
            window.onSnapshot(q, async snapshot => {
                const usernames = [...new Set(snapshot.docs.map(d => d.data().user))];
                const uidMap = {};
                if (usernames.length) {
                    try {
                        const us = await window.getDocs(window.query(window.collection(window.db,'usuarios'), window.where('username','in',usernames.slice(0,10))));
                        us.forEach(d => { uidMap[d.data().username] = d.id; });
                    } catch(e) {}
                }
                _allDocs = snapshot.docs.map(d => ({ id: d.id, data: d.data(), uid: uidMap[d.data().user]||'' }));
                // No renderizar si hay un like en vuelo (el DOM ya está actualizado)
                if (!_likeEnVuelo) renderComentarios();
            });
        }

        async function renderListas() {
            const cont = document.getElementById('listaListasModal');

                const [snap1, snap2] = await Promise.all([
                    window.getDocs(window.query(window.collection(window.db,'listas'), window.where('ownerUID','==',miUID_pelicula))),

                ]);

            const nombre = document.getElementById('inputNuevaLista').value.trim();
            if (!nombre) return;
            try {
                await window.addDoc(window.collection(window.db,'listas'), {
                    nombre, ownerUID: miUID_pelicula, items: [], colaboradores: [], fecha: Date.now()
                });
                document.getElementById('inputNuevaLista').value = '';
                toast('¡Lista creada!');
                await renderListas();
            } catch(e) { toast('Error al crear', false); }
        };

        window.toggleItemLista = async function(listaId, enLista) {
            try {
                const ref = window.doc(window.db,'listas',listaId);
                const snap = await window.getDoc(ref);
                if (!snap.exists()) return;
                let items = [...(snap.data().items||[])];
                if (enLista) {
                    items = items.filter(it => !(it.id===movieID && it.tipo==='pelicula'));
                } else {
                    items.push({ id: movieID, tipo: 'pelicula', titulo: _tituloActual, poster: _posterActual, fecha: Date.now() });
                }
                await window.setDoc(ref, {items}, {merge:true});
                toast(enLista ? 'Quitado de la lista' : '¡Agregado!');
                await renderListas();
            } catch(e) { toast('Error', false); }
        };

        // ── CARGAR PÁGINA ─────────────────────────────────────────
        async function cargarPagina() {
            try {
                const [pRes, cRes] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/movie/${movieID}?api_key=${API_KEY}&language=es-ES`),
                    fetch(`https://api.themoviedb.org/3/movie/${movieID}/credits?api_key=${API_KEY}&language=es-ES`)
                ]);
                const peli = await pRes.json();
                const credits = await cRes.json();

                _tituloActual = peli.title || '';
                _posterActual = peli.poster_path ? 'https://image.tmdb.org/t/p/w500'+peli.poster_path : '';

                if(document.getElementById('tituloSkeleton')) document.getElementById('tituloSkeleton').remove();
                if(document.getElementById('sinopsisSkeleton')) document.getElementById('sinopsisSkeleton').remove();
                document.getElementById('sinopsis').classList.remove('hidden');

                document.getElementById('titulo').innerText = peli.title;
                var tmob=document.getElementById('tituloMobile');if(tmob)tmob.innerText=peli.title;
                document.getElementById('sinopsis').innerText = peli.overview || 'Sin descripción disponible.';
                document.getElementById('anio').innerText = peli.release_date ? peli.release_date.split('-')[0] : 'S/F';
                document.getElementById('voto').innerText = peli.vote_average.toFixed(1);
                var vm=document.getElementById('votoMobile');if(vm)vm.innerText=peli.vote_average.toFixed(1);
                var am=document.getElementById('anioMobile');if(am)am.innerText=peli.release_date?peli.release_date.split('-')[0]:'S/F';
                var sm=document.getElementById('sinopsisMobile');if(sm){sm.innerText=peli.overview||'Sin descripcion.';sm.classList.remove('hidden');var sk=document.getElementById('sinopsisSkeleton');if(sk)sk.remove();}
                document.getElementById('poster').src = _posterActual;
                document.getElementById('backdrop').style.backgroundImage = `url('https://image.tmdb.org/t/p/original${peli.backdrop_path}')`;
                document.title = `MovieM | ${peli.title}`;

                if(peli.vote_average > 7.4) document.getElementById('badget-premios').classList.remove('hidden');

                const dir = credits.crew.find(c => c.job === 'Director');
                if(dir) { document.getElementById('director').innerText = `Director: ${dir.name}`; var dm=document.getElementById('directorMobile');if(dm)dm.innerText='Dir: '+dir.name; }

                document.getElementById('reparto').innerHTML = credits.cast.slice(0,15).map(actor => `
                    <div onclick="verActor(${actor.id})" class="min-w-[110px] text-center cursor-pointer shrink-0 fade-in">
                        <div class="w-20 h-20 mx-auto mb-4 overflow-hidden rounded-full border border-zinc-800 hover:border-red-600 transition-all transform hover:scale-110 duration-300">
                            <img src="${actor.profile_path ? 'https://image.tmdb.org/t/p/w200'+actor.profile_path : 'https://via.placeholder.com/200'}" class="w-full h-full object-cover">
                        </div>
                        <p class="text-[10px] font-black text-zinc-200 truncate uppercase tracking-tighter px-1">${actor.name}</p>
                        <p class="text-[8px] text-zinc-600 truncate italic px-1">${actor.character}</p>
                    </div>`).join('');

                escucharComentariosNube();
                checkStatus();
                actualizarHUD();
                if (peli.runtime) window._peliculaDuracion = peli.runtime;
                cargarSimilares();
                actualizarBarraProgreso(leerProgreso());
            } catch(error) { console.error(error); }
        }

        // ── SISTEMAS DE INTERACCIÓN ───────────────────────────────
        async function checkStatus() {
            if (!miUID_pelicula) return;
            try {
                const userDoc = await window.getDoc(window.doc(window.db,'usuarios',miUID_pelicula));
                if (!userDoc.exists()) return;
                const data = userDoc.data();
                if ((data.watchlist||[]).includes(movieID)) {
                    ['btnWatchlist','btnWatchlistDesktop'].forEach(id => { const b=document.getElementById(id); if(!b)return; b.classList.add('bg-zinc-100','text-black','border-white'); b.classList.remove('bg-zinc-900','text-zinc-400','border-white/5'); });
                }
                if ((data.likes||[]).includes(movieID)) {
                    ['btnLike','btnLikeDesktop'].forEach(id => { const b=document.getElementById(id); if(!b)return; b.classList.add('bg-red-600','border-red-600','text-white'); b.classList.remove('bg-zinc-900','text-zinc-400','border-white/5'); });
                }
            } catch(e) { console.error(e); }
        }

        window.toggleWatchlist = async () => {
            if (!miUID_pelicula) return alert('Debes iniciar sesión para guardar películas.');
            const btn = document.getElementById('btnWatchlist');
            const isSaved = btn.classList.contains('bg-zinc-100');
            try {
                await window.setDoc(window.doc(window.db,'usuarios',miUID_pelicula), {watchlist: isSaved?window.arrayRemove(movieID):window.arrayUnion(movieID)}, {merge:true});
                ['btnWatchlist','btnWatchlistDesktop'].forEach(id => { const b=document.getElementById(id); if(!b)return; if(!isSaved){b.classList.add('bg-zinc-100','text-black','border-white');b.classList.remove('bg-zinc-900','text-zinc-400','border-white/5');}else{b.classList.remove('bg-zinc-100','text-black','border-white');b.classList.add('bg-zinc-900','text-zinc-400','border-white/5');} });
            } catch(e) { console.error(e); }
        };

        window.toggleLike = async () => {
            if (!miUID_pelicula) return alert('Debes iniciar sesión para dar like.');
            const btn = document.getElementById('btnLike');
            const isLiked = btn.classList.contains('bg-red-600');
            try {
                await window.setDoc(window.doc(window.db,'usuarios',miUID_pelicula), {likes: isLiked?window.arrayRemove(movieID):window.arrayUnion(movieID)}, {merge:true});
                ['btnLike','btnLikeDesktop'].forEach(id => { const b=document.getElementById(id); if(!b)return; if(!isLiked){b.classList.add('bg-red-600','border-red-600','text-white');b.classList.remove('bg-zinc-900','text-zinc-400','border-white/5');}else{b.classList.remove('bg-red-600','border-red-600','text-white');b.classList.add('bg-zinc-900','text-zinc-400','border-white/5');} });
            } catch(e) { console.error(e); }
        };

        // ── MODAL ACTORES & TRAILER ───────────────────────────────
        window.verActor = async (id) => {
            try {
                const [resBio, resPelis] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/person/${id}?api_key=${API_KEY}&language=es-ES`),
                    fetch(`https://api.themoviedb.org/3/person/${id}/movie_credits?api_key=${API_KEY}&language=es-ES`)
                ]);
                const actor = await resBio.json();
                const créditos = await resPelis.json();
                document.getElementById('actorNombre').innerText = actor.name;
                document.getElementById('actorFoto').src = actor.profile_path ? 'https://image.tmdb.org/t/p/w500'+actor.profile_path : 'https://via.placeholder.com/500';
                document.getElementById('actorInfo').innerText = actor.biography || 'Biografía no disponible.';
                const pelisValidas = créditos.cast.filter(p => p.poster_path).sort((a,b) => b.popularity-a.popularity).slice(0,15);
                const isScrollable = pelisValidas.length > 5;
                const contenedorPelis = document.getElementById('actorPelisContenedor');
                const pelisHTML = pelisValidas.map(p => `
                    <div class="w-[85px] group/item cursor-pointer shrink-0" onclick="window.location.href='pelicula.html?id=${p.id}'">
                        <div class="w-[85px] h-[125px] overflow-hidden rounded-xl border border-white/5 group-hover/item:border-red-600 transition-all duration-300 transform group-hover/item:scale-105">
                            <img src="https://image.tmdb.org/t/p/w200${p.poster_path}" class="w-full h-full object-cover">
                        </div>
                        <p class="text-[7px] mt-2 text-zinc-500 truncate w-full text-center uppercase font-bold px-1">${p.title}</p>
                    </div>`).join('');
                contenedorPelis.innerHTML = `
                    ${isScrollable ? `<button onclick="scrollPelis(-300)" class="absolute -left-6 top-[62px] -translate-y-1/2 bg-zinc-900/90 p-2 rounded-full border border-white/10 opacity-0 group-hover:opacity-100 transition-opacity z-20 hover:bg-red-600 text-white shadow-xl"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>` : ''}
                    <div id="listaPelisActor" class="flex gap-4 overflow-x-auto no-scrollbar scroll-smooth pb-4 px-1">${pelisHTML}</div>
                    ${isScrollable ? `<button onclick="scrollPelis(300)" class="absolute -right-6 top-[62px] -translate-y-1/2 bg-zinc-900/90 p-2 rounded-full border border-white/10 opacity-0 group-hover:opacity-100 transition-opacity z-20 hover:bg-red-600 text-white shadow-xl"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>` : ''}`;
                document.getElementById('modalActor').classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            } catch(error) { console.error(error); }
        };

        window.cerrarActor = () => { document.getElementById('modalActor').classList.add('hidden'); document.body.style.overflow = 'auto'; };
        window.scrollPelis = (distancia) => document.getElementById('listaPelisActor').scrollBy({left:distancia,behavior:'smooth'});
        window.scrollReparto = (distancia) => document.getElementById('reparto').scrollBy({left:distancia,behavior:'smooth'});

        window.abrirTrailer = async () => {
            try {
                const res = await fetch(`https://api.themoviedb.org/3/movie/${movieID}/videos?api_key=${API_KEY}`);
                const data = await res.json();
                const tr = data.results.find(v => v.type==='Trailer' && v.site==='YouTube');
                if(tr) {
                    document.getElementById('videoContainer').innerHTML = `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${tr.key}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
                    document.getElementById('modalVideo').classList.remove('hidden');
                    document.body.style.overflow = 'hidden';
                }
            } catch(error) { console.error(error); }
        };

        window.cerrarTrailer = () => {
            document.getElementById('modalVideo').classList.add('hidden');
            document.getElementById('videoContainer').innerHTML = '';
            document.body.style.overflow = 'auto';
        };

        window.setRating = (n) => {
            currentRating = n;
            document.querySelectorAll('.star').forEach((s,i) => { s.style.color = i<n ? '#eab308' : '#3f3f46'; });
        };

        // ── PROGRESO ──────────────────────────────────────────────
        let progresoTimer = null, progresoInicio = null;
        function guardarProgreso(p) { try { const pr=JSON.parse(localStorage.getItem('movieM_progress')||'{}'); pr['pelicula_'+movieID]=Math.min(100,Math.max(0,Math.round(p))); localStorage.setItem('movieM_progress',JSON.stringify(pr)); } catch(e){} }
        function leerProgreso() { try { return JSON.parse(localStorage.getItem('movieM_progress')||'{}')['pelicula_'+movieID]||0; } catch(e){return 0;} }
        function actualizarBarraProgreso(pct) { const bar=document.getElementById('progresoBar'),wrap=document.getElementById('progresoWrap'),num=document.getElementById('progresoNum'); if(!bar||!wrap)return; if(pct>2){wrap.classList.remove('hidden');bar.style.width=pct+'%';if(num)num.innerText=Math.round(pct)+'%';}else{wrap.classList.add('hidden');} }

        window.verPelicula = () => {
            document.getElementById('movieFrame').src = `https://vidsrc.cc/v3/embed/movie/${movieID}?auto_lang=es`;
            document.getElementById('playerOverlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            progresoInicio = Date.now();
            const dur = (window._peliculaDuracion||120)*60*1000;
            const prev = leerProgreso();
            progresoTimer = setInterval(() => { const t=Date.now()-progresoInicio; guardarProgreso(prev+(t/dur)*100); actualizarBarraProgreso(Math.min(100,Math.round(prev+(t/dur)*100))); }, 10000);
        };

        window.cerrarPelicula = () => {
            document.getElementById('playerOverlay').style.display = 'none';
            document.getElementById('movieFrame').src = '';
            document.body.style.overflow = 'auto';
            if(progresoTimer){clearInterval(progresoTimer);progresoTimer=null;}
            if(progresoInicio){const dur=(window._peliculaDuracion||120)*60*1000;const t=Date.now()-progresoInicio;guardarProgreso(leerProgreso()+(t/dur)*100);progresoInicio=null;}
            actualizarBarraProgreso(leerProgreso());
        };

        async function cargarSimilares() {
            try {
                const res = await fetch(`https://api.themoviedb.org/3/movie/${movieID}/similar?api_key=${API_KEY}&language=es-ES&page=1`);
                const data = await res.json();
                const fila = document.getElementById('similaresFila');
                const progress = JSON.parse(localStorage.getItem('movieM_progress')||'{}');
                const items = (data.results||[]).filter(p=>p.poster_path).slice(0,18);
                if(!items.length){fila.closest('section').classList.add('hidden');return;}
                fila.innerHTML = items.map(p => {
                    const prog=progress['pelicula_'+p.id]||0, rating=p.vote_average?p.vote_average.toFixed(1):'', anio=(p.release_date||'').split('-')[0];
                    return `<div onclick="location.href='pelicula.html?id=${p.id}'" class="min-w-[75px] md:min-w-[100px] shrink-0 cursor-pointer group/sim-card">
                        <div class="relative rounded-xl overflow-hidden border border-white/5 transition-transform duration-200 group-hover/sim-card:scale-105 mb-1.5">
                            <img src="https://image.tmdb.org/t/p/w200${p.poster_path}" class="w-full aspect-[2/3] object-cover" loading="lazy">
                            <div class="absolute top-1 right-1 flex flex-col gap-0.5 items-end">
                                ${rating?`<div class="bg-black/80 text-yellow-500 text-[7px] font-black px-1 py-0.5 rounded">⭐ ${rating}</div>`:''}
                                ${anio?`<div class="bg-black/80 text-zinc-300 text-[7px] font-black px-1 py-0.5 rounded">${anio}</div>`:''}
                            </div>
                            ${prog>0?`<div class="absolute bottom-0 left-0 right-0 h-1 bg-zinc-800/80"><div class="h-full bg-red-600 rounded-full" style="width:${prog}%"></div></div>`:''}
                        </div>
                        <p class="text-[8px] font-bold uppercase tracking-tighter text-zinc-500 truncate">${p.title}</p>
                    </div>`;
                }).join('');
            } catch(e) { console.error(e); }
        }

        cargarPagina();
    </script>
<!-- ═══════════════════════════════════════════
     MODAL LISTAS PERSONALIZADAS
═══════════════════════════════════════════ -->
<div id="modalListas" class="fixed inset-0 z-[130] hidden items-end md:items-center justify-center bg-black/80 backdrop-blur-sm">
    <div class="bg-zinc-900 border border-white/10 w-full max-w-md rounded-t-3xl md:rounded-3xl shadow-2xl flex flex-col max-h-[85vh]">
        <div class="flex items-center justify-between px-5 py-4 border-b border-white/5 shrink-0">
            <h4 class="text-xs font-black uppercase tracking-widest" style="color:var(--accent-color,#dc2626)">Mis Listas</h4>
            <button onclick="cerrarModalListas()" class="w-8 h-8 rounded-full bg-zinc-800 hover:bg-zinc-700 flex items-center justify-center transition">
                <svg class="w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        <div id="listaListasModal" class="overflow-y-auto no-scrollbar flex-1 p-4 space-y-2"></div>
        <div class="p-4 border-t border-white/5 shrink-0 space-y-2">
            <div class="flex gap-2">
                <input id="inputNuevaLista" type="text" placeholder="Nueva lista..." maxlength="40"
                    class="flex-1 bg-zinc-800 border border-zinc-700 focus:border-red-600 text-white text-sm rounded-xl px-3 py-2.5 outline-none transition">
                <button onclick="crearNuevaLista()"
                    class="bg-red-600 hover:bg-red-700 text-white font-black text-xs uppercase tracking-widest px-4 py-2.5 rounded-xl transition active:scale-95">Crear</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL COLABORADORES -->
<div id="modalColabs" class="fixed inset-0 z-[140] hidden items-end md:items-center justify-center bg-black/80 backdrop-blur-sm">
    <div class="bg-zinc-900 border border-white/10 w-full max-w-md rounded-t-3xl md:rounded-3xl shadow-2xl flex flex-col max-h-[80vh]">
        <div class="flex items-center justify-between px-5 py-4 border-b border-white/5 shrink-0">
            <div>
                <h4 class="text-xs font-black uppercase tracking-widest" style="color:var(--accent-color,#dc2626)">Colaboradores</h4>
                <p id="collabListaNombre" class="text-[10px] text-zinc-500 mt-0.5 truncate max-w-[220px]"></p>
            </div>
            <button onclick="cerrarModalColabs()" class="w-8 h-8 rounded-full bg-zinc-800 hover:bg-zinc-700 flex items-center justify-center transition">
                <svg class="w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        <div id="listaColabs" class="overflow-y-auto no-scrollbar flex-1 p-4 space-y-2"></div>
        <div class="p-4 border-t border-white/5 shrink-0">
            <div class="flex gap-2">
                <input id="inputInvitar" type="text" placeholder="Nombre de usuario..."
                    class="flex-1 bg-zinc-800 border border-zinc-700 focus:border-red-600 text-white text-sm rounded-xl px-3 py-2.5 outline-none transition">
                <button onclick="invitarColaborador()"
                    class="bg-zinc-700 hover:bg-zinc-600 text-white font-black text-xs uppercase tracking-widest px-4 py-2.5 rounded-xl transition active:scale-95">Invitar</button>
            </div>
        </div>
    </div>
</div>

<!-- TOAST GLOBAL -->
<div id="toastMsg" class="fixed bottom-24 md:bottom-8 left-1/2 -translate-x-1/2 z-[500] pointer-events-none flex flex-col items-center gap-2"></div>

</body>

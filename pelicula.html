<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieM | Pelicula</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="firebase-config.js"></script>
    <style>
        .star{cursor:pointer;transition:color .2s ease}
        #starRating:hover .star{color:#ca8a04}
        #starRating .star:hover~.star{color:#3f3f46!important}
        .no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
        .glass-card{background:rgba(255,255,255,.04);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);box-shadow:0 30px 60px -15px rgba(0,0,0,.8)}
        @keyframes pulse-bg{0%{background-color:rgba(39,39,42,.5)}50%{background-color:rgba(63,63,70,.5)}100%{background-color:rgba(39,39,42,.5)}}
        .skeleton{animation:pulse-bg 1.5s infinite ease-in-out}
        .fade-in{animation:fadeIn .8s ease forwards;opacity:0}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        #playerOverlay{display:none;background:#000;position:fixed;inset:0;z-index:200;flex-direction:column}
        #serverMenu{display:none;position:absolute;top:100%;left:0;min-width:160px;background:#18181b;border:1px solid rgba(255,255,255,.1);border-radius:12px;overflow:hidden;z-index:10;box-shadow:0 8px 32px rgba(0,0,0,.8);margin-top:6px}
        #serverMenu button{width:100%;text-align:left;padding:10px 14px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:#a1a1aa;transition:all .15s}
        #serverMenu button:hover{background:rgba(255,255,255,.06);color:#fff}
        #serverMenu button.srv-active{color:#dc2626;background:rgba(220,38,38,.08)}
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans overflow-x-hidden">

<div id="playerOverlay">
    <div class="w-full flex justify-between items-center p-3 md:p-4 bg-zinc-950 border-b border-white/5">
        <div class="flex items-center gap-3">
            <span class="text-red-600 font-black tracking-tighter text-lg md:text-xl">MOVIE<span class="text-white font-light">M</span></span>
            <div class="relative" id="serverDropdownWrap">
                <button onclick="toggleServerMenu()" class="flex items-center gap-1.5 bg-white/5 border border-white/10 text-white text-[9px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full hover:bg-white/10 transition">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h.01M12 12h.01M19 12h.01"/></svg>
                    <span id="serverLabel">LAT — VidSrc</span>
                    <svg class="w-2.5 h-2.5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/></svg>
                </button>
                <div id="serverMenu">
                    <button onclick="cambiarServidor(1,'LAT — VidSrc')" class="srv-active">LAT — VidSrc</button>
                    <button onclick="cambiarServidor(2,'LAT — MultiEmbed')">LAT — MultiEmbed</button>
                    <button onclick="cambiarServidor(5,'LAT — AutoEmbed')">LAT — AutoEmbed</button>
                    <button onclick="cambiarServidor(4,'SUB — VidSrc XYZ')">SUB — VidSrc XYZ</button>
                    <button onclick="cambiarServidor(3,'ENG — Embed.su')">ENG — Embed.su</button>
                </div>
            </div>
        </div>
        <button onclick="cerrarPelicula()" class="text-white/60 font-black uppercase text-[10px] tracking-widest bg-white/5 px-4 py-2 rounded-full border border-white/5">Cerrar x</button>
    </div>
    <div class="flex-1 bg-black">
        <iframe id="movieFrame" src="" class="w-full h-full" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
</div>

<div id="backdrop" class="fixed inset-0 w-full h-full bg-cover bg-center opacity-20 md:opacity-30 blur-sm -z-10 transition-all duration-700"></div>
<div class="fixed inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/80 to-transparent -z-10"></div>

<button onclick="location.href='index.html'" class="fixed top-4 left-4 md:top-8 md:left-8 bg-black/50 p-2.5 md:p-3 rounded-full hover:bg-red-600 transition z-50 border border-white/10 shadow-2xl">
    <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
</button>

<div id="userHUD" class="fixed top-4 right-4 md:top-8 md:right-8 z-50 hidden items-center gap-3 bg-black/40 backdrop-blur-md p-1.5 pr-4 rounded-full border border-white/10 shadow-2xl">
    <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-red-600 flex items-center justify-center font-black text-white border-2 border-white/20 text-sm" id="userInitial">?</div>
    <span id="userNameHUD" class="text-xs font-bold uppercase tracking-widest hidden md:inline">Usuario</span>
</div>

<main class="px-4 md:px-8 pt-16 md:pt-20 pb-8">
    <div class="flex flex-col md:flex-row gap-6 md:gap-12 items-start mb-10 md:mb-16 relative z-0 fade-in">
        <div class="flex gap-4 md:block w-full md:w-80 md:shrink-0">
            <div class="w-28 md:w-full shrink-0">
                <div id="posterSkeleton" class="w-full aspect-[2/3] rounded-xl md:rounded-2xl skeleton"></div>
                <img id="poster" src="" class="w-full rounded-xl md:rounded-2xl border border-white/10 shadow-2xl hidden" onload="this.classList.remove('hidden');document.getElementById('posterSkeleton')?.remove()">
                <div id="progresoWrap" class="hidden mt-2">
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-[9px] font-black uppercase tracking-widest text-zinc-500">Continuar viendo</span>
                        <span id="progresoNum" class="text-[9px] font-black text-accent"></span>
                    </div>
                    <div class="w-full h-1.5 bg-zinc-800 rounded-full overflow-hidden">
                        <div id="progresoBar" class="h-full bg-red-600 rounded-full transition-all duration-500" style="width:0%"></div>
                    </div>
                </div>
            </div>
            <div class="flex-1 md:hidden pt-1">
                <h1 id="tituloMobile" class="text-2xl font-black italic tracking-tighter uppercase leading-none text-white mb-2"></h1>
                <div class="flex items-center gap-2 mb-3 flex-wrap">
                    <span id="anioMobile" class="bg-zinc-800 px-2 py-0.5 rounded text-white text-xs font-bold"></span>
                    <span class="text-yellow-500 text-sm font-bold">&#11088; <span id="votoMobile">0.0</span></span>
                </div>
                <div class="flex gap-2 flex-wrap">
                    <button onclick="verPelicula()" class="bg-red-600 text-white px-4 py-2.5 rounded-full font-black text-xs flex items-center gap-1.5 active:scale-95 shadow-lg">VER</button>
                    <button onclick="abrirTrailer()" class="bg-zinc-800 text-white px-4 py-2.5 rounded-full font-black text-xs active:scale-95">TRAILER</button>
                </div>
            </div>
        </div>

        <div class="flex-1 relative z-10 min-w-0 hidden md:block">
            <h1 id="titulo" class="text-5xl md:text-7xl font-black mb-4 italic tracking-tighter uppercase leading-none text-white truncate"></h1>
            <div id="tituloSkeleton" class="h-16 w-3/4 skeleton rounded-xl mb-4"></div>
            <div class="flex items-center gap-4 mb-6 font-bold flex-wrap">
                <span id="anio" class="bg-zinc-800 px-3 py-1 rounded text-white text-sm"></span>
                <span class="text-yellow-500 text-lg">&#11088; <span id="voto">0.0</span></span>
                <span id="director" class="text-zinc-400 border-l border-zinc-800 pl-4 italic"></span>
            </div>
            <p id="sinopsis" class="text-lg text-zinc-500 max-w-2xl leading-relaxed mb-10 hidden"></p>
            <div class="flex flex-wrap items-center gap-4">
                <button onclick="verPelicula()" class="bg-red-600 text-white px-8 py-4 rounded-full font-black hover:bg-red-700 transition shadow-xl active:scale-95 tracking-tight uppercase">VER PELICULA</button>
                <button onclick="abrirTrailer()" class="bg-white text-black px-8 py-4 rounded-full font-black hover:bg-red-600 hover:text-white transition shadow-xl active:scale-95">VER TRAILER</button>
            </div>
        </div>
    </div>

    </main>

<script type="module">
    const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';
    const urlParams = new URLSearchParams(window.location.search);
    const movieID = urlParams.get('id');

    // CONFIGURACIÓN DE SERVIDORES PARA AUDIO LATINO
    const SERVERS_MOVIE = {
        1: (id) => `https://vidsrc.cc/v3/embed/movie/${id}?auto_lang=es-419`,
        2: (id) => `https://multiembed.mov/?video_id=${id}&tmdb=1&lang=es-419`,
        3: (id) => `https://embed.su/embed/movie/${id}`, // Backup
        4: (id) => `https://vidsrc.xyz/embed/movie?tmdb=${id}&ds_langs=es-419`,
        5: (id) => `https://player.autoembed.cc/embed/movie/${id}?lang=es`
    };

    let servidorActivo = 1;

    async function cargarPagina() {
        try {
            const pRes = await fetch(`https://api.themoviedb.org/3/movie/${movieID}?api_key=${API_KEY}&language=es-ES`);
            const peli = await pRes.json();

            if(document.getElementById('tituloSkeleton')) document.getElementById('tituloSkeleton').remove();
            document.getElementById('titulo').innerText = peli.title;
            document.getElementById('tituloMobile').innerText = peli.title;
            document.getElementById('sinopsis').innerText = peli.overview || "Sin descripción disponible.";
            document.getElementById('sinopsis').classList.remove('hidden');
            document.getElementById('poster').src = 'https://image.tmdb.org/t/p/w500' + peli.poster_path;
            document.getElementById('backdrop').style.backgroundImage = `url('https://image.tmdb.org/t/p/original${peli.backdrop_path}')`;
            document.getElementById('anio').innerText = peli.release_date ? peli.release_date.split('-')[0] : "S/F";
            document.getElementById('voto').innerText = peli.vote_average.toFixed(1);
        } catch (error) { console.error(error); }
    }

    window.toggleServerMenu = () => {
        const menu = document.getElementById('serverMenu');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    };

    window.cambiarServidor = (num, label) => {
        servidorActivo = num;
        document.getElementById('movieFrame').src = SERVERS_MOVIE[num](movieID);
        document.getElementById('serverLabel').innerText = label;
        document.getElementById('serverMenu').style.display = 'none';
        document.querySelectorAll('#serverMenu button').forEach((b, i) => {
            b.classList.toggle('srv-active', b.innerText.includes(label));
        });
    };

    window.verPelicula = () => {
        document.getElementById('movieFrame').src = SERVERS_MOVIE[servidorActivo](movieID);
        document.getElementById('playerOverlay').style.display = 'flex';
        document.body.style.overflow = "hidden";
    };

    window.cerrarPelicula = () => {
        document.getElementById('playerOverlay').style.display = 'none';
        document.getElementById('movieFrame').src = "";
        document.body.style.overflow = "auto";
    };

    cargarPagina();
</script>
</body>
</html>

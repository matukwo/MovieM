<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieM | Buscar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="firebase-config.js"></script>
    <style>
        :root { --accent-color: #dc2626; }
        .text-accent  { color: var(--accent-color); }
        .bg-accent    { background-color: var(--accent-color); }
        .border-accent{ border-color: var(--accent-color); }
        .ring-accent  { --tw-ring-color: var(--accent-color); }
        .no-scrollbar::-webkit-scrollbar { display:none }
        .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .fade-up { animation: fadeUp .35s ease forwards; opacity:0; }
        @keyframes pulse-bg { 0%{background:rgba(39,39,42,.5)} 50%{background:rgba(63,63,70,.5)} 100%{background:rgba(39,39,42,.5)} }
        .skeleton { animation: pulse-bg 1.5s infinite; }
        .card-hover { transition: transform .2s, box-shadow .2s; }
        .card-hover:hover { transform: scale(1.04); box-shadow: 0 20px 40px rgba(0,0,0,.7); }
        .filter-btn { transition: all .2s; }
        .filter-btn.active { background-color: var(--accent-color); color:#fff; border-color: var(--accent-color); }
        .progress-bar { height:3px; background:var(--accent-color); border-radius:999px; transition: width .3s; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans min-h-screen overflow-x-hidden">

<!-- NAV -->
<nav class="px-4 md:px-8 py-3 flex items-center gap-3 bg-zinc-950/95 backdrop-blur-md sticky top-0 z-50 border-b border-white/5">
    <button onclick="location.href='index.html'"
        class="shrink-0 w-9 h-9 flex items-center justify-center rounded-full bg-zinc-800 border border-white/10 hover:bg-accent transition active:scale-95">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
    </button>
    <h1 onclick="location.href='index.html'" class="text-lg font-black italic tracking-tighter cursor-pointer shrink-0">
        MOVIE<span class="text-accent">M</span>
    </h1>
    <!-- Search bar -->
    <div class="relative flex-1 max-w-2xl">
        <input type="text" id="searchInput" autofocus placeholder="Películas, series, personas..."
            class="w-full bg-zinc-900 border border-zinc-700 focus:border-accent text-white text-sm rounded-full py-2.5 px-4 pl-10 outline-none transition ring-0 focus:ring-2 ring-accent/30">
        <svg class="absolute left-3 top-3 w-4 h-4 text-zinc-500 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <button id="btnClearSearch" class="absolute right-3 top-2.5 text-zinc-500 hover:text-white transition hidden">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 md:px-8 pt-6 pb-28 md:pb-12">

    <!-- Estado vacío / inicio -->
    <div id="emptyState" class="flex flex-col items-center justify-center py-24 text-center">
        <div class="w-20 h-20 rounded-full bg-zinc-900 border border-white/10 flex items-center justify-center mb-5">
            <svg class="w-10 h-10 text-zinc-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
        </div>
        <p class="text-zinc-600 text-lg font-black italic uppercase tracking-tighter mb-2">Buscá algo</p>
        <p class="text-zinc-700 text-xs uppercase tracking-widest font-bold">Películas · Series · Personas</p>
    </div>

    <!-- Resultados -->
    <div id="resultsWrap" class="hidden">

        <!-- Filtros -->
        <div class="flex gap-2 mb-6 overflow-x-auto no-scrollbar pb-1">
            <button class="filter-btn active shrink-0 text-[10px] font-black uppercase tracking-widest px-4 py-1.5 rounded-full border border-white/10 text-zinc-400" data-filter="todo">Todo</button>
            <button class="filter-btn shrink-0 text-[10px] font-black uppercase tracking-widest px-4 py-1.5 rounded-full border border-white/10 text-zinc-400" data-filter="pelicula">Películas</button>
            <button class="filter-btn shrink-0 text-[10px] font-black uppercase tracking-widest px-4 py-1.5 rounded-full border border-white/10 text-zinc-400" data-filter="serie">Series</button>
            <button class="filter-btn shrink-0 text-[10px] font-black uppercase tracking-widest px-4 py-1.5 rounded-full border border-white/10 text-zinc-400" data-filter="usuario">Usuarios</button>
            <!-- Géneros -->
            <button class="filter-btn shrink-0 text-[10px] font-black uppercase tracking-widest px-4 py-1.5 rounded-full border border-white/10 text-zinc-400" data-filter="accion">Acción</button>
            <button class="filter-btn shrink-0 text-[10px] font-black uppercase tracking-widest px-4 py-1.5 rounded-full border border-white/10 text-zinc-400" data-filter="terror">Terror</button>
            <button class="filter-btn shrink-0 text-[10px] font-black uppercase tracking-widest px-4 py-1.5 rounded-full border border-white/10 text-zinc-400" data-filter="comedia">Comedia</button>
        </div>

        <!-- Recuento -->
        <p id="resultCount" class="text-[10px] font-black uppercase tracking-widest text-zinc-600 mb-5"></p>

        <!-- Sección personas -->
        <section id="secPersonas" class="mb-8 hidden">
            <h2 class="text-sm font-black uppercase tracking-widest text-zinc-500 mb-4 flex items-center gap-2">
                <span class="w-1 h-4 bg-accent rounded-full inline-block"></span> Usuarios
            </h2>
            <div id="gridPersonas" class="flex gap-3 flex-wrap"></div>
        </section>

        <!-- Sección películas -->
        <section id="secPeliculas" class="mb-8 hidden">
            <h2 class="text-sm font-black uppercase tracking-widest text-zinc-500 mb-4 flex items-center gap-2">
                <span class="w-1 h-4 bg-accent rounded-full inline-block"></span> Películas
            </h2>
            <div id="gridPeliculas" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 xl:grid-cols-7 gap-3 md:gap-4"></div>
        </section>

        <!-- Sección series -->
        <section id="secSeries" class="mb-8 hidden">
            <h2 class="text-sm font-black uppercase tracking-widest text-zinc-500 mb-4 flex items-center gap-2">
                <span class="w-1 h-4 bg-accent rounded-full inline-block"></span> Series
            </h2>
            <div id="gridSeries" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 xl:grid-cols-7 gap-3 md:gap-4"></div>
        </section>

        <!-- Sin resultados -->
        <div id="noResults" class="hidden flex flex-col items-center py-20 text-center">
            <p class="text-zinc-600 font-black italic uppercase text-xl tracking-tighter mb-2">Sin resultados</p>
            <p class="text-zinc-700 text-xs uppercase tracking-widest">Intentá con otro término</p>
        </div>
    </div>
</main>

<!-- Bottom nav mobile -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 z-50 bg-zinc-950/95 backdrop-blur-xl border-t border-white/5">
    <div class="flex items-center justify-around py-3 px-2">
        <a href="index.html" class="flex flex-col items-center gap-1 text-zinc-500">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Inicio</span>
        </a>
        <a href="buscar.html" class="flex flex-col items-center gap-1 text-accent">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Buscar</span>
        </a>
        <a href="series.html" class="flex flex-col items-center gap-1 text-zinc-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.361a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Series</span>
        </a>
        <a href="tv.html" class="flex flex-col items-center gap-1 text-zinc-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">TV</span>
        </a>
        <a href="perfil.html" class="flex flex-col items-center gap-1 text-zinc-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Perfil</span>
        </a>
    </div>
</nav>

<script type="module">
const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';
const IMG = 'https://image.tmdb.org/t/p/w500';

// Color accent
const savedColor = localStorage.getItem('movieM_color');
if (savedColor) document.documentElement.style.setProperty('--accent-color', savedColor);

// Leer query de URL
const params = new URLSearchParams(location.search);
const qInit  = (params.get('q') || '').trim();
const input  = document.getElementById('searchInput');
if (qInit) {
    input.value = qInit;
    document.getElementById('btnClearSearch').classList.remove('hidden');
}

let timer = null;
let filtroActivo = 'todo';
let allResults = { peliculas: [], series: [], personas: [] };

const GENEROS = { accion: 28, terror: 27, comedia: 35 };

// ── Filtros ────────────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filtroActivo = btn.dataset.filter;
        renderResultados();
    });
});

// ── Input ──────────────────────────────────────────────────────────────────────
input.addEventListener('input', () => {
    const q = input.value.trim();
    document.getElementById('btnClearSearch').classList.toggle('hidden', !q);
    clearTimeout(timer);
    if (q.length < 2) { mostrarVacio(); return; }
    timer = setTimeout(() => buscar(q), 350);
});

input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && input.value.trim().length >= 2) buscar(input.value.trim());
});

document.getElementById('btnClearSearch').addEventListener('click', () => {
    input.value = '';
    input.focus();
    document.getElementById('btnClearSearch').classList.add('hidden');
    mostrarVacio();
});

function mostrarVacio() {
    document.getElementById('emptyState').classList.remove('hidden');
    document.getElementById('resultsWrap').classList.add('hidden');
}

// ── Usuarios Firebase (usa window.db del firebase-config.js) ──────────────────
async function buscarUsuarios(q) {
    // Esperar a que firebase-config.js termine de inicializar window.db
    for (let i = 0; i < 20; i++) {
        if (window.db && window.getDocs && window.collection) break;
        await new Promise(r => setTimeout(r, 100));
    }
    if (!window.db) return [];
    try {
        const snap = await window.getDocs(window.collection(window.db, 'usuarios'));
        const usuarios = [];
        snap.forEach(d => {
            const u = d.data();
            if (u.username && u.username.toLowerCase().includes(q.toLowerCase())) {
                usuarios.push({ uid: d.id, username: u.username, avatar: u.avatar || null, color: u.color || '#dc2626' });
            }
        });
        return usuarios.slice(0, 10);
    } catch(e) { console.error('buscarUsuarios:', e); return []; }
}

// ── Buscar ─────────────────────────────────────────────────────────────────────
async function buscar(q) {
    document.getElementById('emptyState').classList.add('hidden');
    document.getElementById('resultsWrap').classList.remove('hidden');
    mostrarSkeletons();

    try {
        const [rMovies, rTv, usuarios] = await Promise.all([
            fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&language=es-ES&query=${encodeURIComponent(q)}&page=1`).then(r => r.json()),
            fetch(`https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&language=es-ES&query=${encodeURIComponent(q)}&page=1`).then(r => r.json()),
            buscarUsuarios(q),
        ]);

        allResults = {
            peliculas: (rMovies.results || []).filter(p => p.poster_path),
            series:    (rTv.results    || []).filter(s => s.poster_path),
            personas:  usuarios,
        };

        renderResultados();
    } catch(e) {
        console.error('buscar error:', e);
        document.getElementById('noResults').classList.remove('hidden');
    }
}

// ── Render ─────────────────────────────────────────────────────────────────────
function renderResultados() {
    let pelis   = allResults.peliculas;
    let series  = allResults.series;
    let personas = allResults.personas;

    if (filtroActivo === 'pelicula') { series = []; personas = []; }
    if (filtroActivo === 'serie')    { pelis = [];  personas = []; }
    if (filtroActivo === 'usuario')  { pelis = [];  series = []; }
    if (['accion','terror','comedia'].includes(filtroActivo)) {
        const gId = GENEROS[filtroActivo];
        pelis  = pelis.filter(p  => (p.genre_ids||[]).includes(gId));
        series = series.filter(s => (s.genre_ids||[]).includes(gId));
        personas = [];
    }

    const total = pelis.length + series.length + personas.length;
    document.getElementById('resultCount').innerText = total + ' resultado' + (total !== 1 ? 's' : '');
    document.getElementById('noResults').classList.toggle('hidden', total > 0);

    // Usuarios
    const secP = document.getElementById('secPersonas');
    const gridP = document.getElementById('gridPersonas');
    gridP.innerHTML = '';
    const personasFiltradas = (filtroActivo === 'todo' || filtroActivo === 'usuario') ? personas : [];
    if (personasFiltradas.length) {
        secP.classList.remove('hidden');
        personasFiltradas.forEach((u, i) => {
            const letra = u.username.charAt(0).toUpperCase();
            const card = document.createElement('div');
            card.className = 'flex items-center gap-3 bg-zinc-900/60 border border-white/5 rounded-2xl px-4 py-3 cursor-pointer hover:border-accent/40 hover:bg-zinc-800/60 transition fade-up';
            card.style.animationDelay = (i * 40) + 'ms';
            card.onclick = () => location.href = `perfil.html?user=${encodeURIComponent(u.username)}`;
            card.innerHTML = `
                <div class="w-10 h-10 rounded-full overflow-hidden shrink-0 flex items-center justify-center font-black text-white text-sm" style="background:${u.color}">
                    ${u.avatar ? `<img src="${u.avatar}" class="w-full h-full object-cover">` : letra}
                </div>
                <div class="min-w-0">
                    <p class="text-sm font-black uppercase tracking-tighter truncate">${u.username}</p>
                    <p class="text-[9px] text-zinc-500 uppercase font-bold tracking-widest">Usuario MovieM</p>
                </div>
                <svg class="w-4 h-4 text-zinc-600 ml-auto shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>`;
            gridP.appendChild(card);
        });
    } else { secP.classList.add('hidden'); }

    // Películas
    const secPelis = document.getElementById('secPeliculas');
    const gridPelis = document.getElementById('gridPeliculas');
    gridPelis.innerHTML = '';
    if (pelis.length) {
        secPelis.classList.remove('hidden');
        const progress = JSON.parse(localStorage.getItem('movieM_progress') || '{}');
        pelis.forEach((p, i) => gridPelis.appendChild(crearCard(p, 'pelicula', i, progress)));
    } else { secPelis.classList.add('hidden'); }

    // Series
    const secSer = document.getElementById('secSeries');
    const gridSer = document.getElementById('gridSeries');
    gridSer.innerHTML = '';
    if (series.length) {
        secSer.classList.remove('hidden');
        const progress = JSON.parse(localStorage.getItem('movieM_progress') || '{}');
        series.forEach((s, i) => gridSer.appendChild(crearCard(s, 'serie', i, progress)));
    } else { secSer.classList.add('hidden'); }
}

function crearCard(item, tipo, idx, progress) {
    const esPeli = tipo === 'pelicula';
    const id     = item.id;
    const titulo = item.title || item.name || '';
    const anio   = (item.release_date || item.first_air_date || '').split('-')[0];
    const rating  = item.vote_average ? item.vote_average.toFixed(1) : 'S/R';
    const poster  = IMG + item.poster_path;
    const href    = esPeli ? `pelicula.html?id=${id}` : `serie.html?id=${id}`;
    const prog    = progress[`${tipo}_${id}`] || 0;

    const div = document.createElement('div');
    div.className = 'fade-up cursor-pointer';
    div.style.animationDelay = (idx * 40) + 'ms';
    div.onclick = () => location.href = href;
    div.innerHTML = `
        <div class="relative rounded-xl overflow-hidden border border-white/5 card-hover mb-1.5">
            <img src="${poster}" alt="${titulo}" class="w-full aspect-[2/3] object-cover" loading="lazy"
                 onerror="this.src='data:image/svg+xml,%3Csvg xmlns%3D%22http%3A//www.w3.org/2000/svg%22 width%3D%22200%22 height%3D%22300%22%3E%3Crect width%3D%22200%22 height%3D%22300%22 fill%3D%22%2327272a%22/%3E%3Ctext x%3D%22100%22 y%3D%22150%22 fill%3D%22%2352525b%22 font-size%3D%2240%22 text-anchor%3D%22middle%22 dominant-baseline%3D%22middle%22%3E%3F%3C/text%3E%3C/svg%3E'">
            <div class="absolute top-1.5 right-1.5 flex flex-col items-end gap-1">
                <div class="bg-black/80 text-yellow-500 text-[8px] font-black px-1.5 py-0.5 rounded-lg">⭐ ${rating}</div>
                ${anio ? `<div class="bg-black/80 text-zinc-300 text-[8px] font-black px-1.5 py-0.5 rounded-lg">${anio}</div>` : ''}
                ${!esPeli ? `<div class="bg-accent/90 text-white text-[7px] font-black px-1.5 py-0.5 rounded-lg uppercase">Serie</div>` : ''}
            </div>
            ${prog > 0 ? `<div class="absolute bottom-0 left-0 right-0 h-1 bg-zinc-800"><div class="progress-bar" style="width:${prog}%"></div></div>` : ''}
        </div>
        <p class="text-[9px] font-bold uppercase tracking-tighter text-zinc-500 truncate px-0.5">${titulo}</p>`;
    return div;
}

function mostrarSkeletons() {
    ['gridPeliculas','gridSeries'].forEach(id => {
        document.getElementById(id).innerHTML = Array(12).fill(0).map(() =>
            `<div class="rounded-xl skeleton aspect-[2/3]"></div>`).join('');
    });
    document.getElementById('secPeliculas').classList.remove('hidden');
    document.getElementById('secSeries').classList.remove('hidden');
    document.getElementById('secPersonas').classList.add('hidden');
    document.getElementById('noResults').classList.add('hidden');
}

// ── Arrancar si hay query en URL ───────────────────────────────────────────────
if (qInit.length >= 2) buscar(qInit);
else mostrarVacio();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MovieM | Mi Lista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .text-accent { color: var(--accent-color, #dc2626); }
        .bg-accent { background-color: var(--accent-color, #dc2626); }
        .fade-in { animation: fadeIn 0.6s ease forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .skeleton { animation: pulse-bg 1.5s infinite ease-in-out; }
        @keyframes pulse-bg {
            0% { background-color: rgba(39,39,42,0.6); }
            50% { background-color: rgba(63,63,70,0.6); }
            100% { background-color: rgba(39,39,42,0.6); }
        }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans min-h-screen">

    <nav class="fixed top-0 w-full z-[100] bg-zinc-950/80 backdrop-blur-xl border-b border-white/5 px-8 py-5">
        <div class="container mx-auto flex justify-between items-center">
            <h1 onclick="window.location.href='index.html'" class="text-2xl font-black italic tracking-tighter cursor-pointer">
                MOVIE<span class="text-accent">M</span>
            </h1>
            <button onclick="window.location.href='index.html'" class="text-xs font-bold uppercase tracking-widest text-zinc-400 hover:text-white transition">
                &larr; Volver al Inicio
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-8 pt-32 pb-20">
        <!-- Estado: cargando -->
        <div id="estadoCargando" class="fade-in">
            <div class="h-10 w-40 skeleton rounded-xl mb-3"></div>
            <div class="h-4 w-64 skeleton rounded mb-12"></div>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
                <div class="aspect-[2/3] skeleton rounded-2xl"></div>
                <div class="aspect-[2/3] skeleton rounded-2xl"></div>
                <div class="aspect-[2/3] skeleton rounded-2xl"></div>
                <div class="aspect-[2/3] skeleton rounded-2xl"></div>
            </div>
        </div>

        <!-- Estado: no logueado -->
        <div id="estadoNoLogin" class="hidden flex flex-col items-center justify-center py-32 text-center fade-in">
            <div class="w-20 h-20 bg-zinc-900 rounded-full flex items-center justify-center mb-6 border border-white/5">
                <svg class="w-8 h-8 text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            </div>
            <h3 class="text-2xl font-black uppercase tracking-tighter mb-2">Inicia sesi&oacute;n</h3>
            <p class="text-zinc-500 mb-8">Necesitas una cuenta para guardar pel&iacute;culas.</p>
            <button onclick="window.location.href='index.html'" class="bg-accent text-white px-8 py-3 rounded-full font-black uppercase text-xs tracking-widest hover:opacity-80 transition">
                Ir al inicio
            </button>
        </div>

        <!-- Estado: lista vacía -->
        <div id="estadoVacio" class="hidden flex flex-col items-center justify-center py-32 text-center fade-in">
            <div class="w-20 h-20 bg-zinc-900 rounded-full flex items-center justify-center mb-6 border border-white/5">
                <svg class="w-8 h-8 text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
            </div>
            <h3 class="text-2xl font-black uppercase tracking-tighter mb-2">Tu lista est&aacute; vac&iacute;a</h3>
            <p class="text-zinc-500 mb-8">Explor&aacute; pel&iacute;culas y guard&aacute; las que quieras ver despu&eacute;s.</p>
            <button onclick="window.location.href='index.html'" class="bg-accent text-white px-8 py-3 rounded-full font-black uppercase text-xs tracking-widest hover:opacity-80 transition">
                Explorar Pel&iacute;culas
            </button>
        </div>

        <!-- Contenido real -->
        <div id="contenidoLista" class="hidden fade-in">
            <header class="mb-10">
                <h2 class="text-4xl font-black italic uppercase tracking-tighter mb-2">Mi Lista</h2>
                <p class="text-zinc-500 font-medium">Pel&iacute;culas que guard&aacute;ste para ver despu&eacute;s.</p>
            </header>
            <div id="gridLista" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
        </div>
    </main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAn5N7m7EhICK2aZG4Nx8DIW9RZd9kK1DA",
        authDomain: "moviem-5b73d.firebaseapp.com",
        projectId: "moviem-5b73d",
        storageBucket: "moviem-5b73d.firebasestorage.app",
        messagingSenderId: "843796138544",
        appId: "1:843796138544:web:c2bde9b39d437b84d97bf5"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';

    // Aplicar color guardado
    var c = localStorage.getItem('movieM_color');
    if (c) document.documentElement.style.setProperty('--accent-color', c);

    function mostrar(id) {
        ['estadoCargando','estadoNoLogin','estadoVacio','contenidoLista'].forEach(function(s) {
            document.getElementById(s).classList.add('hidden');
        });
        document.getElementById(id).classList.remove('hidden');
    }

    onAuthStateChanged(auth, async function(user) {
        if (!user) { mostrar('estadoNoLogin'); return; }

        try {
            var snap = await getDoc(doc(db, 'usuarios', user.uid));
            if (!snap.exists()) { mostrar('estadoVacio'); return; }

            var data = snap.data();

            // Aplicar color del usuario
            if (data.color) document.documentElement.style.setProperty('--accent-color', data.color);

            var watchlist = data.watchlist || [];
            if (watchlist.length === 0) { mostrar('estadoVacio'); return; }

            // Traer detalles de cada película
            var promesas = watchlist.map(function(id) {
                return fetch('https://api.themoviedb.org/3/movie/' + id + '?api_key=' + API_KEY + '&language=es-ES').then(function(r) { return r.json(); });
            });
            var peliculas = await Promise.all(promesas);

            var grid = document.getElementById('gridLista');
            grid.innerHTML = '';

            peliculas.forEach(function(p) {
                if (!p || p.status_code) return; // ignorar errores de API
                var div = document.createElement('div');
                div.className = 'group cursor-pointer fade-in';
                div.onclick = function() { window.location.href = 'pelicula.html?id=' + p.id; };

                var poster = p.poster_path
                    ? 'https://image.tmdb.org/t/p/w500' + p.poster_path
                    : 'https://via.placeholder.com/500x750?text=Sin+Poster';
                var anio = p.release_date ? p.release_date.split('-')[0] : 'S/F';
                var nota = p.vote_average ? p.vote_average.toFixed(1) : '-';

                div.innerHTML = '<div class="relative aspect-[2/3] overflow-hidden rounded-2xl border border-white/5 group-hover:border-accent transition-all duration-500 shadow-2xl">'
                    + '<img src="' + poster + '" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy">'
                    + '<div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-end p-4">'
                    + '<span class="text-yellow-500 text-xs font-bold">\u2B50 ' + nota + '</span>'
                    + '</div></div>'
                    + '<h4 class="mt-3 text-sm font-bold truncate uppercase tracking-tighter group-hover:text-accent transition">' + p.title + '</h4>'
                    + '<p class="text-[10px] text-zinc-600 font-bold uppercase">' + anio + '</p>';

                grid.appendChild(div);
            });

            mostrar('contenidoLista');
        } catch(e) {
            console.error(e);
            mostrar('estadoVacio');
        }
    });
</script>
</body>
</html>

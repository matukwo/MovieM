<script type="module">
const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';
const BASE = 'https://image.tmdb.org/t/p/w185';
let timer = null;

const color = localStorage.getItem('movieM_color');
if (color) document.documentElement.style.setProperty('--accent-color', color);

function crearCard(serie) {
    const rating = serie.vote_average ? serie.vote_average.toFixed(1) : 'S/R';
    const anio = (serie.first_air_date || serie.release_date || '').split('-')[0] || '';
    const poster = serie.poster_path ? BASE + serie.poster_path : 'https://via.placeholder.com/500x750?text=?';
    const card = document.createElement('a');
    card.href = 'serie.html?id=' + serie.id;
    card.className = 'min-w-[120px] md:min-w-[180px] cursor-pointer active:scale-95 md:hover:scale-105 transition-transform duration-300 relative group mb-2 block';
    const inner = document.createElement('div'); inner.className = 'relative';
    const img = document.createElement('img'); img.src = poster; img.className = 'rounded-xl shadow-lg mb-1 border border-white/5 w-full'; img.loading = 'lazy';
    const badge = document.createElement('div');
    badge.className = 'absolute top-1.5 right-1.5 flex flex-col items-end gap-1';
    badge.innerHTML = '<div class="bg-black/80 text-yellow-500 text-[9px] font-black px-1.5 py-0.5 rounded-lg">⭐ '+rating+'</div>'
        + (anio ? '<div class="bg-black/80 text-zinc-300 text-[9px] font-black px-1.5 py-0.5 rounded-lg">'+anio+'</div>' : '');
    inner.appendChild(img); inner.appendChild(badge);
    const title = document.createElement('p'); title.className = 'text-[9px] md:text-[10px] text-center truncate w-full font-bold uppercase tracking-tighter text-zinc-500 mt-1'; title.textContent = serie.name || serie.title;
    card.appendChild(inner); card.appendChild(title);
    return card;
}

async function cargarSeccion(url, id) {
    try {
        const r = await fetch(url), d = await r.json(), c = document.getElementById(id);
        if (d.results) d.results.forEach(s => { if(s.poster_path) c.appendChild(crearCard(s)); });
    } catch(e) { console.error(e); }
}

window.scrollFila = (id, d) => document.getElementById(id).scrollBy({ left: d, behavior: 'smooth' });

window.filtrarGenero = async function(genreId, btn) {
    document.querySelectorAll('.genre-chip').forEach(b => { b.classList.remove('active'); b.classList.add('text-zinc-400'); });
    btn.classList.add('active'); btn.classList.remove('text-zinc-400');
    const principal = document.getElementById('contenidoPrincipal');
    const filtrada = document.getElementById('seccionFiltrada');
    if (!genreId) {
        filtrada.classList.add('hidden');
        principal.querySelectorAll('section').forEach(s => s.classList.remove('hidden'));
        return;
    }
    principal.querySelectorAll('section:not(#seccionFiltrada)').forEach(s => s.classList.add('hidden'));
    filtrada.classList.remove('hidden');
    const gNames = {10759:'Acción & Aventura',35:'Comedia',18:'Drama',27:'Terror',878:'Ciencia Ficción',80:'Crimen',9648:'Misterio',10765:'Fantasía',10762:'Animación'};
    document.getElementById('tituloFiltrado').textContent = gNames[genreId] || 'Series';
    const grid = document.getElementById('gridFiltrado'); grid.innerHTML = '';
    const r = await fetch(`https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&with_genres=${genreId}&language=es-ES&sort_by=popularity.desc`);
    const d = await r.json();
    (d.results || []).filter(s => s.poster_path).forEach(s => {
        const anio = (s.first_air_date||'').split('-')[0]||'';
        const div = document.createElement('div');
        div.className = 'cursor-pointer active:scale-95 md:hover:scale-105 transition-transform duration-300 relative group';
        div.innerHTML = `<div class="relative"><img src="${BASE+s.poster_path}" class="rounded-xl shadow-lg border border-white/5 w-full" loading="lazy">
            <div class="absolute top-1.5 right-1.5 flex flex-col items-end gap-1">
                <div class="bg-black/80 text-yellow-500 text-[9px] font-black px-1.5 py-0.5 rounded-lg">⭐ ${s.vote_average?s.vote_average.toFixed(1):'S/R'}</div>
                ${anio?`<div class="bg-black/80 text-zinc-300 text-[9px] font-black px-1.5 py-0.5 rounded-lg">${anio}</div>`:''}
            </div></div>
            <p class="text-[9px] text-center truncate w-full font-bold uppercase tracking-tighter text-zinc-500 mt-1">${s.name}</p>`;
        div.onclick = () => location.href = 'serie.html?id=' + s.id;
        grid.appendChild(div);
    });
};

// ── BÚSQUEDA (series + usuarios) ──────────────────────────────────
async function buscarTodo(q, dropEl) {
    dropEl.innerHTML = '<p class="text-zinc-600 text-xs p-4 text-center animate-pulse">Buscando...</p>';
    // Esperar a que firebase-config.js inicialice window.db
    for (let i = 0; i < 20; i++) {
        if (window.db && window.getDocs && window.collection) break;
        await new Promise(r => setTimeout(r, 100));
    }
    try {
        const [resSeries, snapU] = await Promise.all([
            fetch(`https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&language=es-ES&query=${encodeURIComponent(q)}`).then(r => r.json()),
            window.getDocs(window.collection(window.db, 'usuarios'))
        ]);
        const series = (resSeries.results || []).slice(0, 4);
        let users = [];
        snapU.forEach(d => { const u = d.data(); if(u.username && u.username.toLowerCase().indexOf(q.toLowerCase()) !== -1) users.push({uid: d.id, username: u.username, avatar: u.avatar || null}); });
        users = users.slice(0, 3);
        let html = '';
        if (users.length) {
            html += '<div class="px-4 pt-3 pb-1"><span class="text-[9px] font-black uppercase tracking-[0.2em] text-zinc-500">Usuarios</span></div>';
            users.forEach(u => {
                const letra = u.username.charAt(0).toUpperCase();
                const av = u.avatar ? `<img src="${u.avatar}" class="w-9 h-9 rounded-full object-cover shrink-0">` : `<div class="w-9 h-9 rounded-full bg-red-600 flex items-center justify-center text-white font-black text-xs shrink-0">${letra}</div>`;
                html += `<div class="flex items-center gap-3 px-4 py-3 hover:bg-zinc-800 cursor-pointer transition" onclick="location.href='perfil.html?user=${encodeURIComponent(u.username)}'">${av}<div><p class="text-sm font-bold">${u.username}</p><p class="text-[9px] text-zinc-500 uppercase font-bold">Perfil</p></div></div>`;
            });
        }
        if (series.length) {
            html += `<div class="px-4 pt-3 pb-1${users.length?' border-t border-white/5 mt-1':''}"><span class="text-[9px] font-black uppercase tracking-[0.2em] text-zinc-500">Series</span></div>`;
            series.forEach(s => {
                const poster = s.poster_path ? `https://image.tmdb.org/t/p/w92${s.poster_path}` : '';
                const anio = s.first_air_date ? s.first_air_date.split('-')[0] : '';
                html += `<div class="flex items-center gap-3 px-4 py-2.5 hover:bg-zinc-800 cursor-pointer transition" onclick="location.href='serie.html?id=${s.id}'">${poster ? `<img src="${poster}" class="w-8 h-12 rounded-lg object-cover shrink-0">` : '<div class="w-8 h-12 bg-zinc-700 rounded-lg shrink-0"></div>'}<div class="flex-1 min-w-0"><p class="text-sm font-bold truncate">${s.name}</p><p class="text-[9px] text-zinc-500 uppercase font-bold">${anio}${s.vote_average?' · ⭐ '+s.vote_average.toFixed(1):''}</p></div></div>`;
            });
        }
        if (!series.length && !users.length) html = '<p class="text-zinc-600 text-xs p-6 text-center italic">Sin resultados</p>';
        dropEl.innerHTML = html;
    } catch(e) { dropEl.innerHTML = '<p class="text-zinc-600 text-xs p-4 text-center">Error</p>'; }
}

const buscador = document.getElementById('buscador'), dropdown = document.getElementById('searchDropdown');
buscador.addEventListener('input', function() {
    clearTimeout(timer); const q = buscador.value.trim();
    if (q.length < 2) { dropdown.classList.add('hidden'); return; }
    timer = setTimeout(() => { dropdown.classList.remove('hidden'); buscarTodo(q, dropdown); }, 350);
});
// Enter → buscar.html con el query
buscador.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        const q = buscador.value.trim();
        if (q.length > 1) location.href = 'buscar.html?q=' + encodeURIComponent(q);
    }
});
document.addEventListener('click', e => { if (!buscador.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.add('hidden'); });

const overlay = document.getElementById('searchOverlayMobile'), buscMob = document.getElementById('buscadorMobile'), dropMob = document.getElementById('searchDropdownMobile');
document.getElementById('btnBuscarMobile').onclick = () => { overlay.style.display = 'flex'; setTimeout(() => buscMob.focus(), 100); };
document.getElementById('btnCerrarBusqueda').onclick = () => { overlay.style.display = 'none'; buscMob.value = ''; dropMob.innerHTML = ''; };
buscMob.addEventListener('input', function() {
    clearTimeout(timer); const q = buscMob.value.trim();
    if (q.length < 2) { dropMob.innerHTML = ''; return; }
    timer = setTimeout(() => buscarTodo(q, dropMob), 350);
});
// Enter mobile → buscar.html con el query
buscMob.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        const q = buscMob.value.trim();
        if (q.length > 1) location.href = 'buscar.html?q=' + encodeURIComponent(q);
    }
});

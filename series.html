<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieM | Series</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
        .text-accent{color:var(--accent-color,#dc2626)}.bg-accent{background-color:var(--accent-color,#dc2626)}.border-accent{border-color:var(--accent-color,#dc2626)}
        .genre-chip{transition:all .2s ease;border:1px solid rgba(255,255,255,0.08)}
        .genre-chip.active{background-color:var(--accent-color,#dc2626);border-color:var(--accent-color,#dc2626);color:white}
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans overflow-x-hidden">

<!-- NAV DESKTOP -->
<nav class="hidden md:grid p-5 grid-cols-3 items-center bg-zinc-950/90 backdrop-blur-md fixed top-0 w-full z-50 border-b border-white/5">
    <div class="flex space-x-6 text-xs font-bold uppercase tracking-widest text-zinc-400">
        <a href="index.html" class="hover:text-white transition">Inicio</a>
        <a href="series.html" class="text-accent">Series</a>
        <a href="mi_lista.html" class="hover:text-white transition">Mi Lista</a>
    </div>
    <div class="flex justify-center">
        <h1 class="text-3xl font-black text-accent tracking-tighter cursor-pointer" onclick="location.href='index.html'">MOVIE<span class="text-white font-light">M</span></h1>
    </div>
    <div class="flex items-center justify-end gap-3">
        <div class="relative">
            <input type="text" id="buscador" placeholder="Buscar serie..." class="bg-zinc-900 border border-zinc-800 text-white text-xs rounded-full py-2.5 px-4 pl-10 focus:ring-1 focus:ring-red-600 w-52 transition-all focus:w-72 outline-none">
            <svg class="absolute left-3 top-2.5 w-4 h-4 text-zinc-500 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <div id="searchDropdown" class="absolute right-0 top-11 bg-zinc-900 border border-white/10 rounded-2xl shadow-2xl w-80 hidden z-50 no-scrollbar max-h-[70vh] overflow-y-auto"></div>
        </div>
        <button id="btnUsuario" onclick="location.href='perfil.html'" class="w-10 h-10 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center hover:bg-red-600 transition group shadow-lg overflow-hidden shrink-0">
            <svg class="h-5 w-5 text-zinc-400 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </button>
    </div>
</nav>

<!-- NAV MOBILE -->
<nav class="md:hidden flex items-center justify-between px-4 py-3 bg-zinc-950/90 backdrop-blur-md fixed top-0 w-full z-50 border-b border-white/5">
    <h1 class="text-2xl font-black text-accent tracking-tighter cursor-pointer" onclick="location.href='index.html'">MOVIE<span class="text-white font-light">M</span></h1>
    <div class="flex items-center gap-2">
        <button id="btnBuscarMobile" class="w-9 h-9 rounded-full bg-zinc-800 flex items-center justify-center">
            <svg class="w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </button>
    </div>
</nav>

<!-- BUSQUEDA OVERLAY MOBILE -->
<div id="searchOverlayMobile" class="fixed inset-0 z-[200] bg-zinc-950 hidden flex-col">
    <div class="flex items-center gap-3 px-4 py-4 border-b border-white/5">
        <div class="relative flex-1">
            <input type="text" id="buscadorMobile" placeholder="Buscar serie..." class="w-full bg-zinc-900 border border-zinc-800 text-white text-sm rounded-full py-3 px-4 pl-10 outline-none">
            <svg class="absolute left-3 top-3.5 w-4 h-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </div>
        <button id="btnCerrarBusqueda" class="text-zinc-400 font-bold text-sm px-2">Cerrar</button>
    </div>
    <div id="searchDropdownMobile" class="flex-1 overflow-y-auto no-scrollbar"></div>
</div>

<!-- MAIN -->
<main class="pt-16 md:pt-24 pb-24 md:pb-8 px-4 md:pl-8 md:pr-4">

    <!-- Filtros -->
    <div class="flex gap-2 overflow-x-auto no-scrollbar pb-3 mb-8 mt-2">
        <button onclick="filtrarGenero(null,this)" class="genre-chip active shrink-0 px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest text-white">Todo</button>
        <button onclick="filtrarGenero(10759,this)" class="genre-chip shrink-0 px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest text-zinc-400">Acción</button>
        <button onclick="filtrarGenero(35,this)" class="genre-chip shrink-0 px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest text-zinc-400">Comedia</button>
        <button onclick="filtrarGenero(18,this)" class="genre-chip shrink-0 px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest text-zinc-400">Drama</button>
        <button onclick="filtrarGenero(27,this)" class="genre-chip shrink-0 px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest text-zinc-400">Terror</button>
        <button onclick="filtrarGenero(878,this)" class="genre-chip shrink-0 px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest text-zinc-400">Sci-Fi</button>
        <button onclick="filtrarGenero(80,this)" class="genre-chip shrink-0 px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest text-zinc-400">Crimen</button>
        <button onclick="filtrarGenero(9648,this)" class="genre-chip shrink-0 px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest text-zinc-400">Misterio</button>
        <button onclick="filtrarGenero(10765,this)" class="genre-chip shrink-0 px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest text-zinc-400">Fantasía</button>
    </div>

    <div id="contenidoPrincipal">
        <section class="mb-10 relative group">
            <h2 class="text-lg md:text-2xl font-black italic uppercase tracking-tighter mb-4 text-zinc-100">Tendencias Esta Semana</h2>
            <button onclick="scrollFila('tendencias',-400)" class="absolute left-0 top-10 z-40 bg-black/80 p-2 rounded-full hidden md:group-hover:flex border border-white/10 hover:bg-accent transition shadow-xl"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"/></svg></button>
            <div id="tendencias" class="flex gap-3 md:gap-4 overflow-x-auto no-scrollbar pb-4 scroll-smooth"></div>
            <button onclick="scrollFila('tendencias',400)" class="absolute right-2 top-10 z-40 bg-black/80 p-2 rounded-full hidden md:group-hover:flex border border-white/10 hover:bg-accent transition shadow-xl"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"/></svg></button>
        </section>
        <section class="mb-10 relative group">
            <h2 class="text-lg md:text-2xl font-black italic uppercase tracking-tighter mb-4 text-zinc-100">Las Mejor Valoradas</h2>
            <button onclick="scrollFila('topRated',-400)" class="absolute left-0 top-10 z-40 bg-black/80 p-2 rounded-full hidden md:group-hover:flex border border-white/10 hover:bg-accent transition shadow-xl"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"/></svg></button>
            <div id="topRated" class="flex gap-3 md:gap-4 overflow-x-auto no-scrollbar pb-4 scroll-smooth"></div>
            <button onclick="scrollFila('topRated',400)" class="absolute right-2 top-10 z-40 bg-black/80 p-2 rounded-full hidden md:group-hover:flex border border-white/10 hover:bg-accent transition shadow-xl"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"/></svg></button>
        </section>
        <section class="mb-10 relative group">
            <h2 class="text-lg md:text-2xl font-black italic uppercase tracking-tighter mb-4 text-zinc-100">En Emisión Ahora</h2>
            <button onclick="scrollFila('enEmision',-400)" class="absolute left-0 top-10 z-40 bg-black/80 p-2 rounded-full hidden md:group-hover:flex border border-white/10 hover:bg-accent transition shadow-xl"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"/></svg></button>
            <div id="enEmision" class="flex gap-3 md:gap-4 overflow-x-auto no-scrollbar pb-4 scroll-smooth"></div>
            <button onclick="scrollFila('enEmision',400)" class="absolute right-2 top-10 z-40 bg-black/80 p-2 rounded-full hidden md:group-hover:flex border border-white/10 hover:bg-accent transition shadow-xl"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"/></svg></button>
        </section>
        <section id="seccionFiltrada" class="mb-10 hidden">
            <h2 id="tituloFiltrado" class="text-lg md:text-2xl font-black italic uppercase tracking-tighter mb-4 text-zinc-100"></h2>
            <div id="gridFiltrado" class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 md:gap-4"></div>
        </section>
    </div>
</main>

<!-- BOTTOM NAV MOBILE -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 z-50 bg-zinc-950/95 backdrop-blur-xl border-t border-white/5">
    <div class="flex items-center justify-around py-3 px-2">
        <a href="index.html" class="flex flex-col items-center gap-1 text-zinc-500">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Inicio</span>
        </a>
        <a href="mi_lista.html" class="flex flex-col items-center gap-1 text-zinc-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Mi Lista</span>
        </a>
        <a href="series.html" class="flex flex-col items-center gap-1 text-accent">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.361a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Series</span>
        </a>
        <a href="perfil.html" class="flex flex-col items-center gap-1 text-zinc-500">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Cuenta</span>
        </a>
    </div>
</nav>

<script>
const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';
const BASE = 'https://image.tmdb.org/t/p/w500';
let timer = null;

const color = localStorage.getItem('movieM_color');
if (color) document.documentElement.style.setProperty('--accent-color', color);

function crearCard(serie) {
    const rating = serie.vote_average ? serie.vote_average.toFixed(1) : 'S/R';
    const poster = serie.poster_path ? BASE + serie.poster_path : 'https://via.placeholder.com/500x750?text=?';
    const card = document.createElement('div');
    card.className = 'min-w-[120px] md:min-w-[180px] cursor-pointer active:scale-95 md:hover:scale-105 transition-transform duration-300 relative group mb-2';
    card.innerHTML = `
        <div class="relative">
            <img src="${poster}" class="rounded-xl shadow-lg mb-1 border border-white/5 w-full" loading="lazy">
            <div class="absolute top-1.5 right-1.5 bg-black/80 text-yellow-500 text-[9px] font-black px-1.5 py-0.5 rounded-lg">⭐ ${rating}</div>
        </div>
        <p class="text-[9px] md:text-[10px] text-center truncate w-full font-bold uppercase tracking-tighter text-zinc-500 mt-1">${serie.name}</p>
    `;
    card.onclick = () => location.href = 'serie.html?id=' + serie.id;
    return card;
}

async function cargarSeccion(url, id) {
    try {
        const r = await fetch(url), d = await r.json(), c = document.getElementById(id);
        if (d.results) d.results.forEach(s => { if (s.poster_path) c.appendChild(crearCard(s)); });
    } catch(e) { console.error(e); }
}

window.scrollFila = (id, d) => document.getElementById(id).scrollBy({ left: d, behavior: 'smooth' });

window.filtrarGenero = async function(genreId, btn) {
    document.querySelectorAll('.genre-chip').forEach(b => { b.classList.remove('active'); b.classList.add('text-zinc-400'); b.style.color = ''; });
    btn.classList.add('active'); btn.classList.remove('text-zinc-400');
    const principal = document.getElementById('contenidoPrincipal');
    const filtrada = document.getElementById('seccionFiltrada');
    if (!genreId) {
        filtrada.classList.add('hidden');
        principal.querySelectorAll('section').forEach(s => s.classList.remove('hidden'));
        return;
    }
    principal.querySelectorAll('section:not(#seccionFiltrada)').forEach(s => s.classList.add('hidden'));
    filtrada.classList.remove('hidden');
    const gNames = {10759:'Acción & Aventura',35:'Comedia',18:'Drama',27:'Terror',878:'Ciencia Ficción',80:'Crimen',9648:'Misterio',10765:'Fantasía'};
    document.getElementById('tituloFiltrado').textContent = gNames[genreId] || 'Series';
    const grid = document.getElementById('gridFiltrado'); grid.innerHTML = '';
    const r = await fetch(`https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&with_genres=${genreId}&language=es-ES&sort_by=popularity.desc`);
    const d = await r.json();
    (d.results || []).filter(s => s.poster_path).forEach(s => {
        const div = document.createElement('div');
        div.className = 'cursor-pointer active:scale-95 md:hover:scale-105 transition-transform duration-300 relative group';
        div.innerHTML = `<div class="relative"><img src="${BASE+s.poster_path}" class="rounded-xl shadow-lg border border-white/5 w-full" loading="lazy"><div class="absolute top-1.5 right-1.5 bg-black/80 text-yellow-500 text-[9px] font-black px-1.5 py-0.5 rounded-lg">⭐ ${s.vote_average?s.vote_average.toFixed(1):'S/R'}</div></div><p class="text-[9px] text-center truncate w-full font-bold uppercase tracking-tighter text-zinc-500 mt-1">${s.name}</p>`;
        div.onclick = () => location.href = 'serie.html?id=' + s.id;
        grid.appendChild(div);
    });
};

async function buscarSeries(q, dropEl) {
    dropEl.innerHTML = '<p class="text-zinc-600 text-xs p-4 text-center animate-pulse">Buscando...</p>';
    const r = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&language=es-ES&query=${encodeURIComponent(q)}`);
    const d = await r.json();
    const series = (d.results || []).slice(0, 5);
    if (!series.length) { dropEl.innerHTML = '<p class="text-zinc-600 text-xs p-6 text-center italic">Sin resultados</p>'; return; }
    let html = '<div class="px-4 pt-3 pb-1"><span class="text-[9px] font-black uppercase tracking-[0.2em] text-zinc-500">Series</span></div>';
    series.forEach(s => {
        const poster = s.poster_path ? `https://image.tmdb.org/t/p/w92${s.poster_path}` : '';
        const anio = s.first_air_date ? s.first_air_date.split('-')[0] : '';
        html += `<div class="flex items-center gap-3 px-4 py-2.5 hover:bg-zinc-800 cursor-pointer transition" onclick="location.href='serie.html?id=${s.id}'">${poster?`<img src="${poster}" class="w-8 h-12 rounded-lg object-cover shrink-0">`:'<div class="w-8 h-12 bg-zinc-700 rounded-lg shrink-0"></div>'}<div class="flex-1 min-w-0"><p class="text-sm font-bold truncate">${s.name}</p><p class="text-[9px] text-zinc-500 uppercase font-bold">${anio}${s.vote_average?' · ⭐ '+s.vote_average.toFixed(1):''}</p></div></div>`;
    });
    dropEl.innerHTML = html;
}

const buscador = document.getElementById('buscador'), dropdown = document.getElementById('searchDropdown');
buscador.addEventListener('input', function() {
    clearTimeout(timer); const q = buscador.value.trim();
    if (q.length < 2) { dropdown.classList.add('hidden'); return; }
    timer = setTimeout(() => { dropdown.classList.remove('hidden'); buscarSeries(q, dropdown); }, 350);
});
document.addEventListener('click', e => { if (!buscador.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.add('hidden'); });

const overlay = document.getElementById('searchOverlayMobile'), buscMob = document.getElementById('buscadorMobile'), dropMob = document.getElementById('searchDropdownMobile');
document.getElementById('btnBuscarMobile').onclick = () => { overlay.classList.remove('hidden'); overlay.classList.add('flex'); setTimeout(() => buscMob.focus(), 100); };
document.getElementById('btnCerrarBusqueda').onclick = () => { overlay.classList.add('hidden'); overlay.classList.remove('flex'); buscMob.value = ''; dropMob.innerHTML = ''; };
buscMob.addEventListener('input', function() {
    clearTimeout(timer); const q = buscMob.value.trim();
    if (q.length < 2) { dropMob.innerHTML = ''; return; }
    timer = setTimeout(() => buscarSeries(q, dropMob), 350);
});

cargarSeccion(`https://api.themoviedb.org/3/trending/tv/week?api_key=${API_KEY}&language=es-ES`, 'tendencias');
cargarSeccion(`https://api.themoviedb.org/3/tv/top_rated?api_key=${API_KEY}&language=es-ES`, 'topRated');
cargarSeccion(`https://api.themoviedb.org/3/tv/on_the_air?api_key=${API_KEY}&language=es-ES`, 'enEmision');
</script>
</body>
</html>

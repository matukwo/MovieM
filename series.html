<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const FB = {apiKey:"AIzaSyAn5N7m7EhICK2aZG4Nx8DIW9RZd9kK1DA",authDomain:"moviem-5b73d.firebaseapp.com",projectId:"moviem-5b73d",storageBucket:"moviem-5b73d.firebasestorage.app",messagingSenderId:"843796138544",appId:"1:843796138544:web:c2bde9b39d437b84d97bf5"};
const app = initializeApp(FB);
const auth = getAuth(app);
const db = getFirestore(app);

const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';
const BASE = 'https://image.tmdb.org/t/p/';
let currentSerie = null;
let currentUID = null;
let searchTimer = null;

// Aplicar color guardado
const color = localStorage.getItem('movieM_color');
if (color) document.documentElement.style.setProperty('--accent-color', color);

// Auth
onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUID = user.uid;
        const snap = await getDoc(doc(db, 'usuarios', user.uid));
        if (snap.exists() && snap.data().color) {
            document.documentElement.style.setProperty('--accent-color', snap.data().color);
        }
    }
});

// ── CREAR CARD DE SERIE ──────────────────────────────────────────
function crearCardSerie(serie) {
    const poster = serie.poster_path ? BASE + 'w300' + serie.poster_path : 'https://via.placeholder.com/300x450?text=?';
    const rating = serie.vote_average ? serie.vote_average.toFixed(1) : 'S/R';
    const div = document.createElement('div');
    div.className = 'min-w-[120px] md:min-w-[160px] cursor-pointer relative group card-hover';
    div.innerHTML = `
        <div class="relative">
            <img src="${poster}" class="rounded-xl border border-white/5 w-full shadow-lg" loading="lazy">
            <div class="absolute top-1.5 right-1.5 bg-black/80 text-yellow-500 text-[9px] font-black px-1.5 py-0.5 rounded-lg">⭐ ${rating}</div>
            <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity rounded-xl flex items-center justify-center">
                <div class="w-10 h-10 rounded-full bg-accent flex items-center justify-center shadow-lg">
                    <svg class="w-5 h-5 fill-white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </div>
            </div>
        </div>
        <p class="text-[9px] md:text-[10px] text-center truncate w-full font-bold uppercase tracking-tighter text-zinc-500 mt-1.5">${serie.name}</p>
    `;
    div.onclick = () => abrirModalSerie(serie.id);
    return div;
}

// ── CARGAR SECCIONES ─────────────────────────────────────────────
async function cargarSeccion(url, contenedorId) {
    try {
        const res = await fetch(url);
        const data = await res.json();
        const c = document.getElementById(contenedorId);
        if (data.results) data.results.forEach(s => c.appendChild(crearCardSerie(s)));
    } catch(e) { console.error(e); }
}

// ── FILTRAR POR GENERO ───────────────────────────────────────────
window.filtrarGenero = async function(genreId, btn) {
    document.querySelectorAll('.genre-chip').forEach(b => {
        b.classList.remove('active', 'bg-accent', 'text-white', 'border-accent');
        b.classList.add('text-zinc-400');
    });
    btn.classList.add('active', 'bg-accent', 'text-white');
    btn.classList.remove('text-zinc-400');

    const secFiltrada = document.getElementById('seccionFiltrada');
    if (!genreId) {
        secFiltrada.classList.add('hidden');
        ['tendenciasSeries','topRated','enEmision'].forEach(id => {
            document.getElementById(id).closest('section').classList.remove('hidden');
        });
        return;
    }

    ['tendenciasSeries','topRated','enEmision'].forEach(id => {
        document.getElementById(id).closest('section').classList.add('hidden');
    });

    const gMap = {10759:'Acción & Aventura',35:'Comedia',18:'Drama',27:'Terror',878:'Ciencia Ficción',80:'Crimen',9648:'Misterio',10765:'Fantasía & Sci-Fi'};
    document.getElementById('tituloFiltrado').innerHTML = `<span class="w-4 h-px bg-accent"></span> ${gMap[genreId] || 'Series'}`;
    document.getElementById('gridFiltrado').innerHTML = Array(12).fill('<div class="aspect-[2/3] skeleton rounded-xl"></div>').join('');
    secFiltrada.classList.remove('hidden');

    const res = await fetch(`https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&with_genres=${genreId}&language=es-ES&sort_by=popularity.desc`);
    const data = await res.json();
    const grid = document.getElementById('gridFiltrado');
    grid.innerHTML = '';
    (data.results || []).forEach(s => {
        const poster = s.poster_path ? BASE + 'w300' + s.poster_path : '';
        if (!poster) return;
        const div = document.createElement('div');
        div.className = 'aspect-[2/3] bg-zinc-900 rounded-xl border border-white/5 overflow-hidden cursor-pointer group relative card-hover';
        div.innerHTML = `<img src="${poster}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" loading="lazy"><div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent opacity-0 group-hover:opacity-100 flex items-end p-2"><p class="text-[9px] font-bold uppercase truncate">${s.name}</p></div>`;
        div.onclick = () => abrirModalSerie(s.id);
        grid.appendChild(div);
    });
};

// ── MODAL SERIE ──────────────────────────────────────────────────
window.abrirModalSerie = async function(id) {
    try {
        const [detRes, credRes] = await Promise.all([
            fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}&language=es-ES`),
            fetch(`https://api.themoviedb.org/3/tv/${id}/credits?api_key=${API_KEY}&language=es-ES`)
        ]);
        const serie = await detRes.json();
        const credits = await credRes.json();
        currentSerie = serie;

        document.getElementById('modalPoster').src = serie.poster_path ? BASE + 'w300' + serie.poster_path : '';
        document.getElementById('modalTitle').innerText = serie.name;
        document.getElementById('modalOverview').innerText = serie.overview || 'Sin descripción disponible.';
        document.getElementById('modalYear').innerText = serie.first_air_date ? serie.first_air_date.split('-')[0] : '';
        document.getElementById('modalVote').innerText = serie.vote_average ? '⭐ ' + serie.vote_average.toFixed(1) : '';
        document.getElementById('modalSeasons').innerText = serie.number_of_seasons ? `${serie.number_of_seasons} Temporada${serie.number_of_seasons>1?'s':''}` : '';
        
        if (serie.backdrop_path) document.getElementById('modalBackdrop').style.backgroundImage = `url('${BASE}w780${serie.backdrop_path}')`;
        if (serie.vote_average >= 8) document.getElementById('modalBadge').classList.remove('hidden');
        else document.getElementById('modalBadge').classList.add('hidden');

        // Temporadas selector
        const selTemp = document.getElementById('selectorTemporadaModal');
        selTemp.innerHTML = '';
        (serie.seasons || []).filter(s => s.season_number > 0).forEach(s => {
            selTemp.innerHTML += `<option value="${s.season_number}">Temporada ${s.season_number} (${s.episode_count} ep)</option>`;
        });
        await cargarEpisodios();

        // Reparto
        const repartoDiv = document.getElementById('repartoSerie');
        repartoDiv.innerHTML = (credits.cast || []).slice(0,12).map(a => `
            <div class="shrink-0 text-center w-20">
                <div class="w-16 h-16 mx-auto rounded-full overflow-hidden border border-zinc-700 mb-2">
                    <img src="${a.profile_path ? BASE+'w92'+a.profile_path : 'https://via.placeholder.com/92'}" class="w-full h-full object-cover">
                </div>
                <p class="text-[8px] font-bold uppercase truncate px-1">${a.name}</p>
                <p class="text-[7px] text-zinc-600 truncate italic px-1">${a.character}</p>
            </div>
        `).join('');

        // Verificar watchlist
        if (currentUID) {
            const snap = await getDoc(doc(db, 'usuarios', currentUID));
            const data = snap.exists() ? snap.data() : {};
            const wl = data.seriesWatchlist || [];
            const btn = document.getElementById('btnWatchlistSerie');
            if (wl.includes(String(id))) {
                btn.classList.add('bg-white', 'text-black');
                btn.classList.remove('bg-zinc-900', 'text-zinc-400');
            } else {
                btn.classList.remove('bg-white', 'text-black');
                btn.classList.add('bg-zinc-900', 'text-zinc-400');
            }
        }

        cambiarTab('episodios');
        document.getElementById('modalSerie').classList.remove('hidden');
        document.getElementById('modalSerie').classList.add('flex');
        document.body.style.overflow = 'hidden';
    } catch(e) { console.error(e); }
};

window.cerrarModalSerie = function() {
    document.getElementById('modalSerie').classList.add('hidden');
    document.getElementById('modalSerie').classList.remove('flex');
    document.body.style.overflow = 'auto';
};

// ── TABS ─────────────────────────────────────────────────────────
window.cambiarTab = function(tab) {
    document.getElementById('tabEpisodios').classList.toggle('hidden', tab !== 'episodios');
    document.getElementById('tabReparto').classList.toggle('hidden', tab !== 'reparto');
    document.getElementById('tab-episodios').className = tab === 'episodios' ? 'tab-active px-4 py-3 text-[11px] font-black uppercase tracking-widest transition mr-2' : 'tab-inactive px-4 py-3 text-[11px] font-black uppercase tracking-widest transition mr-2';
    document.getElementById('tab-reparto').className = tab === 'reparto' ? 'tab-active px-4 py-3 text-[11px] font-black uppercase tracking-widest transition mr-2' : 'tab-inactive px-4 py-3 text-[11px] font-black uppercase tracking-widest transition mr-2';
};

// ── EPISODIOS ────────────────────────────────────────────────────
window.cargarEpisodios = async function() {
    if (!currentSerie) return;
    const temp = document.getElementById('selectorTemporadaModal').value;
    const lista = document.getElementById('listaEpisodios');
    lista.innerHTML = '<p class="text-zinc-600 text-xs animate-pulse">Cargando episodios...</p>';
    
    try {
        const res = await fetch(`https://api.themoviedb.org/3/tv/${currentSerie.id}/season/${temp}?api_key=${API_KEY}&language=es-ES`);
        const data = await res.json();
        document.getElementById('epCount').innerText = `${(data.episodes||[]).length} episodios`;
        lista.innerHTML = '';
        (data.episodes || []).forEach(ep => {
            const div = document.createElement('div');
            div.className = 'episode-item flex items-center gap-3 p-3 rounded-xl cursor-pointer transition group';
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-zinc-800 border border-white/5 flex items-center justify-center shrink-0 group-hover:bg-accent group-hover:border-accent transition">
                    <span class="text-[10px] font-black text-zinc-400 group-hover:text-white">${ep.episode_number}</span>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-xs font-bold truncate group-hover:text-accent transition">${ep.name || 'Episodio ' + ep.episode_number}</p>
                    <p class="text-[9px] text-zinc-600">${ep.runtime ? ep.runtime + ' min' : ''} ${ep.vote_average ? '· ⭐ ' + ep.vote_average.toFixed(1) : ''}</p>
                </div>
                <svg class="w-4 h-4 text-zinc-700 group-hover:text-accent transition shrink-0 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            `;
            div.onclick = () => reproducirEpisodio(currentSerie.id, temp, ep.episode_number, ep.name);
            lista.appendChild(div);
        });
    } catch(e) { lista.innerHTML = '<p class="text-red-500 text-xs">Error al cargar episodios.</p>'; }
};

// ── REPRODUCIR ───────────────────────────────────────────────────
function reproducirEpisodio(serieId, temporada, episodio, nombre) {
    document.getElementById('serieFrame').src = `https://vidsrc.cc/v3/embed/tv/${serieId}/${temporada}/${episodio}?auto_lang=es`;
    document.getElementById('playerTitle').innerText = `${currentSerie?.name || ''} — T${temporada}E${episodio}: ${nombre}`;
    document.getElementById('playerOverlay').style.display = 'flex';
    document.body.style.overflow = 'hidden';
    cerrarModalSerie();
}

window.verSerie = function() {
    const temp = document.getElementById('selectorTemporadaModal').value || 1;
    reproducirEpisodio(currentSerie.id, temp, 1, 'Episodio 1');
};

window.cerrarSerie = function() {
    document.getElementById('playerOverlay').style.display = 'none';
    document.getElementById('serieFrame').src = '';
    document.body.style.overflow = 'auto';
};

window.cambiarTemporada = function() {
    const temp = document.getElementById('selectTemporada').value;
    const ep = document.getElementById('selectEpisodio').value;
    document.getElementById('serieFrame').src = `https://vidsrc.cc/v3/embed/tv/${currentSerie.id}/${temp}/${ep}?auto_lang=es`;
};
window.cambiarEpisodio = function() {
    const temp = document.getElementById('selectTemporada').value;
    const ep = document.getElementById('selectEpisodio').value;
    document.getElementById('serieFrame').src = `https://vidsrc.cc/v3/embed/tv/${currentSerie.id}/${temp}/${ep}?auto_lang=es`;
};

// ── TRAILER ──────────────────────────────────────────────────────
window.abrirTrailerSerie = async function() {
    if (!currentSerie) return;
    try {
        const res = await fetch(`https://api.themoviedb.org/3/tv/${currentSerie.id}/videos?api_key=${API_KEY}`);
        const data = await res.json();
        const tr = data.results.find(v => v.type === 'Trailer' && v.site === 'YouTube') || data.results[0];
        if (tr) {
            document.getElementById('videoContainerSerie').innerHTML = `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${tr.key}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
            document.getElementById('modalVideo').classList.remove('hidden');
            document.getElementById('modalVideo').classList.add('flex');
        }
    } catch(e) { console.error(e); }
};
window.cerrarTrailerSerie = function() {
    document.getElementById('modalVideo').classList.add('hidden');
    document.getElementById('modalVideo').classList.remove('flex');
    document.getElementById('videoContainerSerie').innerHTML = '';
};

// ── WATCHLIST SERIES ─────────────────────────────────────────────
window.toggleWatchlistSerie = async function() {
    if (!currentUID) return alert('Debes iniciar sesión para guardar series.');
    const id = String(currentSerie.id);
    const btn = document.getElementById('btnWatchlistSerie');
    const isSaved = btn.classList.contains('bg-white');
    const userRef = doc(db, 'usuarios', currentUID);
    await setDoc(userRef, { seriesWatchlist: isSaved ? arrayRemove(id) : arrayUnion(id) }, { merge: true });
    if (!isSaved) { btn.classList.add('bg-white', 'text-black'); btn.classList.remove('bg-zinc-900', 'text-zinc-400'); }
    else { btn.classList.remove('bg-white', 'text-black'); btn.classList.add('bg-zinc-900', 'text-zinc-400'); }
};

// ── BÚSQUEDA ─────────────────────────────────────────────────────
async function buscarSeries(q, dropEl) {
    dropEl.innerHTML = '<p class="text-zinc-600 text-xs p-4 text-center animate-pulse">Buscando...</p>';
    const res = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&language=es-ES&query=${encodeURIComponent(q)}`);
    const data = await res.json();
    const pelis = (data.results || []).slice(0, 5);
    if (!pelis.length) { dropEl.innerHTML = '<p class="text-zinc-600 text-xs p-6 text-center">Sin resultados</p>'; return; }
    dropEl.innerHTML = pelis.map(s => {
        const poster = s.poster_path ? `https://image.tmdb.org/t/p/w92${s.poster_path}` : '';
        const anio = s.first_air_date ? s.first_air_date.split('-')[0] : '';
        return `<div class="flex items-center gap-3 px-4 py-2.5 hover:bg-zinc-800 cursor-pointer transition" onclick="abrirModalSerie(${s.id}); document.getElementById('searchDropdown').classList.add('hidden');">${poster ? `<img src="${poster}" class="w-8 h-12 rounded-lg object-cover shrink-0">` : '<div class="w-8 h-12 bg-zinc-700 rounded-lg shrink-0"></div>'}<div><p class="text-sm font-bold truncate">${s.name}</p><p class="text-[9px] text-zinc-500 uppercase font-bold">${anio}${s.vote_average ? ' · ⭐ ' + s.vote_average.toFixed(1) : ''}</p></div></div>`;
    }).join('');
}

const buscador = document.getElementById('buscador');
const dropdown = document.getElementById('searchDropdown');
buscador.addEventListener('input', function() {
    clearTimeout(searchTimer);
    const q = buscador.value.trim();
    if (q.length < 2) { dropdown.classList.add('hidden'); return; }
    searchTimer = setTimeout(() => { dropdown.classList.remove('hidden'); buscarSeries(q, dropdown); }, 350);
});
document.addEventListener('click', e => { if (!buscador.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.add('hidden'); });

const overlay = document.getElementById('searchOverlayMobile');
const buscMob = document.getElementById('buscadorMobile');
const dropMob = document.getElementById('searchDropdownMobile');
document.getElementById('btnBuscarMobile').onclick = () => { overlay.classList.remove('hidden'); overlay.classList.add('flex'); setTimeout(() => buscMob.focus(), 100); };
document.getElementById('btnCerrarBusqueda').onclick = () => { overlay.classList.add('hidden'); overlay.classList.remove('flex'); buscMob.value = ''; dropMob.innerHTML = ''; };
buscMob.addEventListener('input', function() {
    clearTimeout(searchTimer);
    const q = buscMob.value.trim();
    if (q.length < 2) { dropMob.innerHTML = ''; return; }
    searchTimer = setTimeout(() => buscarSeries(q, dropMob), 350);
});

// Cerrar modal al click fuera
document.getElementById('modalSerie').addEventListener('click', function(e) {
    if (e.target === this) cerrarModalSerie();
});

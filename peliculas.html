<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieM | Películas</title>

        .no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}

<!-- NAV MOBILE TOP -->

    <h1 class="text-2xl font-black text-accent tracking-tighter cursor-pointer" onclick="location.href='index.html'">MOVIE<span class="text-white font-light">M</span></h1>

<!-- BUSQUEDA OVERLAY MOBILE -->
<div id="searchOverlayMobile" class="fixed inset-0 z-[200] bg-zinc-950 hidden flex-col">

<!-- MAIN -->
<main class="pt-16 md:pt-24 pb-24 md:pb-8 px-4 md:pl-8 md:pr-4">

        <button onclick="filtrarGenero(28,this)" class="genre-chip shrink-0 px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest text-zinc-400">Acción</button>

        <button onclick="filtrarGenero(18,this)" class="genre-chip shrink-0 px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest text-zinc-400">Drama</button>
        <button onclick="filtrarGenero(27,this)" class="genre-chip shrink-0 px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest text-zinc-400">Terror</button>
        <button onclick="filtrarGenero(878,this)" class="genre-chip shrink-0 px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest text-zinc-400">Sci-Fi</button>
        <button onclick="filtrarGenero(80,this)" class="genre-chip shrink-0 px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest text-zinc-400">Crimen</button>
        <button onclick="filtrarGenero(9648,this)" class="genre-chip shrink-0 px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest text-zinc-400">Misterio</button>
        <button onclick="filtrarGenero(12,this)" class="genre-chip shrink-0 px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest text-zinc-400">Aventura</button>
        <button onclick="filtrarGenero(16,this)" class="genre-chip shrink-0 px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest text-zinc-400">Animación</button>
        <button onclick="filtrarGenero(10749,this)" class="genre-chip shrink-0 px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest text-zinc-400">Romance</button>
    </div>

    <div id="contenidoPrincipal">
        <section class="mb-10 relative group">
            <h2 class="text-lg md:text-2xl font-black italic uppercase tracking-tighter mb-4 text-zinc-100">Tendencias Esta Semana</h2>
            <button onclick="scrollFila('tendencias',-400)" class="absolute left-0 top-1/2 -translate-y-8 z-40 bg-black/80 p-3 rounded-full hidden md:group-hover:flex border border-white/10 hover:bg-accent transition shadow-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"/></svg></button>
            <div id="tendencias" class="flex gap-3 md:gap-4 overflow-x-auto no-scrollbar pb-4 scroll-smooth"></div>
            <button onclick="scrollFila('tendencias',400)" class="absolute right-2 top-1/2 -translate-y-8 z-40 bg-black/80 p-3 rounded-full hidden md:group-hover:flex border border-white/10 hover:bg-accent transition shadow-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"/></svg></button>
        </section>
        <section class="mb-10 relative group">
            <h2 class="text-lg md:text-2xl font-black italic uppercase tracking-tighter mb-4 text-zinc-100">Las Mejor Valoradas</h2>
            <button onclick="scrollFila('topRated',-400)" class="absolute left-0 top-1/2 -translate-y-8 z-40 bg-black/80 p-3 rounded-full hidden md:group-hover:flex border border-white/10 hover:bg-accent transition shadow-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"/></svg></button>
            <div id="topRated" class="flex gap-3 md:gap-4 overflow-x-auto no-scrollbar pb-4 scroll-smooth"></div>
            <button onclick="scrollFila('topRated',400)" class="absolute right-2 top-1/2 -translate-y-8 z-40 bg-black/80 p-3 rounded-full hidden md:group-hover:flex border border-white/10 hover:bg-accent transition shadow-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"/></svg></button>
        </section>
        <section class="mb-10 relative group">
            <h2 class="text-lg md:text-2xl font-black italic uppercase tracking-tighter mb-4 text-zinc-100">En Cines Ahora</h2>
            <button onclick="scrollFila('enCines',-400)" class="absolute left-0 top-1/2 -translate-y-8 z-40 bg-black/80 p-3 rounded-full hidden md:group-hover:flex border border-white/10 hover:bg-accent transition shadow-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"/></svg></button>
            <div id="enCines" class="flex gap-3 md:gap-4 overflow-x-auto no-scrollbar pb-4 scroll-smooth"></div>
            <button onclick="scrollFila('enCines',400)" class="absolute right-2 top-1/2 -translate-y-8 z-40 bg-black/80 p-3 rounded-full hidden md:group-hover:flex border border-white/10 hover:bg-accent transition shadow-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"/></svg></button>
        </section>
        <section id="seccionFiltrada" class="mb-10 hidden">
            <h2 id="tituloFiltrado" class="text-lg md:text-2xl font-black italic uppercase tracking-tighter mb-4 text-zinc-100"></h2>
            <div id="gridFiltrado" class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 md:gap-4"></div>
        </section>
    </div>
</main>

<!-- BOTTOM NAV MOBILE -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 z-50 bg-zinc-950/95 backdrop-blur-xl border-t border-white/5">
    <div class="flex items-center justify-around py-3 px-2">
        <a href="index.html" class="flex flex-col items-center gap-1 text-zinc-500">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Inicio</span>
        </a>
        <a href="peliculas.html" class="flex flex-col items-center gap-1 text-accent">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Películas</span>
        </a>

            <span class="text-[9px] font-black uppercase tracking-widest">Series</span>
        </a>
        <a href="mi_lista.html" class="flex flex-col items-center gap-1 text-zinc-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Mi Lista</span>
        </a>
        <a href="perfil.html" class="flex flex-col items-center gap-1 text-zinc-500">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Cuenta</span>
        </a>
    </div>

<script type="module">
const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';
const BASE = 'https://image.tmdb.org/t/p/w500';
let timer = null;

const color = localStorage.getItem('movieM_color');
if (color) document.documentElement.style.setProperty('--accent-color', color);

function crearCard(pelicula) {
    const rating = pelicula.vote_average ? pelicula.vote_average.toFixed(1) : 'S/R';
    const anio = (pelicula.release_date || '').split('-')[0] || '';
    const poster = pelicula.poster_path ? BASE + pelicula.poster_path : 'https://via.placeholder.com/500x750?text=?';
    const card = document.createElement('div');
    card.className = 'min-w-[120px] md:min-w-[180px] cursor-pointer active:scale-95 md:hover:scale-105 transition-transform duration-300 relative group mb-2';
    const inner = document.createElement('div'); inner.className = 'relative';
    const img = document.createElement('img'); img.src = poster; img.className = 'rounded-xl shadow-lg mb-1 border border-white/5 w-full'; img.loading = 'lazy';
    img.onclick = () => location.href = 'pelicula.html?id=' + pelicula.id;
    const badge = document.createElement('div');
    badge.className = 'absolute top-1.5 right-1.5 flex flex-col items-end gap-1';
    badge.innerHTML = '<div class="bg-black/80 text-yellow-500 text-[9px] font-black px-1.5 py-0.5 rounded-lg">⭐ '+rating+'</div>'
        + (anio ? '<div class="bg-black/80 text-zinc-300 text-[9px] font-black px-1.5 py-0.5 rounded-lg">'+anio+'</div>' : '');
    inner.appendChild(img); inner.appendChild(badge);
    const title = document.createElement('p'); title.className = 'text-[9px] md:text-[10px] text-center truncate w-full font-bold uppercase tracking-tighter text-zinc-500 mt-1'; title.textContent = pelicula.title || pelicula.name;
    card.appendChild(inner); card.appendChild(title);
    return card;
}

async function cargarSeccion(url, id) {
    try {
        const r = await fetch(url), d = await r.json(), c = document.getElementById(id);
        if (d.results) d.results.forEach(p => { if(p.poster_path) c.appendChild(crearCard(p)); });
    } catch(e) { console.error(e); }
}

window.scrollFila = (id, d) => document.getElementById(id).scrollBy({ left: d, behavior: 'smooth' });

window.filtrarGenero = async function(genreId, btn) {
    document.querySelectorAll('.genre-chip').forEach(b => { b.classList.remove('active'); b.classList.add('text-zinc-400'); });
    btn.classList.add('active'); btn.classList.remove('text-zinc-400');
    const principal = document.getElementById('contenidoPrincipal');
    const filtrada = document.getElementById('seccionFiltrada');
    if (!genreId) {
        filtrada.classList.add('hidden');
        principal.querySelectorAll('section').forEach(s => s.classList.remove('hidden'));
        return;
    }
    principal.querySelectorAll('section:not(#seccionFiltrada)').forEach(s => s.classList.add('hidden'));
    filtrada.classList.remove('hidden');
    const gNames = {28:'Acción',35:'Comedia',18:'Drama',27:'Terror',878:'Ciencia Ficción',80:'Crimen',9648:'Misterio',12:'Aventura',16:'Animación',10749:'Romance'};
    document.getElementById('tituloFiltrado').textContent = gNames[genreId] || 'Películas';
    const grid = document.getElementById('gridFiltrado'); grid.innerHTML = '';
    const r = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${genreId}&language=es-ES&sort_by=popularity.desc`);
    const d = await r.json();
    (d.results || []).filter(p => p.poster_path).forEach(p => {
        const anio = (p.release_date||'').split('-')[0]||'';
        const div = document.createElement('div');
        div.className = 'cursor-pointer active:scale-95 md:hover:scale-105 transition-transform duration-300 relative group';
        div.innerHTML = `<div class="relative"><img src="${BASE+p.poster_path}" class="rounded-xl shadow-lg border border-white/5 w-full" loading="lazy">
            <div class="absolute top-1.5 right-1.5 flex flex-col items-end gap-1">
                <div class="bg-black/80 text-yellow-500 text-[9px] font-black px-1.5 py-0.5 rounded-lg">⭐ ${p.vote_average?p.vote_average.toFixed(1):'S/R'}</div>
                ${anio?`<div class="bg-black/80 text-zinc-300 text-[9px] font-black px-1.5 py-0.5 rounded-lg">${anio}</div>`:''}
            </div></div>
            <p class="text-[9px] text-center truncate w-full font-bold uppercase tracking-tighter text-zinc-500 mt-1">${p.title}</p>`;
        div.onclick = () => location.href = 'pelicula.html?id=' + p.id;
        grid.appendChild(div);
    });
};

// ── BÚSQUEDA (películas + usuarios) ──────────────────────────────────
async function buscarTodo(q, dropEl) {
    dropEl.innerHTML = '<p class="text-zinc-600 text-xs p-4 text-center animate-pulse">Buscando...</p>';
    for (let i = 0; i < 20; i++) {
        if (window.db && window.getDocs && window.collection) break;
        await new Promise(r => setTimeout(r, 100));
    }
    try {
        const [resPelis, snapU] = await Promise.all([
            fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&language=es-ES&query=${encodeURIComponent(q)}`).then(r => r.json()),
            window.getDocs(window.collection(window.db, 'usuarios'))
        ]);
        const pelis = (resPelis.results || []).slice(0, 4);
        let users = [];
        snapU.forEach(d => { const u = d.data(); if(u.username && u.username.toLowerCase().indexOf(q.toLowerCase()) !== -1) users.push({uid: d.id, username: u.username, avatar: u.avatar || null}); });
        users = users.slice(0, 3);
        let html = '';
        if (users.length) {
            html += '<div class="px-4 pt-3 pb-1"><span class="text-[9px] font-black uppercase tracking-[0.2em] text-zinc-500">Usuarios</span></div>';
            users.forEach(u => {
                const letra = u.username.charAt(0).toUpperCase();
                const av = u.avatar ? `<img src="${u.avatar}" class="w-9 h-9 rounded-full object-cover shrink-0">` : `<div class="w-9 h-9 rounded-full bg-red-600 flex items-center justify-center text-white font-black text-xs shrink-0">${letra}</div>`;
                html += `<div class="flex items-center gap-3 px-4 py-3 hover:bg-zinc-800 cursor-pointer transition" onclick="location.href='perfil.html?user=${encodeURIComponent(u.username)}'">${av}<div><p class="text-sm font-bold">${u.username}</p><p class="text-[9px] text-zinc-500 uppercase font-bold">Perfil</p></div></div>`;
            });
        }
        if (pelis.length) {
            html += `<div class="px-4 pt-3 pb-1${users.length?' border-t border-white/5 mt-1':''}"><span class="text-[9px] font-black uppercase tracking-[0.2em] text-zinc-500">Películas</span></div>`;
            pelis.forEach(p => {
                const poster = p.poster_path ? `https://image.tmdb.org/t/p/w92${p.poster_path}` : '';
                const anio = p.release_date ? p.release_date.split('-')[0] : '';
                html += `<div class="flex items-center gap-3 px-4 py-2.5 hover:bg-zinc-800 cursor-pointer transition" onclick="location.href='pelicula.html?id=${p.id}'">${poster ? `<img src="${poster}" class="w-8 h-12 rounded-lg object-cover shrink-0">` : '<div class="w-8 h-12 bg-zinc-700 rounded-lg shrink-0"></div>'}<div class="flex-1 min-w-0"><p class="text-sm font-bold truncate">${p.title}</p><p class="text-[9px] text-zinc-500 uppercase font-bold">${anio}${p.vote_average?' · ⭐ '+p.vote_average.toFixed(1):''}</p></div></div>`;
            });
        }
        if (!pelis.length && !users.length) html = '<p class="text-zinc-600 text-xs p-6 text-center italic">Sin resultados</p>';
        dropEl.innerHTML = html;
    } catch(e) { dropEl.innerHTML = '<p class="text-zinc-600 text-xs p-4 text-center">Error</p>'; }
}

const buscador = document.getElementById('buscador'), dropdown = document.getElementById('searchDropdown');
buscador.addEventListener('input', function() {
    clearTimeout(timer); const q = buscador.value.trim();
    if (q.length < 2) { dropdown.classList.add('hidden'); return; }
    timer = setTimeout(() => { dropdown.classList.remove('hidden'); buscarTodo(q, dropdown); }, 350);
});
buscador.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        const q = buscador.value.trim();
        if (q.length > 1) location.href = 'buscar.html?q=' + encodeURIComponent(q);
    }
});
document.addEventListener('click', e => { if (!buscador.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.add('hidden'); });

const overlay = document.getElementById('searchOverlayMobile'), buscMob = document.getElementById('buscadorMobile'), dropMob = document.getElementById('searchDropdownMobile');
document.getElementById('btnBuscarMobile').onclick = () => { overlay.style.display = 'flex'; setTimeout(() => buscMob.focus(), 100); };
document.getElementById('btnCerrarBusqueda').onclick = () => { overlay.style.display = 'none'; buscMob.value = ''; dropMob.innerHTML = ''; };
buscMob.addEventListener('input', function() {
    clearTimeout(timer); const q = buscMob.value.trim();
    if (q.length < 2) { dropMob.innerHTML = ''; return; }
    timer = setTimeout(() => buscarTodo(q, dropMob), 350);
});
buscMob.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        const q = buscMob.value.trim();
        if (q.length > 1) location.href = 'buscar.html?q=' + encodeURIComponent(q);
    }
});

document.getElementById('btnUsuario').onclick = () => location.href = 'perfil.html';

cargarSeccion(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}&language=es-ES`, 'tendencias');
cargarSeccion(`https://api.themoviedb.org/3/movie/top_rated?api_key=${API_KEY}&language=es-ES`, 'topRated');
cargarSeccion(`https://api.themoviedb.org/3/movie/now_playing?api_key=${API_KEY}&language=es-ES`, 'enCines');
</script>
</body>
</html>

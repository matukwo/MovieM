<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieM | TV en Vivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --accent-color: #dc2626; }
        .text-accent   { color: var(--accent-color); }
        .bg-accent     { background-color: var(--accent-color); }
        .border-accent { border-color: var(--accent-color); }
        .no-scrollbar::-webkit-scrollbar { display:none }
        .no-scrollbar  { -ms-overflow-style:none; scrollbar-width:none }
        .live-dot { animation: livepulse 1.4s infinite; }
        @keyframes livepulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(1.4)} }
        .canal-card { transition: all .18s ease; cursor:pointer; }
        .canal-card:hover { background:rgba(39,39,42,.9)!important; transform:translateX(2px); }
        .canal-card.activo { border-color:var(--accent-color)!important; background:rgba(220,38,38,.08)!important; }
        .fade-in { animation: fi .5s ease forwards; opacity:0; }
        @keyframes fi { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        #playerWrap {
            position:relative; background:#000;
            border-radius:16px; overflow:hidden;
            border:1px solid rgba(255,255,255,.07);
            box-shadow:0 25px 60px rgba(0,0,0,.8);
            aspect-ratio:16/9;
        }
        #hlsVideo  { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; background:#000; display:none; }
        #iframeEmbed { position:absolute; inset:0; width:100%; height:100%; border:none; display:none; }
        #playerOverlayBox {
            position:absolute; inset:0;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            background:#09090b; transition:opacity .4s; z-index:10;
        }
        #playerOverlayBox.oculto { opacity:0; pointer-events:none; }
        .spin { animation: spinA 1s linear infinite; }
        @keyframes spinA { to{ transform:rotate(360deg) } }
        .cat-btn { transition:all .2s; }
        .cat-btn.activo { background:var(--accent-color); color:#fff; border-color:var(--accent-color); }
        .cats-scroll { scrollbar-width:none; -ms-overflow-style:none; }
        .cats-scroll::-webkit-scrollbar { display:none; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans min-h-screen overflow-x-hidden">

<nav class="px-4 md:px-6 py-3 flex items-center justify-between bg-zinc-950/90 backdrop-blur-md sticky top-0 w-full z-50 border-b border-white/5">
    <h1 onclick="location.href='index.html'" class="text-lg md:text-xl font-black italic tracking-tighter cursor-pointer">MOVIE<span class="text-accent">M</span></h1>
    <div class="flex items-center gap-3">
        <div class="flex items-center gap-1.5 bg-red-600/10 border border-red-600/30 px-3 py-1.5 rounded-full">
            <span class="w-2 h-2 rounded-full bg-red-500 live-dot"></span>
            <span class="text-[10px] font-black uppercase tracking-widest text-red-400">En Vivo</span>
        </div>
        <button onclick="location.href='canales.html'" class="text-[10px] font-bold uppercase tracking-widest text-zinc-400 hover:text-white transition">← Canales</button>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-3 md:px-6 pt-5 pb-28 md:pb-8">
    <div class="flex flex-col lg:flex-row gap-5 md:gap-6">

        <!-- PLAYER + INFO -->
        <div class="flex-1 min-w-0 fade-in">
            <div id="playerWrap" class="mb-4">
                <video id="hlsVideo" playsinline webkit-playsinline></video>
                <iframe id="iframeEmbed" allowfullscreen webkitallowfullscreen mozallowfullscreen
                    allow="autoplay; encrypted-media; fullscreen" referrerpolicy="no-referrer"></iframe>
                <div id="playerOverlayBox">
                    <div id="overlayContent" class="flex flex-col items-center text-center px-6">
                        <svg class="w-16 h-16 text-zinc-800 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.361a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
                        </svg>
                        <p class="text-zinc-500 text-sm font-bold uppercase tracking-widest">Seleccioná un canal</p>
                    </div>
                </div>
            </div>

            <!-- Info canal -->
            <div class="flex items-center gap-4 mb-5">
                <div class="w-14 h-14 rounded-2xl overflow-hidden bg-white flex items-center justify-center p-1.5 shrink-0 shadow-lg">
                    <img id="logoImg" src="" alt="" class="max-w-full max-h-full object-contain">
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-0.5 flex-wrap">
                        <h2 id="nombreCanal" class="text-xl font-black uppercase tracking-tighter">TV en Vivo</h2>
                        <div id="liveBadge" class="hidden items-center gap-1 bg-red-600/10 border border-red-600/30 px-2 py-0.5 rounded-full">
                            <span class="w-1.5 h-1.5 rounded-full bg-red-500 live-dot"></span>
                            <span class="text-[8px] font-black uppercase text-red-400">Live</span>
                        </div>
                    </div>
                    <p id="categoriaCanal" class="text-zinc-500 text-xs font-bold uppercase tracking-widest">Seleccioná un canal para comenzar</p>
                </div>
                <button onclick="toggleFullscreen()" class="shrink-0 bg-zinc-800 hover:bg-accent p-2.5 rounded-xl transition border border-white/5 active:scale-95">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/>
                    </svg>
                </button>
            </div>

            <div class="bg-zinc-900/40 border border-white/5 rounded-xl px-4 py-3 flex gap-3 text-xs text-zinc-500 items-start">
                <svg class="w-4 h-4 shrink-0 mt-0.5 text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span>Si el stream HLS falla, el canal carga automáticamente su embed de YouTube como respaldo. Los canales internacionales (DW, France 24) funcionan directo sin fallback.</span>
            </div>
        </div>

        <!-- SIDEBAR -->
        <aside class="w-full lg:w-72 shrink-0 fade-in" style="animation-delay:.1s">
            <div class="relative mb-3">
                <input id="searchInput" oninput="filtrarCanales()" type="text" placeholder="Buscar canal..."
                    class="w-full bg-zinc-900 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white placeholder-zinc-600 outline-none focus:border-accent transition pr-8">
                <svg class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-600 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
            </div>
            <div id="categorias" class="flex gap-2 mb-3 overflow-x-auto cats-scroll pb-1"></div>
            <p class="text-[10px] font-black uppercase tracking-[.25em] text-zinc-500 mb-3 flex items-center gap-2">
                <span class="w-4 h-px bg-accent"></span>
                <span id="sidebarLabel">Canales</span>
            </p>
            <div id="sidebar" class="space-y-1.5 lg:overflow-y-auto no-scrollbar lg:max-h-[calc(100vh-300px)]"></div>
        </aside>
    </div>
</main>

<!-- NAV MOBILE -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 z-50 bg-zinc-950/95 backdrop-blur-xl border-t border-white/5">
    <div class="flex items-center justify-around py-3 px-2">
        <a href="index.html" class="flex flex-col items-center gap-1 text-zinc-500">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Inicio</span>
        </a>
        <a href="mi_lista.html" class="flex flex-col items-center gap-1 text-zinc-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Mi Lista</span>
        </a>
        <a href="canales.html" class="flex flex-col items-center gap-1 text-accent">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.361a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">TV</span>
        </a>
        <a href="perfil.html" class="flex flex-col items-center gap-1 text-zinc-500">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Perfil</span>
        </a>
    </div>
</nav>

<script>
var saved = localStorage.getItem('movieM_color');
if (saved) document.documentElement.style.setProperty('--accent-color', saved);

// ─── CANALES ─────────────────────────────────────────────────────────────────
var CANALES = [
    {"nombre":"El Trece","logo":"https://files.catbox.moe/finwuj.png","cat":"General","pais":"🇦🇷",
     "embed":"https://hlsplayer.net/embed?type=m3u8&src=https://livetrx01.vodgc.net/eltrecetv/index.m3u8"}
];

// ─── PROXIES CORS (reintentos automáticos si el stream directo falla) ─────────
var CORS_PROXIES = [
    function(url){ return 'https://corsproxy.io/?' + encodeURIComponent(url); },
    function(url){ return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url); },
    function(url){ return 'https://thingproxy.freeboard.io/fetch/' + url; }
];

var categorias = [...new Set(CANALES.map(function(c){ return c.cat; }))];
var catActiva  = 'Todos';
var canalActual = null;
var hlsInstance = null;

// ─── CATEGORIAS ───────────────────────────────────────────────────────────────
function renderCategorias() {
    var wrap = document.getElementById('categorias');
    wrap.innerHTML = '';
    ['Todos'].concat(categorias).forEach(function(cat) {
        var btn = document.createElement('button');
        btn.className = 'cat-btn shrink-0 text-[9px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full border border-white/10 text-zinc-400' + (cat === catActiva ? ' activo' : '');
        btn.innerText = cat;
        btn.onclick = function() {
            catActiva = cat;
            document.querySelectorAll('.cat-btn').forEach(function(b){ b.classList.remove('activo'); });
            btn.classList.add('activo');
            filtrarCanales();
        };
        wrap.appendChild(btn);
    });
}

// ─── FILTRAR ──────────────────────────────────────────────────────────────────
function filtrarCanales() {
    var q = document.getElementById('searchInput').value.toLowerCase().trim();
    var lista = CANALES.filter(function(c) {
        var okCat = catActiva === 'Todos' || c.cat === catActiva;
        var okQ   = !q || c.nombre.toLowerCase().includes(q) || c.cat.toLowerCase().includes(q);
        return okCat && okQ;
    });
    document.getElementById('sidebarLabel').innerText = lista.length + ' canal' + (lista.length !== 1 ? 'es' : '');
    renderSidebar(lista);
}

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
function renderSidebar(lista) {
    var sb = document.getElementById('sidebar');
    sb.innerHTML = '';
    if (!lista.length) {
        sb.innerHTML = '<p class="text-zinc-600 text-xs text-center py-6">Sin resultados</p>';
        return;
    }
    lista.forEach(function(c) {
        var div = document.createElement('div');
        div.className = 'canal-card flex items-center gap-3 bg-zinc-900/50 border border-white/5 rounded-2xl p-3 active:scale-95' + (canalActual && canalActual.id === c.id ? ' activo' : '');
        div.dataset.id = c.id;
        div.onclick = function() { cargarCanal(c); };
        div.innerHTML =
            '<div class="w-10 h-10 rounded-xl overflow-hidden bg-white flex items-center justify-center p-1 shrink-0">'
          +   '<img src="' + c.logo + '" class="max-w-full max-h-full object-contain" loading="lazy" onerror="this.style.display=\'none\'">'
          + '</div>'
          + '<div class="flex-1 min-w-0">'
          +   '<p class="text-xs font-black uppercase tracking-tight truncate">' + c.pais + ' ' + c.nombre + '</p>'
          +   '<p class="text-[9px] text-zinc-600 uppercase font-bold">' + c.cat + '</p>'
          + '</div>'
          + '<span class="w-1.5 h-1.5 rounded-full bg-red-500 live-dot shrink-0"></span>';
        sb.appendChild(div);
    });
}

// ─── OVERLAY ──────────────────────────────────────────────────────────────────
function showSpinner(txt) {
    document.getElementById('overlayContent').innerHTML =
        '<svg class="spin w-10 h-10 text-accent mb-4" fill="none" viewBox="0 0 24 24">'
      + '<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>'
      + '<path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>'
      + '</svg>'
      + '<p class="text-zinc-400 text-sm font-bold uppercase tracking-widest">' + (txt||'Conectando...') + '</p>';
    document.getElementById('playerOverlayBox').classList.remove('oculto');
}

function showError(canal) {
    var html =
        '<svg class="w-12 h-12 text-zinc-700 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">'
      + '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>'
      + '</svg>'
      + '<p class="text-zinc-300 text-sm mb-1 font-bold">Sin señal</p>'
      + '<p class="text-zinc-600 text-xs mb-5 max-w-xs text-center">El canal está offline o bloqueado por CORS.<br>Se probaron el stream directo y 3 proxies.</p>'
      + '<button onclick="cargarCanal(canalActual)" class="bg-zinc-800 hover:bg-accent border border-white/10 text-white px-6 py-2.5 rounded-full font-black text-xs uppercase tracking-widest transition">↺ Reintentar</button>';
    document.getElementById('overlayContent').innerHTML = html;
    document.getElementById('playerOverlayBox').classList.remove('oculto');
}

function hideOverlay() {
    document.getElementById('playerOverlayBox').classList.add('oculto');
}

// ─── CARGAR CANAL — iframe directo ───────────────────────────────────────────
function cargarCanal(canal) {
    canalActual = canal;
    document.getElementById('nombreCanal').innerText    = canal.nombre;
    document.getElementById('categoriaCanal').innerText = canal.cat + ' · ' + canal.pais;
    document.getElementById('logoImg').src              = canal.logo;
    document.title = 'MovieM | ' + canal.nombre;
    var lb = document.getElementById('liveBadge');
    lb.classList.remove('hidden'); lb.classList.add('flex');
    document.querySelectorAll('.canal-card').forEach(function(el) {
        el.classList.toggle('activo', el.dataset.id === canal.id);
    });
    if (!canal.embed) { showError(canal); return; }
    showSpinner('Cargando...');
    var fr = document.getElementById('iframeEmbed');
    fr.src = canal.embed;
    fr.style.display = 'block';
    document.getElementById('hlsVideo').style.display = 'none';
    fr.onload = function() { hideOverlay(); };
}

// ─── FULLSCREEN ───────────────────────────────────────────────────────────────
function toggleFullscreen() {
    var wrap = document.getElementById('playerWrap');
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        if (wrap.requestFullscreen) wrap.requestFullscreen();
        else if (wrap.webkitRequestFullscreen) wrap.webkitRequestFullscreen();
    } else {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
}
window.toggleFullscreen = toggleFullscreen;

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderCategorias();
filtrarCanales();
</script>
</body>
</html>

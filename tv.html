    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieM | TV en Vivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --accent-color: #dc2626; }
        /* Solo lo que Tailwind no puede hacer */
        @keyframes livepulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(1.4)} }
        @keyframes fadeIn    { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        @keyframes spinA     { to{transform:rotate(360deg)} }
        .live-dot  { animation: livepulse 1.4s infinite; }
        .fade-in   { animation: fadeIn .5s ease forwards; opacity:0; }
        .spin      { animation: spinA 1s linear infinite; }
        /* Scrollbar oculta */
        .no-scrollbar::-webkit-scrollbar { display:none; }
        .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }
        /* Cat-btn activo y canal-card activo — usan CSS var, Tailwind no puede hacerlo dinámicamente */
        .cat-btn.activo  { background:var(--accent-color); color:#fff; border-color:var(--accent-color); }
        .canal-card.activo { border-color:var(--accent-color)!important; background:rgba(220,38,38,.08)!important; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans min-h-screen overflow-x-hidden">

<!-- NAV -->
<nav class="px-4 md:px-6 py-3 flex items-center justify-between bg-zinc-950/90 backdrop-blur-md sticky top-0 w-full z-50 border-b border-white/5">
    <h1 onclick="location.href='index.html'" class="text-lg md:text-xl font-black italic tracking-tighter cursor-pointer">
        MOVIE<span style="color:var(--accent-color)">M</span>
    </h1>
    <div class="flex items-center gap-3">
        <div class="flex items-center gap-1.5 bg-red-600/10 border border-red-600/30 px-3 py-1.5 rounded-full">
            <span class="w-2 h-2 rounded-full bg-red-500 live-dot"></span>
            <span class="text-[10px] font-black uppercase tracking-widest text-red-400">En Vivo</span>
        </div>
        <button onclick="location.href='index.html'" class="text-[10px] font-bold uppercase tracking-widest text-zinc-400 hover:text-white transition">← Inicio</button>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-3 md:px-6 pt-5 pb-28 md:pb-8">
    <div class="flex flex-col lg:flex-row gap-5 md:gap-6">

        <!-- ── PLAYER + INFO ── -->
        <div class="flex-1 min-w-0 fade-in">

            <!-- Player -->
            <div id="playerWrap" class="relative bg-black rounded-2xl overflow-hidden border border-white/[.07] shadow-[0_25px_60px_rgba(0,0,0,.8)] aspect-video mb-4">
                <video id="hlsVideo" class="absolute inset-0 w-full h-full object-contain bg-black hidden" playsinline webkit-playsinline></video>
                <iframe id="iframeEmbed" class="absolute inset-0 w-full h-full border-0 hidden"
                    allowfullscreen webkitallowfullscreen mozallowfullscreen
                    allow="autoplay; encrypted-media; fullscreen" referrerpolicy="no-referrer"></iframe>
                <div id="playerOverlay" class="absolute inset-0 flex flex-col items-center justify-center bg-zinc-950 transition-opacity duration-300 z-10">
                    <div id="overlayContent" class="flex flex-col items-center text-center px-6">
                        <svg class="w-16 h-16 text-zinc-800 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.361a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
                        </svg>
                        <p class="text-zinc-500 text-sm font-bold uppercase tracking-widest">Seleccioná un canal</p>
                    </div>
                </div>
            </div>

            <!-- Info canal -->
            <div class="flex items-center gap-4 mb-4">
                <div class="w-14 h-14 rounded-2xl overflow-hidden bg-white flex items-center justify-center p-1.5 shrink-0 shadow-lg">
                    <img id="logoImg" src="" alt="" class="max-w-full max-h-full object-contain"
                         onerror="this.style.display='none';document.getElementById('logoFallback').style.display='flex'">
                    <span id="logoFallback" class="hidden w-full h-full items-center justify-center text-2xl font-black" style="color:var(--accent-color)"></span>
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-0.5 flex-wrap">
                        <h2 id="nombreCanal" class="text-xl font-black uppercase tracking-tighter">TV en Vivo</h2>
                        <div id="liveBadge" class="hidden items-center gap-1 bg-red-600/10 border border-red-600/30 px-2 py-0.5 rounded-full">
                            <span class="w-1.5 h-1.5 rounded-full bg-red-500 live-dot"></span>
                            <span class="text-[8px] font-black uppercase text-red-400">Live</span>
                        </div>
                    </div>
                    <p id="categoriaCanal" class="text-zinc-500 text-xs font-bold uppercase tracking-widest">Seleccioná un canal para comenzar</p>
                </div>
                <button onclick="toggleFullscreen()" class="shrink-0 bg-zinc-800 hover:bg-zinc-700 p-2.5 rounded-xl transition border border-white/5 active:scale-95">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/>
                    </svg>
                </button>
            </div>

            <!-- Señales alternativas (solo visible si hay embed2) -->
            <div id="senalesWrap" class="hidden mb-4">
                <p class="text-[9px] font-black uppercase tracking-[.25em] text-zinc-500 mb-2 flex items-center gap-2">
                    <span class="w-4 h-px inline-block" style="background:var(--accent-color)"></span>Señales disponibles
                </p>
                <div class="flex gap-2 flex-wrap">
                    <button id="btnSenal1" onclick="cambiarSenal(1)"
                        class="px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest border transition active:scale-95">
                        📡 Señal 1
                    </button>
                    <button id="btnSenal2" onclick="cambiarSenal(2)"
                        class="px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest border transition active:scale-95">
                        📡 Señal 2
                    </button>
                </div>
            </div>

            <!-- Aviso -->
            <div class="bg-zinc-900/40 border border-white/5 rounded-xl px-4 py-3 flex gap-3 text-xs text-zinc-500 items-start">
                <svg class="w-4 h-4 shrink-0 mt-0.5 text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span>Si algún servidor falla o no funciona, por favor reportar el problema.</span>
            </div>
        </div>

        <!-- ── SIDEBAR ── -->
        <aside class="w-full lg:w-72 shrink-0 fade-in" style="animation-delay:.1s">
            <div class="relative mb-3">
                <input id="searchInput" oninput="filtrarCanales()" type="text" placeholder="Buscar canal..."
                    class="w-full bg-zinc-900 border border-white/10 rounded-xl px-4 py-2.5 pr-9 text-sm text-white placeholder-zinc-600 outline-none focus:border-red-600 transition">
                <svg class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-600 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
            </div>
            <div id="categorias" class="flex gap-2 mb-3 overflow-x-auto no-scrollbar pb-1"></div>
            <p class="text-[10px] font-black uppercase tracking-[.25em] text-zinc-500 mb-3 flex items-center gap-2">
                <span class="w-4 h-px inline-block" style="background:var(--accent-color)"></span>
                <span id="sidebarLabel">Canales</span>
            </p>
            <div id="sidebar" class="space-y-1.5 lg:overflow-y-auto no-scrollbar lg:max-h-[calc(100vh-300px)]"></div>
        </aside>
    </div>
</main>

<script>
// ── Tema ─────────────────────────────────────────────────────────────────────
var saved = localStorage.getItem('movieM_color');
if (saved) document.documentElement.style.setProperty('--accent-color', saved);

// ── CANALES ───────────────────────────────────────────────────────────────────
// type: "hls"    → usa hls.js con reintentos por proxy si falla
// type: "iframe" → carga en iframe directo
// embed2 (opcional) → segunda señal para el mismo canal
var CANALES = [

// ── PROXIES CORS (solo para type:"hls") ───────────────────────────────────────
var CORS_PROXIES = [
    function(u){ return 'https://corsproxy.io/?' + encodeURIComponent(u); },
    function(u){ return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u); }
];

// ── Estado ───────────────────────────────────────────────────────────────────
var categorias  = [...new Set(CANALES.map(function(c){ return c.cat; }))];
var catActiva   = 'Todos';
var canalActual = null;
var hlsInstance = null;

// ── UI helpers ────────────────────────────────────────────────────────────────
function accentClass(active) {
    return active
        ? 'px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest border transition active:scale-95 text-white'
        : 'px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest border border-white/10 text-zinc-400 hover:text-white transition active:scale-95';
}

function setAccentBtn(el, active) {
    el.className = accentClass(active);
    el.style.background     = active ? 'var(--accent-color)' : '';
    el.style.borderColor    = active ? 'var(--accent-color)' : '';
}

function showOverlay(content) {
    document.getElementById('overlayContent').innerHTML = content;
    var o = document.getElementById('playerOverlay');
    o.style.opacity = '1';
    o.style.pointerEvents = 'auto';
}

function hideOverlay() {
    var o = document.getElementById('playerOverlay');
    o.style.opacity = '0';
    o.style.pointerEvents = 'none';
}

function showSpinner(txt) {
    showOverlay(
        '<svg class="spin w-10 h-10 mb-4" style="color:var(--accent-color)" fill="none" viewBox="0 0 24 24">'
      + '<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>'
      + '<path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>'
      + '</svg>'
      + '<p class="text-zinc-400 text-sm font-bold uppercase tracking-widest">' + (txt || 'Conectando...') + '</p>'
    );
}

function showError(msg) {
    showOverlay(
        '<svg class="w-12 h-12 text-zinc-700 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">'
      + '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>'
      + '</svg>'
      + '<p class="text-zinc-300 text-sm mb-1 font-bold">Sin señal</p>'
      + '<p class="text-zinc-600 text-xs mb-5 max-w-xs text-center">' + (msg || 'El canal está offline o no disponible.') + '</p>'
      + '<button onclick="cargarCanal(canalActual)" class="bg-zinc-800 hover:bg-zinc-700 border border-white/10 text-white px-6 py-2.5 rounded-full font-black text-xs uppercase tracking-widest transition">↺ Reintentar</button>'
    );
}

// ── CARGAR HLS con reintentos por proxy ───────────────────────────────────────
function cargarHLS(url, intentos) {
    intentos = intentos || 0;
    var video  = document.getElementById('hlsVideo');
    var iframe = document.getElementById('iframeEmbed');
    iframe.style.display = 'none'; iframe.src = '';
    video.style.display  = 'block';

    // Construir la URL a intentar
    var target = intentos === 0 ? url : CORS_PROXIES[intentos - 1](url);
    var label  = intentos === 0 ? 'directo' : 'proxy ' + intentos;
    showSpinner('Conectando (' + label + ')...');

    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

    if (Hls.isSupported()) {
        hlsInstance = new Hls({ enableWorker: true, lowLatencyMode: true });
        hlsInstance.loadSource(target);
        hlsInstance.attachMedia(video);
        hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play().catch(function(){});
            hideOverlay();
        });
        hlsInstance.on(Hls.Events.ERROR, function(e, data) {
            if (data.fatal) {
                hlsInstance.destroy(); hlsInstance = null;
                if (intentos < CORS_PROXIES.length) {
                    cargarHLS(url, intentos + 1);
                } else {
                    showError('Fallaron el stream directo y ' + CORS_PROXIES.length + ' proxies.');
                }
            }
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Safari nativo
        video.src = target;
        video.play().catch(function(){});
        hideOverlay();
    } else {
        showError('Tu navegador no soporta HLS.');
    }
}

// ── CARGAR IFRAME ─────────────────────────────────────────────────────────────
function cargarIframe(url) {
    var video  = document.getElementById('hlsVideo');
    var iframe = document.getElementById('iframeEmbed');
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    video.style.display  = 'none';
    iframe.style.display = 'block';
    showSpinner('Cargando...');
    iframe.src = url;
    iframe.onload = function() { hideOverlay(); };
}

// ── CARGAR CANAL (despacha según type) ────────────────────────────────────────
function cargarCanal(canal) {
    if (!canal) return;
    canalActual = canal;

    // Actualizar info
    document.getElementById('nombreCanal').innerText    = canal.nombre;
    document.getElementById('categoriaCanal').innerText = canal.cat + ' · ' + canal.pais;
    var img = document.getElementById('logoImg');
    var lf  = document.getElementById('logoFallback');
    img.style.display = ''; lf.style.display = 'none';
    img.src = canal.logo;
    lf.innerText = canal.nombre.charAt(0);
    document.title = 'MovieM | ' + canal.nombre;

    // Badge live
    var lb = document.getElementById('liveBadge');
    lb.classList.remove('hidden'); lb.classList.add('flex');

    // Marcar card activo
    document.querySelectorAll('.canal-card').forEach(function(el) {
        el.classList.toggle('activo', el.dataset.id === canal.id);
    });

    // Señales alternativas
    var sw = document.getElementById('senalesWrap');
    if (canal.embed2) {
        sw.classList.remove('hidden');
        setAccentBtn(document.getElementById('btnSenal1'), true);
        setAccentBtn(document.getElementById('btnSenal2'), false);
    } else {
        sw.classList.add('hidden');
    }

    // Despachar por tipo
    if (canal.type === 'hls') {
        cargarHLS(canal.url, 0);
    } else {
        cargarIframe(canal.url);
    }
}

// ── CAMBIAR SEÑAL ─────────────────────────────────────────────────────────────
function cambiarSenal(num) {
    if (!canalActual || !canalActual.embed2) return;
    var url = num === 1 ? canalActual.url : canalActual.embed2;
    setAccentBtn(document.getElementById('btnSenal1'), num === 1);
    setAccentBtn(document.getElementById('btnSenal2'), num === 2);
    cargarIframe(url);
}
window.cambiarSenal = cambiarSenal;

// ── FULLSCREEN ────────────────────────────────────────────────────────────────
function toggleFullscreen() {
    var wrap = document.getElementById('playerWrap');
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        (wrap.requestFullscreen || wrap.webkitRequestFullscreen).call(wrap);
    } else {
        (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    }
}
window.toggleFullscreen = toggleFullscreen;

// ── CATEGORIAS ────────────────────────────────────────────────────────────────
function renderCategorias() {
    var wrap = document.getElementById('categorias');
    wrap.innerHTML = '';
    ['Todos'].concat(categorias).forEach(function(cat) {
        var btn = document.createElement('button');
        btn.className = 'cat-btn shrink-0 text-[9px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full border border-white/10 text-zinc-400 transition';
        if (cat === catActiva) btn.classList.add('activo');
        btn.innerText = cat;
        btn.onclick = function() {
            catActiva = cat;
            document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('activo'); });
            btn.classList.add('activo');
            filtrarCanales();
        };
        wrap.appendChild(btn);
    });
}

// ── FILTRAR ───────────────────────────────────────────────────────────────────
function filtrarCanales() {
    var q = document.getElementById('searchInput').value.toLowerCase().trim();
    var lista = CANALES.filter(function(c) {
        return (catActiva === 'Todos' || c.cat === catActiva)
            && (!q || c.nombre.toLowerCase().includes(q) || c.cat.toLowerCase().includes(q));
    });
    document.getElementById('sidebarLabel').innerText = lista.length + ' canal' + (lista.length !== 1 ? 'es' : '');
    renderSidebar(lista);
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function logoError(img) {
    img.style.display = 'none';
    if (img.nextSibling) img.nextSibling.style.display = 'flex';
}
function renderSidebar(lista) {
    var sb = document.getElementById('sidebar');
    sb.innerHTML = '';
    if (!lista.length) {
        sb.innerHTML = '<p class="text-zinc-600 text-xs text-center py-6">Sin resultados</p>';
        return;
    }
    lista.forEach(function(c) {
        var div = document.createElement('div');
        div.className = 'canal-card flex items-center gap-3 bg-zinc-900/50 border border-white/5 rounded-2xl p-3 cursor-pointer transition-all hover:bg-zinc-800/90 hover:translate-x-0.5 active:scale-95'
                      + (canalActual && canalActual.id === c.id ? ' activo' : '');
        div.dataset.id = c.id;
        div.onclick = function() { cargarCanal(c); };
        div.innerHTML =
            '<div class="w-10 h-10 rounded-xl overflow-hidden bg-white flex items-center justify-center p-1 shrink-0">'
          +   '<img src="' + c.logo + '" class="max-w-full max-h-full object-contain" loading="lazy"'
          +   ' onerror="logoError(this)">'
          +   '<span style="display:none;align-items:center;justify-content:center;width:100%;height:100%;font-size:16px;font-weight:900;color:var(--accent-color)">' + c.nombre.charAt(0) + '</span>'
          + '</div>'
          + '<div class="flex-1 min-w-0">'
          +   '<p class="text-xs font-black uppercase tracking-tight truncate">' + c.pais + ' ' + c.nombre + '</p>'
          +   '<p class="text-[9px] text-zinc-600 uppercase font-bold">' + c.cat + '</p>'
          + '</div>'
          + '<span class="w-1.5 h-1.5 rounded-full bg-red-500 live-dot shrink-0"></span>';
        sb.appendChild(div);
    });
}

// ── INIT ─────────────────────────────────────────────────────────────────────
renderCategorias();
filtrarCanales();
</script>

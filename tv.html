<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieM | TV en Vivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
    <style>
        :root { --accent-color: #dc2626; }
        .text-accent { color: var(--accent-color); }
        .bg-accent { background-color: var(--accent-color); }
        .no-scrollbar::-webkit-scrollbar { display:none }
        .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none }
        .live-dot { animation: livepulse 1.5s infinite; }
        @keyframes livepulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.3)} }
        .fade-in { animation: fi .5s ease forwards; opacity:0; }
        @keyframes fi { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .card-canal { transition:all .18s; cursor:pointer; }
        .card-canal:hover { background:rgba(39,39,42,.9)!important; transform:translateY(-1px); }
        .card-canal:active { transform:scale(.97); }
        /* Skeleton */
        @keyframes pulse-bg{0%{background-color:rgba(39,39,42,.5)}50%{background-color:rgba(63,63,70,.5)}100%{background-color:rgba(39,39,42,.5)}}
        .skeleton{animation:pulse-bg 1.5s infinite ease-in-out}
        /* Player overlay fullscreen */
        #playerOverlay {
            display:none;
            background:#000;
            position:fixed;
            top:0; left:0; right:0; bottom:0;
            width:100%; height:100%;
            z-index:200;
            flex-direction:column;
            -webkit-overflow-scrolling:touch;
        }
        #playerOverlay .player-wrap {
            position:relative; flex:1; width:100%; overflow:hidden;
            -webkit-transform:translateZ(0); transform:translateZ(0);
            background:#000;
        }
        #hlsVideo {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:#000;
        }
        #ytFrameOverlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            border:none;
        }
        /* Loading spinner inside player */
        #playerLoading {
            position:absolute; inset:0;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            background:#000; z-index:5;
            transition:opacity .4s;
        }
        #playerLoading.hidden { opacity:0; pointer-events:none; }
        .spin { animation: spinA 1s linear infinite; }
        @keyframes spinA { to{ transform:rotate(360deg) } }
        /* Error state */
        #playerError {
            position:absolute; inset:0;
            display:none; flex-direction:column;
            align-items:center; justify-content:center;
            background:#09090b; z-index:6; text-align:center; padding:2rem;
        }
        /* Tab buttons */
        .tab-btn { transition:all .2s; border-bottom:2px solid transparent; color:#71717a; }
        .tab-btn.active { color:#fff; border-bottom-color:var(--accent-color); }
        /* Country flag filter */
        .filter-btn { transition:all .15s; }
        .filter-btn.active { background:var(--accent-color); color:#fff; border-color:var(--accent-color); }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans min-h-screen overflow-x-hidden">

var CANALES_AR = [
    { id:'tn',        nombre:'TN',          logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Todo_Noticias_2016.svg/300px-Todo_Noticias_2016.svg.png',       categoria:'Noticias',        videoId:'cb12KmMMDJA' },

    { id:'lnmas',     nombre:'LN+',           logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/LN%2B_logo.svg/300px-LN%2B_logo.svg.png',                     categoria:'Noticias',        videoId:'Y30dM3oT9_s' },
    { id:'america',   nombre:'América TV',    logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Am%C3%A9rica_TV_logo_2019.svg/300px-Am%C3%A9rica_TV_logo_2019.svg.png', categoria:'General', videoId:'s8CJLE7EHSA' },

    { id:'nettv',     nombre:'Net TV',        logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1f/Logo_Net_TV.png/300px-Logo_Net_TV.png',                       categoria:'General',         videoId:null, ytHandle:'nettvargentina' },

function renderArgentina() {

// ── PLAYER OVERLAY ───────────────────────────────────────────────
var hlsInstance = null;

function mostrarLoading() {
    document.getElementById('playerLoading').classList.remove('hidden');
    document.getElementById('playerError').style.display = 'none';
}
function ocultarLoading() {
    document.getElementById('playerLoading').classList.add('hidden');
}
function mostrarError() {
    document.getElementById('playerLoading').classList.add('hidden');
    document.getElementById('playerError').style.display = 'flex';
}

function abrirOverlay(nombre) {
    document.getElementById('overlayNombre').innerText = nombre;
    document.getElementById('playerOverlay').style.display = 'flex';
    document.body.style.overflow = 'hidden';
    document.body.style.position = 'fixed';
    document.body.style.width = '100%';
    mostrarLoading();
}

// Abrir canal YouTube (Argentina)
function abrirCanalYT(canal) {
    // Limpiar HLS si estaba
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    document.getElementById('hlsVideo').style.display = 'none';
    document.getElementById('hlsVideo').src = '';

    abrirOverlay(canal.nombre);

    var yt = document.getElementById('ytFrameOverlay');
    yt.style.display = 'block';

    if (canal.videoId) {
        yt.src = 'https://www.youtube-nocookie.com/embed/' + canal.videoId + '?autoplay=1&rel=0&modestbranding=1&controls=1';
        yt.onload = function() { setTimeout(ocultarLoading, 800); };
    } else {
        // Sin video ID — mostrar error con link a YT
        ocultarLoading();
        document.getElementById('playerError').style.display = 'flex';
        document.getElementById('playerError').innerHTML =
            '<svg class="w-14 h-14 text-zinc-700 mb-4" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a2.994 2.994 0 00-2.107-2.117C19.379 3.5 12 3.5 12 3.5s-7.379 0-9.391.569A2.994 2.994 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a2.994 2.994 0 002.107 2.117C4.621 20.5 12 20.5 12 20.5s7.379 0 9.391-.569a2.994 2.994 0 002.107-2.117C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>'
          + '<p class="text-white font-black text-sm mb-1">No disponible como embed</p>'
          + '<p class="text-zinc-500 text-xs mb-5">Este canal no permite reproducción en la app.</p>'
          + '<a href="https://www.youtube.com/@' + (canal.ytHandle||'') + '/live" target="_blank" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2.5 rounded-full font-black text-xs uppercase tracking-widest transition mb-3">Ver en YouTube ↗</a>'
          + '<button onclick="cerrarPlayer()" class="text-zinc-500 text-xs mt-1">Volver</button>';
    }
}

// Abrir canal IPTV con HLS.js
function abrirCanalIPTV(canal) {
    // Limpiar YouTube
    var yt = document.getElementById('ytFrameOverlay');
    yt.style.display = 'none';
    yt.src = '';

    abrirOverlay(canal.nombre);

    var video = document.getElementById('hlsVideo');
    video.style.display = 'block';

    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

    if (Hls.isSupported()) {
        hlsInstance = new Hls({
            enableWorker: true,
            lowLatencyMode: true,
            backBufferLength: 90,
        });
        hlsInstance.loadSource(canal.url);
        hlsInstance.attachMedia(video);
        hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play().catch(function(){});
            setTimeout(ocultarLoading, 600);
        });
        hlsInstance.on(Hls.Events.ERROR, function(event, data) {
            if (data.fatal) mostrarError();
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Safari nativo
        video.src = canal.url;
        video.addEventListener('loadedmetadata', function() {
            video.play().catch(function(){});
            ocultarLoading();
        });
        video.addEventListener('error', mostrarError);
    } else {
        mostrarError();
    }
}

window.cerrarPlayer = function() {
    document.getElementById('playerOverlay').style.display = 'none';
    // Limpiar video
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    var video = document.getElementById('hlsVideo');
    video.pause(); video.src = ''; video.style.display = 'none';
    var yt = document.getElementById('ytFrameOverlay');
    yt.src = ''; yt.style.display = 'none';
    document.body.style.overflow = '';
    document.body.style.position = '';
    document.body.style.width = '';
};

window.fullscreenPlayer = function() {
    var el = document.getElementById('playerOverlay');
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
};

// ── TABS ─────────────────────────────────────────────────────────
var iptvCargado = false;
window.mostrarTab = function(tab) {
    document.getElementById('seccion-argentina').classList.toggle('hidden', tab !== 'argentina');
    document.getElementById('seccion-iptv').classList.toggle('hidden', tab !== 'iptv');
    document.getElementById('tab-argentina').classList.toggle('active', tab === 'argentina');
    document.getElementById('tab-iptv').classList.toggle('active', tab === 'iptv');
    if (tab === 'iptv' && !iptvCargado) { cargarIPTV(); iptvCargado = true; }
};

// ── IPTV — cargar y parsear m3u ───────────────────────────────────
var todosCanalesIPTV = [];
var canalesFiltrados = [];

function parsearM3U(texto) {
    var canales = [];
    var lineas = texto.split('\n');
    var actual = null;
    for (var i = 0; i < lineas.length; i++) {
        var linea = lineas[i].trim();
        if (linea.startsWith('#EXTINF')) {
            actual = {};
            // nombre
            var partes = linea.split(',');
            actual.nombre = partes.length > 1 ? partes[partes.length-1].trim() : 'Canal';
            // atributos
            var attrMatch = linea.match(/tvg-logo="([^"]*)"/);
            actual.logo = attrMatch ? attrMatch[1] : '';
            var paisMatch = linea.match(/tvg-country="([^"]*)"/);
            actual.pais = paisMatch ? paisMatch[1] : '';
            var catMatch = linea.match(/group-title="([^"]*)"/);
            actual.categoria = catMatch ? catMatch[1] : 'General';
        } else if (linea && !linea.startsWith('#') && actual) {
            actual.url = linea;
            if (actual.nombre && actual.url) canales.push(actual);
            actual = null;
        }
    }
    return canales;
}

function cargarIPTV() {
    // Usar proxy CORS para evitar bloqueo
    var url = 'https://corsproxy.io/?' + encodeURIComponent('https://iptv-org.github.io/iptv/index.m3u');
    fetch(url)
        .then(function(r) { return r.text(); })
        .then(function(texto) {
            todosCanalesIPTV = parsearM3U(texto);
            // Limitar a 2000 canales para performance
            if (todosCanalesIPTV.length > 2000) todosCanalesIPTV = todosCanalesIPTV.slice(0, 2000);
            poblarFiltros();
            canalesFiltrados = todosCanalesIPTV;
            renderGridIPTV();
            document.getElementById('iptvStatus').style.display = 'none';
        })
        .catch(function(err) {
            console.error(err);
            document.getElementById('iptvStatus').innerHTML =
                '<p class="text-zinc-500 text-sm">No se pudo cargar la lista. Intentá de nuevo.</p>'
              + '<button onclick="cargarIPTV()" class="mt-3 bg-zinc-800 hover:bg-zinc-700 text-white px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest transition">Reintentar</button>';
        });
}

function poblarFiltros() {
    var paises = [...new Set(todosCanalesIPTV.map(function(c){ return c.pais; }).filter(Boolean))].sort();
    var cats   = [...new Set(todosCanalesIPTV.map(function(c){ return c.categoria; }).filter(Boolean))].sort();

    var selPais = document.getElementById('filtroPais');
    paises.forEach(function(p) {
        var o = document.createElement('option'); o.value = p; o.textContent = p;
        selPais.appendChild(o);
    });
    var selCat = document.getElementById('filtroCategoria');
    cats.forEach(function(c) {
        var o = document.createElement('option'); o.value = c; o.textContent = c;
        selCat.appendChild(o);
    });
}

window.filtrarIPTV = function() {
    var busq  = document.getElementById('buscadorIPTV').value.toLowerCase();
    var pais  = document.getElementById('filtroPais').value;
    var cat   = document.getElementById('filtroCategoria').value;
    canalesFiltrados = todosCanalesIPTV.filter(function(c) {
        return (!busq || c.nombre.toLowerCase().includes(busq))
            && (!pais || c.pais === pais)
            && (!cat  || c.categoria === cat);
    });
    renderGridIPTV();
};

function renderGridIPTV() {
    var grid = document.getElementById('gridIPTV');
    var contador = document.getElementById('contadorIPTV');
    grid.innerHTML = '';
    contador.classList.remove('hidden');
    contador.innerText = canalesFiltrados.length + ' canales';

    // Mostrar máx 300 a la vez para no trabar el browser
    var visible = canalesFiltrados.slice(0, 300);
    visible.forEach(function(c) {
        var div = document.createElement('div');
        div.className = 'card-canal bg-zinc-900/60 border border-white/5 rounded-2xl p-3 flex flex-col items-center gap-2 fade-in';
        var logoHtml = c.logo
            ? '<img src="' + c.logo + '" class="max-w-full max-h-full object-contain" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
              + '<span style="display:none" class="text-red-600 font-black text-lg">▶</span>'
            : '<span class="text-red-600 font-black text-xl">▶</span>';
        div.innerHTML =
            '<div class="w-14 h-14 rounded-xl overflow-hidden bg-zinc-800 flex items-center justify-center p-1.5 shadow">'
          +   logoHtml
          + '</div>'
          + '<div class="text-center w-full">'
          +   '<p class="text-[10px] font-black uppercase tracking-tight leading-tight line-clamp-2">' + c.nombre + '</p>'
          +   (c.pais ? '<p class="text-[8px] text-zinc-600 font-bold mt-0.5">' + c.pais + (c.categoria ? ' · ' + c.categoria : '') + '</p>' : '')
          + '</div>'
          + '<div class="flex items-center gap-1 bg-red-600/10 border border-red-600/20 px-2 py-0.5 rounded-full">'
          +   '<span class="w-1.5 h-1.5 rounded-full bg-red-500 live-dot"></span>'
          +   '<span class="text-[8px] font-black uppercase text-red-400">Live</span>'
          + '</div>';
        div.onclick = (function(canal){ return function(){ abrirCanalIPTV(canal); }; })(c);
        grid.appendChild(div);
    });

    if (canalesFiltrados.length > 300) {
        var msg = document.createElement('p');
        msg.className = 'col-span-full text-center text-zinc-600 text-xs py-4';
        msg.innerText = 'Mostrando 300 de ' + canalesFiltrados.length + '. Usá los filtros para refinar.';
        grid.appendChild(msg);
    }
}

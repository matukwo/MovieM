<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV en Vivo - El Trece</title>
    <style>
        /* Estilos básicos para la página */
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e; /* Fondo oscuro */
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #ff9800; /* Color naranja para el título */
            margin-bottom: 20px;
        }

        /* Contenedor responsivo para el iframe (mantiene proporción 16:9) */
        .video-container {
            position: relative;
            width: 100%;
            max-width: 800px; /* Ancho máximo del reproductor */
            padding-bottom: 56.25%; /* Proporción 16:9 */
            background-color: #000;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <h1>El Trece</h1>

    <div class="video-container">
        <iframe 
            src="https://hlsplayer.net/embed?type=m3u8&src=https://livetrx01.vodgc.net/eltrecetv/index.m3u8" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>

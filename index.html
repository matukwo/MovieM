<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MovieM | Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .input-premium {
            background: rgba(24, 24, 27, 0.8);
            border: 1px solid rgba(63, 63, 70, 0.5);
            transition: all 0.3s ease;
        }
        .input-premium:focus {
            border-color: var(--accent-color, #dc2626);
            background: rgba(39, 39, 42, 1);
            box-shadow: 0 0 15px rgba(220, 38, 38, 0.1);
        }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .text-accent { color: var(--accent-color, #dc2626); }
        .bg-accent { background-color: var(--accent-color, #dc2626); }
        .border-accent { border-color: var(--accent-color, #dc2626); }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans">

<nav class="p-6 grid grid-cols-3 items-center bg-zinc-950/80 backdrop-blur-md fixed top-0 w-full z-50 border-b border-white/5">
    <div class="flex space-x-6 text-xs font-bold uppercase tracking-widest text-zinc-400">
        <a href="index.html" class="hover:text-white transition">Inicio</a>
        <a href="#" class="hover:text-white transition">Series</a>
        <a href="milista.html" class="hover:text-white transition">Mi Lista</a>
    </div>
    <div class="flex justify-center">
        <h1 class="text-3xl font-black text-accent tracking-tighter cursor-pointer" onclick="window.location.href='index.html'">
            MOVIE<span class="text-white font-light">M</span>
        </h1>
    </div>
    <div class="flex items-center justify-end gap-4">
        <div class="relative hidden md:block">
            <input type="text" id="buscador" placeholder="Buscar..." class="bg-zinc-900 border border-zinc-800 text-white text-xs rounded-full py-2 px-4 pl-10 focus:ring-1 focus:ring-red-600 w-40 transition-all focus:w-52">
            <span class="absolute left-3 top-2 text-zinc-500 text-sm">🔍</span>
        </div>
        <button id="btnUsuario" class="w-10 h-10 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center hover:bg-accent transition group shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-zinc-400 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
        </button>
    </div>
</nav>

<div id="toastContainer" class="fixed bottom-6 right-6 z-[200] flex flex-col gap-3"></div>

<div id="modalLogin" class="fixed top-24 right-6 z-[100] hidden">
    <div id="modalCard" class="bg-zinc-900/95 backdrop-blur-xl border border-white/10 w-80 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] overflow-hidden relative transition-all">
        <div class="h-1.5 w-full bg-accent"></div>
        
        <div class="p-8">
            <div id="contenidoLogin">
                <h3 id="modalTitulo" class="text-xl font-black italic uppercase tracking-tighter mb-1">Bienvenido</h3>
                <p id="modalSubtitulo" class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mb-6">Ingresa tus datos para continuar</p>
                
                <div class="space-y-4">
                    <input type="text" id="nicknameUsuario" placeholder="Usuario" class="w-full input-premium p-3 rounded-xl text-sm outline-none hidden">
                    
                    <input type="text" id="nombreUsuario" placeholder="Email" class="w-full input-premium p-3 rounded-xl text-sm outline-none">
                    <input type="password" id="passUsuario" placeholder="Contraseña" class="w-full input-premium p-3 rounded-xl text-sm outline-none text-white">
                    <input type="password" id="confirmPass" placeholder="Confirmar contraseña" class="w-full input-premium p-3 rounded-xl text-sm outline-none hidden text-white">
                    
                    <button id="btnAccionPrincipal" onclick="procesarUsuario()" class="w-full bg-accent hover:opacity-90 text-white font-black py-4 rounded-xl text-xs uppercase tracking-[0.2em] transition-all active:scale-95 shadow-lg">
                        Entrar
                    </button>
                </div>

                <div class="mt-6 pt-6 border-t border-white/5 text-center">
                    <p id="textoToggle" class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">
                        ¿No tienes cuenta? <button onclick="toggleModoRegistro(true)" class="text-accent hover:underline">Regístrate</button>
                    </p>
                </div>
            </div>

            <div id="perfilActivo" class="hidden text-center">
                <div class="relative w-20 h-20 mx-auto mb-4">
                    <div class="absolute inset-0 bg-accent rounded-full blur-md opacity-20"></div>
                    <div id="avatarCirculo" class="relative w-20 h-20 bg-zinc-800 border-2 border-accent rounded-full flex items-center justify-center text-4xl font-black italic shadow-2xl text-white">
                        <span id="inicialUsuario">M</span>
                    </div>
                </div>
                <p class="text-zinc-200 font-black uppercase tracking-tighter text-lg mb-1" id="saludoUsuario">Hola</p>
                
                <button onclick="window.location.href='perfil.html'" class="w-full mt-4 bg-zinc-800/50 hover:bg-accent text-white text-[10px] font-bold py-3 rounded-xl uppercase tracking-widest transition border border-white/5">
                    Mi Perfil
                </button>
                
                <div class="mt-6 space-y-4 text-left border-t border-white/5 pt-4">
                    <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">Color de Acento</p>
                    <div class="flex gap-3 justify-center">
                        <div onclick="cambiarColor('#dc2626')" class="w-6 h-6 rounded-full bg-red-600 cursor-pointer border-2 border-transparent hover:scale-110 transition"></div>
                        <div onclick="cambiarColor('#2563eb')" class="w-6 h-6 rounded-full bg-blue-600 cursor-pointer border-2 border-transparent hover:scale-110 transition"></div>
                        <div onclick="cambiarColor('#16a34a')" class="w-6 h-6 rounded-full bg-green-600 cursor-pointer border-2 border-transparent hover:scale-110 transition"></div>
                        <div onclick="cambiarColor('#9333ea')" class="w-6 h-6 rounded-full bg-purple-600 cursor-pointer border-2 border-transparent hover:scale-110 transition"></div>
                    </div>
                </div>

                <button onclick="cerrarSesion()" class="w-full mt-8 py-3 rounded-xl border border-zinc-800 text-[10px] font-bold uppercase tracking-widest text-zinc-500 hover:text-white hover:bg-zinc-800 transition">
                    Cerrar Sesión
                </button>
            </div>
        </div>
    </div>
</div>

<main class="pt-28 pl-8">
    <section id="seccionResultados" class="mb-10 hidden pr-8">
        <h2 class="text-2xl font-semibold mb-6 text-accent italic uppercase tracking-tighter">Resultados de búsqueda</h2>
        <div id="resultadosBusqueda" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
        <div class="h-px w-full bg-zinc-800 my-10"></div>
    </section>

    <div id="contenidoPrincipal" class="transition-opacity duration-500">
        <section class="mb-14 relative group">
            <h2 class="text-2xl font-black italic uppercase tracking-tighter mb-6 text-zinc-100">Tendencias Ahora</h2>
            <button onclick="scrollFila('tendencias', -500)" class="absolute left-0 top-1/2 z-40 bg-black/80 backdrop-blur-md p-3 -translate-y-1/2 rounded-full hidden group-hover:block border border-white/10 hover:bg-accent transition shadow-2xl">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <div id="tendencias" class="flex gap-4 overflow-x-auto no-scrollbar pb-4 scroll-smooth"></div>
            <button onclick="scrollFila('tendencias', 500)" class="absolute right-8 top-1/2 z-40 bg-black/80 backdrop-blur-md p-3 -translate-y-1/2 rounded-full hidden group-hover:block border border-white/10 hover:bg-accent transition shadow-2xl">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"/></svg>
            </button>
        </section>

        <section class="mb-14 relative group">
            <h2 class="text-2xl font-black italic uppercase tracking-tighter mb-6 text-zinc-100">Pura Acción</h2>
            <button onclick="scrollFila('accion', -500)" class="absolute left-0 top-1/2 z-40 bg-black/80 backdrop-blur-md p-3 -translate-y-1/2 rounded-full hidden group-hover:block border border-white/10 hover:bg-accent transition shadow-2xl">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <div id="accion" class="flex gap-4 overflow-x-auto no-scrollbar pb-4 scroll-smooth"></div>
            <button onclick="scrollFila('accion', 500)" class="absolute right-8 top-1/2 z-40 bg-black/80 backdrop-blur-md p-3 -translate-y-1/2 rounded-full hidden group-hover:block border border-white/10 hover:bg-accent transition shadow-2xl">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"/></svg>
            </button>
        </section>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAn5N7m7EhICK2aZG4Nx8DIW9RZd9kK1DA",
        authDomain: "moviem-5b73d.firebaseapp.com",
        projectId: "moviem-5b73d",
        storageBucket: "moviem-5b73d.firebasestorage.app",
        messagingSenderId: "843796138544",
        appId: "1:843796138544:web:c2bde9b39d437b84d97bf5",
        measurementId: "G-7FH2FMPYZT"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc'; 
    const BASE_IMAGE = 'https://image.tmdb.org/t/p/w500';
    let esModoRegistro = false;

    window.notificar = function(mensaje, tipo = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `flex items-center gap-3 bg-zinc-900 border border-white/10 px-6 py-4 rounded-2xl shadow-2xl translate-x-10 opacity-0 transition-all duration-500 border-l-4 ${tipo === 'success' ? 'border-l-green-500' : 'border-l-red-600'}`;
        toast.innerHTML = `<span class="text-xs font-bold uppercase tracking-widest">${mensaje}</span>`;
        container.appendChild(toast);
        setTimeout(() => { toast.classList.remove('translate-x-10', 'opacity-0'); }, 100);
        setTimeout(() => { 
            toast.classList.add('translate-x-10', 'opacity-0');
            setTimeout(() => toast.remove(), 500);
        }, 3000);
    }

    window.cambiarColor = function(hex) {
        document.documentElement.style.setProperty('--accent-color', hex);
        localStorage.setItem('movieM_color', hex);
        notificar("Color de acento actualizado");
    }

    window.toggleModoRegistro = function(modo) {
        esModoRegistro = modo;
        const titulo = document.getElementById('modalTitulo');
        const subtitulo = document.getElementById('modalSubtitulo');
        const btnAccion = document.getElementById('btnAccionPrincipal');
        const nickField = document.getElementById('nicknameUsuario');
        const confirmPass = document.getElementById('confirmPass');
        const textoToggle = document.getElementById('textoToggle');

        if (modo) {
            titulo.innerText = "Crea tu cuenta";
            subtitulo.innerText = "Únete a la comunidad MovieM";
            btnAccion.innerText = "Crear Cuenta";
            nickField.classList.remove('hidden');
            confirmPass.classList.remove('hidden');
            textoToggle.innerHTML = `¿Ya tienes cuenta? <button onclick="toggleModoRegistro(false)" class="text-accent hover:underline">Inicia Sesión</button>`;
        } else {
            titulo.innerText = "Bienvenido";
            subtitulo.innerText = "Ingresa tus datos para continuar";
            btnAccion.innerText = "Entrar";
            nickField.classList.add('hidden');
            confirmPass.classList.add('hidden');
            textoToggle.innerHTML = `¿No tienes cuenta? <button onclick="toggleModoRegistro(true)" class="text-accent hover:underline">Regístrate</button>`;
        }
    }

    window.procesarUsuario = async function() {
        const email = document.getElementById('nombreUsuario').value;
        const nickname = document.getElementById('nicknameUsuario').value;
        const p = document.getElementById('passUsuario').value;
        const cp = document.getElementById('confirmPass').value;
        const card = document.getElementById('modalCard');

        if(!email || !p || (esModoRegistro && !nickname)) {
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 400);
            notificar("Completa todos los campos", "error");
            return;
        }

        try {
            if (esModoRegistro) {
                if(p !== cp) {
                    card.classList.add('shake');
                    setTimeout(() => card.classList.remove('shake'), 400);
                    notificar("Las contraseñas no coinciden", "error");
                    return;
                }
                const res = await createUserWithEmailAndPassword(auth, email, p);
                await setDoc(doc(db, "usuarios", res.user.uid), {
                    username: nickname,
                    email: email,
                    color: localStorage.getItem('movieM_color') || '#dc2626'
                });
                notificar("¡Cuenta creada!");
            } else {
                await signInWithEmailAndPassword(auth, email, p);
                notificar("¡Bienvenido!");
            }
        } catch (error) {
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 400);
            notificar(error.message, "error");
        }
    }

    window.mostrarPerfil = function(n) {
        document.getElementById('contenidoLogin').classList.add('hidden');
        document.getElementById('perfilActivo').classList.remove('hidden');
        document.getElementById('saludoUsuario').innerText = n;
        document.getElementById('inicialUsuario').innerText = n.charAt(0).toUpperCase();
    }

    window.cerrarSesion = async function() { 
        await signOut(auth);
        notificar("Sesión cerrada");
        setTimeout(() => location.reload(), 1000);
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const docSnap = await getDoc(doc(db, "usuarios", user.uid));
            const nombre = docSnap.exists() ? docSnap.data().username : user.email.split('@')[0];
            mostrarPerfil(nombre);
        } else {
            document.getElementById('contenidoLogin').classList.remove('hidden');
            document.getElementById('perfilActivo').classList.add('hidden');
        }
    });

    window.crearCard = function(peli) {
        const puntaje = peli.vote_average ? peli.vote_average.toFixed(1) : 'S/R';
        const card = document.createElement('div');
        card.className = "min-w-[160px] md:min-w-[200px] cursor-pointer hover:scale-105 transition-transform duration-300 relative group mb-4";
        card.innerHTML = `
            <div class="relative">
                <img src="${peli.poster_path ? BASE_IMAGE + peli.poster_path : 'https://via.placeholder.com/500x750?text=Sin+Poster'}" class="rounded-xl shadow-lg mb-2 border border-white/5 w-full" 
                     onclick="window.location.href='pelicula.html?id=${peli.id}'">
                <div class="absolute top-2 right-2 bg-black/80 backdrop-blur-md text-yellow-500 text-[10px] font-black px-2 py-1 rounded-lg border border-white/10 flex items-center gap-1 shadow-lg">
                    ⭐ ${puntaje}
                </div>
            </div>
            <p class="text-[10px] text-center truncate w-full font-bold uppercase tracking-tighter text-zinc-500 group-hover:text-accent transition mt-2">${peli.title}</p>
        `;
        return card;
    }

    async function cargarSeccion(url, contenedorId) {
        const res = await fetch(url);
        const data = await res.json();
        const contenedor = document.getElementById(contenedorId);
        data.results.forEach(peli => { contenedor.appendChild(crearCard(peli)); });
    }

    const inputBuscador = document.getElementById('buscador');
    inputBuscador.addEventListener('input', async (e) => {
        const query = e.target.value.trim();
        const seccionResultados = document.getElementById('seccionResultados');
        const contenedorResultados = document.getElementById('resultadosBusqueda');
        const contenidoPrincipal = document.getElementById('contenidoPrincipal');

        if (query.length > 2) {
            const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&language=es-ES&query=${query}`);
            const data = await res.json();
            contenedorResultados.innerHTML = "";
            seccionResultados.classList.remove('hidden');
            contenidoPrincipal.classList.add('opacity-20');
            data.results.forEach(peli => { contenedorResultados.appendChild(crearCard(peli)); });
        } else {
            seccionResultados.classList.add('hidden');
            contenidoPrincipal.classList.remove('opacity-20');
        }
    });

    cargarSeccion(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}&language=es-ES`, 'tendencias');
    cargarSeccion(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=28&language=es-ES`, 'accion');

    window.scrollFila = function(id, d) { document.getElementById(id).scrollBy({ left: d, behavior: 'smooth' }); }

    const color = localStorage.getItem('movieM_color');
    if (color) document.documentElement.style.setProperty('--accent-color', color);
    document.getElementById('btnUsuario').onclick = () => document.getElementById('modalLogin').classList.toggle('hidden');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieM | Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="firebase-config.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
        body{background-color:#09090b;color:#fff;font-family:sans-serif;overflow-x:hidden}
        
        /* Estilo para la transición suave del Hero */
        #heroBackdrop {
            transition: background-image 0.8s ease-in-out, opacity 0.8s ease-in-out;
        }
        .fade-out { opacity: 0; }
        .fade-in { opacity: 0.4; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 bg-gradient-to-b from-zinc-950 to-transparent px-4 py-4 md:px-8 flex justify-between items-center border-b border-white/5 backdrop-blur-sm">
        <span class="text-red-600 font-black tracking-tighter text-2xl">MOVIE<span class="text-white font-light">M</span></span>
        <div id="userHUD" class="hidden items-center gap-3 bg-black/40 backdrop-blur-md p-1 pr-4 rounded-full border border-white/10">
            <div class="w-8 h-8 rounded-full bg-red-600 flex items-center justify-center font-black text-white text-xs" id="userInitial">?</div>
            <span id="userNameHUD" class="text-[10px] font-bold uppercase tracking-widest hidden md:inline">Usuario</span>
        </div>
    </nav>

    <header class="relative h-[70vh] flex items-center px-4 md:px-8 pt-20 overflow-hidden">
        <div id="heroBackdrop" class="absolute inset-0 bg-cover bg-center -z-10 opacity-40"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/40 to-transparent -z-10"></div>
        
        <div class="max-w-2xl transition-all duration-500" id="heroContent">
            <h1 id="heroTitulo" class="text-5xl md:text-7xl font-black italic uppercase tracking-tighter leading-none mb-4">Cargando...</h1>
            <p id="heroSinopsis" class="text-zinc-400 text-sm md:text-lg line-clamp-3 mb-6 font-medium"></p>
            <div class="flex gap-3">
                <button id="heroBtn" class="bg-white text-black px-8 py-3 rounded-full font-black uppercase text-sm hover:bg-red-600 hover:text-white transition shadow-xl">Ver ahora</button>
            </div>
        </div>

        <div id="sliderDots" class="absolute bottom-24 left-4 md:left-8 flex gap-2"></div>
    </header>

    <main class="px-4 md:px-8 -mt-16 relative z-10 space-y-12 pb-20">
        <section id="sec-continuar" class="hidden">
            <h2 class="text-sm font-black uppercase tracking-widest mb-4 text-zinc-500 italic">Continuar viendo</h2>
            <div id="continuarFila" class="flex gap-4 overflow-x-auto no-scrollbar pb-4"></div>
        </section>

        <section>
            <h2 class="text-sm font-black uppercase tracking-widest mb-4 text-zinc-500 italic">Tendencias</h2>
            <div id="tendencias" class="flex gap-4 overflow-x-auto no-scrollbar pb-4"></div>
        </section>

        <section>
            <h2 class="text-sm font-black uppercase tracking-widest mb-4 text-zinc-500 italic">Acción</h2>
            <div id="accion" class="flex gap-4 overflow-x-auto no-scrollbar pb-4"></div>
        </section>
    </main>

    <script type="module">
        const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';
        let peliculasSlider = [];
        let currentIndex = 0;

        window.onAuthStateChanged(window.auth, (user) => {
            if (user) {
                const nombre = localStorage.getItem('usuarioMovieM');
                document.getElementById('userHUD').classList.replace('hidden', 'flex');
                document.getElementById('userNameHUD').innerText = nombre || 'Usuario';
                document.getElementById('userInitial').innerText = (nombre ? nombre[0] : 'U').toUpperCase();
                cargarContinuar(user.uid);
            }
        });

        // --- LÓGICA DEL SLIDER ---
        function actualizarHero(index) {
            const p = peliculasSlider[index];
            const backdrop = document.getElementById('heroBackdrop');
            const content = document.getElementById('heroContent');
            
            // Efecto de parpadeo suave al cambiar
            backdrop.style.opacity = "0";
            content.style.opacity = "0";
            content.style.transform = "translateY(10px)";

            setTimeout(() => {
                backdrop.style.backgroundImage = `url('https://image.tmdb.org/t/p/original${p.backdrop_path}')`;
                document.getElementById('heroTitulo').innerText = p.title;
                document.getElementById('heroSinopsis').innerText = p.overview;
                document.getElementById('heroBtn').onclick = () => location.href = 'pelicula.html?id=' + p.id;
                
                backdrop.style.opacity = "0.4";
                content.style.opacity = "1";
                content.style.transform = "translateY(0)";
                
                // Actualizar puntitos
                document.querySelectorAll('.dot').forEach((d, i) => {
                    d.style.backgroundColor = i === index ? '#dc2626' : 'rgba(255,255,255,0.2)';
                    d.style.width = i === index ? '24px' : '8px';
                });
            }, 400);
        }

        function iniciarSlider() {
            // Crear puntitos indicadores
            const dotsCont = document.getElementById('sliderDots');
            peliculasSlider.slice(0, 5).forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'dot h-2 rounded-full transition-all duration-300 bg-white/20 cursor-pointer';
                dot.style.width = '8px';
                dot.onclick = () => { currentIndex = i; actualizarHero(i); };
                dotsCont.appendChild(dot);
            });

            actualizarHero(0);

            // Cambio automático cada 6 segundos
            setInterval(() => {
                currentIndex = (currentIndex + 1) % 5; // Rotar entre las primeras 5
                actualizarHero(currentIndex);
            }, 6000);
        }

        // --- CARGA DE DATOS ---
        async function cargarSeccion(url, contenedorId) {
            const res = await fetch(url);
            const data = await res.json();
            const fila = document.getElementById(contenedorId);
            
            fila.innerHTML = data.results.map(p => `
                <div onclick="location.href='pelicula.html?id=${p.id}'" class="min-w-[130px] md:min-w-[200px] shrink-0 cursor-pointer group">
                    <div class="rounded-xl overflow-hidden border border-white/5 group-hover:border-red-600/50 transition">
                        <img src="https://image.tmdb.org/t/p/w400${p.poster_path}" class="w-full aspect-[2/3] object-cover" loading="lazy">
                    </div>
                </div>
            `).join('');

            // Si es la sección de tendencias, alimentar el slider
            if(contenedorId === 'tendencias') {
                peliculasSlider = data.results;
                iniciarSlider();
            }
        }

        async function cargarContinuar(uid) {
            try {
                const colRef = window.collection(window.db, 'usuarios', uid, 'continuar');
                const q = window.query(colRef, window.orderBy('updatedAt', 'desc'), window.limit(10));
                const snap = await window.getDocs(q);
                const seccion = document.getElementById('sec-continuar');
                if (!snap || snap.empty) return;

                const itemsValidos = snap.docs.map(doc => doc.data()).filter(d => d.titulo && d.poster);
                if (itemsValidos.length === 0) return;

                seccion.classList.remove('hidden');
                document.getElementById('continuarFila').innerHTML = itemsValidos.map(d => `
                    <div onclick="location.href='pelicula.html?id=${d.contentId}'" class="min-w-[140px] md:min-w-[180px] shrink-0 cursor-pointer group">
                        <div class="relative rounded-xl overflow-hidden border border-white/10 group-hover:scale-105 transition duration-300">
                            <img src="${d.poster}" class="w-full aspect-[2/3] object-cover">
                            <div class="absolute bottom-0 left-0 right-0 h-1.5 bg-zinc-900/80">
                                <div class="bg-red-600 h-full" style="width: ${d.porcentaje || 0}%"></div>
                            </div>
                        </div>
                        <p class="text-[10px] font-black mt-2 truncate uppercase text-zinc-400 group-hover:text-white">${d.titulo}</p>
                    </div>
                `).join('');
            } catch(e) { console.error(e); }
        }

        cargarSeccion(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}&language=es-MX`, 'tendencias');
        cargarSeccion(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=28&language=es-MX`, 'accion');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MovieM | Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .input-premium {
            background: rgba(24, 24, 27, 0.8);
            border: 1px solid rgba(63, 63, 70, 0.5);
            transition: all 0.3s ease;
        }
        .input-premium:focus {
            border-color: var(--accent-color, #dc2626);
            background: rgba(39, 39, 42, 1);
            box-shadow: 0 0 15px rgba(220, 38, 38, 0.1);
        }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .text-accent { color: var(--accent-color, #dc2626); }
        .bg-accent { background-color: var(--accent-color, #dc2626); }
        .border-accent { border-color: var(--accent-color, #dc2626); }
        #searchDropdown { max-height: 420px; overflow-y: auto; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans">

<nav class="p-6 grid grid-cols-3 items-center bg-zinc-950/80 backdrop-blur-md fixed top-0 w-full z-50 border-b border-white/5">
    <div class="flex space-x-6 text-xs font-bold uppercase tracking-widest text-zinc-400">
        <a href="index.html" class="hover:text-white transition">Inicio</a>
        <a href="#" class="hover:text-white transition">Series</a>
        <a href="mi_lista.html" class="hover:text-white transition">Mi Lista</a>
    </div>
    <div class="flex justify-center">
        <h1 class="text-3xl font-black text-accent tracking-tighter cursor-pointer" onclick="window.location.href='index.html'">
            MOVIE<span class="text-white font-light">M</span>
        </h1>
    </div>
    <div class="flex items-center justify-end gap-3">
        <!-- Barra de búsqueda unificada -->
        <div class="relative hidden md:block">
            <input type="text" id="buscador" placeholder="Buscar película o usuario..."
                class="bg-zinc-900 border border-zinc-800 text-white text-xs rounded-full py-2.5 px-4 pl-10 focus:ring-1 focus:ring-red-600 w-52 transition-all focus:w-72 outline-none">
            <svg class="absolute left-3 top-2.5 w-4 h-4 text-zinc-500 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <!-- Dropdown unificado -->
            <div id="searchDropdown" class="absolute right-0 top-11 bg-zinc-900 border border-white/10 rounded-2xl shadow-2xl w-80 hidden z-50 no-scrollbar"></div>
        </div>
        <!-- Botón usuario -->
        <button id="btnUsuario" class="w-10 h-10 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center hover:bg-red-600 transition group shadow-lg overflow-hidden shrink-0">
            <span id="navAvatarInner" class="w-full h-full flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-zinc-400 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </span>
        </button>
    </div>
</nav>

<div id="toastContainer" class="fixed bottom-6 right-6 z-[200] flex flex-col gap-3"></div>

<!-- Modal login/perfil -->
<div id="modalLogin" class="fixed top-24 right-6 z-[100] hidden">
    <div id="modalCard" class="bg-zinc-900/95 backdrop-blur-xl border border-white/10 w-80 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] overflow-hidden relative transition-all">
        <div class="h-1.5 w-full bg-accent"></div>
        <div class="p-8">
            <div id="contenidoLogin">
                <h3 id="modalTitulo" class="text-xl font-black italic uppercase tracking-tighter mb-1">Bienvenido</h3>
                <p id="modalSubtitulo" class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mb-6">Ingresa tus datos para continuar</p>
                <div class="space-y-4">
                    <input type="text" id="nicknameUsuario" placeholder="Usuario" class="w-full input-premium p-3 rounded-xl text-sm outline-none hidden">
                    <input type="text" id="nombreUsuario" placeholder="Email" class="w-full input-premium p-3 rounded-xl text-sm outline-none">
                    <input type="password" id="passUsuario" placeholder="Contrase&ntilde;a" class="w-full input-premium p-3 rounded-xl text-sm outline-none text-white">
                    <input type="password" id="confirmPass" placeholder="Confirmar contrase&ntilde;a" class="w-full input-premium p-3 rounded-xl text-sm outline-none hidden text-white">
                    <button id="btnAccionPrincipal" onclick="procesarUsuario()" class="w-full bg-accent hover:opacity-90 text-white font-black py-4 rounded-xl text-xs uppercase tracking-[0.2em] transition-all active:scale-95 shadow-lg">
                        Entrar
                    </button>
                </div>
                <div class="mt-6 pt-6 border-t border-white/5 text-center">
                    <p id="textoToggle" class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">
                        &iquest;No tienes cuenta? <button onclick="toggleModoRegistro(true)" class="text-accent hover:underline">Reg&iacute;strate</button>
                    </p>
                </div>
            </div>
            <div id="perfilActivo" class="hidden text-center">
                <div class="relative w-20 h-20 mx-auto mb-4">
                    <div class="absolute inset-0 bg-accent rounded-full blur-md opacity-20"></div>
                    <div id="avatarCirculo" class="relative w-20 h-20 bg-zinc-800 border-2 border-accent rounded-full flex items-center justify-center text-3xl font-black shadow-2xl text-white overflow-hidden">
                        <span id="inicialUsuario">M</span>
                    </div>
                </div>
                <p class="text-zinc-200 font-black uppercase tracking-tighter text-lg mb-1" id="saludoUsuario">Hola</p>
                <button onclick="window.location.href='perfil.html'" class="w-full mt-4 bg-zinc-800/50 hover:bg-accent text-white text-[10px] font-bold py-3 rounded-xl uppercase tracking-widest transition border border-white/5">
                    Mi Perfil
                </button>
                <div class="mt-6 space-y-3 text-left border-t border-white/5 pt-4">
                    <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">Color de Acento</p>
                    <div class="flex gap-3 justify-center">
                        <div onclick="cambiarColor('#dc2626')" class="w-6 h-6 rounded-full bg-red-600 cursor-pointer hover:scale-110 transition"></div>
                        <div onclick="cambiarColor('#2563eb')" class="w-6 h-6 rounded-full bg-blue-600 cursor-pointer hover:scale-110 transition"></div>
                        <div onclick="cambiarColor('#16a34a')" class="w-6 h-6 rounded-full bg-green-600 cursor-pointer hover:scale-110 transition"></div>
                        <div onclick="cambiarColor('#9333ea')" class="w-6 h-6 rounded-full bg-purple-600 cursor-pointer hover:scale-110 transition"></div>
                    </div>
                </div>
                <button onclick="cerrarSesion()" class="w-full mt-6 py-3 rounded-xl border border-zinc-800 text-[10px] font-bold uppercase tracking-widest text-zinc-500 hover:text-white hover:bg-zinc-800 transition">
                    Cerrar Sesi&oacute;n
                </button>
            </div>
        </div>
    </div>
</div>

<main class="pt-28 pl-8">
    <div id="contenidoPrincipal" class="transition-opacity duration-500">
        <section class="mb-14 relative group">
            <h2 class="text-2xl font-black italic uppercase tracking-tighter mb-6 text-zinc-100">Tendencias Ahora</h2>
            <button onclick="scrollFila('tendencias', -500)" class="absolute left-0 top-1/2 z-40 bg-black/80 backdrop-blur-md p-3 -translate-y-1/2 rounded-full hidden group-hover:block border border-white/10 hover:bg-accent transition shadow-2xl">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <div id="tendencias" class="flex gap-4 overflow-x-auto no-scrollbar pb-4 scroll-smooth"></div>
            <button onclick="scrollFila('tendencias', 500)" class="absolute right-8 top-1/2 z-40 bg-black/80 backdrop-blur-md p-3 -translate-y-1/2 rounded-full hidden group-hover:block border border-white/10 hover:bg-accent transition shadow-2xl">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"/></svg>
            </button>
        </section>
        <section class="mb-14 relative group">
            <h2 class="text-2xl font-black italic uppercase tracking-tighter mb-6 text-zinc-100">Pura Acci&oacute;n</h2>
            <button onclick="scrollFila('accion', -500)" class="absolute left-0 top-1/2 z-40 bg-black/80 backdrop-blur-md p-3 -translate-y-1/2 rounded-full hidden group-hover:block border border-white/10 hover:bg-accent transition shadow-2xl">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <div id="accion" class="flex gap-4 overflow-x-auto no-scrollbar pb-4 scroll-smooth"></div>
            <button onclick="scrollFila('accion', 500)" class="absolute right-8 top-1/2 z-40 bg-black/80 backdrop-blur-md p-3 -translate-y-1/2 rounded-full hidden group-hover:block border border-white/10 hover:bg-accent transition shadow-2xl">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"/></svg>
            </button>
        </section>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAn5N7m7EhICK2aZG4Nx8DIW9RZd9kK1DA",
        authDomain: "moviem-5b73d.firebaseapp.com",
        projectId: "moviem-5b73d",
        storageBucket: "moviem-5b73d.firebasestorage.app",
        messagingSenderId: "843796138544",
        appId: "1:843796138544:web:c2bde9b39d437b84d97bf5"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';
    const BASE_IMAGE = 'https://image.tmdb.org/t/p/w500';
    let esModoRegistro = false;
    let searchTimer = null;

    // ── TOAST ─────────────────────────────────────────────────────
    window.notificar = function(msg, tipo) {
        tipo = tipo || 'success';
        var c = document.getElementById('toastContainer');
        var t = document.createElement('div');
        t.className = 'flex items-center gap-3 bg-zinc-900 border border-white/10 px-6 py-4 rounded-2xl shadow-2xl translate-x-10 opacity-0 transition-all duration-500 border-l-4 ' + (tipo === 'success' ? 'border-l-green-500' : 'border-l-red-600');
        t.innerHTML = '<span class="text-xs font-bold uppercase tracking-widest">' + msg + '</span>';
        c.appendChild(t);
        setTimeout(function() { t.classList.remove('translate-x-10', 'opacity-0'); }, 100);
        setTimeout(function() { t.classList.add('translate-x-10', 'opacity-0'); setTimeout(function() { t.remove(); }, 500); }, 3000);
    };

    window.cambiarColor = function(hex) {
        document.documentElement.style.setProperty('--accent-color', hex);
        localStorage.setItem('movieM_color', hex);
        notificar('Color actualizado');
    };

    // ── LOGIN / REGISTRO ──────────────────────────────────────────
    window.toggleModoRegistro = function(modo) {
        esModoRegistro = modo;
        if (modo) {
            document.getElementById('modalTitulo').innerText = 'Crea tu cuenta';
            document.getElementById('modalSubtitulo').innerText = 'Unete a la comunidad MovieM';
            document.getElementById('btnAccionPrincipal').innerText = 'Crear Cuenta';
            document.getElementById('nicknameUsuario').classList.remove('hidden');
            document.getElementById('confirmPass').classList.remove('hidden');
            document.getElementById('textoToggle').innerHTML = 'Ya tienes cuenta? <button onclick="toggleModoRegistro(false)" class="text-accent hover:underline">Inicia Sesion</button>';
        } else {
            document.getElementById('modalTitulo').innerText = 'Bienvenido';
            document.getElementById('modalSubtitulo').innerText = 'Ingresa tus datos para continuar';
            document.getElementById('btnAccionPrincipal').innerText = 'Entrar';
            document.getElementById('nicknameUsuario').classList.add('hidden');
            document.getElementById('confirmPass').classList.add('hidden');
            document.getElementById('textoToggle').innerHTML = 'No tienes cuenta? <button onclick="toggleModoRegistro(true)" class="text-accent hover:underline">Registrate</button>';
        }
    };

    window.procesarUsuario = async function() {
        var email = document.getElementById('nombreUsuario').value;
        var nickname = document.getElementById('nicknameUsuario').value;
        var p = document.getElementById('passUsuario').value;
        var cp = document.getElementById('confirmPass').value;
        var card = document.getElementById('modalCard');
        if (!email || !p || (esModoRegistro && !nickname)) {
            card.classList.add('shake'); setTimeout(function() { card.classList.remove('shake'); }, 400);
            notificar('Completa todos los campos', 'error'); return;
        }
        try {
            if (esModoRegistro) {
                if (p !== cp) {
                    card.classList.add('shake'); setTimeout(function() { card.classList.remove('shake'); }, 400);
                    notificar('Las contrasenas no coinciden', 'error'); return;
                }
                var res = await createUserWithEmailAndPassword(auth, email, p);
                await setDoc(doc(db, 'usuarios', res.user.uid), { username: nickname, email: email, color: '#dc2626' });
                notificar('Cuenta creada!');
            } else {
                await signInWithEmailAndPassword(auth, email, p);
                notificar('Bienvenido!');
            }
        } catch (err) {
            card.classList.add('shake'); setTimeout(function() { card.classList.remove('shake'); }, 400);
            notificar(err.message, 'error');
        }
    };

    function mostrarPerfilActivo(username, avatarSrc) {
        document.getElementById('contenidoLogin').classList.add('hidden');
        document.getElementById('perfilActivo').classList.remove('hidden');
        document.getElementById('saludoUsuario').innerText = username;
        var inner = document.getElementById('navAvatarInner');
        var circulo = document.getElementById('avatarCirculo');
        if (avatarSrc) {
            inner.innerHTML = '<img src="' + avatarSrc + '" class="w-full h-full object-cover">';
            circulo.innerHTML = '<img src="' + avatarSrc + '" class="w-full h-full object-cover">';
        } else {
            var letra = username.charAt(0).toUpperCase();
            inner.innerHTML = '<span class="text-xs font-black text-white">' + letra + '</span>';
            document.getElementById('btnUsuario').style.backgroundColor = 'var(--accent-color, #dc2626)';
            circulo.innerHTML = '<span>' + letra + '</span>';
        }
    }

    window.cerrarSesion = async function() {
        await signOut(auth);
        notificar('Sesion cerrada');
        setTimeout(function() { location.reload(); }, 1000);
    };

    onAuthStateChanged(auth, async function(user) {
        if (user) {
            var snap = await getDoc(doc(db, 'usuarios', user.uid));
            var data = snap.exists() ? snap.data() : {};
            var nombre = data.username || user.email.split('@')[0];
            var storedUID = localStorage.getItem('movieM_uid');
            if (storedUID && storedUID !== user.uid) localStorage.removeItem('movieM_avatar');
            localStorage.setItem('movieM_uid', user.uid);
            localStorage.setItem('usuarioMovieM', nombre);
            var color = data.color || localStorage.getItem('movieM_color') || '#dc2626';
            document.documentElement.style.setProperty('--accent-color', color);
            mostrarPerfilActivo(nombre, data.avatar || null);
        } else {
            document.getElementById('contenidoLogin').classList.remove('hidden');
            document.getElementById('perfilActivo').classList.add('hidden');
        }
    });

    // ── BÚSQUEDA UNIFICADA ────────────────────────────────────────
    var buscador = document.getElementById('buscador');
    var dropdown = document.getElementById('searchDropdown');

    buscador.addEventListener('input', function() {
        clearTimeout(searchTimer);
        var q = buscador.value.trim();
        if (q.length < 2) { dropdown.classList.add('hidden'); return; }
        searchTimer = setTimeout(function() { buscarTodo(q); }, 350);
    });

    async function buscarTodo(q) {
        dropdown.innerHTML = '<p class="text-zinc-600 text-xs p-4 text-center animate-pulse">Buscando...</p>';
        dropdown.classList.remove('hidden');

        // Buscar películas y usuarios en paralelo
        try {
            var [resPelis, snapUsers] = await Promise.all([
                fetch('https://api.themoviedb.org/3/search/movie?api_key=' + API_KEY + '&language=es-ES&query=' + encodeURIComponent(q)).then(function(r) { return r.json(); }),
                getDocs(collection(db, 'usuarios'))
            ]);

            var peliculas = (resPelis.results || []).slice(0, 4);
            var usuarios = [];
            snapUsers.forEach(function(d) {
                var u = d.data();
                if (u.username && u.username.toLowerCase().indexOf(q.toLowerCase()) !== -1) {
                    usuarios.push({ uid: d.id, username: u.username, avatar: u.avatar || null });
                }
            });
            usuarios = usuarios.slice(0, 3);

            var html = '';

            // Sección usuarios
            if (usuarios.length > 0) {
                html += '<div class="px-4 pt-3 pb-1"><span class="text-[9px] font-black uppercase tracking-[0.2em] text-zinc-500">Usuarios</span></div>';
                usuarios.forEach(function(u) {
                    var letra = u.username.charAt(0).toUpperCase();
                    var av = u.avatar
                        ? '<img src="' + u.avatar + '" class="w-9 h-9 rounded-full object-cover shrink-0 border border-white/10">'
                        : '<div class="w-9 h-9 rounded-full bg-red-600 flex items-center justify-center text-white font-black text-xs shrink-0">' + letra + '</div>';
                    html += '<div class="flex items-center gap-3 px-4 py-2.5 hover:bg-zinc-800/70 cursor-pointer transition" onclick="location.href=\'perfil.html?user=' + encodeURIComponent(u.username) + '\'">' + av + '<div><p class="text-sm font-bold leading-tight">' + u.username + '</p><p class="text-[9px] text-zinc-500 font-bold uppercase">Perfil</p></div></div>';
                });
            }

            // Sección películas
            if (peliculas.length > 0) {
                html += '<div class="px-4 pt-3 pb-1 ' + (usuarios.length > 0 ? 'border-t border-white/5 mt-1' : '') + '"><span class="text-[9px] font-black uppercase tracking-[0.2em] text-zinc-500">Pel&iacute;culas</span></div>';
                peliculas.forEach(function(p) {
                    var poster = p.poster_path ? 'https://image.tmdb.org/t/p/w92' + p.poster_path : 'https://via.placeholder.com/46x69?text=?';
                    var anio = p.release_date ? p.release_date.split('-')[0] : 'S/F';
                    var nota = p.vote_average ? p.vote_average.toFixed(1) : '-';
                    html += '<div class="flex items-center gap-3 px-4 py-2 hover:bg-zinc-800/70 cursor-pointer transition" onclick="location.href=\'pelicula.html?id=' + p.id + '\'">'
                        + '<img src="' + poster + '" class="w-8 h-12 rounded-lg object-cover shrink-0 border border-white/5">'
                        + '<div class="flex-1 min-w-0"><p class="text-sm font-bold truncate leading-tight">' + p.title + '</p>'
                        + '<p class="text-[9px] text-zinc-500 font-bold uppercase">' + anio + ' &nbsp;&middot;&nbsp; &#11088; ' + nota + '</p></div></div>';
                });
            }

            if (peliculas.length === 0 && usuarios.length === 0) {
                html = '<p class="text-zinc-600 text-xs p-4 text-center italic">Sin resultados para "' + q + '"</p>';
            } else {
                html += '<div class="p-2 border-t border-white/5 mt-1"><button onclick="verTodosResultados(\'' + encodeURIComponent(q) + '\')" class="w-full text-[9px] font-black uppercase tracking-widest text-accent py-2 hover:bg-zinc-800 rounded-xl transition">Ver todos los resultados</button></div>';
            }

            dropdown.innerHTML = html;
        } catch(e) {
            console.error(e);
            dropdown.innerHTML = '<p class="text-zinc-600 text-xs p-4 text-center">Error al buscar</p>';
        }
    }

    window.verTodosResultados = function(q) {
        buscador.value = decodeURIComponent(q);
        dropdown.classList.add('hidden');
        mostrarResultadosCompletos(decodeURIComponent(q));
    };

    async function mostrarResultadosCompletos(q) {
        var main = document.getElementById('contenidoPrincipal');
        main.innerHTML = '<div class="pr-8"><h2 class="text-2xl font-black italic uppercase tracking-tighter mb-8 text-zinc-100">Resultados para "<span class="text-accent">' + q + '</span>"</h2><div id="gridResultados" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div></div>';
        var res = await fetch('https://api.themoviedb.org/3/search/movie?api_key=' + API_KEY + '&language=es-ES&query=' + encodeURIComponent(q));
        var data = await res.json();
        var grid = document.getElementById('gridResultados');
        if (data.results) data.results.forEach(function(p) { grid.appendChild(crearCard(p)); });
    }

    document.addEventListener('click', function(e) {
        if (!buscador.contains(e.target) && !dropdown.contains(e.target)) {
            dropdown.classList.add('hidden');
        }
    });

    // ── CARDS ─────────────────────────────────────────────────────
    function crearCard(peli) {
        var puntaje = peli.vote_average ? peli.vote_average.toFixed(1) : 'S/R';
        var poster = peli.poster_path ? BASE_IMAGE + peli.poster_path : 'https://via.placeholder.com/500x750?text=Sin+Poster';
        var card = document.createElement('div');
        card.className = 'min-w-[160px] md:min-w-[200px] cursor-pointer hover:scale-105 transition-transform duration-300 relative group mb-4';
        var inner = document.createElement('div');
        inner.className = 'relative';
        var img = document.createElement('img');
        img.src = poster;
        img.className = 'rounded-xl shadow-lg mb-2 border border-white/5 w-full';
        img.onclick = function() { window.location.href = 'pelicula.html?id=' + peli.id; };
        var badge = document.createElement('div');
        badge.className = 'absolute top-2 right-2 bg-black/80 backdrop-blur-md text-yellow-500 text-[10px] font-black px-2 py-1 rounded-lg border border-white/10 flex items-center gap-1 shadow-lg';
        badge.textContent = '\u2B50 ' + puntaje;
        inner.appendChild(img); inner.appendChild(badge);
        var title = document.createElement('p');
        title.className = 'text-[10px] text-center truncate w-full font-bold uppercase tracking-tighter text-zinc-500 group-hover:text-accent transition mt-2';
        title.textContent = peli.title;
        card.appendChild(inner); card.appendChild(title);
        return card;
    }

    async function cargarSeccion(url, contenedorId) {
        try {
            var res = await fetch(url);
            var data = await res.json();
            var contenedor = document.getElementById(contenedorId);
            if (data.results) data.results.forEach(function(p) { contenedor.appendChild(crearCard(p)); });
        } catch(e) { console.error('Error:', e); }
    }

    // ── INIT ──────────────────────────────────────────────────────
    window.scrollFila = function(id, d) { document.getElementById(id).scrollBy({ left: d, behavior: 'smooth' }); };

    var colorGuardado = localStorage.getItem('movieM_color');
    if (colorGuardado) document.documentElement.style.setProperty('--accent-color', colorGuardado);

    document.getElementById('btnUsuario').onclick = function() {
        document.getElementById('modalLogin').classList.toggle('hidden');
    };

    cargarSeccion('https://api.themoviedb.org/3/trending/movie/week?api_key=' + API_KEY + '&language=es-ES', 'tendencias');
    cargarSeccion('https://api.themoviedb.org/3/discover/movie?api_key=' + API_KEY + '&with_genres=28&language=es-ES', 'accion');
</script>

<!DOCTYPE html>
<html lang="es">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        .no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
        .input-premium{background:rgba(24,24,27,.8);border:1px solid rgba(63,63,70,.5);transition:all .3s ease}
        .input-premium:focus{border-color:var(--accent-color,#dc2626);background:rgba(39,39,42,1);box-shadow:0 0 15px rgba(220,38,38,.1)}
        .shake{animation:shake .4s cubic-bezier(.36,.07,.19,.97) both}
        @keyframes shake{10%,90%{transform:translate3d(-1px,0,0)}20%,80%{transform:translate3d(2px,0,0)}30%,50%,70%{transform:translate3d(-4px,0,0)}40%,60%{transform:translate3d(4px,0,0)}}

</head>

<!-- BUSQUEDA OVERLAY MOBILE -->

<!-- MODAL LOGIN -->
<div id="modalLogin" class="fixed inset-0 md:inset-auto md:top-20 md:right-6 z-[150] hidden items-end md:items-start justify-center md:justify-start">
    <div class="absolute inset-0 bg-black/60 md:hidden" id="modalLoginOverlay"></div>
    <div id="modalCard" class="relative bg-zinc-900 border border-white/10 w-full md:w-80 rounded-t-3xl md:rounded-2xl shadow-2xl overflow-hidden max-h-[90vh] overflow-y-auto no-scrollbar">

        <div class="md:hidden w-12 h-1 bg-zinc-700 rounded-full mx-auto mt-3"></div>

                <h3 id="modalTitulo" class="text-xl font-black italic uppercase tracking-tighter mb-1">Bienvenido</h3>

                <div class="space-y-3">
                    <input type="text" id="nicknameUsuario" placeholder="Usuario" class="w-full input-premium p-3 rounded-xl text-sm outline-none hidden">

                    </p>

            </div>
            <div id="perfilActivo" class="hidden text-center">
                <div class="relative w-20 h-20 mx-auto mb-4">
                    <div class="absolute inset-0 bg-accent rounded-full blur-md opacity-20"></div>
                    <div id="avatarCirculo" class="relative w-20 h-20 bg-zinc-800 border-2 border-accent rounded-full flex items-center justify-center text-3xl font-black shadow-2xl text-white overflow-hidden"><span id="inicialUsuario">M</span></div>
                </div>
                <p class="text-zinc-200 font-black uppercase tracking-tighter text-lg mb-1" id="saludoUsuario">Hola</p>
                <button onclick="location.href='perfil.html'" class="w-full mt-4 bg-zinc-800/50 hover:bg-accent text-white text-[10px] font-bold py-3 rounded-xl uppercase tracking-widest transition border border-white/5">Mi Perfil</button>
                <div class="mt-5 border-t border-white/5 pt-4">
                    <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest mb-3">Color de Acento</p>
                    <div class="flex gap-3 justify-center">
                        <div onclick="cambiarColor('#dc2626')" class="w-7 h-7 rounded-full bg-red-600 cursor-pointer hover:scale-110 transition"></div>
                        <div onclick="cambiarColor('#2563eb')" class="w-7 h-7 rounded-full bg-blue-600 cursor-pointer hover:scale-110 transition"></div>
                        <div onclick="cambiarColor('#16a34a')" class="w-7 h-7 rounded-full bg-green-600 cursor-pointer hover:scale-110 transition"></div>
                        <div onclick="cambiarColor('#9333ea')" class="w-7 h-7 rounded-full bg-purple-600 cursor-pointer hover:scale-110 transition"></div>
                    </div>
                </div>
                <button onclick="cerrarSesion()" class="w-full mt-5 py-3 rounded-xl border border-zinc-800 text-[10px] font-bold uppercase tracking-widest text-zinc-500 hover:text-white transition">Cerrar Sesion</button>

        </div>

</div>

    <div class="flex items-center justify-around py-3 px-2">
        <a href="index.html" class="flex flex-col items-center gap-1 text-accent">

            <span class="text-[9px] font-black uppercase tracking-widest">Inicio</span>
        </a>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import{getFirestore,doc,setDoc,getDoc,collection,getDocs}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyAn5N7m7EhICK2aZG4Nx8DIW9RZd9kK1DA",authDomain:"moviem-5b73d.firebaseapp.com",projectId:"moviem-5b73d",storageBucket:"moviem-5b73d.firebasestorage.app",messagingSenderId:"843796138544",appId:"1:843796138544:web:c2bde9b39d437b84d97bf5"};
const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);
const API_KEY='86dfc26f9d7b8c9957129a1d7a173ddc',BASE='https://image.tmdb.org/t/p/w500';
let esModo=false,timer=null;

window.notificar=function(msg,tipo){
  tipo=tipo||'success';
  var c=document.getElementById('toastContainer'),t=document.createElement('div');
  t.className='flex items-center gap-2 bg-zinc-900 border border-white/10 px-4 py-3 rounded-2xl shadow-2xl translate-x-10 opacity-0 transition-all duration-500 border-l-4 '+(tipo==='success'?'border-l-green-500':'border-l-red-600');
  t.innerHTML='<span class="text-xs font-bold uppercase tracking-widest">'+msg+'</span>';
  c.appendChild(t);setTimeout(function(){t.classList.remove('translate-x-10','opacity-0');},100);
  setTimeout(function(){t.classList.add('translate-x-10','opacity-0');setTimeout(function(){t.remove();},500);},3000);
};
window.cambiarColor=function(hex){document.documentElement.style.setProperty('--accent-color',hex);localStorage.setItem('movieM_color',hex);notificar('Color actualizado');};

function abrirModal(){var m=document.getElementById('modalLogin');m.classList.remove('hidden');m.classList.add('flex');}
function cerrarModal(){var m=document.getElementById('modalLogin');m.classList.add('hidden');m.classList.remove('flex');}
['btnUsuario','btnUsuarioMobile','btnUsuarioMobileNav'].forEach(function(id){
  var el=document.getElementById(id);if(el)el.onclick=function(){document.getElementById('modalLogin').classList.contains('hidden')?abrirModal():cerrarModal();};
});
document.getElementById('modalLoginOverlay').onclick=cerrarModal;

window.toggleModoRegistro=function(modo){
  esModo=modo;
  document.getElementById('modalTitulo').innerText=modo?'Crea tu cuenta':'Bienvenido';
  document.getElementById('modalSubtitulo').innerText=modo?'Unete a MovieM':'Ingresa tus datos';
  document.getElementById('btnAccionPrincipal').innerText=modo?'Crear Cuenta':'Entrar';
  document.getElementById('nicknameUsuario').classList.toggle('hidden',!modo);
  document.getElementById('confirmPass').classList.toggle('hidden',!modo);
  document.getElementById('textoToggle').innerHTML=modo?'Ya tienes cuenta? <button onclick="toggleModoRegistro(false)" class="text-accent underline">Inicia Sesion</button>':'No tienes cuenta? <button onclick="toggleModoRegistro(true)" class="text-accent underline">Registrate</button>';
};

window.procesarUsuario=async function(){
  var email=document.getElementById('nombreUsuario').value,nick=document.getElementById('nicknameUsuario').value,p=document.getElementById('passUsuario').value,cp=document.getElementById('confirmPass').value,card=document.getElementById('modalCard');
  if(!email||!p||(esModo&&!nick)){card.classList.add('shake');setTimeout(function(){card.classList.remove('shake');},400);notificar('Completa todos los campos','error');return;}
  try{
    if(esModo){
      if(p!==cp){card.classList.add('shake');setTimeout(function(){card.classList.remove('shake');},400);notificar('Las contrasenas no coinciden','error');return;}
      var r=await createUserWithEmailAndPassword(auth,email,p);
      await setDoc(doc(db,'usuarios',r.user.uid),{username:nick,email:email,color:'#dc2626'});
      notificar('Cuenta creada!');
    } else {await signInWithEmailAndPassword(auth,email,p);notificar('Bienvenido!');}
  }catch(err){card.classList.add('shake');setTimeout(function(){card.classList.remove('shake');},400);notificar(err.message,'error');}
};

function setAvatarUI(nombre,avatarSrc){
  document.getElementById('contenidoLogin').classList.add('hidden');
  document.getElementById('perfilActivo').classList.remove('hidden');
  document.getElementById('saludoUsuario').innerText=nombre;
  var letra=nombre.charAt(0).toUpperCase();
  var av=avatarSrc?'<img src="'+avatarSrc+'" class="w-full h-full object-cover">':'<span class="text-xs font-black text-white">'+letra+'</span>';
  document.getElementById('navAvatarInner').innerHTML=av;
  document.getElementById('avatarCirculo').innerHTML=avatarSrc?'<img src="'+avatarSrc+'" class="w-full h-full object-cover">':'<span>'+letra+'</span>';
  document.getElementById('navAvatarInnerMobile').innerHTML=av;
  if(!avatarSrc){document.getElementById('btnUsuario').style.backgroundColor='var(--accent-color,#dc2626)';document.getElementById('btnUsuarioMobile').style.backgroundColor='var(--accent-color,#dc2626)';}
  var bn=document.getElementById('navAvatarBottomNav');
  bn.innerHTML=avatarSrc?'<img src="'+avatarSrc+'" class="w-full h-full object-cover rounded-full">':'<span class="text-[10px] font-black text-white">'+letra+'</span>';
  if(!avatarSrc)bn.style.backgroundColor='var(--accent-color,#dc2626)';
}

window.cerrarSesion=async function(){await signOut(auth);notificar('Sesion cerrada');setTimeout(function(){location.reload();},1000);};

onAuthStateChanged(auth,async function(user){
  if(user){
    var snap=await getDoc(doc(db,'usuarios',user.uid)),data=snap.exists()?snap.data():{};
    var nombre=data.username||user.email.split('@')[0];
    var storedUID=localStorage.getItem('movieM_uid');
    if(storedUID&&storedUID!==user.uid)localStorage.removeItem('movieM_avatar');
    localStorage.setItem('movieM_uid',user.uid);localStorage.setItem('usuarioMovieM',nombre);
    var color=data.color||localStorage.getItem('movieM_color')||'#dc2626';
    document.documentElement.style.setProperty('--accent-color',color);
    setAvatarUI(nombre,data.avatar||null);
  } else {document.getElementById('contenidoLogin').classList.remove('hidden');document.getElementById('perfilActivo').classList.add('hidden');}
});

async function buscarTodo(q,dropEl){
  dropEl.innerHTML='<p class="text-zinc-600 text-xs p-4 text-center animate-pulse">Buscando...</p>';
  try{
    var[resPelis,snapU]=await Promise.all([
      fetch('https://api.themoviedb.org/3/search/movie?api_key='+API_KEY+'&language=es-ES&query='+encodeURIComponent(q)).then(function(r){return r.json();}),
      getDocs(collection(db,'usuarios'))
    ]);
    var pelis=(resPelis.results||[]).slice(0,4),users=[];
    snapU.forEach(function(d){var u=d.data();if(u.username&&u.username.toLowerCase().indexOf(q.toLowerCase())!==-1)users.push({uid:d.id,username:u.username,avatar:u.avatar||null});});
    users=users.slice(0,3);
    var html='';
    if(users.length){
      html+='<div class="px-4 pt-3 pb-1"><span class="text-[9px] font-black uppercase tracking-[0.2em] text-zinc-500">Usuarios</span></div>';
      users.forEach(function(u){
        var letra=u.username.charAt(0).toUpperCase();
        var av=u.avatar?'<img src="'+u.avatar+'" class="w-9 h-9 rounded-full object-cover shrink-0">':'<div class="w-9 h-9 rounded-full bg-red-600 flex items-center justify-center text-white font-black text-xs shrink-0">'+letra+'</div>';
        html+='<div class="flex items-center gap-3 px-4 py-3 hover:bg-zinc-800 active:bg-zinc-800 cursor-pointer transition" onclick="location.href=\'perfil.html?user='+encodeURIComponent(u.username)+'\'">'+av+'<div><p class="text-sm font-bold">'+u.username+'</p><p class="text-[9px] text-zinc-500 uppercase font-bold">Perfil</p></div></div>';
      });
    }
    if(pelis.length){
      html+='<div class="px-4 pt-3 pb-1'+(users.length?' border-t border-white/5 mt-1':'')+'"><span class="text-[9px] font-black uppercase tracking-[0.2em] text-zinc-500">Peliculas</span></div>';
      pelis.forEach(function(p){
        var poster=p.poster_path?'https://image.tmdb.org/t/p/w92'+p.poster_path:'';
        var anio=p.release_date?p.release_date.split('-')[0]:'';
        html+='<div class="flex items-center gap-3 px-4 py-2.5 hover:bg-zinc-800 active:bg-zinc-800 cursor-pointer transition" onclick="location.href=\'pelicula.html?id='+p.id+'\'">'+(poster?'<img src="'+poster+'" class="w-8 h-12 rounded-lg object-cover shrink-0">':'<div class="w-8 h-12 bg-zinc-700 rounded-lg shrink-0"></div>')+'<div class="flex-1 min-w-0"><p class="text-sm font-bold truncate">'+p.title+'</p><p class="text-[9px] text-zinc-500 uppercase font-bold">'+anio+(p.vote_average?' · ⭐ '+p.vote_average.toFixed(1):'')+'</p></div></div>';
      });
    }
    if(!pelis.length&&!users.length)html='<p class="text-zinc-600 text-xs p-6 text-center italic">Sin resultados</p>';
    dropEl.innerHTML=html;
  }catch(e){dropEl.innerHTML='<p class="text-zinc-600 text-xs p-4 text-center">Error</p>';}
}

var buscador=document.getElementById('buscador'),dropdown=document.getElementById('searchDropdown');
buscador.addEventListener('input',function(){
  clearTimeout(timer);var q=buscador.value.trim();
  if(q.length<2){dropdown.classList.add('hidden');return;}
  timer=setTimeout(function(){dropdown.classList.remove('hidden');buscarTodo(q,dropdown);},350);
});
document.addEventListener('click',function(e){if(!buscador.contains(e.target)&&!dropdown.contains(e.target))dropdown.classList.add('hidden');});

var overlay=document.getElementById('searchOverlayMobile'),buscMob=document.getElementById('buscadorMobile'),dropMob=document.getElementById('searchDropdownMobile');
document.getElementById('btnBuscarMobile').onclick=function(){overlay.classList.remove('hidden');overlay.classList.add('flex');setTimeout(function(){buscMob.focus();},100);};
document.getElementById('btnCerrarBusqueda').onclick=function(){overlay.classList.add('hidden');overlay.classList.remove('flex');buscMob.value='';dropMob.innerHTML='';};
buscMob.addEventListener('input',function(){
  clearTimeout(timer);var q=buscMob.value.trim();
  if(q.length<2){dropMob.innerHTML='';return;}
  timer=setTimeout(function(){buscarTodo(q,dropMob);},350);
});

function crearCard(peli){
  var puntaje=peli.vote_average?peli.vote_average.toFixed(1):'S/R';
  var anio=(peli.release_date||peli.first_air_date||'').split('-')[0]||'';
  var poster=peli.poster_path?BASE+peli.poster_path:'https://via.placeholder.com/500x750?text=?';
  var card=document.createElement('div');
  card.className='min-w-[120px] md:min-w-[180px] cursor-pointer active:scale-95 md:hover:scale-105 transition-transform duration-300 relative group mb-2';
  var inner=document.createElement('div');inner.className='relative';
  var img=document.createElement('img');img.src=poster;img.className='rounded-xl shadow-lg mb-1 border border-white/5 w-full';img.loading='lazy';
  img.onclick=function(){location.href='pelicula.html?id='+peli.id;};
  var badge=document.createElement('div');
  badge.className='absolute top-1.5 right-1.5 flex flex-col items-end gap-1';
  badge.innerHTML='<div class="bg-black/80 text-yellow-500 text-[9px] font-black px-1.5 py-0.5 rounded-lg">⭐ '+puntaje+'</div>'
    +(anio?'<div class="bg-black/80 text-zinc-300 text-[9px] font-black px-1.5 py-0.5 rounded-lg">'+anio+'</div>':'');
  inner.appendChild(img);inner.appendChild(badge);
  var title=document.createElement('p');title.className='text-[9px] md:text-[10px] text-center truncate w-full font-bold uppercase tracking-tighter text-zinc-500 mt-1';title.textContent=peli.title||peli.name;
  card.appendChild(inner);card.appendChild(title);return card;
}

async function cargarSeccion(url,id){
  try{var r=await fetch(url),d=await r.json(),c=document.getElementById(id);if(d.results)d.results.forEach(function(p){c.appendChild(crearCard(p));});}catch(e){console.error(e);}
}

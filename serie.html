<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MovieM | Serie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Bloqueo estricto de scroll para móviles cuando el player está abierto */
        body.player-open {
            overflow: hidden !important;
            height: 100vh !important;
            position: fixed;
            width: 100%;
        }

        #playerOverlay {
            display: none;
            background: #000;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100dvh; /* Altura dinámica para Safari/Chrome móvil */
            z-index: 9999;
            flex-direction: column;
        }

        .player-wrap {
            position: relative;
            flex: 1;
            width: 100%;
            background: #000;
        }

        #serieFrame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Estilos adicionales para UI */
        .star{cursor:pointer;transition:color .2s ease}
        .no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
        .skeleton{animation:pulse-bg 1.5s infinite ease-in-out}
        @keyframes pulse-bg{0%{background-color:rgba(39,39,42,.5)}50%{background-color:rgba(63,63,70,.5)}100%{background-color:rgba(39,39,42,.5)}}
        .fade-in{animation:fadeIn .8s ease forwards;opacity:0}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .temp-tab.active{color:white;border-bottom: 2px solid #dc2626}
        .ep-card{transition:all .2s;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans overflow-x-hidden">

<div id="playerOverlay">
    <div class="w-full flex justify-between items-center p-3 md:p-4 bg-zinc-950 border-b border-white/5" style="flex-shrink:0">
        <div class="flex flex-col md:flex-row md:items-center gap-1 md:gap-4">
            <div class="flex items-center gap-2">
                <span class="text-red-600 font-black tracking-tighter text-lg md:text-xl">MOVIE<span class="text-white font-light">M</span></span>
                <span id="playerLabel" class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest truncate max-w-[150px] md:max-w-none"></span>
            </div>
            <div class="flex items-center gap-1.5 bg-white/5 p-1 rounded-lg border border-white/10">
                <button onclick="cambiarServidor(1)" id="btnS1" class="text-[9px] font-black px-3 py-1.5 rounded transition-colors bg-red-600 text-white">SERVER 1</button>
                <button onclick="cambiarServidor(2)" id="btnS2" class="text-[9px] font-black px-3 py-1.5 rounded transition-colors bg-zinc-800 text-zinc-400">SERVER 2</button>
            </div>
        </div>
        <button onclick="cerrarPlayer()" class="text-white font-black uppercase text-[11px] tracking-widest bg-white/10 h-10 px-5 rounded-full border border-white/10 active:bg-red-600 transition-colors">
            Cerrar ×
        </button>
    </div>
    <div class="player-wrap">
        <iframe id="serieFrame" 
                src="" 
                allowfullscreen="true" 
                webkitallowfullscreen="true" 
                mozallowfullscreen="true" 
                allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
                sandbox="allow-forms allow-scripts allow-pointer-lock allow-same-origin allow-top-navigation">
        </iframe>
    </div>
</div>

<div id="backdrop" class="fixed inset-0 w-full h-full bg-cover bg-center opacity-20 md:opacity-30 blur-sm -z-10"></div>
<div class="fixed inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/80 to-transparent -z-10"></div>

<main class="px-4 md:px-8 pt-20 pb-8">
    <div id="titulo" class="text-4xl font-black mb-4 italic uppercase">Cargando...</div>
    <div id="tabsTemporadas" class="flex gap-2 overflow-x-auto no-scrollbar mb-6 border-b border-white/5"></div>
    <div id="gridEpisodios" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
</main>

<script type="module">
    // --- Configuración Global ---
    const API_KEY = '86dfc26f9d7b8c9957129a1d7a173ddc';
    const serieID = new URLSearchParams(window.location.search).get('id');
    let currentTemp = 1;
    let currentEp = 1;
    let currentLabel = "";

    // --- Lógica del Reproductor ---
    window.reproducirEpisodio = function(temp, ep, nombre) {
        currentTemp = temp;
        currentEp = ep;
        currentLabel = `T${temp} · E${ep} — ${nombre || ''}`;
        
        // Abrir UI
        document.getElementById('playerLabel').innerText = currentLabel;
        document.getElementById('playerOverlay').style.display = 'flex';
        document.body.classList.add('player-open');

        // Cargar servidor 1 por defecto
        cambiarServidor(1);
    };

    window.cambiarServidor = function(num) {
        const frame = document.getElementById('serieFrame');
        const btn1 = document.getElementById('btnS1');
        const btn2 = document.getElementById('btnS2');
        
        // Fuentes actualizadas 2024 para máxima compatibilidad móvil
        const fuentes = {
            1: `https://vidsrc.cc/v3/embed/tv/${serieID}/${currentTemp}/${currentEp}?auto_lang=es`,
            2: `https://vidsrc.xyz/embed/tv?tmdb=${serieID}&season=${currentTemp}&episode=${currentEp}`
        };

        frame.src = fuentes[num];

        // Cambio visual de botones
        if(num === 1) {
            btn1.className = "text-[9px] font-black px-3 py-1.5 rounded transition-colors bg-red-600 text-white";
            btn2.className = "text-[9px] font-black px-3 py-1.5 rounded transition-colors bg-zinc-800 text-zinc-400";
        } else {
            btn2.className = "text-[9px] font-black px-3 py-1.5 rounded transition-colors bg-red-600 text-white";
            btn1.className = "text-[9px] font-black px-3 py-1.5 rounded transition-colors bg-zinc-800 text-zinc-400";
        }
    };

    window.cerrarPlayer = function() {
        const player = document.getElementById('playerOverlay');
        const frame = document.getElementById('serieFrame');
        
        player.style.display = 'none';
        frame.src = ''; // Detener video/audio
        document.body.classList.remove('player-open');
    };

    // (Aquí iría el resto de tu lógica de cargarPagina() y cargarEpisodios() que ya tenías)
    // Asegúrate de que al crear los episodios en el bucle, el onclick llame a:
    // div.onclick = () => reproducirEpisodio(numTemp, ep.episode_number, ep.name);
</script>

</body>
</html>

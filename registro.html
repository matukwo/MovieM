<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Perfil - Moviem</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex items-center justify-center min-h-screen">

    <div class="bg-zinc-900 p-8 rounded-2xl border border-white/10 w-full max-w-md">
        <h2 class="text-3xl font-bold mb-6 text-center">Únete a Moviem</h2>
        
        <div class="space-y-4">
            <div>
                <label class="text-sm text-zinc-400">Nombre de Usuario</label>
                <input type="text" id="regUser" class="w-full bg-zinc-800 p-3 rounded-lg border border-white/5 focus:border-white/20 outline-none">
            </div>
            <div>
                <label class="text-sm text-zinc-400">Correo Electrónico</label>
                <input type="email" id="regEmail" class="w-full bg-zinc-800 p-3 rounded-lg border border-white/5 focus:border-white/20 outline-none">
            </div>
            <div>
                <label class="text-sm text-zinc-400">Contraseña</label>
                <input type="password" id="regPass" class="w-full bg-zinc-800 p-3 rounded-lg border border-white/5 focus:border-white/20 outline-none">
            </div>
            
            <button onclick="ejecutarRegistro()" class="w-full bg-white text-black font-bold py-3 rounded-lg hover:bg-zinc-200 transition mt-4">
                Crear Cuenta
            </button>
        </div>
        
        <p class="text-center text-zinc-500 mt-6 text-sm">
            ¿Ya tienes cuenta? <a href="login.html" class="text-white hover:underline">Inicia sesión</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // USA TUS MISMAS CREDENCIALES AQUÍ
        const firebaseConfig = {
            apiKey: "AIzaSyAn5N7M7EhICK2aZG4Nx8DIW9RZd9kK1DA",
            authDomain: "moviem-5b73d.firebaseapp.com",
            projectId: "moviem-5b73d",
            storageBucket: "moviem-5b73d.firebasestorage.app",
            messagingSenderId: "843796138544",
            appId: "1:843796138544:web:c2bde9b39d437b84d97bf5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.ejecutarRegistro = async () => {
            const u = document.getElementById('regUser').value;
            const e = document.getElementById('regEmail').value;
            const p = document.getElementById('regPass').value;

            if(!u || !e || !p) return alert("Por favor, llena todos los campos");

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, e, p);
                const user = userCredential.user;

                // Guardamos el nombre de usuario en Firestore
                await setDoc(doc(db, "usuarios", user.uid), {
                    username: u,
                    email: e,
                    fecha: new Date()
                });

                alert("¡Bienvenido, " + u + "!");
                window.location.href = "index.html"; // O a donde quieras mandarlo

            } catch (error) {
                alert("Error: " + error.message);
            }
        };
    </script>
</body>
</html>
